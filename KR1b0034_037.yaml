body:
  text: 尚書纂傳卷三十七元王天與撰君陳第二十三周書周公既沒命君陳分正東郊成周作君陳漢孔氏曰成王重周公所營故命君陳分居正東郊成周之邑里官司唐孔氏曰周公遷殷頑民於成周親自監之周公既沒成王命君陳代周公監之鄭元云君陳蓋周公子未必然矣李氏曰君陳亦猶稱君奭君牙葉氏曰分正猶分陜之分分東郊而使之正也吕氏曰成周乃東郊之總名河南成周之王城也洛陽成周之下都也王城非天子時會諸侯則虛之下都則保釐大臣所居治事之地君陳畢公尹殷民蓋在下都之地命書皆謂之東郊則下都在王城之東明矣唐孔氏曰史敘其事作君陳君陳漢孔氏曰作書命之臣名也因以名篇唐孔氏曰君陳亦命也蔡氏曰今文無古文有王若曰君陳惟爾令德孝恭惟孝友于兄弟克施有政命汝尹兹東郊敬哉陳氏曰此章總言德政乃一篇之綱領漢孔氏曰言其有令德善事父母行已以恭吕氏曰令德即孝恭也令者所以形容孝恭之粹美也按令德莫大於孝恭則自孝中出如責難於君謂之恭曽子謂事君不忠非孝則指此恭為事君之恭亦可如與人恭而有禮曽子謂交友不信非孝則指此恭為與人之恭亦可隨孝心發見處為恭孝恭雖若並言其實孝字意重漢孔氏曰言善父母者必友于兄弟能施有政令真氏曰天下萬善同出一源愛敬之心隨遇而見施之親則曰孝施之兄弟則曰友非二道也蓋孝者之心慈祥惻怛推之君臣朋友無不盡者近而天倫之戚抑又可知世固有知厚其親而此或昧焉者特未誠於孝而已苟誠孝矣雖一髮膚之微且不敢忽况同氣而生者乎父母之所愛愛之雖犬馬猶然况親之遺體乎此孝之所以必友也吕氏曰惟孝友于兄弟自父母而達之兄弟也克施有政自家而達之官也漢孔氏曰正此東郊監殷頑民教訓之王氏曰尹即所謂分正也吕氏曰東郊何地也周公之居也今焉命汝臨長之如之何其不敬也昔周公師保萬民民懷其德往愼乃司兹率厥常懋昭周公之訓惟民其乂我聞曰至治馨香感于神明黍稷非馨明德惟馨爾尚式時周公之猷訓惟日孜孜無敢逸豫凡人未見聖若不克見既見聖亦不克由聖爾其戒哉王氏曰此章教君陳法周公修德漢孔氏曰言周公師安天下之民民歸其德蔡氏曰周公之在東郊有師之尊有保之親師教之保安之漢孔氏曰今往承其業當愼汝所主此循其常法而教訓之勉明周公之教惟民其治吕氏曰民方深懷周公之德苟君陳一事少異周公則觀聽疑駭怨謗交集民不可得而治矣惟發明周公之訓示之自翕然順聽漢孔氏曰所聞上古聖賢之言致治之至者芬芳馨氣動於神明所謂芬芳非黍稷之氣乃明德之馨勵之以德吕氏曰成王既勉君陳昭周公之訓復舉周公精微之訓以告之至治馨香以下四語所謂周公之訓也物之精粗固無二體然形質止而氣臭升止者有方升者無間則馨香者精華之上達者也至治舉其成明德循其本非有二馨香也漢孔氏曰汝庶幾用是周公之道教殷民惟當日孜孜勤行之無敢自寬暇逸豫吕氏曰周公之訓固為精微而舉以告君陳尤當其可自殷頑民言之欲其感格非可形驅而勢迫所謂洞達無間者蓋當深省也自周公法度言之典章雖具苟無前人之德則索然萎薾徒為陳迹也故勉之以用是猷訓惟日孜孜無敢逸豫焉是訓也至精至微非日新不已深致篤敬之功孰能與于斯漢孔氏曰此言凡人有初無終未見聖道如不能得見已見聖道亦不能用之所以無成汝戒勿此為凡人之行蔡氏曰君陳實親見周公故特中戒以爾惟風下民惟草圖厥政莫或不艱有廢有興出入自爾師虞庶言同則繹爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德嗚呼臣人咸若時惟良顯哉王氏曰此章教君陳以為政漢孔氏曰民從上教而變猶草應風而偃不可不愼漢孔氏曰謀其政無有不先慮其難有所廢有所起出納之事當用汝衆言度之衆言同則陳而布之禁其專吕氏曰廢興非謂更革周公之法蓋政事舉措之間斟酌權衡以求其當而已當出入反覆與衆共度之應氏曰出上之意以達之於下入下之言以達之於上而與衆反覆籌度之也蔡氏曰衆言既同則又紬繹而深思之而後行也漢孔氏曰汝有善謀善道則入告汝君於內汝乃順行之於外此善謀此善道惟我君之德善則稱君人臣之義蔡氏曰言切於事謂之謀言合於道謂之猷道與事非二也各舉其重者言之吕氏曰此成王舉君陳前日已然之善而美之也葛氏曰成王殆失言矣真氏曰善則稱君乃人臣之自處者所當知君以是告其臣則不可也漢髙帝稱李斯善則稱君而王衛尉深非之衛尉之名不著然其言足為後世法吕氏之云乃回護之辭漢孔氏曰嘆而美之曰臣於人者皆順此道是惟良臣則君顯明於世王氏曰良言其善顯言其善之昭著也王曰君陳爾惟𢎞周公丕訓無依勢作威無倚法以削寬而有制從容以和殷民在辟豫曰辟爾惟勿辟豫曰宥爾惟勿宥惟厥中有弗若于汝政弗化于汝訓辟以止辟乃辟狃于姦宄敗常亂俗三細不宥爾無忿疾于頑無求備于一夫必有忍其乃有濟有容德乃大簡厥修亦簡其或不修進厥良以率其或不良王氏曰此章告以政之節目漢孔氏曰汝為政當闡大周公之大訓無乘勢位作威人上無倚法制以行刻削之政蔡氏曰此篇言周公之訓者三曰懋昭曰式時至此則𢎞周公之丕訓欲其益張而大之也君陳何有倚勢以為威倚法以侵削者然勢我所有也法我所用也喜怒豫奪毫髮不於人而於己是私意也非公理也漢孔氏曰寬不失制動不失和德教之治鄭氏曰從容者和緩之意吕氏曰方和中時大體固當寬苟無制焉則流蕩放侈乖爭陵犯之所由起矣循擾調娛于品節之間遊息化養於範圍之內斯其所以和也漢孔氏曰殷人有罪在刑法者我曰刑之汝勿刑我曰赦宥汝勿宥惟其當以中正平理斷之漢孔氏曰有不順于汝政不變于汝教刑之而懲止犯刑者乃刑之蔡氏曰此終上之辟漢孔氏曰習于姦宄凶惡毁敗五常之道以亂風俗之教罪雖小三犯不赦所以絶惡源蔡氏曰犯此三者雖小罪亦不可宥以其所關者大也此終上之宥漢孔氏曰人有頑嚚不喻汝當訓之無忿怒疾之使人當器之無責備于一夫鄭氏曰忿怒也漢孔氏曰為人君長必有所含忍其乃有所成有所包容德乃為大欲其忍恥藏垢蘇氏曰有殘忍之忍有容忍之忍春秋傳謂州吁阻兵而安忍殘忍之忍也孔子謂小不忍則亂大謀容忍之忍也此言必有忍正孔子所戒小不忍亂大謀者林氏曰強恕而行者忍也人與已猶二也一視同仁者容也己與物渾渾乎為一矣陳氏曰此即無忿疾于頑之意漢孔氏曰簡别其德行修者亦别其有不修者善以勸能惡以阻否進顯其賢良者以率其有不良者使為善陳氏曰修謂方修于善良謂已進于善陳氏曰此即無求備于一夫之意惟民生厚因物有遷違上所命從厥攸好爾克敬典在德時乃罔不變允升于大猷惟豫一人膺受多福其爾之休終有辭於永世王氏曰末章又歸于修德漢孔氏曰言人自然之性敦厚因所見所習之物有遷變之道故必愼所以示之吕氏曰商民所以澆薄者以居沈湎暴虐之地而為物所遷耳其性之厚自若也苟卿生戰國見其俗薄而遂出性惡之論其亦異於成王之觀矣漢孔氏曰人之於上不從其令從其所好故人主不可不愼其所好蔡氏曰大學言其所令反其所好則民不從亦此意漢孔氏曰汝治人能敬常在道德是乃無不變化其政教則信升于大道蔡氏曰敬典者敬其君臣父子兄弟夫婦朋友之常道也在德者得其典常之道而著之於身也蓋知敬典而不知在德則典與我猶二也惟敬典而在德焉則所敬之典無非實有諸己吕氏曰東郊命君陳始以令德孝恭得之終以敬典在德勉之漢孔氏曰則惟我一人亦當受其多福其汝之美名亦然見稱誦于長世張氏曰人君不言福風俗醇厚即人君之福其曰終有辭以見成王之期君陳逺矣尚書纂傳卷三十七
