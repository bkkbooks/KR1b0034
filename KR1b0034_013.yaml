body:
  text: 尚書纂傳卷十三元王天與撰咸有一德第八商書伊尹作咸有一德漢孔氏曰言君臣皆有純一之德以戒太甲唐孔氏曰百篇之序此類有四咎單作明居周公作無逸作立政與此篇直言其所作之人不言其作者之意蓋以經文明故略之咸有一德吕氏曰此篇終始言一德一德之名明百聖之所未明林氏曰篇內有咸有一德故以名篇亦訓體也蔡氏曰今文無古文有伊尹既復政厥辟將告歸乃陳戒于德唐孔氏曰叙其作戒之由漢孔氏曰還政太甲告老歸邑陳德以戒唐孔氏曰太甲既歸伊尹即應還政下云今嗣王新服厥命則是初始即政蓋太甲居亳之後即告老也君奭云在太甲時則有若保衡左傳云伊尹放太甲而相之卒無怨色則是伊尹又相太甲蓋伊尹此時將告歸太甲留之為相如成王之留周公也曰嗚呼天難諶命靡常常厥德保厥位厥德匪常九有以亡夏王弗克庸德慢神虐民皇天弗保監于萬方啓迪有命眷求一德俾作神主惟尹躬暨湯咸有一德克享天心受天明命以有九有之師爰革夏正非天私我有商惟天佑于一德非商求于下民惟民歸于一德德惟一動罔不吉德二三動罔不凶惟吉凶不僭在人惟天降災祥在德陳氏曰此首言天命廢興吉凶皆本乎德漢孔氏曰以其無常故難信真氏曰諶信也靡無也天難諶者今日而善則福之明日而淫則禍之難必信也命靡常者有德則歸于我無德則去之人無定位也漢孔氏曰人能常其德則安其位九有諸侯桀不能常其德湯伐而兼之蔡氏曰常厥德所謂德惟一厥德匪常所謂德二三唐孔氏曰九有九州也漢孔氏曰言桀不能常其德不敬神明不恤下民漢孔氏曰言天不安桀所為廣視萬方有天命者開道之漢孔氏曰天求一德使伐桀為天地神祇之主吕氏曰至此方露一德之名張氏曰言神主則民主可知朱子曰此篇先言常德庸德後言一德則一者常一之謂能漢孔氏曰享當也蔡氏曰湯之君臣皆有一德故上當天心受天明命漢孔氏曰爰於也於得九州之衆遂伐夏勝之改其正林氏曰正正朔之正夏以建寅為正商始以建丑為正革夏正用商正也漢孔氏曰非天私商而王之佑助一德所以王非商以力求民民自歸于一德蔡氏曰上言一德故得天得民此言天佑民歸皆以一德之故蓋反覆言之漢孔氏曰二三言不一吕氏曰一則動皆合理故無不吉二三則動皆悖理故無不凶漢孔氏曰行善則吉行惡則凶是不差德一天降之善不一天降之災是在德唐孔氏曰指其已然則為吉凶言其徴兆則曰災祥其事不甚異也吉凶已成之事指人言之故曰在人災祥未至之徴行之所招故言在德在德謂為德有一與不一在人謂人行有善有不善吉凶已在其身故不言來處災祥自外而至故言天降其實吉凶亦天降也今嗣王新服厥命惟新厥德終始惟一時乃日新任官惟賢材左右惟其人臣為上為德為下為民其難其慎惟和惟一陳氏曰此勉太甲君臣應前咸有一德之意漢孔氏曰其命王命新其德戒勿怠張氏曰太甲即位久矣曰新服厥命自復政時言也夏氏曰服天命謂受命在身如衣被其服而在身也漢孔氏曰言德行終始不衰殺是乃日新之義大學盤銘曰茍日新日日新又日新朱子曰這箇道理須是常接續不已方是才有閒斷便不可又曰必因其已新而日日新之又日新之使其存養省察之功無少間斷則明德常明不復為利欲之昏真氏曰易以日新為盛德先儒謂人之學不日進則日退故德不可不日新不日新者不一害之也始敬終肆以一出一入之心為或作或輟之事德何自而新乎終始常一則德日新矣漢孔氏曰官賢材而任之非賢材不可任選左右必忠良不忠良非其人蔡氏曰賢者有德之稱材者能也左右者輔弼大臣非賢材之稱可盡故曰惟其人漢孔氏曰言臣奉上布德順下訓民朱子曰四為字皆去聲為上者輔其德而不阿其意之所欲為下者利於民而不徇已之所安或問如逄君之惡也是為上而非是為德為宫室妻妾之奉也是為下而非是為民朱子曰然真氏曰為云者意有所主之名言人臣之心為上則為君成德為下則為君牧民意之所主惟此二者二者之外不雜他念然後為一德之臣漢孔氏曰其難無以為易其慎無以輕之羣臣當和一心以事君政乃善夏氏曰人君任用之際既難既慎不敢任用非人又與之和協其心純一其德同心同德相與大有為於天下可也德無常師主善為師善無常主協于克一陳氏曰此言一德之義漢孔氏曰德非一方以善為主乃可師言以合於能一為常德或問或言主善人而為師若仲尼無恆師之意如何朱子曰非也橫渠說德主天下之善善原天下之一最好又曰四句三段一段緊似一段德且是大體說有吉德有凶德然必主於善始為吉耳善亦且是大體說或在此為善而在彼為不善或在彼為善而在此為不善或在前日則為善而今日則不善或在前日則不善而今日則為善惟須協于克一是乃為善謂以此心揆度彼善耳故橫渠言原則若善之原於一耳蓋善因一而後定也德以事言善以理言一以心言大扺此篇只有幾個一字上有精神須與細看此心才一便終始不變而有常也協者雖訓合字却是以此合彼之合非已相合之合與禮記協于分藝書協時月正日之協同蓋若揆度參驗之意耳張敬夫謂虞書精一四句與此為尚書語之最精密者而虞書為尤精蔡氏曰一德純一之德不雜不息之義又曰精粹無雜者一也終始無閒者一也該括萬善者一也一者通古今達上下萬化之原萬事之幹語其理則無二語其運則無息語其體則并包無遺也咸有一德之書三者之義悉備按蔡氏不雜不息之說固當至後三語比前說尤備蓋如發於惻隱而不能不雜於內交要譽之私則非所謂無二擇乎中庸而不能不轉移於朞月之不能守則非所謂無息得此失彼而未必備衆善為統宗㑹元之歸則亦非所謂并包而無遺惟備此三語之義而後造乎之德之純所謂一也一者心學也故緝其語以備參考俾萬姓咸曰大哉王言又曰一哉王心克綏先王之祿永砥蒸民之生蔡氏曰此言一德之效驗漢孔氏曰一德之言故曰大能一德則一心張氏曰民始聞號令既贊其言之大及行之久而不變又贊其心之一使左右皆曰大哉一哉未足貴也使諸大夫皆曰大哉一哉未足貴也惟萬姓皆曰大皆曰一然後信乎大且一耳真氏曰不言德之一而言心之一者推原其所自出也心不一而欲其言之大雖致飾於號令之末未見其能大也漢孔氏曰言為王而令萬姓如此則能保安先王之寵祿長致衆民所以自生之道孫氏曰或言天祿或言先王之祿蓋天與之而先王受之也嗚呼七世之廟可以觀德萬夫之長可以觀政后非民罔使民非后罔事無自廣以狹人匹夫匹婦不獲自盡民主罔與成厥功陳氏曰此言一德已盡猶不可自足漢孔氏曰天子立七廟有德之王則為祖宗其廟不毁故可觀德能整齊萬夫其政可知唐孔氏曰王制云天子七廟三昭三穆與太祖之廟而七祭法云王之七廟曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之逺廟為祧有二祧享嘗乃止林氏曰太甲上事七世之廟必其德有可觀而後可太甲下為萬夫之長必其政有可觀而後可季武子謂諸侯宋魯於是乎觀禮與此觀德觀政意同王氏曰於廟言德者不德則墜厥宗於長言政者政荒則民散漢孔氏曰君以使民自尊民以事君自生蔡氏曰此即前篇民非后罔克胥匡以生后非民罔以辟四方之意申言君民之相須如此欲太甲不敢忽也漢孔氏曰上有狹人之心則下無所自盡矣言先盡其心然後乃能盡其力人君所以成功張氏曰自廣則以已為有餘狹人則以人為不足鄭氏曰狹小匹單也一說匹偶也陳氏曰一夫甚微民主甚尊然匹夫匹婦之情茍使攜二則人主不能成功甚言不可失人心也按自伊訓以下皆勉太甲以德而一德之㫖尤精皆託太甲以神民之事而七世之廟萬夫之長歸宿之語尤切太甲於此其必立德之純逹於有政上能使七廟之奠安而永綏其祿下能使萬夫之宗戴而永砥其生則神民之任有歸嗣王之責少塞矣雖然民者神之主故下文又以君民相須之理言之必是心慊然常如匹夫匹婦之不獲自盡此堯舜之博施濟衆猶以為病而伊尹生平所志思天下之民匹夫匹婦有不被堯舜之澤若已推而內之溝中者盡發其藴以告太甲言有盡而意無窮也漢孔氏說七世之廟可以觀德諸家因之恐未得本指惟林氏稍當故特取而以此數語足之以備商摧云沃丁既葬伊尹于亳咎單遂訓伊尹事作沃丁漢孔氏曰沃丁太甲子伊尹既致仕老終以三公禮葬唐孔氏曰世本本紀皆云太甲崩子沃丁立皇甫謐云沃丁八年伊尹卒卒年百有餘歲李氏曰豫讀伊訓等書考伊尹進退之迹昭然明甚而紛紛俗說有以汙之序書者於伊周著之最詳自稷契臯陶而下盡臣道者代不一人而伊周之葬獨紀於書意可見矣漢孔氏曰訓暢其所行功德之事咎單忠臣名作此篇以戒也亡伊陟相太戊亳有祥桑榖共生于朝伊陟贊于巫咸作咸乂四篇漢孔氏曰伊陟伊尹子太戊沃丁弟之子唐孔氏曰殷本紀云沃丁崩弟太庚立崩子小甲立崩弟雍已立崩弟太戊立漢孔氏曰祥妖怪二木合生七日大拱不恭之罰漢孔氏曰贊告也巫咸臣名皆亡唐孔氏曰伊陟不先告太戊而告巫咸者大臣見怪而懼先共議論而後告君家語哀公問於孔子曰夫國家之存亡禍福信有天命非唯人也孔子對曰存亡禍福皆已而已天災地妖不能加也先世殷王太戊之時道缺法圯以致天孽桑穀于朝七日大拱占之者曰桑榖野木不合生朝意者國亡乎太戊恐駭側身修行故天災地妖所以警人主者也災妖不勝善政真氏曰史記云帝太戊立伊陟為相桑榖生于朝一暮大拱太戊懼問伊陟伊陟曰臣閒妖不勝德帝之政其有缺歟帝其修德太戊從之祥桑枯死太戊遇災而懼如此故周公稱之曰昔在殷王中宗嚴恭寅畏天命自度是可謂知中宗之心矣太戊贊于伊陟作伊陟原命漢孔氏曰告以改過自新原臣名伊陟原命二篇皆亡仲丁遷于嚻作仲丁漢孔氏曰太戊子去亳嚻地名陳遷都之義亡唐孔氏曰發其舊都謂之遷到彼新邑謂之居李顒云嚻在陳留浚儀縣皇甫謐云仲丁自亳徙嚻在河北或云今河南敖倉二說未知孰是河亶甲居相作河亶甲漢孔氏曰仲丁弟相地名在河北亡唐陸氏曰今魏郡有相縣祖乙圯于耿作祖乙漢孔氏曰亶甲子圯於相遷於耿河水所毁曰圯亡唐孔氏曰皇甫謐以為耿在河東皮氏縣耿鄉尚書纂傳卷十三
