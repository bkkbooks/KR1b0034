body:
  text: 尚書纂傳卷二十九元王天與撰洛誥第十五周書召公既相宅周公往營成周使來告卜作洛誥漢孔氏曰召公先相宅卜之周公自後至經營作之遣使以所卜吉兆逆告成王吕氏曰洛邑雖有二城而成周則其總名敬王請城成周之辭亦謂成王合諸侯于成周以為東都則成周者洛都之總名成周說見召誥吳氏曰此書不専為告卜以其首言告卜故以為序唐孔氏曰史叙其事作洛誥洛誥誥說見仲虺之誥蔡氏曰洛邑既定周公遣使告卜史氏録之以為洛誥又并記其君臣答問及成王命周公留治洛之事今文古文皆有周公拜手稽首曰朕復子明辟王如弗敢及天基命定命豫乃𦙍保大相東土其基作民明辟豫惟乙卯朝至于洛師我卜河朔黎水我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食伻來以圖及獻卜蔡氏叙章指見篇末漢孔氏曰周公盡禮致敬言我復還明君之政於子蔡氏曰拜手稽首史記周公遣使之禮也吕氏曰世儒復辟之說蓋生于此語抑不知有失而後有復武王崩成王立未嘗一日不居王位何復之有蓋復如復逆之復成王命周公往營成周周公得卜復命于王如有復于王說復于王之復王氏曰子者親之也明辟者尊之也漢孔氏曰如往也言王往日幼少不敢及知天始命周家安定天下之命故已攝朱子曰周公不欲斥言王幼不能故言王若不敢及天基命定命漢孔氏曰我乃繼文武安天下之道大相洛邑其始為民明君之治吕氏曰豫乃不得不嗣大保以往大相東土其基可以中天下而立明四目達四聰誠作民明辟之基也蔡氏曰洛在鎬京東故言東土漢孔氏曰本其春來至洛衆說始卜定都之意吕氏曰乙卯至洛即召誥乙卯周公朝至于洛也蔡氏曰洛師猶言京師漢孔氏曰我使人卜河北黎水卜不吉又卜澗瀍之間南近洛吉今河南城也卜必先墨畫龜然後灼之兆順食墨吕氏曰黎地近紂都周公欲宅洛而先卜黎何也蓋卜都主于遷殷民意在近地者商民之心意在地中者周公之心周公不以獨見違衆故列二說以聽于天卜黎于先乃先人後己之心也黎既不吉卜洛乃吉蓋周公之心與天一也輿地記曰卜澗水東瀍水西而作王城今為河南府河南縣皇城薛氏曰今卜兆先揚火而後致墨既拆而墨加之則大小微明可知食者墨與拆相茹入吉凶由此其辨漢孔氏曰今洛陽也將定下都遷殷頑民故併卜之輿地記曰卜瀍水東而作下都城中有狄泉今為洛陽縣洛陽故城漢孔氏曰遣使以所卜地圖及獻所卜吉兆來告成王蔡氏曰伻使也王拜手稽首曰公不敢不敬天之休來相宅其作周匹休公既定宅伻來來視豫卜休恆吉我二人共貞公其以豫萬億年敬天之休拜手稽首誨言蔡氏叙章指見篇末漢孔氏曰成王尊敬周公答其拜手稽首而受其言述而美之言公不敢不敬天之美來相宅其作周以配天之美吳氏曰古者問人於他邦再拜而送之使者之至亦再拜而受之王以此待公之使尊之至也朱子曰匹配也或云作新邑與我周同休或云作洛與宗周同休皆通漢孔氏曰言公前已定宅遣使來來視我以所卜之美常吉之居我與公共正其美馬氏曰視與示通用林氏曰左傳云成王定鼎于郟鄏卜世三十卜年七百所謂恆吉也葉氏曰凡卜有貞其吉凶者大卜言國大遷大師則貞龜二人皆知其吉斷以示天下所謂共貞漢孔氏曰公其當用我萬億年敬天之美言久逺張氏曰此成王欲永留公輔佐以豫萬億年敬天休以成此休恆之吉也漢孔氏曰成王盡禮致敬于周公求教誨之言蔡氏曰又拜手稽首以謝周公告卜之誨言周公曰王肇稱殷禮祀于新邑咸秩無文豫齊百工伻從王于周豫惟曰庶有事今王即命曰記功宗以功作元祀惟命曰汝受命篤弼丕視功載乃汝其悉自教工孺子其朋孺子其朋其往無若火始焰焰厥攸灼敘弗其絶厥若彞及撫事如豫惟以在周工往新邑伻嚮即有僚明作有功惇大成裕汝永有辭蔡氏叙章指見篇末漢孔氏曰言王當始舉殷家祭祀以禮典祀于新邑皆次秩不在禮文者而祀之王氏曰殷盛也蔡氏曰與五年再殷祭之殷同吕氏曰祀于新邑有告焉有報焉冇祈焉後世不知祭祀之義鬼神之德視首祀新邑若闊于事情不知人主臨鎮新都齊祓一心對越天地逺此精明之德放諸四海無所不凖而助祭諸臣下至庖翟之賤亦皆有孚顒若格君心萃天下之道莫要于此漢孔氏曰我整齊百官使從王于周行其禮典我惟曰庶幾有善政事朱子曰本攝政時言也齊百工謂百官總已以聽周宗周也漢孔氏曰今王就行王命于洛邑曰當記人之功尊人亦當用功大小為序有大功則列大祀王氏曰記功若紀于太常載在盟府之類作元祀若兹豫大享于先王爾祖其從與享之之類蔡氏曰功宗功之尊顯者祭法曰聖王之制祭祀也法施于民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之蓋功臣皆祭于大蒸而勳勞之最尊顯者則為之冠故謂之元祀漢孔氏曰惟天命我周邦汝受天命厚矣當輔大天命視羣臣有功者記載之乃汝新即政其當盡自教衆官躬化之朱子曰又命我曰汝周公受先王之命而厚輔我大視功載則可見矣功載記功之書也成王與周公言未嘗汝之周公述王言故變公稱汝葉氏曰乃汝其悉自教工此汝亦成王稱周公也漢孔氏曰少子慎其朋黨少子慎其朋黨戒其自今已往言朋黨敗俗所宜禁絶無令若火始然焰焰尚微其所及灼然有次叙不其絶事從微至著防之宜以初朱子曰焰焰火始然尚微而方進貌灼焚也按今王即命曰以下諸說大槩得之惟命曰以下諸說不同要之此一節周公設為成王之言今王即命曰泛言記功之意惟命曰則專欲報周公謂汝受文武之命堅篤輔弼大視功載之書凡有功者皆汝悉自教訓之百工也蓋宰相能教訓百工有功即是第一功此成王歸重周公如此也孺子其朋兩句朋是偏比之意成王之意歸重周公故公戒之曰孺子其朋孺子其朋若謂如此則是孺子私于我也孺子私于我自今以往無所不私若火之然至于不可絶矣此一節大意恐是如此漢孔氏曰其順常道及撫國事如我所為惟用在周之百官吕氏曰周工即所齊從王之百工戒成王不可以他人間之也漢孔氏曰往行政化于新邑當使臣下各嚮就有官明為有功厚大成寬裕之德則汝長有嘆譽之辭于後世林氏曰若止于明作有功此漢宣之技巧咸精止是綜核之政若止于惇大成裕此漢文寬大之風不免有柔弱之患故周公欲其不偏也公曰已汝惟沖子惟終汝其敬識百辟享亦識其有不享享多儀儀不及物惟曰不享惟不役志于享凡民惟曰不享惟事其爽侮乃惟孺子頒朕不暇聽朕教汝于棐民彞汝乃是不蘉乃時惟不永哉篤敘乃正父罔不若豫不敢廢乃命汝往敬哉兹豫其明農哉彼裕我民無逺用戾漢孔氏曰已乎汝惟童子嗣父祖之位惟當終其美業朱子曰惟終猶伊尹言慎厥終漢孔氏曰奉上謂之享言汝為王其當敬識百君諸侯之奉上者亦識其有違上者奉上之道多威儀威儀不及禮物惟曰不奉上吕氏曰王者御諸侯不識其向背之情則忠佞不分賞罰紊而操柄失矣然所以識之非用智任術亦曰敬而已敬則是心常存無愛憎之私故能識其享與不享也蘇氏曰小人賄以悅人必簡于禮周公戒成王責諸侯以禮不以幣春秋傳謂晉趙文子為政薄諸侯之幣而重其禮魯穆叔曰自今以往兵其少弭矣夫以列國之卿輕幣重禮猶足以弭兵王而賄則致寇也必矣唐之衰君相皆可以賄取方鎮爭貢羡餘行包苴而天子始失其政以至於亡周公之戒至矣漢孔氏曰言人君惟不役志于奉上則凡人化之惟曰不奉上矣如此則惟政事其差錯侮慢不可治理蔡氏曰諸侯不用志于享上則下民化之亦不奉上鄭氏曰爽差也漢孔氏曰我為政常若不暇汝惟小子當分取我之不暇而行之聽朕教汝于輔民之常而用之吕氏曰周公之于民至矣然治道有先後之序蓋亦有未暇為者故屬成王頒布我所未暇為者于天下王其聽我教汝于輔助斯氏教養之常道次第而頒之于民可也漢孔氏曰汝乃是不勉為政汝是惟不可長哉唐孔氏曰蘉勉也成五有以豫億萬年敬天休之語故公答云使汝不勉安能永哉漢孔氏曰厚次叙汝正父之道而行之無不順我所為則天下不敢棄汝命常奉之蔡氏曰正父武王猶今稱先正云者篤者篤厚而不忘叙者先後之不紊言篤叙武王之道無不如我則人不敢廢汝之命矣吕氏曰武王沒周公若武王天下所以不廢周公之命周公去成王若周公天下所以不廢成王之命苟成王作聰明喜變更武王周公之政皆失其序天下安肯用命乎漢孔氏曰汝往居新邑敬行教化哉如此我其退老明教農人以義哉彼天下被寬裕之政則我民無逺用來言皆來蔡氏曰戾至也王往洛邑其敬之哉我其退休田野惟明農事蓋公有歸老之志矣彼謂洛邑也王于洛邑和裕其民則民將無逺而不至焉吕氏曰周公于將去之際殷勤反覆不能忘民如此王若曰公明保豫沖子公稱丕顯德以豫小子揚文武烈奉答天命和恆四方民居師惇宗將禮稱秩元祀咸秩無文惟公德明光于上下勤施于四方旁作穆穆迓衡不迷文武勤教豫沖子夙夜毖祀蔡氏叙章指見篇末漢孔氏曰言公當明安我童子不可去之漢孔氏曰言公當留舉大明德用我小子褒揚文武之業又當奉答天命以和常四方之民居處其衆蔡氏曰明顯明之也保保佑之也吕氏曰文武之業要在增光而發揚之苟止欲持循則浸頽其舊矣上天之眷要在進修而奉答之苟無以稱職則將墜其命矣四方之民要在和調而恆保之苟使之乖離則君位危而不能居師衆之上矣漢孔氏曰厚尊大禮舉秩大祀皆次叙無禮文而宜在祀典者凡此待公而行唐孔氏曰將大也蔡氏曰宗功功之宗也下文宗禮同吕氏曰此即前所謂肇稱殷禮者周公之誨以祀為先者先其源也成王之答以祀為後者先其實也齊明之心蓋出治之源而為治之條理則其實也漢孔氏曰言公明德光于天地勤政施于四海萬邦四夷服仰公德而化之吕氏曰勤施不已之心雖聖人所同然征誅四國思兼三王公之勤勞特甚焉漢孔氏曰四方旁來為敬敬之道以迎太平之政不迷惑于文武所勤之教蔡氏曰旁作猶旁求旁行無方所也因上下四方為言穆穆和敬也吕氏曰不曰既平而曰迓平迓有亹亹方進之意焉漢孔氏曰我童子徒早起夜寐慎其祭祀而已唐孔氏曰此留公之意欲惟典祭祀以政事委公左傳衛獻公使與寧喜言曰苟得反國政由寧氏祭則寡人亦猶是也王曰公功棐迪篤罔不若時漢孔氏曰公之功輔道我已厚矣天下無不順而是公之功蔡氏曰當常如是未可以言去也王曰公豫小子其退即辟于周命公後四方迪亂未定于宗禮亦未克敉公功迪將其後監我士師工誕保文武受民亂為四輔漢孔氏曰我小子退坐之後便就君于周命立公後公當留佐我史氏曰命公後者使公且留洛也朱子曰史氏說是蔡氏曰成王之意未欲捨鎬京而廢祖宗之舊故于舉祀發政之後即欲歸周而留周公治洛謂之後者猶後世節度留後之義先儒謂封伯禽為魯後者非是考之費誓東郊不開乃在周公東征之時則伯禽就國蓋已久矣下文惟告周公其後其字之義益可見其為周公不為伯禽也真氏曰史記魯世家云伯禽即位之後管蔡等反淮夷徐戎亦並興于是伯禽率師伐之于肸遂平徐戎據此則蔡氏之說當矣漢孔氏曰言四方雖道治猶未定于尊禮禮未彰是亦未能撫順公之大功明不可以去蔡氏曰宗禮即功宗之禮也四方開治公之功也未定功宗之禮故未能敉公之功敉功者安定其功之謂即下文命寧者也蘇氏曰宗廟之禮所以鎮撫公之元勳者未暇定也成王蓋有賜周公以天子禮樂之意矣黃氏曰此處未見賜天子禮樂之意明堂位取之書而失之也蘇氏何為取明堂位以為洛誥之訓乎程子曰世儒有論魯祀周公以天子禮樂以為周公能為人臣不能為之功則可用人臣不得用之禮樂是不知人臣之道也夫居周公之位則為周公之事由其位而能為者皆所當為也周公乃盡其職耳子道亦然惟孟子推知此義故曰事親若曽子可也未嘗以曽子之孝為有餘也蓋子之身所能為者皆所當為也漢孔氏曰公留教道將助我其今已後之政監篤我政事衆官委任之言朱子曰使周公在後居洛監我士也師也工也漢孔氏曰大安文武所受之民治之為我四維之輔蔡氏曰大保文武所受于天之民而治為宗周之四輔也漢之三輔蓋本諸此王曰公定豫往已公功肅將祗歡公無困哉我惟無斁其康事公勿替刑四方其世享漢孔氏曰公留以安定我我從公言往至洛邑已矣朱子曰此王與公訣而歸之言也公定居洛豫往歸周已蔡氏曰定止也漢孔氏曰公功已進大天下咸敬樂公功真氏曰此蓋即公身而言謂其功如此而以肅自將以敬自樂非謂天下敬樂之也又曰肅將者嚴毅之容著于外祗歡者和樂之意發于中聖德氣象可以想見漢孔氏曰公必留無去以困我哉我惟無厭其安天下事公勿去以廢法則四方其世世享公之德吳氏曰前漢書兩引公無困哉皆以哉為我朱子曰公無困哉言公無以事自困猶漢所謂憫勞公以官職之事也我則當無厭倦于安國安民之事而公但勿廢其所以儀刑四方者則四方世享矣周公拜手稽首曰王命豫來承保乃文祖受命民越乃光烈考武王𢎞朕恭孺子來相宅其大惇典殷獻民亂為四方新辟作周恭先曰其自時中乂萬邦咸休惟王有成績豫旦以多子越御事篤前人成烈答其師作周孚先考朕昭子刑乃單文祖德蔡氏叙章指見篇末漢孔氏曰拜而後言許成王留言王命我來承安汝文德之祖文王所受命之民是所以不得去于汝大業之父武王大使我恭奉其道叙成王留已意蔡氏曰來者來洛邑也承保乃文祖受命民及光烈考武王者答誕保文武受民之言也𢎞朕恭者大其責難之義也漢孔氏曰少子今所以來相宅于洛邑其大厚行典常于殷賢人蔡氏曰典典章也殷獻民殷之賢者也言當大厚其典章及殷之獻民蓋文獻者為治之大要也漢孔氏曰言當治理天下新其政化為四方之新君為周家見恭敬之主後世所推先也蔡氏曰恭先者人君恭以接下以恭而倡後王也漢孔氏曰其當用是土中為治使萬國皆被美德如此惟王乃有成功蔡氏曰公又言其自是宅中圖治萬邦咸砥休美則王其有成績矣此周公以治洛之效望之成王也漢孔氏曰我旦以衆卿大夫于御治事之臣厚率行先王成業當其衆心為周家立信者之所推先唐孔氏曰子者有德之稱大夫皆稱子蔡氏曰孚先者人臣信心事上以信而倡後人也漢孔氏曰我所以成明子法乃盡文祖之德蘇氏曰單盡也考我所以明子之法乃盡文王之德也蔡氏曰此周公以治洛之事自效也伻來毖殷乃命寧豫以秬鬯二卣曰明禋拜手稽首休享豫不敢宿則禋于文王武王惠篤敘無有遘自疾萬年厭于乃德殷乃引考王伻殷乃承敘萬年其永觀朕子懷德蔡氏叙章指見篇末漢孔氏曰所以居上中是文武使已來慎教殷民乃見命而安之周公攝政七年致太平以黑黍酒二器明潔致敬告文武以美享言我見天下太平則潔告文武不經宿唐孔氏曰釋草云秬黑黍釋器云卣中樽也以黑黍為酒煮鬱金之草築而和之使芬香條暢謂之秬鬯酒周禮鬱鬯之酒實之于彞此言在卣者詩大雅江漢及文侯之命皆言秬鬯一卣則未祭實之于卣祭時實之于彞彼一卣此二卣者此一告文王一告武王彼王賜臣使祀其太祖故惟一卣漢孔氏曰汝為政當順典常厚行之使有次第無有遇用患疾之道者則天下萬年厭于汝德殷乃長成為周王使殷民上下相承有次序則萬年之道民其長觀我子孫而歸其德矣勉使終之蔡氏曰承聽受也叙教條次第也周公雖許成王留洛然且謂王伻殷者若曰遷洛之民我固任之至于使其承叙萬年則實繫于王也亦責難之意與召誥末用供王能祈天永命語脉相類蔡氏曰乃命寧豫絶句王氏曰成王使周公來毖商民乃命寧周公以秬鬯二卣曰明禋于文武使之明禋則以太平告文武也故周公不敢宿成王明禋之命即禋文武蘇氏曰周公祝之曰使我國家順厚以叙身其康彊無有遇疾子孫萬年厭飽乃德殷人亦夀考王使殷人承叙萬年永觀法我孺子而懷其德陳氏曰禋于文王武王以上當從王氏成王遣使祭而周公領其事也惠篤叙以下當從蘇氏周公祝文武之事也按周公將歸與成王論宅洛規模毖祀告成有三大事焉理百工也朝百辟也君師萬民也皆示成王中天下定四海氣象也及成王留之周公許留則于大規模中又論毖殷遷洛至切之事所以毖殷者復先以惇典殷獻民為重與酒誥劼毖殷獻臣召誥以讎民百君子同意此化殷機括周公留後化殷莫切于民命寧且以慰安周公為定成王使命之辭使周公以毖殷責任昭告文武也以下陳氏定取王氏蘇氏之說尤當戊辰王在新邑蒸祭歲文王騂牛一武王騂牛一王命作冊逸祝冊惟告周公其後王賔殺禋咸格王入太室祼王命周公後作冊逸誥在十有二月惟周公誕保文武受命惟七年蔡氏叙章指見篇末漢孔氏曰成王既受周公誥遂就居洛邑以十二月戊辰晦到唐孔氏曰是年三月丙午朏以算術推之三月甲辰朔大四月甲戌朔小五月癸卯朔大六月癸酉朔小七月壬寅朔大八月壬申朔小九月辛丑朔大閏九月辛未朔小十月庚子朔大十一月庚午朔小十二月己亥朔大計十二月三十日戊辰晦也蔡氏曰是日成王在洛漢孔氏曰明月夏之仲冬始于新邑蒸祭故曰蒸祭歲古者褒德賞功必于祭日示不專也特加文武各一牛告曰尊周公立其後為魯侯陳氏曰蒸冬祭名周禮仲冬享蒸傳云凡四時之祭用孟月若有故及日不吉則用仲月又不吉則用季月周以建子為歲首則十二月乃建亥之月是周之歲終乃孟冬之月也豈蒸祭當歲終之時故曰蒸祭歲歟蔡氏曰騂赤色周尚赤故牲用騂宗廟禮大牢此用特牛者誥周公留後于洛故舉盛禮也逸史佚也作冊者冊書也逸祝冊者史逸為祝冊以告神也惟告周公其後者祝冊所載更不他及惟告周公留守其後之意重其事也漢孔氏曰王賔異周公殺牲精意以享文武皆至其廟親告也太室清廟祼鬯告神王氏曰賔助祭者也蔡氏曰王賔猶虞賔杞宋之屬諸侯以王殺牲禋祭祖廟故咸至也唐孔氏曰清廟有五室中史為太室室之大者也祼灌也王以圭瓚酌鬱鬯之酒以獻尸尸受酒而灌于地因奠不飲謂之祼夏氏曰郊特牲云既灌然後出迎牲則祼在前殺牲在後今此先言殺後言祼者蓋此所謂王賔殺禋咸格非謂諸侯至殺牲時始至也乃謂諸侯以王將舉此殺禋盛禮皆來助祭諸侯既至然後王入清廟祼酒也此與郊特牲之義何異漢孔氏曰王為冊書使史逸誥伯禽封命之書皆同在蒸祭日周公拜前魯公拜後史氏曰祼事既畢乃明告周公以居洛作冊使逸誥之漢孔氏曰言周公攝政盡此十二月大安文武受命之事惟七年天下太平陳氏曰已上事實在十二月吕氏曰史官記周公輔成王保文武受命終始至此七年吳氏曰成王之留公言誕保文武受民公之復成王亦言承保乃文祖受命民越乃光烈考武王故史臣于其終亦曰惟周公誕保文武受命惟七年蓋終始公之辭云按戊辰王在新邑漢孔氏以為十二月戊辰晦到易在為到已誤矣又自疑到之日舉蒸祭冊周公不免匆遽故以上事皆指為明月要之于經無據詳此章曰戊辰又曰在十有二月又曰惟七年史錯綜成文也蒸祭祝告俾公留後蓋公總攝終事之日堯舜重舜禹之攝故正月上日正月朔旦使得以正其始成王重周公之攝故于是日舉禮使得以正其終觀總結之曰惟周公誕保文武受命惟七年而史臣記年記月記日記事悉粲然明白矣總說一篇意蔡氏曰周公拜手稽首以下周公授使者告卜之辭也王拜手稽首以下成王授使者復公之辭也王肇稱殷禮以下周公教成王宅洛之事也公明保豫沖子以下成王命周公留後治洛之事也王命豫來以下周公許成王留洛君臣各盡其責難之辭也伻來以下成王錫命毖殷命寧之事也戊辰以下史臣記其祭祀冊誥等事及周公居洛以附之以見周公作洛之始終而成王舉祀發政之後即歸于周而未嘗都洛也尚書纂傳卷二十九
