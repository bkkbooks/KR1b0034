body:
  text: 尚書纂傳卷三十元王天與撰多士第十六周書成周既成遷殷頑民周公以王命誥作多士成周說見召誥洛誥漢孔氏曰殷大夫士心不則德義之經故徙近王都教誨之吕氏曰遷洛之事召誥則經始之也洛誥則考成之也多士則慰安之也亦既慰安之矣而踐奄之後復待多方之誥然後人情始定與其再喻之煩曷若一喻之至乎曰聖人之言不過乎煩始遷之時如是勞來之足矣苟預憂他日之疑而曲喻之于己則為躁于民則為瀆非聖人之言也又曰所謂頑民者蓋于商民之中尤負固不悛者非諸侯之權所能震服也非文誥之辭所能勸率也惟置之于醇醲太和之地而後日漸月漬浸以融釋此其所以有成周之遷也張氏曰此多士者周所謂頑民乃商之忠臣也周公營建洛邑于是使其耳目一新心志變易日見周之士大夫日聞周之號令日被周之德化變念商之心為念周之心其論遷居于洛則曰時惟天命無我怨論夏迪簡在王庭則曰豫一人惟聽用德既安慰以勞苦之詞又開勉以選任之意使人人自喜有仕宦之望而無擯絶之憂有一家之心而無防間之苦嗚呼周公忠厚之風其亦見于此乎李氏曰周公之營洛邑專以遷商民之大家世族故播告之辭皆稱商士商之多士舊居衛地去西周最逺周公蓋憂之因遷之東洛使之近附鎬豐而易以化服也陳氏曰堯遷有苗于三危而苗民始格周公遷商于洛而商民始化此即孟子引而致之莊嶽之說也漢孔氏曰稱成王命告令之唐孔氏曰史叙其事作多士多士漢孔氏曰所誥者即衆士故以名篇唐孔氏曰多士亦誥也蔡氏曰今文古文皆有惟三月周公初于新邑洛用告商王士蔡氏曰此多士之本序漢孔氏曰周公致政明年三月始于新邑洛用王命告商王之衆士陳氏曰此三月正七年三月而孔氏謂明年三月安得今年營洛直待明年方告多士耶唐孔氏曰經云商王士殷遺多士士者在官之總號王若曰爾殷遺多士弗弔旻天大降喪于殷我有周佑命將天明威致王罰勑殷命終于帝肆爾多士非我小國敢弋殷命惟天不畀允罔固亂弼我我其敢求位惟帝不畀惟我下民秉為惟天明畏陳氏曰此首以天命諭之漢孔氏曰告殷遺餘衆士王若曰說見盤庚吕氏曰頑民人所忿嫉也周公以王命誥首呼之曰爾殷遺多士撫摩勞來之意見于言表略無忿嫉之氣頑民之來謂周公必以凶徒醜類見處不自意得殷遺多士之稱訓誥未孚而囂悍暴厲已十消其八九矣漢孔氏曰殷道不至故旻天下喪亡于殷弗弔說見大誥旻天說見大禹謨吕氏曰喪殷非他也周實為之也而辭若無與焉者何哉蓋殷得罪于天周奉天討未嘗有心于其間也漢孔氏曰言我有周受天佑助之命故得奉天明威天命周致王者之誅罰正黜殷命終周于帝王吕氏曰以天言之則曰明威以人言之則曰王罰至公之理一也張氏曰勑正殷命之終于帝而革之終者言天祿之永終也漢孔氏曰天佑我故汝衆士臣服我弋取也非我敢取殷王命乃天命吕氏曰弋如弋鳥之弋謂有心于取之也周之革殷至公至明如此惟頑民以小人之慮度君子之心則疑周之弋殷命也故呼而告之曰非我小邦周敢弋殷命以彊弱小大之勢論之小國豈能弋殷命然卒革殷命焉是天也非人也頑民亦可以少悟矣漢孔氏曰惟天不與信無堅固治者故輔佐我我其敢求天位乎蘇氏曰固如推亡固存之固吕氏曰天之于物栽者培之傾者覆之固其治而不固其亂觀天之不畀殷信矣其不固亂也天既不畀殷故相助輔弼我有周俾作民主我曷嘗有求位之意哉是乃因其疑以解之而非自解也漢孔氏曰惟天不與紂惟我周家下民秉心為我皆是天明德可畏之效吕氏曰前既言惟天不畀此又言帝不畀告之然所謂不畀者豈在外哉是我下民所秉之為蓋善善惡惡確然不可易者也下民之為即天威之明畏者也詩言秉彞此言秉為彞言其體此言其用也始言天不畀後言帝不畀蓋剖析精微以示之故指其主宰謂之帝至本其明畏之理則謂之天也天帝說見益稷我聞曰上帝引逸有夏不適逸則惟帝降格嚮于時夏弗克庸帝大淫泆有辭惟時天罔念聞厥惟廢元命降致罰乃命爾先祖成湯革夏俊民甸四方自成湯至于帝乙罔不明德恤祀亦惟天丕建保乂有殷殷王亦罔敢失帝罔不配天其澤在今後嗣王誕罔顯于天矧曰其有聽念于先王勤家誕淫厥泆罔顧于天顯民祇惟時上帝不保降若兹大喪惟天不畀不明厥德凡四方小大邦喪罔非有辭于罰夏氏曰此舉夏殷興亡之事證之漢孔氏曰言上天欲民長逸樂有夏桀為政之不逸樂故天下至戒以譴告之蘇氏曰引去也放逸者則天命去之也夏之先王不往從放逸之樂故上帝降格應氏曰下文大淫泆有辭誕淫厥泆逸泆字通蔡氏曰降格與吕刑降格同真氏曰引逸諸說不同蘇氏說近之然以引為去乃時俗之言未知古有此訓否也漢孔氏曰是嚮于時夏桀不能用天戒大為過逸之行有惡辭聞于世葉氏曰嚮于時夏謂曩在是夏桀也漢孔氏曰天無所念聞言不佑其惟廢其大命下致天罰應氏曰昔也降而感格天與人甚近今也邈無心聞則曽無顧惜之意矣吕氏曰國之元命猶人之元氣有則生無則死元命廢則降致天罰夏祚亦從而絶矣漢孔氏曰天命湯更代夏用其賢人治四方蔡氏曰甸治也張氏曰甸者井牧其地什伍其民之謂吕氏曰俊民甸四方湯所以盡人君之職分也大君之于四方豈特一手一足之力明揚賢俊分布逺近使甸治區畫而大君之職盡矣伊尹稱湯旁求俊彥孟子稱湯立賢無方深知湯治天下之規模也漢孔氏曰自帝乙以上無不顯用有德憂念齊敬奉其祭祀言能保宗廟社稷明德說見堯典范氏曰明德恤祀一代創守之本而明德又恤祀之本也漢孔氏曰湯既革夏亦惟天大立安治于殷殷家諸王皆能憂念祭祀無敢失天道者故無不配天布其德澤蔡氏曰毖祀言其謹之至恤祀言其憂之深先王之重祭祀如此薛氏曰無所不浹天之澤也王者子惠天下無此疆彼界之殊所謂配天其澤漢孔氏曰後嗣王紂大無明于天道行昏虐天且忽之況曰其有聽念先祖勤勞國家之事乎吕氏曰先言不明天理次言不念祖宗者蓋天理猶有毫髮之存則追惟前人櫛風沐雨之艱難必不忍蕩覆之也漢孔氏曰言紂大過其過無顧于天無能明人為敬孫氏曰天顯天道之明而可畏者民祗民事之當敬者漢孔氏曰惟是紂惡天不安之故下若此喪亡之誅蔡氏曰大喪謂國亡身滅也漢孔氏曰惟天不與不明其德者故凡四方小大國喪滅無非有辭于天所罰言皆有圖亂之辭吕氏曰天也祖宗也民也自古帝王之所共畏也紂不聽念于先王勤家則不畏祖宗矣罔顧于天顯則不畏天矣罔顧于民祗則不畏民矣三畏既除舉無忌憚窮凶極惡故惟時上帝弗保降若兹大喪也推原紂所以為天所絶者不明其德而已明德者天所賦也明其德者人之所以盡乎天也紂雖下愚亦豈無是德哉惟昏蔽蠱惑不能明其德人欲日肆故其惡如上所陳也國未嘗無故而亡泛觀前後亡國者其致罰之由必有可言者況周之奉辭伐罪乎爾頑民亦可以知自反矣王若曰爾殷多士今惟我周王丕靈承帝事有命曰割殷告勑于帝惟我事不二適惟爾王家我適豫其曰惟爾洪無度我不爾動自乃邑豫亦念天即于殷大戾肆不正葉氏曰此章言黜殷本天意漢孔氏曰周王文武也蔡氏曰大善承天之所為武成言祗承上帝以遏亂略是也吕氏曰頑民所以憾周者徒見征伐為周之事故明告以是皆帝之事我周王特大善承之而已漢孔氏曰天有命周割絶殷命告正于天蔡氏曰告其勑正之事于帝武成言告于皇天后土將有大正于商是也漢孔氏曰言天下事己之我周矣不二之他惟汝殷王家已之我不復有變吕氏曰我周割殷未嘗容少私意一于從帝而無二適惟爾有殷王家自不得不惟我之適矣周不二于帝殷其可二于周乎上帝臨汝無二爾心惟我事不二適之謂也上帝既命侯于周服惟爾王家我適之謂也是時頑民猶妄意我周或可動搖故示以不可移奪之意漢孔氏曰我其曰惟汝大無法度謂紂無道我不先動誅汝亂從汝邑起言自召禍蔡氏曰猶伊訓所謂造攻自鳴條也漢孔氏曰我亦念天就于殷大罪而加誅者故以紂不能正身念法蔡氏曰豫亦念天就殷邦屢降大戾紂既死武庚又死故邪慝不正言當遷徙也王曰猷告爾多士豫惟時其遷居西爾非我一人奉德不康寧時惟天命無違朕不敢有後無我怨惟爾知惟殷先人有冊有典殷革夏命今爾又曰夏迪簡在王庭有服在百僚豫一人惟聽用德肆豫敢求爾于天邑商豫惟率肆矜爾非豫罪時惟天命吕氏曰此章明告以遷洛之意猷說見大誥漢孔氏曰我惟汝未達德義是以徙居西汝于洛邑教誨汝陳氏曰洛在商之西故曰居西漢孔氏曰我徙汝非我天子奉德不能使民安之是惟天命宜然陳氏曰奉德猶秉德漢孔氏曰汝無違命我亦不敢有後誅汝無怨我吕氏曰無違者戒頑民不可違天命也我畏天命故于遷洛之事不敢有後爾其無或我怨也夫周行天討者也殷受天討者也受討者之懼冝若甚于行討者今以文意觀之周公常懼頑民常肆周公常切頑民常緩是何耶蓋小人不知天命而不畏也漢孔氏曰言汝所親知殷先世有冊書典籍說殷改夏王命之意吕氏曰爾先人典冊所載殷革夏命之事歷歷可考我周之革商正如是耳以所明于前而驗所見于後廢興亦可識矣漢孔氏曰今汝又曰夏之衆士蹈道者大在殷王庭有服職在百官吕氏曰周公以殷革夏之事諭頑民頑民復以殷革夏之事責周謂商革命之初凡夏之士皆啓迪簡拔在商王之庭有服列于百僚之間今周之于商士未聞有所簡拔也此雖頑民責周之語然成湯革夏之政不多見于書因此語而推之則其舉民望慰衆心合新舊安危疑規模略可見也漢孔氏曰言我周亦法殷家惟聽用有德故我敢求汝于天邑商將任用之吕氏曰豫一人所聽用者惟德而已故豫敢以德而求爾于天邑商爾其修令德以應我之求不可援前比以必我之爵也商猶云天邑者蓋其地舊為天子之都理當富于賢德敢求亦敬賢之意重其地而敬其辭裁之者固甚正待之者亦甚厚矣漢孔氏曰惟我循殷故事憐愍汝故徙教汝非我罪咎是惟天命吕氏曰豫惟以下復諭以遷洛者惟欲相率肆赦矜憫爾豈可反以我為罪乎前云非我一人奉德不康寧時惟天命此又云非豫罪時惟天命夫豈借天以自解哉誠以頑民䝉蔽之極故每舉天命之公以大警省之使于此而有發焉則知洛邑之遷周蓋未嘗與也王曰多士昔朕來自奄豫大降爾四國民命我乃明致天罰移爾遐逖比事臣我宗多遜吕氏曰此申言遷徙寬大之恩漢孔氏曰昔我來從奄謂先誅三監後伐奄淮夷大下汝民命唐孔氏曰昔我來從奄謂攝政三年時也于時王不親行而王言我來自奄者周公以王命誅四國周公師還亦王來還也一舉而誅四國獨言來自奄者奄誅在後誅奄即來故言來自奄也民命民之性命蘇氏曰四國三監及奄也奄東方之國蔡氏曰天下死生之命人君制之民嘗從四國叛矣有可殺之道也我乃誅其君而釋其民是降民命也降猶今法降等云者多方曰惟爾殷侯尹民我惟大降爾命又曰今我曷敢多誥我惟大降爾四國民命與此意同真氏曰降命蔡氏于文勢為順漢孔氏曰乃所以明致天罰今移徙汝于洛邑使汝逺于惡俗比近臣我宗周多為順道林氏曰王者有心于化民無意于棄物故人雖有罪未嘗必欲置之逺方而塞其為善之路也使成王自克奄歸國之後以四國之民凶頑為甚乃遷于絶逺之域是亦明致天罰何自不可然王之心有不忍以棄物而常急于化民于是營洛以居之使其親比王化臣服宗周去其前日之頑而為今日之遜其待商之多士豈不深耶王曰告爾殷多士今豫惟不爾殺豫惟時命有申今朕作大邑于兹洛豫惟四方罔攸賔亦惟爾多士攸服奔走臣我多遜爾乃尚有爾土爾乃尚寧幹止爾克敬天惟畀矜爾爾不克敬爾不啻不有爾土豫亦致天之罰于爾躬今爾惟時宅爾邑繼爾居爾厥有幹有年于茲洛爾小子乃興從爾遷吕氏曰此勉以安居樂業之計漢孔氏曰所以徙汝是我不欲殺汝故惟是教命申戒之吕氏曰明許其不死所以洗其危疑也是章復申告之漢孔氏曰今我作此洛邑以待四方無有逺近無所賔外非但待四方亦惟汝衆士所當服行奔走臣我多為順事吕氏曰今朕作大邑于洛者蓋為四方諸侯罔有所賔禮之地故即土中建都以朝㑹此營洛之本意也亦惟爾多士所服事奔走臣我周家進于濟濟多士之盛非居洛不可此又營洛之本意也蓋營洛有二說一則以賔諸侯一則以居商士然則待汝商士亦甚厚矣漢孔氏曰乃庶幾還有汝本土乃庶幾安汝故事止居陳氏曰幹事止居也吕氏曰爾乃尚庶幾保有爾土而無懷動搖之思此蓋分之以田也爾乃尚庶幾安寧各幹其所止無起覬覦之望此蓋受之以業也漢孔氏曰汝能敬行順事則為天所與為天所憐也汝不能敬順其罰深重不但不得還本土而已我亦致天罰于汝身言刑殺蔡氏曰敬則言動無不循理天之所福吉祥所集也不敬則言動莫不違理天之所禍刑戮所加也漢孔氏曰今汝惟是敬順居汝邑繼汝所當居為則汝其有安事有豐年于此洛邑蔡氏曰邑四井為邑之邑繼者承續安居之謂有營為有夀考皆于兹洛焉漢孔氏曰汝能敬則子孫乃起從汝化而遷善吕氏曰爾之遷洛乃建立門户之祖後世子孫之興實從此遷始自亡國之末裔而為興國之始祖頑民雖愚其知所擇矣王曰又曰時豫乃或言爾攸居漢孔氏曰言汝衆士當是我勿非我也我乃有教誨之言則汝所當居行唐孔氏曰凡言王曰皆是史官録辭非王語也今史録稱王之言曰以前事未終故言又曰也吕氏曰多士多方篇末皆有又曰蓋殷勤以續前話然多士王曰之下闕文失其前語故又曰之辭不可盡通然所謂時豫乃或言爾攸居者勉以安居之大指則可知也尚書纂傳卷三十
