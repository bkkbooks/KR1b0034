body:
  text: 尚書纂傳卷十二上元王天與撰太甲上第五商書太甲既立不明伊尹放諸桐三年復歸于亳思庸作太甲三篇漢孔氏曰不明居喪之禮吕氏曰斷以不明原太甲之過也然曰既立不明意者既立之後聲色臭味有以蠱之漢孔氏曰桐湯葬地也不知朝政故曰放龜山楊氏曰伊尹放太甲為時中陳氏曰孟子云有伊尹之志則可無伊尹之志則篡也蘇氏曰湯放桀伊尹放太甲古未有是皆聖賢不得已之變也故湯以慙德為法受惡曰此我之所甚病也亂臣賊子庶乎其少衰矣湯不放桀伊尹不放太甲不獨病一時而已將使後世無道之君謂天下無若我何此其為病與口實之慙均耳聖人以為寧慙己以救天下後世故不得已而為之以為不得已之變則可以為道固當爾則不可漢孔氏曰念常道蘇氏曰思用伊尹之言也陳氏曰孟子所謂自怨自艾於桐處仁遷義三年以聽伊尹之訓己者也唐孔氏曰史敘其事作太甲三篇上篇是放桐之事中下二篇是歸亳之事此序歷言其事以總三篇也太甲漢孔氏曰戒太甲故以名篇唐孔氏曰盤庚仲丁祖乙等皆是發言之人名篇此太甲及沃丁君奭以被告之人名篇史官不同故為名有異且伊訓肆命徂后與此三篇及咸有一德皆是伊尹戒太甲不可同名伊訓故隨事立稱以太甲名篇也林氏曰此篇訓體也蔡氏曰今文無古文有惟嗣王不惠于阿衡唐孔氏曰史為作書發端故言此為目漢孔氏曰阿倚衡平言不順伊尹之言王氏曰阿如大陵之有阿保其君如阿平其國如衡蔡氏曰商官名也亦曰保衡吳氏曰君之於臣尊而不名則象其德而為之號如阿衡尚父仲父之類伊尹作書曰先王顧諟天之明命以承上下神祇社稷宗廟罔不祇肅天監厥德用集大命撫綏萬方惟尹躬克左右厥辟宅師肆嗣王丕承基緒惟尹躬先見于西邑夏自周有終相亦惟終其後嗣王罔克有終相亦罔終嗣王戒哉祇爾厥辟辟不辟忝厥祖夏氏曰此言湯及有夏以戒太甲林氏曰作簡册之書以陳戒若後世之章疏也漢孔氏曰顧謂常目在之諟是也言敬奉天命以承順天地朱子曰古注顧字此語最好非謂有一物常在面前可見也只是長存此心知得有這道理光明不昧方其靜坐未接物也此理固湛然清明及其遇事而應接也此理亦隨處發見只要人常提撕省察念念不忘存養久之則是理愈明雖欲忘之而不可得矣又曰自人言之喚做明德自天言之喚做明命今人多鶻鶻突突一似無這明命若常見其在目前則凜凜然不敢放肆許多道理都在眼前又曰顧諟天之明命只是照管得那本明底物事在真氏曰此語要切在顧諟二字今人俗語云看顧云照顧即此意漢孔氏曰肅嚴也言能嚴敬鬼神而逺之唐孔氏曰漢世儒者説社稷有二左傳説社祭勾龍稷祭柱棄惟祭人神而已孝經説社為土神稷為穀神勾龍柱棄是配食者也陳氏曰宗廟祖宗之廟吕氏曰人心雖渙散至祭祀之時無有不誠敬者故萃渙二卦必言王假有廟伊尹欲收太甲縱欲之失故言此以收其放心漢孔氏曰監視也天視湯德集王命於其身撫安天下真氏曰湯惟敬天天亦眷湯曰顧曰監可見天人之交至近而非逺也為人上者奈何不敬漢孔氏曰伊尹言能助其君居業天下之衆陳氏曰辟君也漢孔氏曰言先祖勤德致有天下故子孫得大承基業宜念祖修德陳氏曰基址也緒説見五子之歌漢孔氏曰周忠信也言身先見夏君臣用忠信有終夏都在亳西吕氏曰凡百所為無不纎悉內而修身外而治朝廷大而治天下全備而無一毫虧缺不滿人意之處如孟子周于德周于利之周王氏曰有終善終也相輔相之臣也漢孔氏曰言桀君臣滅先王之道德不能終其業以取亡王氏曰罔終不克善終也蔡氏曰太甲之意必謂伊尹足以任天下之重我雖縱欲未必遽至危亡故伊尹以相亦罔終之言深折其私而破其所恃也漢孔氏曰以不終為戒慎之至敬其君道則能終為君不君則辱其祖真氏曰辟不辟之言殆甚於漢人所謂帝不諦也然漢君怒而誅之太甲雖無所聽然不聞其怒也此所以卒於思庸歟王惟庸罔念聞蔡氏曰此史氏之言漢孔氏曰言太甲守常不改無念聞伊尹之戒或問舊説庸字絶句竊謂只作一句讀庸訓用如王庸作書以誥之庸如何朱子曰是伊尹乃言曰先王昧爽丕顯坐以待旦旁求俊彥啓迪後人無越厥命以自覆慎乃儉德惟懷永圖若虞機張往省括于度則釋欽厥止率乃祖攸行惟朕以懌萬世有辭夏氏曰此又言湯之勤以戒太甲陳氏曰作書而不變乃面命而言漢孔氏曰爽顯皆明也言先王昧明思大明其德坐以待旦而行之唐孔氏曰昧是晦冥爽是將明謂夜向晨也鄭氏曰待俟也旦早也吕氏曰昧爽者昏旦之交是時已大自顯明洗濯其心澡雪其志想當其時存心養性湛然清淨無一毫物纍同乎太虛猶日之東升明照天下湯之勤勞受天命宜若可少逸矣猶且若是則下於湯者當何如伊尹所以暗針太甲之病也漢孔氏曰旁非一方美士曰彥開道後人言訓戒陳氏曰啓開發之迪導達之也林氏曰湯所以孜孜汲汲不遑寧處者惟欲求賢以為子孫計而已漢孔氏曰越墜失也無失亡祖命而不勤德以自顛覆漢孔氏曰言當以儉為德思長世之謀吕氏曰既言儉德又言慎者蓋德者本然之理慎者用功之地伊尹以此針太甲之病根也太甲欲縱正與儉德相反真氏曰儉則心小而為慮者逺侈則心大而為謀者疏漢孔氏曰機弩牙也言修德夙夜思之明旦行之如射先省矢括于度釋則中朱子曰虞虞人也王氏曰上弦曰張蔡氏曰括矢末也度法度射者之所準望者也釋發也蘇氏曰準望有毫釐之差則中有尋丈之逺言人君所為得失微而禍福大亦如此也漢孔氏曰止謂行所安止君止於仁子止於孝蔡氏曰安汝止者聖君之事生而知之者也欽厥止者賢君之事學而知之者也漢孔氏曰言能循汝祖所行則我喜恱王亦見嘆美無窮陳氏曰懌恱辭稱譽也袁氏曰古人事業不但只了目前直要萬世之下莫不稱贊永圖之驗也王未克變蔡氏曰此亦史氏之言漢孔氏曰未能變不用訓唐孔氏曰據在後能變故當時為未能也伊尹曰兹乃不義習與性成豫弗狎于弗順營于桐宫密邇先王其訓無俾世迷張氏曰此伊尹之自言漢孔氏曰言習行不義將成其性鄭氏曰習慣熟也程子曰此言氣質之性非言性之本也若言其本則性即是理理無不善按太甲氣質本非髙明而又縱欲漸以慣熟二者相成也尚書四言性湯誥西伯戡黎言性之本此篇及召誥止是氣質之性漢孔氏曰狎近也經營桐墓立宫令太甲居之近先王則訓於義無成其過不使世人迷惑怪之朱子曰狎習見也不順言太甲所為不順義理也鄭氏曰密親也蘇氏曰使之獨居桐宫密邇先王之陵墓以思哀而生善心此則先王之訓也葉氏曰無使太甲終其世迷而弗悟也王徂桐宫居憂克終允德蔡氏曰此亦史辭漢孔氏曰往入桐宫居憂位言能思念其祖終其信德吕氏曰憂則心收樂則心放故王居憂而克終允德蔡氏曰允德實有其德於身也次篇言嗣王克終厥德又言允德協于下故史臣言克終允德以發次篇之義吕氏曰此篇伊尹未嘗言太甲之非但以先王反覆言之蓋人臣戒君直言其惡必不聽信故言先王之美如此使善惡自相形此伊尹納誨之不可及尚書纂傳卷十二上欽定四庫全書尚書纂傳卷十二中元王天與撰太甲中第六商書惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳夏氏曰此史敘太甲自桐歸時事漢孔氏曰湯以元年十一月崩至此二十六月三年服闋蘇氏曰此亦三年正月也説見伊訓漢孔氏曰冕冠也踰月即吉服唐孔氏曰王制云殷人冔而祭大雅云常服黼冔冔是殷之祭冠今為冕者蓋冕為通名殷禮不知天子幾冕周禮天子六冕大裘之冕祭天尚質辨師惟掌五冕備物盡文惟衮冕耳此以冕服蓋衮冕之服也夏氏曰太甲既悔過又適當三年之喪畢冢宰攝政至是可歸故伊尹以冕服奉迎太甲歸亳也作書曰民非后罔克胥匡以生后非民罔以辟四方皇天眷佑有商俾嗣王克終厥德實萬世無疆之休夏氏曰此伊尹美太甲之意漢孔氏曰無能相匡故須君以生須民以君四方蘇氏曰胥匡相正也蔡氏曰言民固不可無君君尤不可失民太甲悔過之初伊尹首言此其喜懼之意深矣漢孔氏曰言王能終其德乃天之顧佑商家是商家萬世無窮之美陳氏曰疆疆界也吕氏曰味此數語伊尹痛定之辭也使太甲終不變尹將若何克終矣喜慰又如何實云者尹之心可想矣王拜手稽首曰豫小子不明于德自砥不類欲敗度縱敗禮以速戾于厥躬天作孽猶可違自作孽不可逭既往背師保之訓弗克于厥初尚賴匡救之德圖惟厥終夏氏曰此太甲望伊尹之言漢孔氏曰君而稽首於臣謝前過類善也暗於德故自致不善陳氏曰君拜手稽首於臣惟太甲成王於伊周為然蓋待師保之禮吕氏曰太甲自謂不明序亦以不明言之蓋太甲之病正在不明也林氏曰不類猶不肖也詩云克明克類真氏曰德者得之於天也天性本善人自昧之則反善為惡與天不相似矣漢孔氏曰速召也言已放縱情欲毁敗禮儀法度以召罪於其身唐孔氏曰欲者本之於情縱者放之於外有欲而縱之縱欲為一也準法謂之度體見謂之禮禮度一也真氏曰二字乃太甲受病之源故至此首以自責漢孔氏曰孽災逭逃也言天災可避自作災不可逃漢孔氏曰言己己往之前不能修德於其初今庶幾賴教訓之德謀終於善悔過之辭吳氏曰背違也救正也吕氏曰當太甲不惠阿衡之時伊尹惟恐太甲之不聽及太甲既明之後太甲惟恐伊尹之不言蔡氏曰太甲固困而知之者然昔迷今復昔晦今明如日月晦蝕一復其舊而光彩煥耀萬象俱新湯武不可及矣豈居成王之下乎伊尹拜手稽首曰修厥身允德協于下惟明后先王子惠困窮民服厥命罔有不恱並其有邦厥鄰乃曰徯我后后來無罰王懋乃德視乃烈祖無時豫怠奉先思孝接下思恭視逺惟明聽德惟聰朕承王之休無斁夏氏曰此伊尹告太甲以法湯修德之事孫氏曰前言王拜手稽首君致敬以禮臣此言伊尹拜手稽首臣致敬以復君漢孔氏曰言修其身使信德合於羣下惟乃明君蘇氏曰允德信有德也下之協從從其非偽者陳氏曰太甲前日不明于德今日悔過自謂已明故尹迎其端而充廣之謂修身允德協于下然後為明后耳漢孔氏曰言湯子愛困窮之人使皆得其所故民心服其教令無有不欣喜朱子曰子愛之如子也恱喜意也陳氏曰孟子云中心恱而誠服夫恱而不服則玩服而不恱則離服而恱斯為王者之政所謂畏而愛之也漢孔氏曰湯俱與鄰並有國鄰國人乃曰待我君來言欣戴君來無罰言仁惠蘇氏曰上失其道民散久矣附麗於罰者皆君使之湯來則我自無罪矣朱子曰言湯與彼皆有土諸侯而鄰國之人乃曰云云此可見得民心處漢孔氏曰言當勉修其德法視其祖而行之無為是逸豫怠惰林氏曰太甲既克終允德廣而充之惟在勉之而已蔡氏曰湯之盤銘云茍日新日日新又日新湯之懋德如此太甲亦當勉於其德視烈祖之所為不可頃刻而豫怠也漢孔氏曰以念祖德為孝以不驕慢為恭陳氏曰先祖先也中庸謂孝者善繼人之志善述人之事者也接交接也下臣下也吕氏曰思者日加省察之謂漢孔氏曰言當以明視逺以聰聽德唐孔氏曰視戒見近迷逺故言視逺聽戒背正從邪故言聽德各準其事相配為文吕氏曰明與聰本然之有也惟視逺聽德然後為本然之聰明人能視而不能視逺有物以蔽之也物不能蔽則本然之明見矣人能聽而不能聽德有物以雜之也物不能雜則本然之聰見矣三山陳氏曰孝與恭臨事而不可忘故曰思聰與明存養於無事之時不為利欲所汨則所視無非逺所聽無非德故曰惟明惟聰漢孔氏曰王所行如此則我承王之美無厭尚書纂傳卷十二中欽定四庫全書尚書纂傳卷十二下元王天與撰太甲下第七商書伊尹申誥于王曰嗚呼惟天無親克敬惟親民罔常懷懷于有仁鬼神無常享享于克誠天位艱哉德惟治否德亂與治同道罔不興與亂同事罔不亡終始慎厥與惟明明后吕氏曰此下至篇終伊尹畫一以告太甲蔡氏曰申誥重告也漢孔氏曰言天於人無有親疏惟親能敬身者民所歸無常以仁政為常鬼神不保一人能誠信者則享其祀蔡氏曰曰敬曰仁曰誠者各因所主而言天謂之敬者天者理之所在動靜語默不可有一毫之慢民謂之仁者民非元后何戴鰥寡孤獨皆人君所當恤鬼神謂之誠者不誠無物誠立於此而後神格於彼也真氏曰誠字始見於此按誠字義程子曰無妄之謂誠不欺其次矣謝氏曰誠是實理朱子曰誠者真實無妄之謂又曰經傳有以理之實言者有以心之實言者漢孔氏曰言居天子之位難以此三者陳氏曰王位與天同故曰天位猶言天王天子漢孔氏曰為政以德則治不以德則亂蔡氏曰德者合敬仁誠之稱漢孔氏曰言安危在所任治亂在所法蘇氏曰堯舜讓而帝之噲讓而滅與治同事未必興也必同道而後興道同者事未必同也厲王弭謗秦皇禁偶語景王鑄大錢王莽作泉貨紂積巨橋之粟隋煬洛口諸倉其事同其亂無不同者與亂同事則亡矣真氏曰道指全體而言如堯舜之仁湯武之義是也事指一事而言如太康遊畋夏桀暴虐之類是也必同道乃興宋襄以不擒二毛自比文王不知一事之同而他事之不副其能興乎茍同事必亡三風十愆或有其一無不亡者蓋興之難亡之易如此漢孔氏曰明慎其所與治亂之機則為明王明君李氏曰與者與治與亂之謂也陳氏曰伊尹慮其不終故勉以終始慎厥與則為明明后茍不克終則復為不明矣蔡氏曰上篇言惟明后此言惟明明后蓋明其所已明而進乎前矣先王惟時懋敬厥德克配上帝今王嗣有令緒尚監兹哉若升髙必自下若陟遐必自邇無輕民事惟難無安厥位惟危慎終于始有言逆于汝心必求諸道有言遜于汝志必求諸非道漢孔氏曰言湯勉修其德能配天而行之朱子曰成湯工夫全在敬字上真氏曰惟時云者謂敬德之外無復他道也前言敬仁誠而此總之以敬者敬而後能仁敬而後能誠也陳氏曰配合也漢孔氏曰令善也繼祖善業當夙夜庶幾視祖此配天之德而法之真氏曰成湯之敬德至與天合太甲其可不與之合邪能與湯合則亦與天合矣漢孔氏曰言善政有漸如登髙升逺必用下近為始然後終致髙逺蔡氏曰中庸論君子之道亦謂辟如行逺必自邇辟如登髙必自卑進德修業之喻未有如此之切者吕氏曰是時太甲悔甚鋭見甚力伊尹恐其勇於進而不循序故告以此欲其知下學而上達道在邇而不可求諸逺蓋灑掃應對即精義入神之理家人父子即治國平天下之理皆於實地而用功也漢孔氏曰無輕為力役之事必重難之乃可言當常自危懼以保其位陳氏曰輕易也民事治民之事吕氏曰輕者非謂太甲遂輕慢民事慮其既明處民事自以為有餘而忘崇敬之意也安者非謂太甲遂安肆厥位慮其既明處大位自以為無虞而失修省之功也故戒以惟難惟危所以藥其病於既明漢孔氏曰於始慮終於終思始蔡氏曰人情孰不欲善終者特安於縱欲以為今日姑若是而他日固改之也然始而不善而能善其終者寡矣桐宫之事往已今其即政臨民亦事之一初也漢孔氏曰人以言咈違汝心必以道義求其意勿拒逆之言順汝心必以非道察之勿以自臧吕氏曰求字最要看大凡逆順之言須以理觀方知是非且逆耳之言亦有不合理處要之合處多不合處少遜志之言亦有合理處要之合處少不合處多求之云者蓋逆耳多是而未必俱是遜志多非而未必俱非但於逆順求合於理然後為當伊尹之言自有言外意嗚呼弗慮胡獲弗為胡成一人元良萬邦以貞君罔以辨言亂舊政臣罔以寵利居成功邦其永孚于休漢孔氏曰胡何也一人天子天子有大善則天下得其正葉氏曰慮者思之悉也蔡氏曰弗慮何得欲其慎思之也弗為何成欲其篤行之也唐孔氏曰謂天子為一人者其義有二一則天子自稱一人是為謙辭言己是人中之一耳一則臣下謂天子為一人是為尊稱言天下惟一人而已漢孔氏曰利口覆邦家故特慎焉陳氏曰辨言巧言能亂善惡之實者也祖宗舊政慮之甚詳行之甚久不可輕以巧言亂之蔡氏曰亂之為害甚於廢也漢孔氏曰成功不退其志無限故為之極以安之鄭氏曰寵愛也唐孔氏曰伊尹告君而言及臣事者雖復泛説大理亦見己有退心也吳氏曰上篇稱嗣王不惠于阿衡必其言有與伊尹背違者辨言亂政或太甲所失在此罔以寵利居成功已之自處者素定矣下語既非泛論則上語必有為而發也真氏曰辨言亂舊政武帝以張湯而變髙祖之約束是也寵利居成功霍光以援立之功據權位而不去是也故武帝末年海內幾亂而光不免赤族之禍伊尹之言豈非萬世龜鑑哉漢孔氏曰言君臣各以其道則國長信保於美總説太甲三篇意吕氏曰上篇規諫太甲之病故舉先王之道以為規模中篇悔過之初故言先王子惠之德以涵養其心終篇已知道矣故申告之以為君之次序上篇之辭甚嚴中篇和緩終篇復嚴蓋量其可言而後言也朱子曰伊尹告太甲諸篇極緊切其所以治心修身處雖為人主言初無貴賤之别又曰許多説話都從天理窟中抉出又曰伊尹説得極懇切許多説話重重疊疊説了又説今看來句句是天理尚書纂傳卷十二下
