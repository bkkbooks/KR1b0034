body:
  text: 尚書纂傳卷二十一元王天與撰武成第五周書武王伐殷往伐歸獸識其政事作武成漢孔氏曰往誅紂克定偃武修文歸馬牛於華山桃林之牧地記識殷家政教善事以為法唐孔氏曰此序於經于征伐商是往伐也歸馬牧牛是歸獸也記識善事經云列爵惟五分土惟三是也吕氏曰武成見武王有取商之規模有定商之規模取商以至公大義定商以常典成法秦皇晉武亦能乘機會取天下而亡不旋踵者蓋無以定之也唐孔氏曰史叙其事作武成武成林氏曰篇内有大告武成故以名篇唐孔氏曰此篇叙事多而王言少辭又首尾不結體裁異於餘篇須江徐氏曰是書乃武王翦商之功已成而後作非紂尚存之日作也此其所以為武成其文豈必相屬唐孔氏曰武成亦誥也有蔡氏曰今文無古文惟一月壬辰旁死魄越翼日癸巳王朝步自周于征伐商須江徐氏曰此史臣記武王往伐之意一月說見泰誓漢孔氏曰旁近月二日近死魄唐孔氏曰正月辛卯朔其二日壬辰朔是死魄故月二日近死魄魄者形也謂月之輪郭無光之處名魄也朔後明生而魄死望後明死而魄生律歴志云死魄朔也生魄望也旁死魄無事而記之者與下日為𤼵端猶今之將言日必先言朔也漢孔氏曰翼明步行也武王以正月三日行自周往征伐商二十八日渡孟津蔡氏曰周鎬京在京兆鄠縣上林即今長安縣昆明池北鎬陂厥四月哉生明王來自商至于豐乃偃武修文歸馬于華山之陽放牛于桃林之野示天下弗服須江徐氏曰此史臣記武王歸獸之意漢孔氏曰其四月始生明月三日與死魄互言唐孔氏曰其年四月己丑朔生明死魄俱是月初陳氏曰朔日月已生明但其明處極微昧明生則魄死矣故為始死魄魄死則生明矣故為哉生明薛氏謂哉生明月一日也旁死魄月二日也至望日則明全生而魄全死自望後一日則月生魄魄生則明死矣至晦日則明全死而魄全生故每月之終謂之晦以其魄全晦故也每月之始謂之朔以其明初見故也於晦望觀月則可見袁氏日文王都豐武王誅紂復舊都猶湯黜夏復歸亳蔡氏曰豐在京兆鄠縣即今長安縣西北靈臺豐水之上周先王廟在焉漢孔氏曰倒載干戈包以虎皮示不用行禮射設庠序修文教張氏曰政事即修文也非政事之外別有文漢孔氏曰桃林在華山東蘇氏曰華山之陽有川險絶可入不可出唐孔氏曰杜預云桃林之塞今𢎞農華陰縣潼關指其所往謂之歸據我釋之則云放放牛歸馬互言之耳吕氏曰此但放用以伐紂者耳若天子十有二閑與丘甸之賦自不廢不然後之東征將何所用丁未祀于周廟邦甸侯衛駿奔走執豆籩越三日庚戌柴望大告武成旣生魄庶邦冢君曁百工受命于周須江徐氏曰此史臣記武王以成祀廟告天庶邦奔走聽命之意漢孔氏曰四月丁未祭告后稷以下文考以上七世之廟駿大也邦國甸侯衞服諸侯皆大奔走於廟執事唐孔氏曰丁未四月十九日也李氏曰邦甸侯衞言甸服侯服衞服之邦也則五服諸侯皆在矣豆木豆籩竹豆祭器也漢孔氏曰燔柴郊天望祀山川先祖後郊自近始唐孔氏曰越三日庚戌二十二日也吕氏曰使武王伐紂有一毫之愧豈能對越在天又見伐紂非武王事乃天地山川之責在我我盡其責功成乃告武王之心蓋與神明為一漢孔氏曰魄生明死十五日之後諸侯與百官受政命於周明一統陳氏曰諸儒以生魄為十六日夫望之後一日魄始生而望或在十五日或在十四日或在十六日不可定指十六日為生魄也唐孔氏曰丁未祀周廟已是此月十九日矣此受命于周繼生魄言之則受命在祀廟之前故祀廟之時諸侯已奔走執事豈得未受周命已助周祭明其受命在祀廟前矣史官探其時日先言告武成既訖然後却受命故文在下耳王若曰嗚呼羣后惟先王建邦啓土公劉克篤前烈至于大王肇基王迹王季其勤王家我文考文王克成厥勲誕膺天命以撫方夏大邦畏其力小邦懷其徳惟九年大統未集予小子其承厥志厎商之罪告于皇天后土所過名山大川曰惟有道曾孫周王𤼵將有大正于商今商王受無道暴殄天物害虐烝民為天下逋逃主萃淵藪予小子既獲仁人敢祗承上帝以遏亂畧華夏蠻貊罔不率俾恭天成命肆予東征綏厥士女惟其士女篚厥𤣥黄昭我周王天休震動用附我大邑周惟爾有神尚克相予以濟兆民無作神羞既戊午師逾孟津癸亥陳于商郊俟天休命甲子昧爽受率其旅若林會于牧野罔有敵于我師前徒倒戈攻于後以北血流漂杵一戎衣天下大定須江徐氏曰此史臣叙武王伐商告下之辭漢孔氏曰歎美之以告諸侯漢孔氏曰尊祖故稱先王后稷也唐孔氏曰后稷始封於邰故言建邦啓土漢孔氏曰后稷曾孫公爵劉名能厚先人之業唐孔氏曰周本紀云后稷卒子不窋立卒子鞠陶立卒子公劉立公劉修后稷之業百姓懐之多徙而歸保焉漢孔氏曰太王修徳以翦齊商人始王業之肇迹王季纘統其業乃勤立王家史氏曰史記后稷而下十三世古公亶父即太王十四世季歴即王季唐孔氏曰詩云后稷之孫實維大王居岐之陽實始翦商周本紀云王季修古公之遣諸侯順之漢孔氏曰言我文徳之父能成其王功大當天命以撫綏四方中夏陳氏曰能成其功如伐崇伐莒一怒安民是也膺天命撫方夏謂三分天下有其二也李氏曰中庸謂武王受命追王大王王季文王此大王以下所以皆以王稱漢孔氏曰言天下諸侯大者畏咸小者懷徳是文王威徳之大唐孔氏曰大邦力足距敵故言畏力小邦必畏力矣小邦或被棄遺故言懷徳大邦亦懷徳矣量事為文也漢孔氏曰言諸侯歸之九年而卒故大統未就漢孔氏曰言承文王本意漢孔氏曰致商之罪謂伐紂之時后土社也名山華岳大川河唐孔氏曰禮天子出征必類帝宜社此告皇天后土即泰誓類上帝宜冡土自周適商路過河華山川大乃有名名大互言之耳周禮太祝云王過大山川則用事焉鄭云用事用祭祀告行也漢孔氏曰告天社山川之辭大正以兵征之也蘇氏曰有道指祖父唐孔氏曰稱曾孫者曲禮云臨祭事内事曰孝子某侯某外事曰曽孫某侯某左傳蒯聵禱祖亦自稱曾孫皆是言已承藉上祖奠享之意陳氏曰泰誓言小子𤼵此言周王𤼵蓋武成之後史文其言也蔡氏曰正即湯誓不敢不正之正漢孔氏曰無道徳暴絶天物言逆天也逆天害民所以為無道唐孔氏曰天物語闊人在其間以人為貴故別言害民則天物之害除人外普謂天下百物鳥獸草木皆暴絶之漢孔氏曰逋亡也天下罪人逃亡者而紂為魁主窟聚淵府藪澤言大姦蔡氏曰紂殄物害民為天下逋逃罪人之主如魚之聚淵如獸之聚藪也漢孔氏曰仁人謂大公周召之徒略路也言誅紂敬承天意以絶亂路鄭氏曰仁人秉心與天為一上帝臨汝無貳爾心武王素有此心矣人得仁人而後敢祗承以遏亂人之謀略亦如湯聿求元聖而後與爾有衆請命也漢孔氏曰冕服采章曰華大國曰夏及四夷皆相率而使奉天成命華夏説見舜典陳氏曰南曰蠻北曰貊總言則蠻貊猶言夷狄也俾使也蔡氏曰成命黜商之定命也漢孔氏曰言東國士女筐篚盛其絲帛奉迎道次明我明王為之除害陳氏曰武王居西紂在東故曰東征王者之兵弔民伐罪秋毫無擾凡以安其士女而已蔡氏曰士女猶曰男女詩中士多對女言之𤣥黄色帛也朱子曰商民而曰我周王猶夏民而曰我后也漢孔氏曰天之美應震動民心故用依附我漢孔氏曰神庶幾助我渡民危害無為神羞辱陳氏曰正月辛卯朔戊午二十八日也二月辛酉朔癸亥三日也甲子四日也蔡氏曰休命勝商之命也武王頓兵商郊雍容不廹以待紂師之至史臣謂之俟天休命可謂善於形容者矣漢孔氏曰旅衆也如林言盛多會逆距戰紂衆服周仁政無有戰心前徒倒戈自攻于後以北走血流漂舂杵甚之言朱子註孟子曰書本意謂商人自相殺非謂武王殺之也孟子之詨此言懼後世之惑且長不仁之心耳漢孔氏曰衣服也一著戎服而滅紂言與衆同心動有成功薛氏曰戎衣甲胄之服邵子皇極經世書紀殷自成湯至紂二十八主凡六百四十四祀而天下歸周自武王至赧王三十七主凡八百六十七年而周亡或問武成諸家多以為錯簡然反覆讀之竊以為王若曰以後皆史官歴叙己前之事雖作武王告羣后之辭實史官叙述之文如云有道曾孫周王𤼵昭我周王皆是史官之言非武王之自稱也亦如五誥中王若曰以下多是周公之語若如此看不必改移亦自可讀朱子曰王若曰以下固是告羣后之辭兼敘其致禱之辭亦與湯誥相類但此却無結殺處只自敘其功烈政事之美又書戊午癸亥甲子日辰亦非誥命之體恐須有錯簡按自王若曰至天下大定諸家分章各不同惟徐氏以為皆武王告下之辭今詳王若曰至無作神羞此史叙王言無可疑者其下紀戊午癸亥甲子之類已舉於泰誓牧誓而史於此復言之者蓋叙王言祝告之後須覆載數語則工文有所承結而前章紀一月紀四月已著始末亦得此以備中間事之未備不可以日月先後不同而遂疑也今姑依徐氏合之而記其說于比乃反商政政由舊釋箕子囚封比干墓式商容閭散鹿臺之財𤼵鉅橋之粟大賚于四海而萬姓恱服列爵惟五分土惟三建官惟賢位事惟能重民五教惟食喪祭惇信明義崇徳報功垂拱而天下治須江徐氏曰此又史臣敘武王識政事之實漢孔氏曰反紂惡政用商王善政漢孔氏曰囚奴徒隷封益其土商容賢人紂所貶退式其閭巷以禮賢唐孔氏曰鄭𤣥以為箕在圻内司馬彪云箕子名胥餘鄭𤣥王肅皆以箕子為紂諸父服䖍杜預以為紂庶兄家語云比干紂之親是紂諸父商容賢人姓名式者車上横木有所敬則俯而憑式閭族居里門也漢孔氏曰紂所積之府倉皆散𤼵以賑貧民唐孔氏曰散者言其分布𤼵者言其開出互相見也漢孔氏曰施舍己責救之賙無所謂周有大賚天下皆恱仁服徳唐孔氏曰周本紀云命召公釋箕子之囚命畢公表商容之閭命閎夭封比干之墓命南宫括散鹿臺之財𤼵鉅橋之粟帝王世紀云王命封墓釋囚及歸施鹿臺之珠玉殷民咸喜曰王之於仁人也死者猶封其暮況生者乎王之於賢人也亡者尤表其閭況存者乎王之於財也聚者猶散之況其復聚之乎是恱服之事也漢孔氏曰爵五等公侯伯子男列地封國公侯方百里伯七十里子男五十里為三品漢孔氏曰立官以官賢才居位理事必任能事賢能說見說命中陳氏曰建官惟用賢人然官各有事賢各有所能如舜九官皆官也而官所職之事則有司徒司空作士作稷之異禹臯稷契皆賢也而其能則冇治水明刑播種敷教之殊故建官以賢人必随其人之能以位其事也漢孔氏曰所重在氏及五常之教民以食為命喪禮篤親愛祭祀崇孝養皆聖王所重蔡氏曰五教五事所以立人紀而厚風俗故重之漢孔氏曰使天下厚行信顯忠義有徳尊以爵有功報以禄漢孔氏曰言武王所修皆是所任得人故垂拱而天下治吕氏曰垂衣拱手天下自治武成與堯舜氣象不同終篇一語則與堯舜無為而治如一也按此篇自唐孔氏而下王氏劉氏程子皆疑簡編錯亂各有改正而朱子集諸家所長定讀一篇自惟一月壬辰至于征伐商次厎商之罪至罔不率俾次惟爾有神至萬姓悅服次四月哉生明至示天下弗服次既生魄至受命于周次丁未至大告武成次王若曰至其承厥志次恭天成命至用附我大邑周以為此下冇缺文宜有求助諸侯交相警飭之意略如湯誥又次列爵惟五至垂拱而天下治其序如此但世本相傳已久未敢輒依此更易而唐孔氏又謂體裁異於餘篇葢史官雜載武成之事雖無聮屬而各有首尾觀者尚有考云尚書纂傳卷二十一
