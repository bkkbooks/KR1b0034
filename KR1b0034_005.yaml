body:
  text: 尚書纂傳卷五元王天與撰甘誓第二夏書啓與有扈戰于甘之野作甘誓漢孔氏曰夏啓嗣禹位伐有扈之罪朱子曰交兵曰戰唐陸氏曰有扈國名京北鄠縣即有扈之國甘水名今在鄠縣西吕氏曰讀書者必觀其時識其變堯舜禹三聖相承渾然無間至啓而有跋扈之臣臣與君抗其勢若均其體若敵遂至於戰視有苗弗率汝祖征之氣象有間矣唐孔氏曰史敘其事作甘誓甘誓漢孔氏曰將戰先誓唐孔氏曰甘誓牧誓費誓皆取誓地為名湯誓舉其王號泰誓不言武誓者皆史官不同故立名有異泰誓未戰而誓故不言國名秦誓自悔而誓非為戰誓故舉其國名蔡氏曰今文古文皆有大戰于甘乃召六卿王曰嗟六事之人豫誓告汝有扈氏威侮五行怠棄三正天用勦絶其命今豫惟恭行天之罰左不攻于左汝不恭命右不攻于右汝不恭命御非其馬之正汝不恭命用命賞于祖弗用命戮于社豫則孥戮汝唐孔氏曰發首二句敘其誓之由王曰已下皆是誓辭漢孔氏曰天子六軍其將皆命卿蔡氏曰古者四方有變責之方伯方伯不能討然後天子親征之天子之兵有征無戰今啓既親率六軍以出而又書大戰于甘所以深著有扈不臣之罪為天下後世諸侯之戒也李氏曰周禮地官鄉大夫每鄉卿一人六鄉六卿無事則各掌其鄉之政教禁令屬於大司徒有事則率其鄉之萬二千五百人而為之將屬於大司馬即此卿也吕氏曰六鄉兼統六師無事則為六卿有事則為六師六鄉分職司馬主兵官制也六鄉並將司馬帥一兵制也兩不相妨莆陽鄭氏曰司馬雖專掌兵至於軍旅大事五官之長咸有事焉冢宰徴師於諸侯大司徒以旗致百官而治其政令大宗伯以軍禮同邦國大司寇涖戮于社漢孔氏曰各有軍事故曰六事唐孔氏曰鄭𤣥云變六卿言六事之人者言軍吏下及士卒也下文戒左右與御是遍勑在軍之士步卒亦在其間吕氏曰嗟者發嘆而憫其勞之辭漢孔氏曰五行之德王者相承所取法有扈與夏同姓恃親而不恭是則威虐侮慢五行怠惰廢棄天地人之正道蔡氏曰威暴殄之侮輕忽之唐孔氏曰五行水火金木土也分行四時各有其德吕氏曰五行散在天地間為人為物皆有五行其或殘害生民廢壞萬物即是威侮也漢孔氏曰用其失道故勦截也截絶謂滅之漢孔氏曰恭奉也唐孔氏曰天子用兵稱恭行天罰諸侯伐有罪稱肅將王誅皆示有所稟承不敢專也漢孔氏曰左車左左方主射攻治也治其職右車右勇力之士執戈矛以退敵御以正馬為政三者有失皆不奉我命唐孔氏曰歷言左右及御此三人在一車之上也宣十二年左傳云楚許伯御樂伯攝叔為右以致晉師樂伯曰吾聞致師者左射以菆攝叔曰吾聞致師者右入壘折馘執俘而還是左主射右主擊刺而御居中也御言正馬而左右不言所職者以戰主殺敵左右用兵戰之常事故略而不言御惟主馬故特言之互相明也葉氏曰古者車戰左右不失其事為政故宣王復古其詩謂之車攻吕氏曰啓之誓師欲嚴部分左不攻左而攻右右不攻右而攻左御不以範而以詭雖有功亦為不恭命也師不以律則臧而凶後世吳起斬先戰而奔敵斬首者蓋斬首之功小亂行之罪大一亂部分則不可以為師也漢孔氏曰天子親征必載遷廟之祖主行有功則賞祖主前示不專張氏曰用命謂恭命漢孔氏曰天子親征又載社主謂之社事不用命奔北者則戮之於社主前社主隂隂主殺親祖嚴社之意張氏曰弗用命謂不恭命蔡氏曰戮殺也漢孔氏曰孥子也蘇氏曰戮及其子曰孥堯舜之時罰弗及嗣武王數紂之罪曰罪人以族孥戮非聖人之事也言孥戮者惟啓與湯知德之衰矣然亦言之而已未聞其真孥戮人也吕氏曰啓承堯舜禹重熙纍洽之後未嘗接行陳之事一旦誓師戒飭戎陳如素講然古人之學醴用兼全本末具舉於此可見尚書纂傳卷五
