body:
  text: 尚書纂傳卷九元王天與撰仲虺之誥第二商書湯歸自夏至于大坰仲虺作誥漢孔氏曰自三朡而還大坰地名唐孔氏曰大坰未知所在當是定陶向亳之路所經漢孔氏曰仲虺臣名以諸侯相天子爲湯左相奚仲之後吕氏曰湯伐桀歸至大坰在中路間仲氏即作誥蓋湯旣勝夏愧心頓發茍不急銷釋之則過而不化有害進修之業矣唐孔氏曰史録其言作仲虺之誥序不言作仲虺之誥以理足文便故略之仲虺之誥漢孔氏曰會同曰誥陳氏曰此告君之書古字告誥通用召誥洛誥同蔡氏曰古文有今文無成湯放桀于南巢惟有慙徳曰予恐來世以台爲口實唐孔氏敘章指見篇末漢孔氏曰湯放桀武功成故以爲號南巢地名有慙徳慙徳不及古蘇氏曰廬江六縣東有居巢城桀奔于此湯不殺也吕氏曰慙愧也湯居萬世君臣之始變故自以爲慙徳朱子曰湯武固是反之細讀其書湯反之之功恐更精密湯有慙徳如武王恐未必有此意漢孔氏曰恐來世論道我放天子常不去口鄭氏曰恐懼也曰湯言口實謂藉口也陳氏曰堯舜以天下讓後世好名之士猶有不知而慕之者若燕噲於子之是也湯武征伐而有天下後世嗜利之人安得不以爲口實此湯之所以恐也仲虺乃作誥曰嗚呼惟天生民有欲無主乃亂惟天生聰明時乂有夏昏徳民墜塗炭天乃錫王勇智表正萬邦纘禹舊服兹率厥典奉若天命夏王有罪矯誣上天以布命于下帝用不臧式商受命用爽厥師唐孔氏敘章指見篇末漢孔氏曰陳義誥湯可無慙漢孔氏曰民無君主則恣情欲必致禍亂漢孔氏曰言天生聰明是治民亂聰明說見堯典漢孔氏曰夏桀昏亂不恤下民民之危險若䧟泥墜火無救之者吕氏曰有夏昏徳正與聰明相反漢孔氏曰言天與王勇智應爲民主儀表天下法正萬國繼禹之功統其故服鄭氏曰勇果决也智知識也吕氏曰勇智非自外來即聰明之發見陳氏曰立本爲標準謂之表表而正之使萬邦皆正所謂天生聰明時乂也蔡氏曰湯革夏而纘舊服武王革商而政由舊孔子所謂百世可知也漢孔氏曰天意如此但當循其典法奉順天命而已無所慙吕氏曰典即萬世常行之理真氏曰湯之伐桀自謂不幸而處變故有慙徳蓋以爲不獨有愧於人亦將有愧於天仲虺解之曰此特循其常道以順天命而已蓋變而不失其正即所謂常也漢孔氏曰言托天以行虐於民乃桀之大罪林氏曰矯詐也如矯制之矯誣僞也吳氏曰如言吾有天下如天之有日此類是也漢孔氏曰天用桀無道故不善之式用爽明也用商受王命用明其衆言爲主也蘇氏曰臧善也吕氏曰有夏昏徳衆民亦居懵然之中用湯以開明之使如醉夢之得醒故曰爽簡賢附勢寔繁有徒肇我邦于有夏若苗之有莠若粟之有秕小大戰戰罔不懼于非辜矧予之徳言足聽聞唐孔氏敘章指見篇末漢孔氏曰簡略也賢而無勢則略之不賢有勢則附之若是者繁多有徒衆無道之世所常鄭氏曰附親附勢權勢也漢孔氏曰始我商家國於夏世欲見翦除若莠生苗若秕在粟恐被鋤治簸颺朱子曰榖之始生者曰苗莠似苗之草秕糠秕也林氏曰以桀喻苗粟以湯喻莠秕此言勢之危而立於此時必不見容也漢孔氏曰言商家小大憂危恐其非罪見滅況我之道徳善言足聽聞乎無道之惡有道自然理蔡氏曰戰戰恐懼貌朱子曰此仲虺分明言事勢不容住我不誅彼則彼將圖我矣後人多曲爲之說以諱之要之自是住不得林氏曰史記稱桀召湯而囚之夏臺雖不見於經以仲虺之言觀之則史記信矣惟王不邇聲色不殖貨利徳懋懋官功懋懋賞用人惟己改過不吝克寛克仁彰信兆民乃葛伯仇餉初征自葛東征西夷怨南征北狄怨曰奚獨後予攸徂之民室家相慶曰傒予后后來其蘇民之戴商厥惟舊哉唐孔氏敘章指見篇末史氏曰仲虺稱惟王言湯之所爲天下一人而已漢孔氏曰不近聲樂言清簡不近女色言貞固殖生也不生資財貨利言不貪也旣有盛徳兼有此行吕氏曰仲虺見聖人之的故其稱湯不爲髙大之論而實非聖人莫能至聲色貨利不邇不殖自非純乎天理無一亳人欲安能如此林氏曰老子云惟無以天下爲者可以有天下舜禹之禪湯武之兵天下不以爲過者惟其無利之之心故也故仲虺言聲色貨利皆不足以動湯心則其伐夏救民果且有利之之心乎漢孔氏曰勉於徳者則勉之以官勉於功者則勉之以賞用人之善若自己出有過則改無所吝惜所以能成王業馬氏曰官須用有徳之人小人有功者亦或有之但賞之而已林氏曰用人惟己所謂善與人同舍己從人樂取諸人以爲善也吕氏曰用人惟己猶所謂取人以身司馬氏曰成湯聖君也仲虺聖輔也以聖輔贊揚聖君不稱其無過而稱其改過是則聖賢之意惟以改過爲能不以無過爲貴漢孔氏曰言湯寛仁之徳明信於天下蒲氏曰寛雖對仁而言寛實仁中之一事真氏曰六經言仁始於此虞書所謂好生之徳安民則惠即仁也而未有仁之名至是而名始著大抵言仁之用至孔子而後言仁之體按仁字義朱子曰仁者愛之理心之徳也又曰仁之道大不可一言而盡也程子謂乾四徳之元猶五常之仁偏言則一事専言則包四者推此而言則可見矣蓋仁者五常之首也而包四者惻隱之體也而貫四端故仁之爲義偏言之則曰愛之理專言之則曰心之徳其實愛之理所以爲心之徳也今詳此處言仁指愛之理而言真氏所謂仁之用是也漢孔氏曰葛伯逰行見農民之餉於田者殺其人奪其餉故謂之仇餉湯爲是以不祀之罪伐之從此後遂征無道西夷北狄舉逺以言則近者著矣唐孔氏曰乃者却說已過之事朱子曰餉饋也仇餉與餉者爲仇也王氏曰王者之用兵如良醫之治疾惟恐其來之遲故先彼則此怨先此則彼怨張子曰湯征而未至怨者非史溢辭如郡縣素困弊政亦望一良吏莫非至誠平居亦不甚至於有事則傾望其上之來如解倒懸也天下之望湯是實如父母願耕願出莫非實如此漢孔氏曰怨者辭也蔡氏曰奚何也言湯何爲不先征伐我國也漢孔氏曰湯所徃之民皆喜曰待我君來其可蘇息朱子曰室謂夫婦所居家謂一門之内慶喜也蘇復生也吕氏曰後世用兵師之所至荆棘生焉湯師之至民皆欣然有喜蓋弔民伐罪所至則蘇故其氣象不可與後世同日語又曰夏商之際君臣易位天地之大變觀其征伐之時唐虞都俞揖遜氣象依然若存蓋堯舜禹湯以道相傳世雖降而道不降也廣漢張氏曰湯未有天下而民已后之亦猶汝墳之詩稱文王爲父母也漢孔氏曰舊謂初征自葛時蔡氏曰天下之愛戴歸徃者非一日矣商業之興蓋不在於鳴條之日也佑賢輔徳顯忠遂良兼弱攻昧取亂侮亡推亡固存邦乃其昌徳日新萬邦惟懷志自滿九族乃離王懋昭大徳建中于民以義制事以禮制心垂裕後昆予聞曰能自得師者王謂人莫已若者亡好問則裕自用則小嗚呼慎厥終惟其始殖有禮覆昏暴欽崇天道永保天命唐孔氏敘章指見篇末漢孔氏曰賢則助之徳則輔之忠則顯之良則進之明王之道唐孔氏曰賢是徳盛之名徳是資賢之實忠是盡心之事良是爲善之稱俱是可用之人所從言之異耳佑之與輔顯之與遂隨便而言之漢孔氏曰弱則兼之闇則攻之亂則取之有亡形則侮之言正義唐孔氏曰力少爲弱不明爲昧政荒爲亂國滅爲亡兼謂包之攻謂擊之取謂取爲已有侮謂侮慢其人漢孔氏曰有亡道則推而亡之有存道則輔而固之王者如此國乃昌盛林氏曰天之生物因其材而篤焉栽者培之傾者覆之佑賢輔徳顯忠遂良此言善者必爲人所助也兼弱攻昧取亂侮亡此言不善者必爲人所絶也聖人因其常理以應世接物桀有可亡之道無可存之理湯因其將亡推而亡之果何容心哉漢孔氏曰日新不懈怠自滿志盈溢朱子曰日新須是常接續不已纔有閒斷便不可吕氏曰湯安得有自滿之意此書欲解湯之慙所以歴舉徳業之盛天命人心之所歸又懼湯以是自滿也故以此語豫防之湯豈有是哉論必至此乃爲備也真氏曰日新則日進一日堯舜兢業之事也自滿則日怠一日後世不克終之事也治亂之分在此而已唐孔氏曰萬邦舉逺以明近九族舉親以明疎也九族說見堯典漢孔氏曰欲王自勉明大徳立大中之道於民率義奉禮垂優足之道示後世中說見大禹謨義說見臯陶謨朱子曰禮者天理之節文人事之儀則也又曰以義制事以禮制心内外交相養之法事在外義由内制心在内禮由外作鄭氏曰制裁制垂逺及裕餘也東陽馬氏曰昆亦後也後昆猶言子孫真氏曰懋昭大徳即所謂日新其徳也此心無時而不勉則其徳無時而不明懋之一言乃其機括也懋昭大徳者修身之事所謂明明徳也建中於民者以身率人之事所謂新民也中者民性之本然惟因物有遷故失其正聖人以一身爲民之極使望而趨之皆歸於中所謂建中于民也然其道豈有他哉以義制事以禮制心而已蓋事有萬端未易裁處惟揆之以當然之理則舉措當而無一事之不中矣心有萬慮未易執持惟内主於敬而視聽言動不敢肆焉則周旋中禮而無一念之不中矣已之中乃民之所由中也夫王者所以爲法後世者義與禮而已道備於身而無缺則法垂於後而有餘漢孔氏曰求賢聖而事之蔡氏曰孟子云湯之於伊尹學焉而後臣之故不勞而王夫自天子至於庶人未有舍師而能成者雖生知之聖亦有師焉後世之不如古非特世道之降抑亦師道之不明也仲氏之論遡流而源要其極而歸諸能自得師之一語其可爲帝王之大法也歟漢孔氏曰自多足人莫之益亡之道吕氏曰謂人莫己若則孤峭特立傲然萬物之上烏得而不亡漢孔氏曰問則有得所以足不問専固所以小吕氏曰此皆不自滿之意也仲虺所以諄諄者人君之居入自滿爲甚近也漢孔氏曰靡不有初鮮克有終故戒慎終如其始漢孔氏曰有禮者封殖之昏暴者覆亡之真民曰有禮昏暴非指人而言蓋欲湯之自警也湯豈昏暴者哉此亦虞廷以傲虐戒舜之意按此兩說不同左傳載仲孫湫言親有禮因重固閒攜貳覆昏暴舊說蓋依此句法漢孔氏曰王者如此上事則敬天安命之道蔡氏曰欽崇者敬畏尊奉之意吕氏曰欽崇天道勅天之命之謂欽之工夫至矣又加之以崇欽之至也總說一篇意唐孔氏曰發首二句史述成湯之心次二句湯言己慙之意仲虺乃作誥以下皆勸湯之辭自曰嗚呼至用爽厥師言天以桀有罪命伐夏之事自簡賢附勢至言足聽聞說湯在桀時怖懼之事自惟王不邇聲色至厥惟舊哉言湯有徳行加民民歸之事自佑賢輔徳以下說天子之法當擢用賢良屏黜昏暴勸湯奉行此事不須以放桀爲惡蘇氏曰湯之慙徳仁人君子莫大之病也仲虺恐其憂愧不已以害維新之政故思有以廣其意者首言桀得罪於天天命不可辭次言桀之必害已終言湯之勲徳足以受天下者乃因極陳爲君艱難安危禍福可畏之道以明今者受夏非以利己乃爲無窮之恤以深慰湯而解其慙仲虺之忠愛可謂至矣然而湯之所慙來世口實之病仲虺終不敢謂無也夫君臣之分放弑之名雖其臣子有不能盡況萬世之後乎尚書纂傳卷九
