body:
  text: 尚書纂傳卷三十六元王天與撰周官第二十二周書成王既黜殷命滅淮夷還歸在豐作周官漢孔氏曰黜殷在周公東征時滅淮夷在成王即政後事相因故連言之漢孔氏曰成王雖作洛邑猶還西周唐孔氏曰在豐者豐鎬相近豐有文王廟故事就豐宣之故也唐孔氏曰史敘其事作周官周官漢孔氏曰言周家設官分職用人之法吕氏曰金勝成王初年之書洛誥周公還政之書無逸立政周公教戒之書周官成王親政開物成務之書合數篇以觀可以見成王之本質可以見其離師傅而不反焉過此有君陳乃周公既沒之後有顧命乃其身將沒之時成王進德始終之序備矣周公格君之功著矣唐孔氏曰周官上誥于下誥體也蔡氏曰今文無古文有惟周王撫萬邦巡侯甸四征弗庭綏厥兆民六服羣辟罔不承德歸于宗周董正治官蔡氏曰此書之本序漢孔氏曰撫萬國巡行天下侯服甸服唐孔氏曰六服而惟言侯甸者二服去圻最近舉近以言之也漢孔氏曰四面征討諸侯之不直者所以安其兆民葛氏曰弗庭者弗來賔服于王庭也唐孔氏曰周制無萬國惟伐淮夷非四征大言之耳漢孔氏曰六服諸侯奉承周德還歸于豐督正治理職司之百官唐孔氏曰周體九服此惟言六者夷鎮蕃三服在九州之外夷狄之地王者于夷狄羈縻而已不同于華夏宗周説見召誥吕氏曰天下大物也非綿力小材所能運轉非薄物細故所能維持昔也成王不出闈闥之孱王耳今也撫萬邦云云乾開坤闔秋殺春生四海皆隨其運轉歸于宗周云云訓督裁正品式備具萬世皆入其維持是其進不可以階級數其大不可以尺度量也陳氏曰史言歸于宗周是歸鎬京而董正之也序云還歸在豐作周官是發册以告之之時也王曰若昔大猷制治于未亂保邦于未危曰唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯庶政惟和萬國咸寧夏商官倍亦克用乂明王立政不惟其官惟其人今豫小子祗勤于德夙夜不逮仰惟前代時若訓迪厥官吕氏曰此成王首言法古訓官之意漢孔氏曰言當順古大道制治安國必于未亂未危之前思患預防之唐孔氏曰治謂政教邦謂國家治有失則亂邦不安則危制其治于未亂之前安其國于未危之始標此二句于前以示立官之意漢孔氏曰堯舜考古以建百官內置百揆四嶽外置州牧十二及五國之長上下相維外內咸治百揆四嶽州牧説見舜典陳氏曰上古朴略雖以鳥火雲龍紀官其制未備唐虞時事漸詳故考古參今立官至于百吕氏曰百揆無所不總也四嶽兼總方嶽也州牧各總其州也侯伯次州牧而總諸侯也漢孔氏曰故衆政惟和萬國皆安夏氏曰庶政和則其政不亂萬國寧則其邦不危此繳前二句漢孔氏曰禹湯建官二百亦能用治言不及唐虞之清要張氏曰唐虞官百夏商倍之周又倍之若多于古而其大體未嘗變也舜命九官至商列為八政至周合為六典大綱皆出于一所增特其屬耳蘇氏曰火化之始燔黍捭豚以為靡矣至周而醯醢之屬百二十甕棟宇之始茅茨采椽以為泰矣至周而九尺之筵山節藻棁聖人隨時而為之節文豈得已哉天下之事古略而今詳天下之官古少而今多聖人非有意于其間勢則然也吕氏曰百焉而治倍焉而亦治則夏商之于唐虞不矜于同而矜于治也漢孔氏曰言聖帝明王立政修教不惟多其官惟在得其人漢孔氏曰今我小子敬勤於德雖夙夜匪懈不能及古人蔡氏曰逮及也祗勤于德常若有所不及然漢孔氏曰言仰惟先代之法是順訓蹈其所建官而則之不敢自同堯舜之官準擬夏殷而蹈之李氏曰成王自知其不及故訓迪其官所以助其不及陳氏曰史言董正治官紀實也王言訓迪厥官婉辭也立太師太傅太保兹惟三公論道經邦燮理隂陽官不必備惟其人少師少傅少保曰三孤二公𢎞化寅亮天地弼豫一人新安王氏曰自此至大明黜陟言建官之制漢孔氏曰師天子所師法傅傅相天子保保安天子于德義者此惟三公之任佐王論道以經緯國事和理隂陽言有德乃堪之張氏曰文王世子云師也者教之以事而諭諸德者也保也者謹其身而輔翼之使歸諸道也賈誼云師道之教訓傅傅之德義保保其身體此師傅保之義程子曰三代之時人君必有師傅保之官後世作事無法知求治而不知正君知規過而不知養德傅德義之道固已踈矣保身體之法復無聞焉吕氏曰三公所論之道即以經邦理隂陽者也經者經綸之謂也燮理者調和之謂也經綸之用藏于無迹和調之妙間不容聲亦何待于論乎論云者擬議以成其變化講明啓沃而精一之者也非經綸天下之大經參天地之化育者不足以與此漢孔氏曰三公之官不必備員惟其人有德乃處之陳氏曰書稱召公為保周公為師是有二公則為之師保也無其人則雖傅亦無聞焉其後周公既沒則以召公為保而師亦無聞焉此所謂官不必備惟其人漢孔氏曰此三官名曰三孤孤特也言卑于公尊于卿特置此三者陳氏曰少對太而言蓋其次也猶周禮言大宰小宰蔡氏曰三少雖三公之二而非其屬官故曰孤漢孔氏曰副二三公𢎞大道化敬信天地之教以輔我一人之治王氏曰二副也吕氏曰弼一人乃格君心之任獨于孤言之公反不與何耶論道經邦燮理隂陽未有不自君心者特成王尊三公之至若不敢以身煩之若曰斯人也乃造化之友非豫一人之弼也尊之至也朱子曰三公三孤本無職事亦無官屬但以道義輔佐天子而已又曰三公三少只是加官周公以太師兼冢宰召公以太保兼冢宰是以加官而兼宰相之任也後世官制益紊遂以三公三少為階官不復有師保之任論道經邦之責矣蔡氏曰隂陽以氣言道者隂陽之理恆而不窮者也易云一隂一陽之謂道是也天地以形言化者天地之用運而無迹者也易云範圍天地之化是也公論道孤𢎞化公燮理隂陽孤寅亮天地公論于前孤弼于後公孤之分如此冢宰掌邦治統百官均四海司徒掌邦教敷五典擾兆民宗伯掌邦禮治神人和上下司馬掌邦政統六師平邦國司冦掌邦禁詰姦慝刑暴亂司空掌邦土居四民時地利六卿分職各率其屬以倡九牧阜成兆民吕氏曰三公三孤天子所與調精祲之源而無所治者也總萬事而分治之則六卿之職六卿者萬事之綱也漢孔氏曰天官卿稱太宰主國政治統理百官均平四海之內邦國冢宰説見伊訓林氏曰掌猶主也古人各即一事名官獨冢宰無所不統故不以一事名而曰邦治吕氏曰冢宰內統百官外均四海宰相之職也百官異職管攝之使歸于一是之謂統四海異宜調劑之使得其平是之謂均管攝之者非官官而控制之也自百而歸之六自六而歸之一所操者至簡也調劑之者非人人而稱量之也大者與之為大小者與之為小所居者至易也明乎易簡之理相業無餘藴矣漢孔氏曰地官卿司徒主國教化布五常之教以安和天下衆民使小大協睦五典説見舜典陳氏曰司徒掌養民教民之事今獨言教取其重者言之猶宗伯掌禮樂而獨言掌邦禮也唐孔氏曰舜典云司徒敬敷五教周禮司徒掌十有二教鄭云有虞氏五而周十有二然則十有二細分五教為之陳氏曰舜典言敬敷五教在寬言施教在于寬以施教之術而言也此言擾兆民言施教以馴擾其民以施教之效而言也漢孔氏曰春官卿宗廟官長主國禮治天神地祇人鬼之事及國之吉凶軍賔嘉五禮以和上下尊卑等列唐孔氏曰宗伯職云掌建邦之天神人鬼地示之禮又主吉凶軍賔嘉之五禮吉禮之别十有二凶禮之别有五賔禮之别有八軍禮之别有五嘉禮之别有六總有三十六禮皆在宗伯職掌之文吕氏曰成周合禮樂于一官和云者蓋亦包樂于其間也後世禮樂廢壞所以治人者不過期會簿書之末至于祀典尤為不經所謂治神者謾不知為何語矣漢孔氏曰夏官卿主戎馬之事掌國征伐統正六軍平治王邦四方國之亂者吕氏曰國之大事何莫非政獨戎政謂之政何也天下無事寓兵於農然後賦役百為始有所施是固政之所從出也天下有事舉兵討亂邦之存亡安危係焉其為政之大又不待論矣王者之兵特欲平邦國之不平者耳非貪忿而誇功也六師説見胤征漢孔氏曰秋官卿主冦賊法禁治姦惡刑強暴作亂者唐孔氏曰周禮云掌邦刑此云掌邦禁者避下刑暴亂之文陳氏曰設刑以禁人使不為惡而非以虐民故曰邦禁姦詐慝惡乃暴亂之本以其隱而離知故言詰謂窮詰其情也暴虐為亂乃姦慝之著以其已見所犯故言刑謂加刑也要之詰而後刑刑者必詰互文也漢孔氏曰冬官卿主國空土以居民士衆工商四民使順天時分地利授之土能吐生百穀故曰土唐孔氏曰周禮冬官亡小宰職云冬官掌邦事禮記王制記司空之事云量地以制邑度地以居民足明冬官有空土居民之事周禮云事此云土者為下有居四民故曰土以居民為急故也齊語云管仲制法令士農工商四民不雜即此居民也吕氏曰地利者陂澤之灌溉土壤之膏腴皆是也不曰興地利而曰時地利者江河之移徙固有昔瘠而今沃者矣陵谷之變遷固有昔下而今髙者矣隨時而權其廢興然後地利可盡漢孔氏曰六卿各率其屬官大夫士治其所分之職以倡導九州牧伯為政大成兆民之性命皆能其官則政治林氏曰六卿屬官各六十共三百六十吕氏曰六卿率其屬以倡九州之牧自內以達之外九牧率其州之諸侯以應六卿之令自外而受之于內內倡外應阜成兆民此成周治天下之體統又曰冢宰相天子統百官則司徒以下無非冢宰所統乃均列一職而併數之為六者網在綱中也乾坤之于六子並列于八方冢宰之與五卿並列于六職六年五服一朝又六年王乃時巡考制度于四嶽諸侯各朝于方嶽大明黜陟漢孔氏曰五服侯甸男采衛六年一朝會京師唐孔氏曰周禮大行人云侯服歲一見其貢祀物甸服二歲一見其貢嬪物男服三歲一見其貢器物采服四歲一見其貢服物衛服五歲一見其貢財物要服六歲一見其貢貨物先儒説周禮者皆云見謂來朝也計六年大集應六服俱來而此文惟言五服蓋以要服路逺外逼四夷不必常能及期故寬言之而不數也漢孔氏曰周制十二年一巡守春東夏南秋西冬北故曰時巡考正制度禮法于四嶽之下如虞帝巡守然唐孔氏曰周禮大行人云十有二歲王巡守殷國漢孔氏曰覲四方諸侯各朝于方嶽之下大明考績黜陟之法黜陟説見舜典吕氏曰是制也嘗一見于虞書後千餘年始復出于此于此驗其疏數而世之升降事之繁簡輿衛之多寡用度之豐約與夫成王觀會通而行典禮皆可得而推矣王曰嗚呼凡我有官君子欽乃攸司慎乃出令令出惟行弗惟反以公滅私民其允懷學古入官議事以制政乃不迷其爾典常作之師無以利口亂厥官蓄疑敗謀怠忽荒政不學牆面蒞事惟煩戒爾卿士功崇惟志業廣惟勤惟克果斷乃罔後艱位不期驕祿不期侈恭儉惟德無載爾偽作德心逸日休作偽心勞日拙居寵思危罔不惟畏弗畏入畏推賢讓能庶官乃和不和政厖舉能其官惟爾之能稱匪其人惟爾不任陳氏曰此方詳言訓迪之意漢孔氏曰嘆而戒之使敬汝所司慎汝出令從政之本令出必惟行之不惟反改吕氏曰有官君子合尊卑大小同訓之也令之大者固出于君而百司庶府自下教條于其屬亦莫非令也蘇氏曰令出不善知而改之猶賢于不反也然數出數反則民不復信上雖有善令不行矣故教以謹令非教以遂非也漢孔氏曰從政以公平滅私情則其民信歸之程子曰公則一致私則萬殊人心不同如面只是私心吕氏曰不曰至公無私而曰以公滅私蓋私乃古今在官者之實病故成王示之消長之理使知用力也漢孔氏曰言當先學古訓然後入官治政凡制事必以古義議度終始政乃不迷錯吕氏曰淵源必考其自來軌轍必觀其已試三代君臣相與建事一以稽古為本至苟卿始開法後王之論李斯得之蕩滅古學令吏以法令為師卒以亡秦然則三代所以嚴守古學者是誠有意也議事以制制即所學之成法也蘇氏曰鄭子産鑄刑書晉叔向譏之曰昔先王議事以制不為刑辟其言蓋取諸此先王人法並任而任人為多故律設大法而已其輕重之詳則付之人臨事而議以制其出入故刑簡而政清自唐以前治罪科條止于申律令而已人之所犯日變無窮而律令有限以有限治無窮不聞有所闕豈非人法兼行吏猶得臨事而議乎今律今之外科條數萬而不足于用有司請立新法者日益不已嗚呼任法之弊一至于此哉漢孔氏曰其汝為政當以舊典常故事為師法陳氏曰典常者理之通古今常行而不可變者也應氏曰自欽乃攸司而下謂當嚴謹于居官之際也自學古入官而下謂當講貫于入官之初也議事以制即用其學之所得者為議論典常作師即守其理之所存者為矜式以其斷決而不可犯曰制以其一定而不可易曰典常不可析為二也或以制為古典為今或以制為今典為古説雖不同俱非本旨漢孔氏曰無以利口辨侫亂其官吕氏曰自古變亂祖宗之法度未有不始于利口之人漢孔氏曰積疑不決必敗其謀怠惰忽略必亂其政人而不學其猶正牆面而立臨政事必煩吕氏曰有疑即辨可否立決蓄而不辨一前一却謀之所以不成也怠則失于不及忽則失于太過或過或不及荒于政則均也學者應事以理不學者應事以才力學者以理應事雖萬變而不勞不學者于理不通懵然面牆遇事之至始以一二才力營之未至什伯已不勝其煩矣漢孔氏曰此戒凡有官位但言卿士舉其掌事者功髙由志業廣由勤惟能果斷行事乃無後難言多疑必致患吕氏曰人之居官患在因循苟且趣過目前不以功業自期故更端而警之欲其注于心功者業之成也業者功之積也所謂功業者非欲經營分外而求新竒也凡一官一職莫不有無窮之事業也崇其功者存乎志廣其業者存乎勤勤由志而生志待勤而遂雖有二者當幾而不能果斷則志與勤虛用而終蹈後艱矣朱子曰斷以不疑鬼神避之需者事之賊也漢孔氏曰貴不與驕期而驕自至富不與侈期而侈自來驕侈以行已所以速亡陳氏曰驕矜肆也侈奢泰也漢孔氏曰言當恭儉惟以立德無行姦偽陳氏曰載猶載物之載漢孔氏曰為德直道而行于心逸豫而名日美為偽飾巧百端于心勞苦而事日拙不可為吕氏曰居移氣養移體位祿之移人入于驕侈而不自知處此而欲恭儉非聲音笑貌所能為也必實冇是德不容毫髮之偽于其間然後可也因是而推言實偽之辨從事于實則心廣體胖日以休泰從事于偽雖殫其智慮左蔽右隱人之視己如見肺肝日彰其拙矣天下至逸而無憂者莫如德至勞而無益者莫如偽此兩塗凡人皆當知所擇在官守者尤當知之也怵于權利懷諼行詐以覆邦家其害為尤甚成王别白示之其賜後世深矣漢孔氏曰言雖居貴寵當思危懼無所不畏若乃不畏則入可畏之刑吕氏曰後世之患失者與思危若相似然思危者以寵為憂患失者以寵為樂所存大不同也張氏曰居寵思危則其視爵位無非可畏者不畏則禍不旋踵霍光梁冀是也漢孔氏曰賢能相讓俊乂在官所以和諧厖亂也吕氏曰人情相下然後能相入後世聚訟紛爭人各有心東曹所與西或奪之左臺所建右或毁之政事厖雜莫知適從正坐不相下故耳漢孔氏曰所舉能修其官惟亦汝之功能舉非其人亦惟汝之不勝其任王氏曰道二義利而已推賢讓能所以為義大臣出于義則莫不出于義此庶官所以不爭而和蔽賢害能所以為利大臣出于利則莫不出于利此庶官所以爭而不和則政必雜亂而不理矣所舉之人能修其官是亦爾之所能舉非其人是亦爾不勝任古者大臣以人事君其責蓋如此王曰嗚呼三事暨大夫敬爾有官亂爾有政以佑乃辟永康兆民萬邦惟無斁吕氏曰成王訓戒既終復總告之漢孔氏曰嘆而勑之公卿以下各敬居汝所有之官治汝所有之政吕氏曰即始所謂欽乃攸司也漢孔氏曰以助汝君長安天下兆民則天下萬國惟乃無厭我德葉氏曰始言阜成兆民終言永康兆民終始之辭成王既伐東夷肅慎來賀王俾榮伯作賄肅慎之命漢孔氏曰海東諸夷駒麗扶餘馯貊之屬武王克商皆通道焉成王即政而叛王伐而服之故肅慎氏來賀蘇氏曰東夷淮夷也在周為東唐孔氏曰東北逺夷有名肅慎氏者漢孔氏曰榮國名同姓諸侯為卿大夫王使之為命書以幣賄賜肅慎之夷亡周公在豐將沒欲葬成周公薨成王葬于畢告周公作亳姑漢孔氏曰致政老歸唐孔民曰成王封伯禽于魯公老不歸魯而在豐者公羊氏傳云周公曷為不之魯欲天下之一于周也漢孔氏曰己所營作示終始念之漢孔氏曰不敢臣周公故使近文武之墓唐孔氏曰帝王世紀云文武葬于畢漢孔氏曰周公徙奄君于亳姑因告柩以葬畢之義并及奄君已定亳姑言所遷之功成亡吕氏曰周公老于豐蓋成王拳拳不可一日逺周公故不容之魯觀洛誥所以反覆挽留者可見矣公羊之云蓋以利害言不足與論三代君臣之際也將沒而欲葬成周蓋宗臣垂死憂國之心以邦之安危惟兹殷士致其不忘之意耳以葬警成王而意不在葬也成王領其意不從其葬葬畢者祔于文武從周家之兆域也亳姑之義不可知先儒謂併告遷奄亦或然也尚書纂傳卷三十六
