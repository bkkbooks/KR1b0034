body:
  text: 尚書纂傳卷二十元王天與撰牧誓第四周書武王戎車三百兩虎賁三百人與受戰于牧野作牧誓漢孔氏曰兵車百夫長所載車稱兩蔡氏曰戎車馳車也古者馳車一乘則革車一乘馳車戰車也革車輜車載器械貨財衣裝者也司馬法云一車甲士三人步卒七十二人炊家子十人固守衣裝五人廐養五人樵汲五人馳車七十五人革車二十五人凡百人二車故謂之兩三百兩三萬人也漢孔氏曰勇士稱也若虎賁獸言其猛也皆百夫長林氏曰史記孟子皆作三千人愚謂當從此序葢古者虎賁之士必擇驍勇有力者為之以為衞兵周官虎賁氏掌先後王而趨以卒伍其屬有虎士八百人當周之盛時纔有虎士八百人則伐殷之時有三百人固其理也成王崩太保命仲桓南宫毛俾爰齊侯吕伋以二千戈虎賁百人逆子釗于南門之外則是虎賁之士葢宿衞之官所以輔從乗輿者也牧野之戰有虎賁三百人已為盛矣是時諸侯各以其師來會此惟言戎車三百兩虎賁三百人但舉周師之數而不及諸侯之師者葢以周師為主也漢孔氏曰紂近郊三十里地名牧唐孔氏曰史敘其事作牧誓牧誓漢孔氏曰至牧地而誓衆吕氏曰湯伐桀止于湯誓一篇武王伐紂則有泰誓三篇又有牧誓即誓言之繁簡可見時世風俗之推移蔡氏曰今文古文皆有時甲子昧爽王朝至于商郊牧野乃誓王左杖黄鉞右秉白旄以麾曰逖矣西土之人按此史斂作誓之由漢孔氏曰是克紂之月甲子之日二月四日癸亥夜陳甲子朝誓將與紂戰吕氏曰司馬法謂或將交刃而誓致民志也此誓即交刃而誓也漢孔氏曰鉞以黄金飾斧左手杖鉞示無事於誅右手把旄示有事於教逖逺也逺矣西土之人勞苦之唐孔氏曰太公六韜云大柯斧重八斤一名天鉞廣雅云鉞斧也旄用白者取其易見也唐陸氏曰馬云白旄旄牛尾鄭氏曰麾指麾也蘇氏曰王無自用鉞之理以為儀耳故左杖黄鉞麾非右手不能故右秉白旄此事理之常而或者附致議論皆非其實王曰嗟我友邦冢君御事司徒司馬司空亞旅師氏千夫長百夫長及庸蜀羌髳微盧彭濮人稱爾戈比爾干立爾矛予其誓林氏曰歴舉所誓之人友邦冢君御事説見泰誓上漢孔氏曰三卿司徒主民司馬主兵司空主土指誓戰者林氏曰是時周為諸侯未有六卿故止言三卿漢孔氏曰亞次旅衆也衆大夫其位次卿林氏曰周禮云建其正立其貳設其考陳其殷亞即所謂貳小司徒小司馬小司空是也旅即所謂殷殷衆士也蔡氏曰大國三卿下大夫五人士二十七人亞者卿之貳大夫是也旅者卿之屬士是也漢孔氏曰師氏大夫官以兵守門者唐孔氏曰周禮師氏中大夫使其屬帥四夷之隸各以其兵服守王之門外朝在野外則守内列鄭云内列藩營之在内者也守之如守王宫林氏曰師氏即大誥所謂尹氏洪範所謂師尹又在亞旅之下漢孔氏曰師帥卒帥葉氏曰司馬法百人為卒卒有長所謂百夫長也五百人為旅二千五百人為師皆有帥則千人之間宜亦有長所謂千夫長也林氏曰千夫長百夫長皆是主兵之人但不必盡合司馬法所言漢孔氏曰八國皆蠻夷戎狄屬文王者國名羌在西蜀叟髳微在巴蜀盧彭在西北庸濮在江漢之南唐孔氏曰皆西南夷也文王國在西故西南夷先屬焉漢孔氏曰稱舉也干戈說見說命中蔡氏曰矛㦸屬長二丈唐孔氏曰戈短人執以舉之故言稱楯則並以扞敵故言比矛長立之於地故言立吕氏曰今各各嚴辦以聽誓王曰古人有言曰牝雞無晨牝雞之晨惟家之索今商王受惟婦言是用昏棄厥肆祀弗答昏棄厥遺王父母弟不迪乃惟四方之多罪逋逃是崇是長是信是使是以為大夫卿士俾暴虐于百姓以姦宄于商邑今予發惟恭行天之罰林氏曰此誓之以伐紂之意漢孔氏曰言無晨鳴之道索盡也喻婦人知外事雌代雄鳴則家盡婦奪夫政則國亡真氏曰索蕭索也唐孔氏曰牝雌也爾雅飛曰雌雄走曰牝牡此言牝雞者毛詩左傳稱雄狐是飛走通也將陳紂用婦言故舉此古人之語朱子曰天下之本在國國之本在家三代聖賢能修其政者莫不本於齊家葢男正位乎外女正位乎内而夫婦之别嚴者家之齊也妻齊體於上妾承接於下而嫡庶之分定者家之齊也采有德戒聲色近嚴敬逺技能者家之齊也内言不出外言不入包苴不逹請謁不行者家之齊也書曰牝雞之晨惟家之索傳曰福之興莫不本乎室家道之衰莫不始乎梱内漢孔氏曰妲己惑紂紂信用之漢孔氏曰昏亂肆陳答當也亂棄其所陳祭祀不復當享鬼神蘇氏曰祭所以報也故謂之答唐孔氏曰不事神祗惡之大者故泰誓及此三言之漢孔氏曰王父祖之昆弟母弟同母弟言棄具骨肉不接之以道唐孔氏曰釋親云父之考為王父王父祖也紂無親祖可棄故為祖之昆弟棄其祖之昆弟則父之昆弟亦棄之矣同母之弟尚棄則别生者必棄矣舉尊親以見卑疎也遺亦棄也經先言棄祀棄親者鄭𤣥云誓首言此者神怒民怨紂所以亡也真氏曰紂受病之本皆是昏之一字故武王兩言之漢孔氏曰言紂棄其賢臣而尊長逃亡罪人信用之林氏曰四方多罪逋逃之人崇之長之信之使之或為大夫或為卿士既曰崇又曰長又曰信又曰使言其好用小人也漢孔氏曰使四方罪人暴虐姦宄於都邑唐孔氏曰暴虐謂殺害殺害加於人故言於百姓姦宄謂劫奪劫奪有處故言於商邑百姓亦是商邑之人也㳟行天罰説見甘誓今日之事不愆于六歩七歩乃止齊焉夫子朂哉不愆于四伐五伐六伐七伐乃止齊焉朂哉夫子尚桓桓如虎如貔如熊如羆于商郊弗迓克奔以役西土朂哉夫子爾所弗朂其于爾躬有戮林氏曰此節制衆士之辭漢孔氏曰今日戰事就敵不過六歩七歩乃止相齊言當旅進一心蔡氏曰歩進趨齊整齊也此告之以坐作進退之法所以戒其輕進也此言夫子朂哉下言朂哉夫子反覆成文以致其意夫子說見泰誓中漢孔氏曰伐謂擊刺少則四五多則六七以為例蔡氏曰此告之以攻殺擊刺之法所以戒其貪殺也吕氏曰戰陣如長蛇或形勢高下或敵情艱險皆不可知數數止齊亦不是聖人之法葢伍兩卒旅各有長使其長各自止其止各自齊其齊故當戰時自井然有序不失紀律三軍一人百將一指後世之師有追逐夜行三百里者紀律安在哉漢孔氏曰桓桓武貌貔執夷虎屬也四獸皆猛健欲使士衆法之奮擊於牧野商衆能奔來降者不迎擊之如此則所以役我西土之義唐孔氏曰迓迎也蔡氏曰此勉其武勇而戒其殺降者也按以役西土讀如周禮以役太師句法葢勿迎擊之而撫受之則來者皆為吾用舊説恐未安漢孔氏曰不勉則於汝身有戮矣吕氏曰武王之誓比前代雖繁然曰顯戮曰有戮比廿誓湯誓之孥戮反輕葢忠厚之意復還於昔也尚書纂傳卷二十
