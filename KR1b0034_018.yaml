body:
  text: 尚書纂傳卷十八元王天與撰微子第十七商書殷既錯天命微子作誥父師少師漢孔氏曰錯亂也唐孔民曰不指紂惡而言錯亂天命者天生蒸民立君以牧之為君而無君道是錯亂天命為惡之大故舉此以見惡之極耳漢孔氏曰微圻內國名子爵為紂卿士告二師而去紂父師太師三公箕子也少師孤卿比干也唐孔氏曰微子名啓紂之庶兄吕氏曰治亂之興觀賢人君子議論之所在天下有道相與謀議於朝共盡致君之道天下無道相與私議於家各盡致身之道使微子與父師少師在唐虞時必與稷契臯陶都俞於朝廷在成湯時必與伊尹仲虺陳告於君前不幸遇紂諫之不聽進不可也不諫不能退不可也進退不可不得已謀各行其志以不拂其節聖賢處心至此紂之時如何唐孔氏曰史敘其事作此篇名曰微子而不言作微子者已言微子作誥以可知而省文也微子蔡氏曰此篇誥體也以篇首有微子二字因以名篇今文古文皆有微子若曰父師少師殷其弗或亂正四方我祖砥遂陳于上我用沈酗于酒用亂敗厥德于下殷罔不小大好草竊姦宄卿士師師非度凡有辜罪乃罔恆獲小民方興相為敵讎今殷其淪喪若涉大水其無津涯殷遂喪越至于今曰父師少師我其發出狂吾家耄遜于荒今爾無指告豫顛隮若之何其蔡氏曰此微子問二師之言若曰説見盤庚漢孔氏曰言殷其不有治正四方之事將必亡吕氏曰其者未定之辭或者非斷然之辭商之亡形決矣猶曰商其弗或能治正四方是微子望君之切猶冀其一旦悔悟不敢謂其果不能也漢孔氏曰言湯致遂其功陳列於上世陳氏曰遂成也漢孔氏曰我紂也沈湎酗醟敗亂湯德於後世蔡氏曰言我而不言紂者過則歸已猶不忍斥言之沈説見胤征唐陸氏曰以酒為凶曰酗李氏曰紂罪多矣止言沈酗于酒者蓋多罪自沈酗始德本素有因酒滅之故曰亂敗葉氏曰敗于下與陳于上為對上下猶前後也漢孔氏曰草野竊盜又為姦宄於內外吕氏曰好者見其心之無所畏忌也漢孔氏曰六卿與士相師效為非法度皆有辜罪無秉常得中者林氏曰六卿庶士皆相師效為非法度之事紂為天下逋逃主而卿士師師非度故凡有罪者不能常獲吕氏曰唐虞之朝非不師師乃師師為善師師為惡是為惡之力方新也如見人宫室華麗之類則師其華麗是相則效以為惡也犯罪者皆有所倚倚人君為惡可以逃罪倚權臣為惡可以逃罪倚貴戚為惡可以逃罪雖有三尺將奚攸用亂世之象明矣漢孔氏曰共為敵讎言不和同葉氏曰方興言其方興而未艾也敵爭鬭也讎仇怨也吕氏曰亦亂世之證也君者能羣之謂君能羣則天下之民出入相友守望相助疾病相扶持親睦之不暇何敵讎之有君不能羣則大陵小強陵弱爭相陵奪方且興起而樂之所以促天下於淪亡也漢孔氏曰淪沒也言殷將沒亡如涉大水無涯際無所依就陳氏曰涉處曰津水際曰涯吕氏曰詩人刺幽王曰淠彼舟流不知所屆心之憂矣不遑假寐微子之情正如詩人無聊之態漢孔氏曰言遂喪亡於是至于今到不待久吕氏曰微子嘆商業之大乃至今日而遂喪亡代紂而寒心也唐孔氏曰微子止而復言故别加一曰漢孔氏曰我念殷亡發疾生狂在家耄亂故欲遁出於荒野言愁悶鄭氏曰狂疾也躁也耄昏亂也張氏曰微子蓋有去之之意矣漢孔氏曰汝無指意告我殷邦顛隕隮墜如之何其救之林氏曰鄭氏謂其語助也音姬孔氏謂如之何救之則是但非其字讀當以鄭為正蔡氏曰微子上陳祖烈下述喪亂哀怨痛切言有盡而意無窮數千載之下猶使人感傷悲憤後世人君亦可以深鑒之矣父師若曰王子天毒降災荒殷邦方興沈酗于酒蔡氏曰以下箕子答微子之言此答微子沈酗于酒之語而有甚之之意下同漢孔氏曰比干不見明心同省文微子帝乙元子故曰王子漢孔氏曰天生紂為亂是天毒下災四方化紂為沈湎不可如何蔡氏曰自紂言之則紂無道故天降災自天下言之則紂之無道亦天之數箕子歸之天者以見其忠厚敬君之意與小旻詩言旻天疾威敷于下土意同葉氏曰方興與上文方興同林氏曰紂之惡其原惟在酒故微子箕子酒誥及蕩之詩皆言之乃罔畏畏咈其耇長舊有位人蔡氏曰此答微子卿士師師非度之語漢孔氏曰上不畏天災下不畏賢人違戾耇老之長致仕之賢蔡氏曰乃罔畏畏不畏其所當畏也咈其耇長者即武王所謂播棄犂老者也今殷民乃攘竊神祗之犧牷牲用以容將食無災蔡氏曰此答微子草竊姦宄之語漢孔氏曰自來而取曰攘色純曰犧體完曰牷牛羊豕曰牲器實曰用盜天地宗廟牲用相容行食之無災罪之者言政亂唐孔氏曰攘竊同文則攘是竊類説文云犧宗廟牲也曲禮云天子以犧牛周禮牧人掌牧六牲以供祭祀之牲牷用者簠簋之實謂黍稷稻梁容謂所司相通容使盜者得行盜而食之夫祭祀之物物之重者盜而無罪漢魏以來著律皆云敢盜郊祀宗廟之物無多少皆死者為特重故也降監殷民用乂讎斂召敵讎不怠罪合于一夕夕瘠罔詔蔡氏曰此答微子小民相為敵讎之語漢孔氏曰下視殷民所用治者皆重賦傷民斂聚怨讎之道而又亟行暴虐自召敵讎不懈怠蔡氏曰讎斂若仇讎棓斂之也上以讎而斂下則下必為讎以敵上下之敵讎實上之讎斂召之不怠力行不息也漢孔氏曰言殷民上下有罪皆合於一法紂故使民多瘠病而無詔救之者蔡氏曰詔告也吕氏曰君為不善猶可詔其左右之大臣卿為不善猶可詔其僚屬之大夫今上下俱惡如出一人困窮之民何所赴訴惟有坐視而已商今其有災我興受其敗商其淪喪我罔為臣僕詔王子出迪我舊云刻子王子弗出我乃顛隮蔡氏曰此答微子淪喪顛隮之語漢孔氏曰災滅在近我起受其敗漢孔氏曰商其沒亡我二人無所為臣僕欲以死諫紂唐孔氏曰有災與淪喪一事而重出文者上言災雖未至至則已必受禍此言殷滅之後已不事異姓辭有二意而重出其文朱子門人問曰微子以宗國將亡不勝其憂愁無聊之心而謀出處於箕子比干故箕子為言我興受其敗不可逃免當與宗國俱為存亡雖啇祀或至淪亡我亦誓不臣屬他人蓋將諫紂紂不聽亦不敢茍全逃死其後比干果以諌死而箕子乃不死者比干初心豈欲徒死以沽名哉所以諌者庶幾吾言得行而紂改焉耳紂既不改而言益切故紂遂殺之則比干亦不得而逃死耳箕子初心亦豈欲隱晦自存以茍全其生哉亦猶比干之諫冀吾言得行而紂改焉耳紂既不改而囚之偶不死耳紂囚之而不置之死則箕子豈固欲自經於溝瀆而為匹夫之諒哉故因遂佯狂而為奴蓋亦未欲即死庶幾彌縫其失而冀其萬有一之開悟耳蓋諌行而紂改過者二子之本心也諫不行而或死或囚者二子所遇之不同耳朱子答曰此説得之史記亦説箕子諫而見囚也漢孔氏曰我教王子出合於道刻病也我久知子賢言於帝乙欲立子帝乙不肯病子不得立則宜為殷後者豫今若不出逃難我殷家宗廟乃隕墜無主蘇氏曰刻害也朱子門人問曰箕子為微子之計其意則以微子國之元子也往者紂未立吾嘗言於帝乙而立子帝乙不從而立紂是以紂卒疑吾兩人故吾舊所云者足以害子子若起諫紂則紂益生疑非惟不從害必及子矣死分也不足惜而未有毫髮益於紂而遽死可惜也東萊所謂人先有疑心則雖盡忠與言而未必聽蓋疑心先入而為之主是也故微子不可留但當遁逃而出乃合於道不可使成湯以來廟不血食萬有一全宗祀可也朱子曰是張氏曰觀此則微子雖有去之之意又出於父師之詔而始決也自靖人自獻于先王我不顧行遁蔡氏曰上文既答微子所言至此告以彼此去就之義漢孔氏曰各自謀行其志人人自獻達于先王以不失道靖説見盤庚蘇氏曰微子之告箕子若欲與之偕去然箕子曰吾三人者各行其志自用其心之所安者而已人各自以其意貢于先王微子以去之為續先王之國箕子以為之奴為全先王之嗣比干以諌而死為不負先王也漢孔氏曰言將與紂俱死所執各異皆歸于仁明君子之道出處語默非一途總説一篇意論語微子去之箕子為之奴比干諫而死孔子曰殷有三仁焉朱子曰三人之行不同而同出於至誠惻怛之意故不咈乎愛之理而有以全其心之德也龜山楊氏曰此三人者各得其本心故同謂之仁王氏曰左傳楚克許許男面縛銜璧衰絰輿襯以見楚子楚子問諸逢伯逢伯對曰昔者武王克啇微子啓如是武王親釋其縛受其璧而袚之焚其櫬禮而命之使復其所則是微子歸周在武王克商之後而其行遁之本心特欲避禍自全待其悔而冀其存也紂卒不悔武王克商微子奉祭器出為商請後甚不得已也按説者謂微子志存殷後為仁然此言於紂亡之後可也若謂謀去之初事固出此則未然嘗考比書辭意將去深悲迫於情之不獲已故雖有存宗祀之心而亦豈出於豫亡其君留身以為後圖之意左傳載歸周在殷亡之後若謂此時已抱祭器而往則是豫擬國家於必亡而自計其身僅存殷後為宗祀計者不過如此得為仁乎故讀微子之書者若以為微子決然去之全身續祀未足見微子之心惟觀其愛君憂國傷時念亂倣徨躊躇就謀於一二同休戚之人而後微子之心始著已而去之猶將謂王庶幾改之豫日望之萬一疑情泮渙頓釋前非直為宗社救此一縷此宗臣依依戀國之真心也書有五子之歌詩有小辨皆親親也親親仁也詳味書中辭意怨而不怒去而非忘最見情意之真故述以共商榷云尚書纂傳卷十八
