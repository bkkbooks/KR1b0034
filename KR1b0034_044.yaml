body:
  text: 尚書纂傳卷四十四元王天與撰文侯之命第三十周書平王錫晉文侯秬鬯圭瓉作文侯之命漢孔氏曰幽王為犬戎所殺平王立而東遷洛邑晉文侯迎送安定之故錫命焉以圭為杓柄謂之圭瓉唐孔氏曰史記幽王娶於申而生太子宜臼後幽王嬖褒姒廢申后逐太子宜臼宜臼奔申申侯與犬戎殺幽王晉文侯與鄭武公及申侯共立宜臼是為平王晉文侯唐叔之後與王同姓名仇祭之初酌鬱鬯之酒以灌尸圭瓉者酌鬱鬯之杓杓下有槃瓉即槃之名也周禮典瑞云祼圭有瓉鄭云於圭頭為器可以挹鬯祼祭謂之瓉詩云瑟彼玉瓉黃流在中毛傳云玉瓉圭瓉也鄭云圭瓉之狀以圭為柄黃金為勺青金為外朱中央是説圭瓉之形狀也毛傳又云九命然後錫以秬鬯圭瓉則晉文侯於時九命為東西大伯故得受此賜陳氏曰經言錫秬鬯弓矢馬序獨言秬鬯舉其重也林氏曰書言秬鬯序言圭瓉互相備也吕氏曰周書載以秬鬯錫臣者凡兩見周公勤勞王家成王始有二卣之賜東遷之時視卜洛時何如也平王之錫文侯之受曽是以為足乎唐孔氏曰史録其册書作文侯之命文侯之命漢孔氏曰平王命為侯伯所以名篇蔡氏曰今文古文皆有王若曰父義和丕顯文武克愼明德昭升于上敷聞在下惟時上帝集厥命于文王亦惟先正克左右昭事厥辟越小大謀猷罔不率從肆先祖懷在位夏氏曰此首言文武得賢臣之力漢孔氏曰文侯同姓故稱曰父義和字也稱父者非一人故以字别之唐孔氏曰不云伯父叔父而直稱父者尤親之也漢孔氏曰言文王聖德明升于天而布聞在下民惟以是故上天集成其王命德流子孫丕顯明德説並見康誥吕氏曰克愼者維持保養明德之所以存自堯舜以來曰敬曰愼異名同實皆是作聖工夫二帝三王之書始篇曰欽明文思光被四表格于上下終篇曰克愼明德昭升于下敷聞在下帝王之學無毫髮異也孫氏曰周家之業集于文王定于武王故集命則以文王言明德則文武兼言漢孔氏曰亦惟先正官賢臣能左右明事其君所以然薛氏曰昭事厥辟以明德事其君也文武以明德臨下先正以謀明德事上先正説見説命下漢孔氏曰於小大所道德天下無不循從其化應氏曰此二句説者皆以為文武之事以文勢考之用先正者文武也從小大之謀猷以事文武者先正也漢孔氏曰故我後世先祖歸在王位唐孔氏曰先祖謂文武之後成康至宣幽皆是薛氏曰懷安也如邦之榮懷之懷謂先王得安在位也嗚呼閔豫小子嗣造天丕愆殄資澤于下民侵戎我國家純即御我事罔或耆夀俊在厥服豫則罔克曰惟祖惟父其伊恤朕躬嗚呼有績豫一人永綏在位父義和汝克昭乃顯祖汝肇刑文武用會紹乃辟追孝于前文人汝多修扞我于艱若汝豫嘉夏氏曰此稱文侯之功漢孔氏曰嘆而自痛傷也言我小子而遭天大罪過父死國敗祖業隤隕吕氏曰犬戎之禍實幽王之愆而平王乃曰嗣造天丕愆過則歸已猶有周家忠厚之遺也漢孔氏曰言周邦喪亂絶其資用惠澤於下民侵兵傷我國及卿大夫之家禍甚大林氏曰王室中否資澤及于下民者殄絶矣資澤既殄則民心去故夷狄乘間侵害我國家甚大漢孔氏曰即我治事之臣無有耆宿壽考俊德在其服位我則材劣無能之致唐孔氏曰幽王時平王被逐在外國之興亡非平王所知言我無能之致者引過歸已漢孔氏曰王曰同姓諸侯在我惟祖惟父列者其誰當憂念我身嗚呼能有成功則我一人長安在王位言恃諸侯唐孔氏曰伊誰地漢孔氏曰重稱字親之不稱名尊之言汝能明汝顯祖唐叔之道奬之漢孔氏曰言汝今始法文武之道矣當用是道合會繼汝君以善使追孝于前文德之人汝君平王自謂也繼先祖之志為孝葉氏曰周王稱成王為文子文孫故平王亦稱文武為文人漢孔氏曰戰功曰多言汝之功多甚修矣乃扞我于艱難謂救周誅犬戎汝功我所善之蘇氏曰汝多所修完扞衛我于艱難也張氏曰立平王乃申侯意文侯特能扶立平王豈有戰功蘇氏多修之訓極當吕氏曰文侯豈真能若此平王當想望之時得文侯扶持之故許之不知其過平王之失大抵求于人者重而所以自任者輕徒延頸以望諸侯之救已而不思自強以進君德王曰父義和其歸視爾師寧爾邦用賚爾秬鬯一卣彤弓一彤矢百盧弓一盧矢百馬四匹父往哉柔逺能邇惠康小民無荒寧簡恤爾都用成爾顯德唐孔氏曰王既陳其功乃賚賜之漢孔氏曰遣令還晉國其歸視汝衆安汝國內上下漢孔氏曰不言圭瓉可知彤赤盧黑也彤弓以講德習射馬供武用侯伯之賜無常以功大小為度葉氏曰覲禮諸侯來朝天子享之賜以車服此常禮也及敵王所愾而獻其功於是有加賜賜弓矢然後征賜斧鉞然後殺賜圭瓉然後為鬯未賜圭瓉則資鬯于天子此非常禮也陳氏曰古者駕車用四馬必備純色又小大相稱故言四匹匹偶也漢孔氏曰父往歸國哉能柔逺者必能柔近安小人之道必以順無荒廢人事而自安柔逺能邇説見舜典夏氏曰小民尤難以恩懷故恩惠所安尤貴先及于小民也漢孔氏曰當簡核汝所任憂治汝都鄙之人不言鄙由近以及逺夏氏曰言簡閲憂恤汝所都之國而成我顯明之德也吕氏曰東遷之初大讎未報王略未復正君臣坐薪嘗膽之時奔亡之餘僅得苟安君臣釋然自以為足曰歸視爾師寧爾邦兵已罷矣曰賚爾秬鬯弓矢功已報矣曰柔逺能邇教之以平世之政軍旅不復講矣曰簡恤爾都勉之以本邦之治王室無復事矣嗚呼君臣如此周其終於東乎總説一篇意蘇氏曰豫讀是篇知東周之不復興也宗周傾覆禍敗極矣平王宜若衛文公越勾踐然今其書乃施施焉與平康之世無異春秋傳謂厲王之禍諸侯釋位以間王政宣王有志而後效官讀此篇知平王之無志也唐德宗奉天之赦陸贄為作制書武夫悍卒皆為出涕唐是以復興嗚呼平王獨無此臣哉蔡氏曰平王以申侯立已為有德而忘其弒父為當誅方以復讎討賊之衆而為戍申戍許之舉其忘親背義得罪于天已甚矣然則是篇孔子以其能言文武之舊而存之歟抑亦以示戒於天下後世而存之歟吕氏曰風氣之推移治道之開塞必於其會觀之此篇作於東遷之初由此而上則為成康為文武由此而下則為春秋為戰國乃消長升降之會也故法語舊典尚有一二未泯而陵遲頽墮之意亦已見於辭氣間矣李氏曰夫子之於東周蓋三致意焉編詩則黍離降於國風修春秋則編年始于魯隱定書則命諸侯迄于文侯皆平王之世也尚書纂傳卷四十四
