body:
  text: 尚書纂傳卷一元王天與撰堯典第一虞書唐孔氏曰堯典雖曰唐事本以虞史所録末言舜登庸由堯故追堯作典非唐史所録故謂之虞書也唐陸氏曰凡十六十一篇亡五篇見昔在帝堯聰明文思光宅天下將遜于位讓于虞舜作堯典漢孔氏曰言聖德之逺著宅居也唐陸氏曰昔古也堯唐帝名姓伊耆氏帝嚳子吕氏曰聰明聖人先知先覺治天下所不可少敬而在外則為文聰明之發見也藴而在內則為思聰明之潛蓄也程子曰聽廣曰聰視逺曰明文文章也謂文理明順成文也愚謀慮意思也謂其含蓄堯以此聰明文思臨治天下其道光顯故云光宅言光顯而居天下也漢孔氏曰遜遁也老使攝遂禪之虞氏舜名許氏曰遜退避也朱子曰讓推以與人也唐陸氏曰舜姓姚氏唐孔氏曰王肅云虞地名今河東大陽山西虞地是也舜居虞地有天下號曰虞唐孔氏曰史述其事作堯典之篇吕氏曰聰明文思云云四句該一篇之旨九載績用弗成以前皆光宅天下之實咨四嶽以下將遜于位之實也按唐孔氏謂書序馬融王肅並云孔子所作至朱子則以為非又云相承已久未敢輕議且附經後今是編姑從漢孔氏引之各冠其篇首云堯典漢孔氏曰言堯可為百代常行之道朱子曰説文云典從册在丌上尊閣之也此篇以簡册載堯之事故曰堯典後世以其所載之事可為常法故又訓為常唐孔氏曰序已云作堯典而重言此者此是經之篇目不可因序有名略其舊題故諸篇皆重言朱子曰此篇今文古文皆有曰若稽古帝堯曰放勳欽明文思安安允恭克讓光被四表格于上下程子敘章旨見篇末漢孔氏曰若順稽考也能順考古道而行之者帝堯元城劉氏曰當為粵若稽古粵若發語之辭言史臣考古以此事也粵若所謂越若來三月是也朱子曰曰古文作粵元城説是程子曰放勳上更加曰字者稽古之帝堯其事曰如此也漢孔氏曰勳功欽敬也朱子曰放至也孟子言放於四海是也言堯之功大而無所不至也真氏曰放廣大之意自鴻荒以來羲農黃帝數聖人皆有功於生民而堯之功為尤大故曰放勳亦猶孔子稱堯曰巍巍乎其有成功鄭氏曰史臣以放勳贊堯而孟子因以為先稱如子貢言夫子天縱之將聖後人遂稱夫子為將聖也吕氏曰序言聰明此言欽明伊川云言欽則聰在其中欽之一字乃堯作聖之功夫聖聖相傳入道門户莫要于此伊川又云明包聰百聖相傳只一欽字前言聰明指其生知全德之自然也後言欽明指其作聖始終之工夫也朱子曰安安言其德性之美皆出自然而非勉強所謂性之也漢孔氏曰允信克能格至也既有四德又信恭能讓故其名聞充溢四外至于天地朱子曰恭莊敬讓謙遜也常人德非性有物欲害之故有強為恭而不實欲為讓而不能者惟堯性之是以信恭而能讓也被及表外上天下地也德之盛如此故其所及之逺如此克明俊德以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍程子敘章旨見篇末漢孔氏曰能明俊德之士任用之朱子曰看文勢不見有用人意此是再提起堯德説又曰明明之也俊大也堯之大德上文所稱是也大學引帝典曰克明俊德皆自明也朱子曰德之為體未嘗不大但人自有以昏之而陷於一物之小惟堯能明其大德而無昏蔽狹小之纍漢孔氏曰以睦髙祖玄孫之親既已也許氏曰以用親愛也禮記喪服小記曰親親以三為五以五為九鄭氏曰上親父下親子三也以父親祖以子親孫五也以祖親髙祖以孫親玄孫九也漢夏侯氏歐陽氏曰九族者父族四母族三妻族二林氏云父族四父五屬之內一也父之女昆弟適人者及其子二也己之女昆弟適人者及其子三也己之女子適人者及其子四也母族三母之父姓一也母之母姓二也母之女昆弟適人者及其子三也妻族二妻之父姓一也妻之母姓二也朱子曰九族且從古注又曰九族舉近以該逺五服之外異姓之親亦在其中也夏氏曰既盡睦和也漢孔氏曰百姓百官蔡氏曰百姓畿內民庶百官族姓亦在其中朱子曰典謨中百姓只説民如罔咈百姓之類若國語中百姓則多指官百族姓昭明皆能自明其德也按伏生大傳作辨章百姓朱子門人曰後漢書云部刺史之職在辨章百姓宣美風俗辨章即平章也又下文平秩平在之平大傳亦皆作辨漢孔氏曰協合黎衆時是雍和也言天下衆民皆變化從上是以風俗太和朱子曰萬邦天下諸侯之國黎黑也民首皆黑故曰黎民陳氏曰於如詩於穆於乎之於嘆美之辭也於變蓋神化之妙不可形容與直言變者氣象不同矣朱子曰此言堯推其德自身而家而國而天下所謂放勳也又曰九族既睦是堯一家之明德百姓昭明是堯一國之明德黎民於變時雍是堯天下之明德按大學在明明德在新民朱子曰明明德者非有所作為於性分之外也然所謂明德者又人人之所同得而非有我之得私故推吾之所自明者以及之始于齊家中於治國終於平天下是所謂新民者亦非有所付畀增益之也又大學引康誥曰克明德帝典曰克明峻德真氏曰康誥帝典兩語要切處在克之一字明德人所同有但以克明與不克明之異耳常人所以不能明者一以氣稟昏弱二以物欲蔽塞若一旦悔悟欲自明其德亦無不可患在自不肯為耳孟子謂有是四端而自謂不能者自賊者也惟以克之一字自勉而母自謂不能明則堯文王可及矣以上釋大學之意有同堯典意今附見乃命羲和欽若昊天歷象日月星辰敬授人時程子做章旨見篇末漢孔氏曰重黎之後義氏和氏世掌天地四時之官故堯命之使敬順昊天昊天言元氣廣大星四方中星辰日月所會歷象其分節敬記天時以授人也此舉其目下别序之許氏曰命使授付也唐孔氏曰據堯身而言用臣故云乃命非時雍之後方始命之朱子曰歷所以紀數之書象所以觀天之器如下篇璣衡之屬是也日陽精一日而繞地一周月隂精一月而與日一會星二十八宿衆星為經金木水火土五星為緯皆是唐陸氏曰日月會於十二次寅曰析木卯曰大火辰曰壽星已曰鶉尾午曰鶉火未曰鶉首中曰實沈酉曰大梁戌曰降婁亥曰娵訾子曰玄枵丑曰星紀朱子曰人時謂耕穫蠶績之侯凡民事早晚所關也吕氏曰未作歷之先欽若昊天是先天而天弗違也既作歷之後敬授民時是後天而奉天時也定歷之法敬心一失則乖錯舛謬其害大矣故雖分命申命所掌不同而乃命之辭欽敬之意本無異也真氏曰敬之見于經始此按先儒釋敬字義附臯陶謨篇分命羲仲宅嵎夷曰暘谷寅賔出日平秩東作日中星鳥以殷仲春厥民析鳥獸孳尾許氏曰分别也唐孔氏曰堯於羲和之內乃分命其羲氏而字仲者漢孔氏曰東表之地稱嵎夷暘明也日出于谷而天下明故稱㿩谷㿩谷嵎夷一也羲仲居治東方之官蘇氏曰禹貢嵎夷之地在青州唐孔氏曰居在國都而遙統領之王肅云皆居京師而統之是也日由空道似行自谷故以谷言之非實有深谷而日從谷以出也以春位在東因治於東方其實本主四方春政下文互發之漢孔氏曰寅敬賔導秩序也嵗起于東而始就耕謂之東作東方之官敬導出日平均次序東作之事以務農也朱子曰賔禮接之如賔客也亦帝嚳歷日月而迎送之意出日方出之曰蓋以春分之旦朝方出之日而識其初出之景也林氏曰東作謂萬物發生于東非全取農作之義曾氏云春為陽中萬物以生且引詩薇亦作止老子萬物並作為證此可以補先儒之説漢孔氏曰日中春分之日殷正也以正仲春之氣節唐孔氏曰馬融云古制刻漏晝夜百刻晝長六十刻夜短四十刻晝短四十刻夜長六十刻晝中五十刻夜亦五十刻融之此言據日出見為説天之晝夜以日出入為分人之晝夜以昏明為限日未出前二刻半為明日入後二刻半為昏損夜五刻以禆于晝則晝多於夜復校五刻古今厯術與太史所侯皆云夏至之晝六十五刻夜三十五刻冬至之晝四十五刻夜五十五刻春分秋分之晝五十五刻夜四十五刻此其不易之法也然今太史細候之法則挍常法半刻也從春分至于夏至晝漸長增九刻半夏至至于秋分所減亦如之從秋分至於冬至晝漸短減十刻半從冬至至于春分其增亦如之又於每氣之間增減刻數不可通而為率朱子曰中星或以象言或以次言或以星言者蓋星適當昏中則以星言如星虛星昴是也星不當中而適當其次者則以次言如星火是也次不當中而適界于兩次之間者則以象言如星鳥是也鄭氏曰二十八宿環列四方隨天而西轉角亢氐房心尾箕東方之宿也斗牛女虛危室壁北方之宿也奎婁冒昴畢觜參西方之宿也井鬼柳星張翼軫南方之宿也四方雖有定星而星無定居各以時見於南方惟仲春之月四方之星各居其位故星火在東星鳥在南星昴在西星虛夻北至仲夏則鳥轉而西火轉而南虛轉而東昴轉而北至仲秋則火轉而西虛轉而南昴轉而東鳥轉而北至仲冬則虛轉而西昴轉而南鳥轉而東火轉而北來嵗仲春則鳥又轉而南矣堯考中星以正四時甚簡而明林氏曰仲春之月初昏之時鶉火之星見于南方正午朱子曰殷中也春分陽之中也漢孔氏曰冬寒無事並入室處春事既起丁壯就功厥其也言其民老壯分析乳化曰孳交接曰尾朱子曰以民之散處驗其氣之溫也以物之生育驗其氣之和也申命羲叔宅南交平秩南訛敬致日永星火以正仲夏厥民因鳥獸希革漢孔氏曰申重也唐孔氏曰又就所分羲氏之內重命其羲氏而字叔者漢孔氏曰南交言夏與春交舉一隅以見之此居治南方之官劉氏曰㿩谷昧谷幽都皆指地而言不當於夏而獨以氣言本蓋言宅南曰交趾後人傳寫脫兩字耳陳氏曰交下當有曰明都三字漢孔氏曰訛化也掌夏之官平敘南方化育之事敬行其教以致其功四方同之亦舉一隅朱子曰南訛史記索隱作南訛謂所當為之事也敬致周禮所謂春夏致日蓋以夏至之日中祠日而致其景如所謂日至之景尺有五寸謂之地中者也漢孔氏曰永長也謂夏至之日以正仲夏之氣節林氏曰仲夏之月初昏之時大火之星見於南方正午朱子曰正者夏至陽之極午為正陽位也漢孔氏曰因謂老弱因就在田之丁壯以助農也夏至鳥獸毛羽希少改易革改也朱子曰因析而又析氣愈熱而民愈散也分命和仲宅西曰昧谷寅餞納日平秩西成宵中星虛以殷仲秋厥民夷鳥獸毛毨唐孔氏曰又分命和氏而字仲者漢孔氏曰昧冥也日入於谷而天下冥故曰昧谷昧谷曰西則嵎夷東可知此居治西方之官掌秋天之政也朱子曰西謂西極之地唐孔氏曰谷為日所行之道故謂日入之處為昧谷非實有谷而日入也漢孔氏曰餞送也日出言導日入言送因事之宜秋西方萬物成平序其政助成物許氏曰納入成就也朱子曰納日方納之日蓋以秋分之莫夕方納之日而識其景也西成秋月物成之時所當成就之事也漢孔氏曰宵夜也春言日秋言夜互相備虛玄武之中星林氏曰仲秋之月初昏之時虛之星見於南方正午朱子曰亦曰隂者秋分隂之中也漢孔氏曰夷平也老壯在田與夏平也毨理也毛更生整理朱子曰暑退而人氣平也毛毨毛落更生潤澤鮮好也申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬厥民隩鳥獸氄毛唐孔氏曰又重命和氏而字叔者漢孔氏曰北稱朔亦稱方言一方則三方見矣北稱幽則南稱明從可知也都謂所聚也程子曰朔初也陽生於子謂陽初始生之方也朱子曰朔之為言蘇也萬物至此死而復蘇猶月之晦而有朔也幽暗也日行至是則淪於地中萬象幽暗故曰幽都漢孔氏曰在察也易謂嵗改易於北方平均在察其政以順天常王氏曰冬不言秩而言在在察其改易而已秩非不在在非不秩亦互相備吕氏曰北方終其隂而復始其陽既成今嵗之終又慮來嵗之始故謂之朔易始而終終而始此天地生生不窮之道聖人體之以贊天地化育乾健不息艮始終萬物之意也漢孔氏曰日短冬至之日昴白虎之中星林氏曰仲冬之月初昏之時昴星見於南方正午朱子曰亦曰正者冬至隂之極子為正隂之位也漢孔氏曰隩室也民改嵗入此室處以辟風寒鳥獸皆生耎毳細毛以自溫鳥朱子曰隩室之內也氣寒而民聚於內也氄毛亦以寒而生細毛以自溫也總説分命義仲以下四節朱子曰天左旋一日一周天又行過一度或言天一日一周日則不及一度非天過一度也此説不是若以為天止一日一周則四時中星如何解不同更如此則日日一般如何記嵗把甚麼時節做定限禮記月令疏中説早晚不同及更行一度處甚分明按月令疏云二十八宿及諸星皆循天左行一日一夜一周天一周天之外更行一度又云二十八宿隨天而行每日雖周天一匝早晚不同此朱子之所引也以此推之自仲春至仲夏滿九十一日有竒而星宿隨天所過之度亦積至九十一度有竒故夏至初昏星鳥嚮西而星火正見南方下文星虛星昴亦然此四時中星所以不同也朱子曰堯時冬至日在虛昏中昴月令冬至日在斗昏中壁而中星古今不同者蓋天有三百六十五度四分度之一嵗有三百六十五日四分日之一天度四分之一而有餘嵗日四分之一而不足故天度常平運而舒日運常內轉而縮天漸差而西嵗漸差而東此即嵗差之由唐一行所謂嵗差者日與黃道俱差者是也古厯簡易未立差法但隨時占候修改以與天合至東晉虞喜始以天為天以嵗為嵗乃立差法以追其變約以五十年而退一度何承天以為大過乃倍其年而反又不及至隋劉焯取二家中數為七十五年為近之而亦未為精密也林氏曰此一假皆是觀象作歷之法所以定中氣起閏餘也蓋必先奠方隅驗昏且測時氣齊晷刻候中星而又驗之於農事之早晚物類之變化然後中氣可得而定中氣既定然後閠餘可得而推學者於此不可以他求惟求作歷之法而盡得之矣帝曰咨汝羲暨和期三百有六旬有六日以閠月定四時成嵗允釐百工庶績咸熙漢孔氏曰咨嗟暨與也匝四時曰期一嵗十二月一月三十日正三百六十日除小月六為六日是為一嵗有餘十二日未盈三嵗足得一月則置閠焉以定四時之氣節成一嵗之歷象應氏曰咨咨謀咨諏之類先總而言曰乃命繼析而言曰分命申命終復總而咨謀之蘇氏曰有讀為又古有又通唐陸氏曰十日為旬許氏曰閠餘分月也唐孔氏曰從冬至以及明年冬至為一嵗朱子曰天體至圎周圍三百六十五度四分度之一繞地左旋常一日一周而過一度日麗天而少遲一日繞地一周無餘而常不及天一度積三百六十五日九百四十分日之二百三十五而與初躔會是一嵗日行之數也月麗天而尤遲一日常不及天十三度十九分度之七積二十九日九百四十分日之四百九十九而與日會十二會得全日三百四十八餘分之積五千九百八十八如日法九百四十而一得六不盡三百四十八通計得日三百五十四九百四十分日之三百四十八是一嵗月行之數也嵗有十二月月有三十日三百六十者嵗之常數也故日行而多五日九百四十分日之二百二十五者為氣盈月行而少五日九百四十分日之五百九十二者為朔虛合氣盈朔虛而閠生焉故一嵗閠率則十日九百四十分日之八百二十七三嵗一閠則三十二日九百四十分日之六百一五嵗再閠則五十四日九百四十分日之三百七十五十有九嵗七閠則氣朔分齊是為一章也故積之三年而不置閠則春之一月入于夏而時漸不定矣子之一月入于丑而嵗漸不成矣積之之久至于三失閠則春皆入夏而時全不定矣十二失閠則子皆入丑而嵗全不成矣其名實乖戾寒暑反易農桑庶務皆失其時故必以此餘日置閠月於其間然後四時不差而嵗得成漢孔氏曰釐冶工官績功咸皆熙廣也言定四時成嵗厯以告時授事則能信治百官衆功皆廣嘆其善王氏曰不言功而言績謂其功乃緝纍而成張氏曰熙廣而且明也程子曰自乃命義和已下言堯設官分職立正綱紀以成天下之務首舉其大者是察天道正四時順時行政使人遂其生養之道此大本也萬事無不本乎此天下之事無不順天時法隂陽者律度量衡皆出于此故首舉而詳載之其施庶事更不備言故統云允釐百工云云史載堯治天下之法盡於此後世學其法者不知其道故歷星為工技之事而與政分矣帝曰疇咨若時登庸放齊曰胤子朱啓明帝曰吁嚚訟可乎程子敘章旨見篇末漢孔氏曰疇誰庸用也誰能咸熙庶績順是事者將登用之朱子曰堯言誰為我訪問能順時為治之人而登用之乎吕氏曰登庸者大用之意也漢孔氏曰放齊臣名胤國子爵朱名啓開也吁疑怪之辭言不忠信為嚚又好爭訟可乎言不可程子曰此堯老廣求聖賢之意故放齊以嗣子朱對朱子曰胤嗣也訟爭辨也吕氏曰啓明之中有不同君子因開明以為善小人因開明以為惡想朱之性亦果開明但不能因之為善耳帝曰疇咨若豫采歡兜曰都共工方鳩僝功帝曰吁靜言庸違象恭滔天疇咨説見上文漢孔氏曰采事也朱子曰上言順時此言順事職任大小可見漢孔氏曰歡兜臣名都嘆美之辭共工官稱鳩聚僝見也嘆共工能方方聚見其功朱子曰方且言共工方且鳩聚而見其功也許氏曰以勞定國曰功漢孔氏曰靜謀滔漫也言共工自為謀言起用行事而違背之貌象恭敬而心傲狠若漫天言不可用胡氏曰靜無事之時也朱子曰滔天二字不可曉與下文相似疑有舛誤帝曰咨四嶽湯湯洪水方割蕩蕩懷山襄陵浩浩滔天下民其咨有能俾乂僉曰於鯀哉帝曰吁咈哉方命圯族嶽曰異哉試可乃已帝曰往欽哉九載績用弗成漢孔氏曰四嶽即上羲和四子分掌四嶽之諸侯故稱焉朱子曰四嶽一人而總四嶽諸侯之事也按二説不同詳辨在舜典末章陳氏曰堯典言咨四嶽二治水巽位也舜典言咨四嶽二熙帝載典三禮也古者大事詢于衆庶帝以此事大體重四嶽掌方嶽知天下衆庶之情故以訪之漢孔氏曰湯湯流貌洪大割害也言大水方方為害蕩蕩言水奔突有所滌除懷包襄上也包山上陵浩浩盛大若漫天方説見上文鄭氏曰積石曰山大阜曰陵山髙則懷而包之陵卑則襄而上之漢孔氏曰俾使乂治也言民咨嗟憂愁病水困苦哉問四嶽有能治者將使之漢孔氏曰僉皆也鯀崇伯之名朝臣舉之朱子曰僉衆共之辭四嶽與所領諸侯在朝者同辭而對也漢孔氏曰凡言吁者皆非帝意圯毁族類也言鯀性狠戾好比方名命而行事輒毁敗善類朱子曰咈者甚不然之辭方命者逆命而不行也王氏云圎則行方則止方命猶言廢閣詔令也蓋鯀之為人悻戾自用不從上令也圯族言與衆不和傷人害物鯀之不可用者以此楚辭言鮌婞直是其方命圯族之證也漢孔氏曰異己也退也言餘人盡已惟鯀可試無成乃退朱子曰嶽曰四嶽之獨言也異義未詳疑是己廢而復強舉之之意試可乃己蓋廷臣未有能於鯀者不若姑試用之取其可以治水而已言無預他事不必求其備也漢孔氏曰勑鯀往治水命使敬其事朱子曰戒以欽哉蓋任大事不可不敬聖人之戒辭約而意盡也漢孔氏曰載年也三考九年功用不成則放退之陳氏曰祭法謂禹能修鯀之功是鯀非無功但不能成耳吕氏曰觀往欽哉之命見鯀非無治水之才所以方命圯族本於忽視天下惟欽之一字可以治鯀之病鯀而領往欽哉之命安知其不可用九載績用弗成鯀往而弗欽也要之鯀非無才心之忽實壞之也總説疇咨若時以下至此章唐孔氏曰此經三言求人未必一時事但歷言朝臣不賢為求舜張本程子曰堯之時丹朱在朝四凶未去而無惡君子之氣勝耳吕氏曰堯典大略先言堯盡天下之常自疇咨以下言堯處天下之變蓋堯朝無非君子而有小人是變也堯時無非佳祥而有洪水是變也帝曰咨四嶽朕在位七十載汝能庸命巽朕位嶽曰否德忝帝位曰明明揚側陋師錫帝曰有鰥在下曰虞舜帝曰俞豫聞如何嶽曰瞽子父頑母嚚象傲克諧以孝蒸蒸乂不格姦帝曰我其試哉女于時觀厥刑于二女釐降二女于媯汭嬪于虞帝曰欽哉漢孔氏曰堯年十六以唐侯升為天子在位七十年則時年八十六老將求代馬氏曰朕我也古者上下通稱至秦始皇始獨稱朕漢孔氏曰巽順也言四嶽能用帝命故欲使順行帝位之事朱子曰庸命方命之命皆謂命令吳氏曰巽遜古通用漢孔氏曰否不忝辱也辭不堪漢孔氏曰堯知子不肖有禪位之意故明舉明人在側陋者廣求賢也朱子曰明明上明謂明顯之下明謂己在顯位者揚舉也側陋微賤之人也言惟德是舉不拘貴賤唐孔氏曰側陋僻側淺陋之處漢孔氏曰師衆錫與也無妻曰鰥在下民之中朱子曰師者四嶽羣臣諸侯同辭以對也漢孔氏曰俞然也然其所舉言我亦聞之其德行如何嶽曰説見上文漢孔氏曰無目曰瞽配字曰瞍心不則德義之經為頑象舜弟之字傲慢不友言並惡朱子曰母舜後母象舜異母弟名傲驕傲也漢孔氏曰諧和蒸進也言能至孝和諧頑嚚昏傲使進進以善自治不至於姦惡朱子曰善事父母為孝吕氏曰四嶽稱舜可以當天下之實獨於家庭言之何也蓋舜瞽瞍之子父既頑母既嚚象復傲而舜克諧以孝其始也怨怒忌克乖爭陵犯一家之中無所不有克諧之後悉變為和順雍睦之風蒸蒸二字舜之工夫在此蒸蒸者有熏灌之意詩云蒸之浮浮如甑之炊物然薪不斷火氣相續則自然蒸蒸以至于熟舜處頑父嚚母傲象之間茍非孝誠薰灌工夫源源安能至於不格姦之地漢孔氏曰言欲試舜觀其行迹應氏曰將以天下大事任試之刑于二女則閨門至親至切之一端耳漢孔氏曰女妻刑法也堯於是以二女妻舜觀其法度接二女以治家觀治國鄭氏曰觀視也新安王氏曰堯二女長曰娥皇次曰女英舜在下則娥皇為妻女英為妾為天子則娥皇為后女英為夫人漢孔氏曰降下嬪婦也水北曰汭舜為匹夫能以義理下帝女之心於所居溈水之汭使行婦道於虞氏嘆舜能修己行敬則其所能者大矣唐孔氏曰媯水在河東虞鄉縣歷山西流至蒲坂縣南入於河虞與媯汭為一地分為二文汭水涯也鄭云汭之為言內也唐陸氏曰水之隈曲曰汭周子曰治天下有本身之謂也治天下有則家之謂也本必端端本誠心而已矣則必善善則和親而已矣家難而天下易家親而天下踈也家人離則必起于婦人故暌次家人以二女同居而其志不同行堯所以釐降二女于媯汭舜可禪乎吾兹試矣是治天下觀于家治家觀身而已矣朱子曰我其試哉女于時觀厥刑于二女皆堯言也釐降二女于媯汭嬪于虞乃史臣紀堯治裝而下嫁二女于媯汭使為舜婦于虞也帝曰欽哉成二女之辭猶所謂往之女家必敬必戒也總説疇兹若時以下至此章真氏曰堯問若時登庸之人而放齊以朱對又問若采之人而歡兜以共工對又問治水之人而四嶽以鯀對此不當舉而舉者也後問可以巽位之人而四嶽以舜對此當舉而舉者也堯於其不當舉者則吁而嘆之於其當舉者則俞而然之方三人之舉何異後世庸暗之朝姦邪之人自相汲引惟堯之明德如曰中天萬象畢照片言之發洞中隱微有不能遁此其所以為聖歟雖然欲以堯為法則當如何曰明其德而已蓋堯之知人不可學而能堯之明德可以學而至格物致知於天下之理無所疑勝私窒欲於天下之物無所蔽所以明其德也明德者知人之本也總説一篇意程子曰自放勳至格于上下堯之德也自克明俊德至於變時雍堯治天下之道也自乃命羲和至庶績咸熙堯立治之法也自帝曰疇咨以下至篇終言堯之聖明能知人也吕氏曰堯典一篇綱目在欽之一字始之欽明終之欽哉其中曰允恭曰欽若曰敬授曰寅賔寅餞敬致曰往欽哉皆以敬為辭又曰堯典乃一書之綱領通堯典則他可觸類而通之矣又曰堯舜二典與他篇不同他篇或説一事二典畢備如易之乾坤尚書纂傳卷一
