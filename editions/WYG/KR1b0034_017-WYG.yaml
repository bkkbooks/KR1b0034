body:
  text: 尚書纂傳卷十七元王天與撰西伯戡黎第十六商書殷始咎周周人乗黎祖伊恐奔告于受作西伯戡黎漢孔氏曰咎惡乗勝也唐孔氏曰黎國漢之上黨郡壺關所治黎亭是也紂都朝歌黎在朝歌之西漢孔氏曰祖己後賢臣受紂也音相亂帝乙之子嗣立暴虐無道唐孔氏曰此及泰誓武成皆呼為受自外書傳皆呼為紂殷本紀云帝乙崩子辛立是爲帝辛天下謂之紂蔡氏曰奔告自其邑奔走來告也林氏曰黎蓋西伯所統伐之乃西伯之職祖伊非謂西伯有反啇之心蓋以黎之亡逆知殷之必亡故恐而奔告唐孔氏曰史叙其事作西伯戡黎西伯戡黎唐孔氏曰此篇亦誥也蔡氏曰今文古文皆有西伯旣戡黎祖伊恐奔告于王蔡氏曰下文無及戡黎之事史臣特標此篇首以見祖伊告王之因漢孔氏曰戡亦勝也蔡氏曰西伯文王也姓姬氏名昌史記文王脫羑里之囚獻洛西之地紂賜弓矢鈇鉞使得専征伐爲西伯文王旣受命黎爲不道於是舉兵伐而勝之或云西伯武王也史記載武王伐紂紂使膠鬲觀兵膠鬲問曰西伯曷爲而來則武王繼文王為西伯矣曰天子天旣訖我殷命格人元龜罔敢知吉非先王不相我後人惟王滛戲用自絶故天棄我不有康食不虞天性不迪率典今我民罔弗欲喪曰天曷不降威大命不摯今王其如台陳氏曰此言天民棄殷以警紂漢孔氏曰天已畢訖殷之王命蔡氏曰將言天終殷命故特呼天子以感動之訖絶也漢孔氏曰至人以人事觀殷大龜以神靈考之皆無知吉唐孔氏曰祖伊未必問至人親灼龜但假之以爲言耳漢孔氏曰非先祖不助子孫以王滛過戲怠用自絶於先王吕氏曰自絶云者天無心周亦無心也漢孔氏曰故天亦棄之宗廟不有安食於天下而王不度知天性命所在而所行不蹈循常法言多罪吕氏曰曰故者天實有所因矣陳氏曰不肯享有其康安之玉食謂自作不靖不虞度天性謂迷亂不省不蹈循其典謂棄越典常凡此者皆天奪其魄而棄之也漢孔氏曰摯至也民無不欲王之亡言天何不下罪誅之有大命宜王者何以不至王之凶害其如我所言蔡氏曰大命非常之命也上言天棄殷此又言民棄殷祖伊之言可謂痛切明著矣史記作今王其奈何王曰嗚呼我生不有命在天祖伊反曰嗚呼乃罪多參在上乃能責命于天殷之即喪指乃功不無戮于爾邦陳氏曰紂不責已故祖伊直言其必亡之狀漢孔氏曰言我生有壽命在天民之所言豈能害我遂惡之辭唐李鄴侯曰天命他人皆可以言之惟君相不可言蓋君相所以造命也若言命則禮樂刑政皆無所用矣紂曰云云此商之所以亡也吕氏曰天命歸之聖人猶曰命靡常天命已訖乃曰有命在天真不知命者也漢孔氏曰反報紂也言汝罪惡衆多參列於上天天誅罰汝汝能責命于天拒天誅乎夏氏曰以反曰爲反告於紂非也此數語激切之甚使紂聞之必嬰比干之誅蓋反者反身而退與孟子言子貢反曽子反同鄭氏曰參布列也責求也吕氏曰責命于天惟與天同徳者則可漢孔氏曰言殷之就亡指汝功事所致汝不得無死戮於殷國必將滅亡立可待蘇氏曰功事也陳氏曰善有善之功惡有惡之功此功蓋謂其惡之成也與惟府辜功之功同總說一篇意蘇氏曰子貢云紂之不善不如是之甚也祖伊盡言不諱漢唐中主所不能容者紂雖不改而終不怒祖伊得全則後世人主不如紂多矣吕氏曰商之覆亡固未易救然而賢人尚多先王之澤尚未泯紂茍能轉而之善則前日不敢知吉之格人今將以吉而許前日不相之先王今將隂隲而黙佑前日棄我之天今將昭監而眷顧前日民之欲喪者今將愛戴而懷歸周德雖盛以服事殷又何求也蔡氏曰吾讀是篇而知周德之至祖伊以西伯戡黎不利於殷故奔告於受意必及西伯戡黎不利於殷之語而入以告后出以語人未有一毫及周者是知周家初無利天下之心其戡黎也義之所當伐也使紂遷善改過則周將終守臣節矣祖伊殷之賢人知周之興必不利於啇又知殷之亡初無與於周故因戡黎告紂反覆乎天命民情之可畏而畧無及周者文武公天下之心於是可見矣尚書纂傳卷十七
