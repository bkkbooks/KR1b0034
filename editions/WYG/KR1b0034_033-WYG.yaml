body:
  text: 尚書纂傳卷三十三元王天與撰蔡仲之命第十九周書蔡叔既没王命蔡仲踐諸侯位作蔡仲之命漢孔氏曰以罪放而卒父卒命子罪不相及吕氏曰叔未没之前周公之心所謂庶幾改之予日望之者也叔既没矣于是以其平日友愛之至情不得施于叔者施之于仲也唐孔氏曰史叙其事作蔡仲之命蔡仲之命漢孔氏曰冊書命之蔡國名仲字因以名篇蔡氏曰今文無古文有惟周公位冢宰正百工羣叔流言乃致辟管叔于商囚蔡叔于郭鄰以車七乘降霍叔于庶人三年不齒蔡仲克庸祗德周公以為卿士叔卒乃命諸王邦之蔡蔡氏曰此史叙作命之意漢孔氏曰百官緫已以聽冢宰謂武王崩時吕氏曰冢宰首六卿緫有官葢天子之相周公以三公下行相事三公無職六卿則分職三公論道六卿則行道以三公兼六卿同精粗于一體也羣叔流言説見金縢漢孔氏曰致法謂誅殺囚謂制其出入郭鄰中國之外地名從車七乘言少管蔡國名霍叔罪輕故退為衆人三年之後乃齒録封為霍侯子孫為晉所滅陳氏曰齒列也不齒不得與諸侯之列漢孔氏曰蔡仲能用敬德稱其賢也周公圻内諸侯二卿治事唐孔氏曰周禮冡宰以八則治都鄙馬融謂距王城四百里至五百里謂之都鄙以封王之子弟在圻内者冢宰又云施則于都鄙而建其長立其兩馬鄭皆謂立卿兩人是圻内諸侯立二卿左傳説此事云周公舉之以為己卿士是為周公圻内之卿士也世家云周公舉胡為魯卿士按成王封周公于魯周公身不就封安得使胡為卿士馬遷謬耳漢孔氏曰叔之所封圻内之蔡仲之所封淮汝之間圻内之蔡名已滅故取其名以名新國欲其戒之唐孔氏曰周公囚蔡叔至死不赦蔡叔之卒不知何年其命蔡仲未必初卒即命以其繼父命之故係之叔卒之後蘇氏曰蔡叔未卒仲無君國之理周公之封仲必在叔卒之後葉氏曰乃命諸王請命于王也王若曰小子胡惟爾率德改行克慎厥猷肆予命爾侯于東土往即乃封敬哉爾尚葢前人之愆惟忠惟孝爾乃邁迹自身克勤無怠以垂憲乃後率乃祖文王之彞訓無若爾考之違王命夏氏曰此先勉蔡仲率文王以掩蔡叔之過漢孔氏曰言小子明當受教訓胡仲名王若曰説見盤庚漢孔氏曰言汝循祖之德改父之行能慎其道嘆其賢漢孔氏曰故我命汝為諸侯于東土往就汝所封之國當修巳以敬哉陳氏曰蔡土在周之東封者累土以為疆界之識漢孔氏曰汝當庶幾修德掩葢前人之過子能葢父所以為惟忠惟孝真氏曰人子不幸如大禹之承鯀蔡仲之承蔡叔又當思所以葢之故治水功成而鯀配夏郊率德改行而蔡叔世祀豈非孝之大乎後世如沈充叛臣也其子勁以死節著李義府姦臣也其子湛以忠義聞若勁與湛可謂能葢其父之愆矣漢孔氏曰汝乃行善迹用汝身使可蹤迹而法循之能勤無懈怠以垂法子孫世世稱頌乃當我意李氏曰邁迹自身迹謂一步之初也一步之初循之以至于逺其始皆自乎吾身有以謹之吾身正則踐履之迹無往不正矣漢孔氏曰言當循文王之常教以父違命為世戒張氏曰率乃祖之彞訓即率德也無若爾考之違王命即改行也葉氏曰舜殛鯀興禹今命蔡仲而追尤其父無乃不可乎曰越人關弓而射之則已談笑而道之無他疏之也其兄關弓而射之則已垂涕泣而道之無他戚之也父子兄弟之間而猶諱焉不敢盡言是愈疏矣周公之待蔡仲親親之道歟皇天無親惟德是輔民心無常惟惠之懐為善不同同歸于治為惡不同同歸于亂爾其戒哉慎厥初惟厥終終以不困不惟厥終終以困窮懋乃攸績睦乃四鄰以蕃王室以和兄弟康濟小民率自中無作聰明亂舊章詳乃視聽罔以側言改厥度則予一人汝嘉夏氏曰此下畫一以戒蔡仲漢孔氏曰天之于人與有親疏惟有德者則輔佐之民心于上無有常主惟愛已者則歸之漢孔氏曰言人為善為惡各有百端未必正同而治亂所歸不殊冝慎其微蔡氏曰善固不一端而無不可為之善惡亦不一端而無有可為之惡吕氏曰處安樂者病于肆處憂患者病于拘肆者固當謹拘者要不可不開廣之也仲遭父之變動心忍性雖克庸祗德豈無或過扵拘者乎故言天人無適無莫之理以開廣之仲無以父之惡得罪于天人而自沮也進德布惠斯得天人之助矣不德不惠則叔以文王之子而不得保其身有德有惠則仲以蔡叔之子而不得辭其國又以善惡殊塗同歸之理以開廣之也博觀萬善随其時義奚獨率于文王並戒萬惡絶其本根奚獨改于蔡叔所以進之者洪矣漢孔氏曰汝其戒治亂之機哉作事云為必慎其初念其終則終用不困窮薛氏曰爾其戒哉欲其警懼之心克存則初終之際無忽也張氏曰不惟厥終則至困窮困猶有時通窮則無復通也吕氏曰語以謹始而復授以慮終竭兩端之教也漢孔氏曰勉汝所立之功親汝四鄰之國以蕃屏王室以和協同姓之邦汝為政當安小民之居成小民之業吕氏曰此告以諸侯之職也勉其所當為之績欲其無邀功生事也睦其四鄰之國欲其無結怨起隙也上奉天子旁睦友邦下安民庶諸侯之職畢矣觀䇿戒蔡仲之辭則周家所以示德意于諸侯安靜鎮定之規模可槩見矣漢孔氏曰循用大中之道無敢為小聦明作異辯以變亂舊典文章吕氏曰随時随事莫不有中率皆由于中則無過不及之失也舊章葢文武典憲布在侯邦者所當謹守不可作聦明以變亂之大抵舊章平實久大例不與新進喜事者合故作聦明者尤欲亂之焉漢孔氏曰詳審汝視聽非禮義勿視聽無以邪巧之言易其常度必斷之以義則我一人善汝矣蔡氏曰詳審也側言一偏之言也吕氏曰聽覽不貴于速而貴于詳迎刃立決顧盼生風似若可喜然忽略疎快動皆愆尤凡讒説姦言何嘗不乗其匆遽之時而入乎惟詳其視聽則安徐審訂側媚之言無自而進故詳者乃聽覽之大法也王曰嗚呼小子胡汝往哉無荒棄朕命漢孔氏曰嘆而勑之吕氏曰仲豈荒棄王命者地之逺時之久敬或有時而替故于終復戒之成王東伐淮夷遂踐奄作成王政漢孔氏曰成王即政淮夷奄國又叛王親征之遂滅奄而徙之以其數反覆吕氏曰大誥已叙淮夷之叛矣此序復言東伐淮夷是再叛也多士已言昔朕來自奄矣此序復言遂踐奄是亦再叛也孟子謂周公相武王誅紂伐奄則武王之時既用師矣至是葢三加兵于奄也踐滅之之謂也漢孔氏曰為平淮夷徙奄之政令亡成王既踐奄將遷其君于蒲姑周公告召公作將蒲姑漢孔氏曰已滅奄而徙其君及人臣之惡者于蒲姑蒲姑齊地近中國教化之唐孔氏曰左傳晏子云古之居此地者有蒲姑氏杜預謂樂安博昌縣北有蒲始城蔡氏曰史記作亳姑漢孔氏曰言將徙奄新立之君於蒲姑告召公使作冊書告令之亡吕氏曰將遷而告召公冇以見周公于軍國大議未嘗敢專非惟善處同列葢股肱心膂自應一體也尚書纂傳卷三十三
