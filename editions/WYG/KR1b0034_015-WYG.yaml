body:
  text: 尚書纂傳卷十五上元王天與撰說命上第十二商書髙宗夢得說使百工營求諸野得諸傅巖作說命三篇漢孔氏曰盤庚弟小乙子名武丁德髙可尊故號髙宗夢得賢相其名曰說唐孔氏曰世本云盤庚崩弟小辛立崩弟小乙立崩子武丁立漢孔氏曰使百官以所夢之形象經營求之於外野得之於傅巖之谿命說爲相唐孔氏曰巖是山崖之名唐孔氏曰史叙其事作說命三篇上篇言夢說始求得而命之中篇說旣總百官戒王爲政下篇王欲師說而學說報王爲學之有益王又屬說以伊尹之功相對以成章史分序以爲三篇說命漢孔氏曰始求得而命之林氏曰此記髙宗命說之言命之曰以下是也猶微子之命蔡仲之命之類後世命官制辭其原蓋出此蔡氏曰今文無古文有王宅憂亮隂三祀旣免喪其惟弗言羣臣咸諫于王曰嗚呼知之曰明哲明哲實作則天子惟君萬邦百官承式王言惟作命不言臣下罔攸稟令王庸作書以誥曰以台正于四方惟恐徳弗類兹故弗言恭黙思道夢帝賚予良弼其代予言乃審厥象俾以形旁求于天下說築傅巖之野惟肖爰立作相王置諸其左右蔡氏曰史氏將記髙宗命說之辭先叙事始如此漢孔氏曰隂黙也居憂信黙三年不言王氏曰宅憂居喪也朱子曰舊說以亮隂爲信黙鄭氏於禮記又讀作梁闇言居倚廬大抵古者天子居喪之名其義則古今言殊不可曉矣漢孔氏曰除喪猶不言政許氏曰免釋也范氏曰在朝無不諫故曰咸諫漢孔氏曰知事則爲明智明智則能制作法則朱子曰知猶識也林氏曰天生斯民使先知覺後知使先覺覺後覺明哲者先知先覺之人也實爲法則於天下漢孔氏曰天下待令百官仰法陳氏曰爲天所子謂之天子式即法也作之謂之則承之謂之式漢孔氏曰稟受令亦命也陳氏曰王有言則爲命而作則不言則臣民無所稟令而承式之矣上行之爲命下稟之爲令漢孔氏曰用臣下怪之故作誥我正四方恐徳不善此故不言不類說見太甲中吕氏曰自古聖賢皆於恐懼用工恐徳弗類入聖作德之門也漢孔氏曰夢天與我輔弼良佐將代我言政教吕氏曰恭黙者用志不分也思道者沈潛思慮玩索天下至理之所在也真氏曰此一語最宜深玩非獨人主宅憂之際當然學者平居求道亦所當然程子曰髙宗至誠思得賢相寤寐不忘故朕兆先見於夢此理之常或問髙宗徃求說耶說來入夢耶曰譬如懸鏡於此有物必照亦非鏡徃照物亦非物來入鏡大抵人心虚明善則先知不善亦先知范氏曰中庸曰誠則形形則著揚雄曰人心其神矣乎髙宗之夢蓋誠之形而心之神也或問髙宗因思夢說得無近怪矣乎朱子曰精誠之極可與天通此感應之常理耳古之孝子固有得鯉於層氷得筍於深冬者人皆以爲孝誠所格何獨於夢說而疑之耶叔孫穆子之夢竪牛事亦類此但髙宗誠其思故夢亦誠叔孫邪其思故夢亦邪耳蘇氏曰史記曰髙宗得說與之語果聖人乃舉以爲相蓋非直以夢而已漢孔氏曰審所夢之人刻其形象以四方旁求之於民間蔡氏曰審詳也漢孔氏曰傅氏之巖在虞虢之界通道所經有澗水壞道常使胥靡刑人築護此道說賢而隠代胥靡築之以供食肖似似所夢之形或問傅說版築亦讀書否朱子曰不讀書如何有說命三篇之文漢孔氏曰於是禮命立以爲相使在左右蔡氏曰置諸左右蓋以冢宰兼師保也荀子云學莫便乎近其人置諸左右者近其人以學之也命之曰朝夕納誨以輔台徳若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨啓乃心沃朕心若藥弗瞑眩厥疾弗瘳若跣弗視地厥足用傷惟曁乃僚罔不同心以匡乃辟俾率先王迪我髙后以康兆民嗚呼欽予時命其惟有終黄氏曰此髙宗責說之教誨漢孔氏曰言當納諫誨直辭以輔我徳吕氏曰朝夕者工夫相續而不間斷也髙宗見道明故知頃刻不可無賢人之言新安王氏曰訓教曰誨不曰諌而曰誨蓋屈己以求教也林氏曰古者置相非特統百官均四海蓋將使之輔其君之徳髙宗命說不及政事而首言納誨輔徳可謂先立乎其大者漢孔氏曰鐵須礪以成利器礪說見禹貢漢孔氏曰渡大水待舟楫鄭氏曰巨大楫櫂也漢孔氏曰霖以救旱唐孔氏曰左傳云凡雨自三日以徃爲霖林氏曰此若詩人所謂如切如磋如琢如磨但舉一句亦足見意或者遂從而爲之說以爲每句皆有所託如王氏謂作礪使治已作舟楫使濟難作霖雨使濟民吕吉甫謂作礪舉一己而聴之作舟楫舉一國而聴之作霖雨舉天下而聴之皆附會穿鑿不足取漢孔氏曰開汝心以沃我心蔡氏曰沃灌漑也陳氏曰啟乃心開心見誠也沃我之心如水之沃潤萬物有漸漬漑灌之意古之大臣所以格君心者非一日之積蓋有沃潤之漸矣漢孔氏曰如服藥必瞑眩極其病乃除欲其出切言以自警唐孔氏曰瞑眩者令人憤悶之意方言云凡飲藥而毒東齊海岱之間或謂之瞑或謂之眩郭璞云瞑眩亦通語也司馬氏曰髙宗命說云云蓋切直之言非人臣之利乃國家之福是以人君夙夜求言惟懼不得聞漢孔氏曰跣必視地足乃無害言欲使爲已視聴鄭氏曰足無履曰跣傷損也吕氏曰髙宗本明哲之君自處乃若無能者倚說爲兩目一時不可無說也其望說又甚於前矣漢孔氏曰與汝並官皆當倡率無不同心以匡正汝君林氏曰說爲相統百官則百辟卿士而下皆其屬漢孔氏曰言匡正汝君使循先王之道蹈成湯之蹤以安天下張氏曰先王髙宗以前之賢王髙后則湯也天生民而立之君使司牧之髙宗命說納誨輔徳反覆譬喻必至康兆民而極可謂知人君之職矣漢孔氏曰敬我是命修其職使有終蔡氏曰命即上文所命說復于王曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祗若王之休命黄氏曰此說勉髙宗之聴從蔡氏曰答欽予時命之語漢孔氏曰言木以繩直君以諌明朱子曰繩引繩彈墨以取直者今墨斗繩是也蘇氏曰說以匹夫得政王虚心待之如此意必有髙世絶人之謀今其復王者曰從諫而已大哉仁人之言約而至也唐太宗中主也然所以致刑措去聖人無㡬者特以從諫而已說以爲此一言可以聖也故首進之以太宗觀之知從諌之可使狂作聖也漢孔氏曰君能受諌則臣不待命其承意而諌之言王如此誰敢不敬順王之美命而諫者乎吕氏曰主聖則臣直此又充髙宗受諌之量髙宗本欲求之臣說乃使求之已也尚書纂傳卷十五上欽定四庫全書尚書纂傳卷十五中元王天與撰說命中第十三商書惟說命總百官漢孔氏曰在冢宰之任唐孔氏曰惟傅說受王命總百官之職史特標此句爲發言之端乃進于王曰嗚呼明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民惟天聰明惟聖時憲惟臣欽若惟民從乂惟口起羞惟甲胄起戎惟衣裳在笥惟干戈省厥躬王惟戒兹允兹克明乃罔不休惟治亂在庶官官不及私昵惟其能爵罔及惡徳惟其賢慮善以動動惟厥時有其善喪厥善矜其能喪厥功惟事事乃其有備有備無患無啓寵納侮無恥過作非惟厥攸居政事惟醇黷于祭祀時謂弗欽禮煩則亂事神則難陳氏曰此章皆言憲天聰明之事漢孔氏曰天有日月北斗五星二十八宿皆有尊卑相正之法言明王奉順此道以立國設都立君臣上下龜山楊氏曰明王不以私智自用循天理而已所謂奉若天道也唐孔氏曰建邦謂立王國及邦國設都謂設帝都及諸侯國都樹立也后王謂天子也君公謂諸侯也承者奉上之名后王君公人君也大夫師長人臣也周禮立官多以師爲名師者衆所法亦長之義大夫以下分職不同毎官各有其長故以師長言之漢孔氏曰不使有位者逸豫民上言立之主使治民蘇氏曰古之言天者皆言民民不難出其力以食諸侯卿士以養天子者豈獨以逸樂之哉將使濟已也此所謂天道也漢孔氏曰言聖王法天以立敎臣敬順而奉之民以從上爲治吕氏曰天聰明止是自然道理傅說欲充廣髙宗之明哲使之廣大無窮故敎髙宗於憲字下工夫黄氏曰域中有四位曰天曰君曰臣曰民是四者相須而爲治者三退聴而待其治者一天也君也臣也者相須而爲治者也民也者退聴而待其治者也天以民爲心君以天爲心臣以君爲心轉相係屬缺一不可漢孔氏曰甲鎧胄兜鍪也言不可輕敎令易用兵鄭氏曰羞猶辱也言語輕出則有起辱之患唐孔氏曰古之甲胄皆用犀兕未有用鐵者而鍪鎧之字皆從金蓋後世始用鐵耳漢孔氏曰言服不可加非其人兵不可任非其才戈㦸也王氏曰衣裳命服也上曰衣下曰裳蘇氏曰笥篚皆所以盛衣裳幣帛者也以貢上曰篚以賜下曰笥唐孔氏曰方言云楯自關而東或謂之楯或謂之干關西謂之楯是干楯爲一也方言又云㦸楚謂之孑呉揚之間謂之戈是戈即㦸也考工記云戈柲六尺有六寸車㦸常鄭云八尺曰尋倍尋曰常然則戈㦸長短異名但長短雖異其形制則同朱子曰惟口起羞以下四句皆是審應氏曰曰甲胄又曰干戈以兵事尤重也漢孔氏曰言王戒慎此四惟之事信能明政乃無不美三山陳氏曰明字極重察於此而蔽於彼皆未足謂之明王氏曰四事乃爲天下之大者得其大則小者從之故曰乃罔不休漢孔氏曰言所官得人則治失人則亂張氏曰治亂不在天下而在庶官庶官所以造治亂也漢孔氏曰不加私昵惟能是官言非賢不爵唐孔氏曰王制云論定然後官之任官然後爵之鄭云官之使之試守也爵之命之也然則治其事謂之官受其位謂之爵官爵一也所從言之異耳能謂才用賢謂德行治事必用能故官云惟其能受位宜得賢故爵云惟其賢詩序云任賢使能周禮郷大夫考其徳行道藝而興賢者能者鄭云賢有徳行者能有道藝者是賢能爲異耳陳氏曰官以職言若虞九官周六官是也爵以位言若公卿大夫士是也新安王氏曰昵親狎也惡徳猶凶徳漢孔氏曰非善非時不可動陳氏曰合於理之謂善當其可之謂時吕氏曰作事固欲從善必得時措之宜如貢之法非不善在夏之時則善周用之則非宜矣漢孔氏曰雖天子亦必讓以得之陳氏曰有存於中矜發於外人之功善纔萌少有矜心則滿滿即日退雖有功善俱喪之矣功由能所致故曰矜其能喪厥功漢孔氏曰事事非一事鄭氏曰備防備也張氏曰修車馬備器械事乎兵事則兵有其備故外侮不能爲之憂簡稼器修稼政事乎農事則農有其備故水旱不能爲之害所謂事事有備無患者如此漢孔氏曰開寵非其人則納侮之道漢孔氏曰恥過誤而文之遂成大非林氏曰明皇寵安禄山以基漁陽之禍所謂啓寵納侮漢武爲竇太后置酒宣室引納董君以東方朔之諌更置酒北宫所謂恥過作非漢孔氏曰其所居行皆如所言則王之政事醇粹蔡氏曰居止而安之義安於義理之所止也義理出於勉彊則猶二也義理安於自然則一矣一故政事醇而不雜漢孔氏曰祭不欲數數則黷黷則不敬事神禮煩則亂而難行髙宗之祀特豐數近廟故說因以戒之鄭氏曰黷猶褻也煩通作繁數也陳氏曰以髙宗伐鬼方典祀豐昵二事推之則說所言未必不有爲而發然此二事皆在髙宗親政後說一見知其未形之過而先戒之蓋先見於其微矣吕氏曰天之聰明至公無私君憲天則與天一也惟口起羞至事神則難皆憲天聰明之條目也又曰老子之談聰明多於虚空言之但云吾心湛然而已聖人之論聰明皆求之於實惟口起羞以下皆事爲之粗也天下之理本無精粗粗者不蔽而精者洞然矣每事知所戒非聰明之大者乎蘇氏曰傅說之言散而不一然一言一藥皆足以治天下之公患豈獨以訓武丁哉真氏曰朱子嘗言伊傅之言雖爲告君而發然人人皆可玩味無不切於己者亦蘇氏藥患之意王曰旨哉說乃言惟服乃不良于言予罔聞于行蔡氏曰此髙宗賛傅說之所言漢孔氏曰旨美也美其所言皆可服行陳氏曰服謂其言可以佩服漢孔氏曰汝若不善於所言則我無聞於所行之事陳氏曰此二語蓋賛美其言之可行耳非於此方求其言者也說拜稽首曰非知之艱行之惟艱王忱不艱允協于先王成德惟說不言有厥咎蔡氏曰此傅說勉髙宗之所行漢孔氏曰言知之易行之難以勉髙宗程子曰知之非艱行之惟艱固也然知之亦自艱如人欲徃京師必是知出那門行那路然後可徃若不知雖有欲徃之心其將何之自古非無能力行者然鮮能明道此知之亦難也廣漢張氏曰知者聖凡之分也豈可易云乎哉說之告髙宗髙宗蓋知之者恭黙思道夢帝賚予良弼非知之者有此乎此舊學甘盤之所得也知之非艱說意亦曰雖已知之此非難事貴於身親實履之此爲知之者言也若髙宗未克知而告之曰非知之艱則說爲失言矣朱子曰知之與行如車兩輪如鳥兩翼缺一不可又曰知行常相須如目無足不行足無目不見論先後知爲先論輕重行爲重漢孔氏曰王心誠不以行之爲難則信合於先王張氏曰髙宗以誠爲主何患於行之難乎董子所謂尊其所聞則髙明矣行其所知則光大矣髙明光大不在乎他在乎加之意而已者是也成徳說見伊訓漢孔氏曰王能行善而說不言則有其咎罪蔡氏曰上篇言后克聖臣不命其承所以廣其從諌之量而將告以爲治之要也此篇言允協先王成徳惟說不言有厥咎所以責其躬行之實而將進其爲學之說也皆引而不發之義尚書纂傳卷十五中欽定四庫全書尚書纂傳卷十五下元王天與撰說命下第十四商書王曰來汝說台小子舊學于甘盤旣乃遯于荒野入宅于河自河徂亳曁厥終罔顯爾惟訓于朕志若作酒醴爾惟麴蘖若作和羹爾惟鹽梅爾交修予罔予棄予惟克邁乃訓陳氏曰此髙宗資說以願學之事漢孔氏曰甘盤殷賢臣有道德者唐孔氏曰舊學甘盤謂爲王子時也君奭篇周公云在武丁時則有若甘盤蓋甘盤於小乙之世已爲大臣小乙將崩受遺輔政漢孔氏曰其父欲使髙宗知民之艱苦故使居民間自河徃居亳與今其終故遂無顯明之徳蘇氏曰武丁爲太子學於甘盤即位而甘盤遯去隠于荒野武丁使人求之迹其所徃則居河濵自河徂亳不知所終武丁無與共政者故相說也舊說乃謂武丁遯于荒野武丁爲太子而遯決無此理遯則如呉太伯豈復立也哉學者徒見書云髙宗舊勞于外故以武丁爲遯小乙使武丁劬勞于外以知艱難決非荒野之遯也漢孔氏曰言汝當敎訓於我使我通達陳氏曰髙宗於說必言誨言訓者蓋以師禮待之訓志猶格心也漢孔氏曰酒醴須麴蘖以成亦言我須汝以成鹽鹹梅醋羹須鹹醋以和之朱子曰醴酒名周官五齊二曰醴齊註云醴成而汁滓相將如今甜酒也鄭氏曰麴米麥蘖總名蘖牙生榖和羹味之調節也范氏曰酒非麴糵不成羹非鹽梅不和人君雖有美質必得賢人輔導之乃能成徳作酒者麴多則大苦糵多則大甜麴蘖得中然後成酒作羹者鹽過則鹹梅過則酸鹽梅得中然後成羮臣之於君當以柔濟剛可濟否左右規正以成其徳漢孔氏曰交非一之義言我能行汝敎陳氏曰交修交相修正之也應氏曰罔予棄者非必舍而去之也言而不盡誨而或倦是即有厭薄鄙夷之心矣吕氏曰予惟克邁乃訓髙宗蓋舉前言惟說不言有厥咎之意以感發之說前日恐髙宗不能行耳今髙宗謂我能行汝訓汝而不言汝之咎也說曰王人求多聞時惟建事學于古訓乃有獲事不師古以克永世匪說攸聞惟學遜志務時敏厥修乃來允懷于兹道積于厥躬惟斆學半念終始典于學厥德修罔覺監于先王成憲其永無愆惟說式克欽承旁招俊乂列于庶位陳氏曰此傅說論學爲王者事而以成湯望髙宗漢孔氏曰王者求多聞以立事王氏曰王人猶君人也真氏曰大學之道自格物致知推而至於治國平天下蓋致知所以明理理明則見之行事者舉而措之耳此求多聞建事之意也古者學與事爲一故精義所以致用利用所以崇徳本末先後非二致也後世學與事爲二故求道者以政事爲粗迹任事者以講學爲空言不知天下未嘗有無理之事未嘗有無事之理老莊言理而不及事是有無事之理也管商言事而不及理是有無理之事也深味傅說之言則古先聖王之正傳可識矣漢孔氏曰學於古訓乃有所得蔡氏曰古訓者古先聖王之訓載修身治天下之道二典三謨之類是也漢孔氏曰事不法古訓而以能長世非說所聞言無是理材氏曰秦焚詩書不師古始自以爲萬世之業而二世以亡此不克永世者也漢孔氏曰學以順志務是敏疾其徳之修乃來蔡氏曰遜謙抑務専力也時敏者無時而不敏也真氏曰凡人之害於學者驕與怠而已驕則志盈善不可入怠則志惰功不可進遜則不驕敏則不怠吕氏曰來者源源自生之意如井之泉愈汲愈來漢孔氏曰信懷此學志則道積於其身真氏曰積聚猶積善之積今日造一理明日又造一理今日進一善明日又進一善持久不替則道積於身身即道道即身渾然無間矣漢孔氏曰斆敎也敎然後知所困是學之半終始常念學則其徳之修無能自覺吕氏曰敎人與受教者其工各半如師舉一隅學者當以三隅自反師告諸徃學者當以來者自悟聖人敎人多引而不發上一半固賴提指之力下一半必自用工蔡氏曰言敎人居學之半始之自學學也終之敎人亦學也或云受敎亦曰斆斆於爲學之道半之半須自得此說極爲新巧但古人論學語皆平實無此險巧此蓋後世釋教機權而誤以論聖賢之學也真氏曰學記云學然後知不足教然後知困知不足然後能自反也知困然後能自彊也故曰教學相長也蔡說與學記合然吕說亦有意味且與下文念終始典于學相屬未見其爲竒險姑並存之又曰不言始終而言終始者學無止法也上言道之積下言徳之修者以理言之是謂道以所得言之是謂徳非有二也孫氏曰徳修罔覺董子所謂長日加益而不自知也漢孔氏曰視先王成法其長無過其惟學乎吕氏曰前數語皆収在此句旣言學於古訓又言監于先王先王不能違是學後世豈可違先王故曰遵先王之法而過者未之有也無愆極難舜徳可謂盛矣臯陶止曰帝徳罔愆漢孔氏曰說亦用能敬承王志廣招俊乂使列衆官史氏曰王雖有志於學尚恐一齊人傅之衆楚人咻之欽承之際敢不招俊乂列庶位乎是以祖已之徒得以進也然則傅說豈固寵而蔽賢乎陳氏曰列布也人君莫大於務學宰相莫急於用賢真氏曰六經至此始言學字學之一字前此未經見也髙宗與傅說始言之遂開萬古聖學之源其功大矣哉按學字義揚子曰學之爲王者事其已久矣堯舜禹湯文武汲汲仲尼皇皇亦已久矣真氏曰世人多言帝王之學與儒者不同不知學者之言也凡學便當講求王者之事大學自格物致知至於治國平天下天子至庶人皆所當學豈以位爲間哉揚子此言有可取者朱子曰學無非事事無非學張子曰爲學大益在自求變化氣質王曰嗚呼說四海之内咸仰朕德時乃風股肱惟人良臣惟聖昔先正保衡作我先王乃曰予弗克俾厥后惟堯舜其心愧恥若撻于市一夫不獲則曰時予之辜佑我烈祖格于皇天爾尚明保予罔俾阿衡専美有商惟后非賢不乂惟賢非后不食其爾克紹乃辟于先王永綏民說拜稽首曰敢對揚天子之休命陳氏曰此髙宗論致君澤民之事而以伊尹望傅說漢孔氏曰風教也使天下皆仰我徳是汝敎鄭氏曰仰舉首瞻望也風說見大禹謨漢孔氏曰手足具乃成人有良臣乃成聖蔡氏曰髙宗初以舟楫霖雨爲喻繼以麹蘖鹽梅爲喻至此又以股肱惟人爲喻其所造益深所望益切矣王氏曰期說之良期已之聖至是其相期者亦逺矣漢孔氏曰保衡伊尹作起正長也言先世長官之臣唐孔氏曰保衡阿衡俱伊尹也伊尹爲保衡言天下所取安所取平也陳氏曰湯學於伊尹湯之爲聖乃尹興起而作成之也漢孔氏曰言伊尹不能使其君如堯舜則恥之若見撻于市故成其能鄭氏曰愧即恥也漢孔氏曰伊尹見一夫不得其所則以爲己罪真氏曰周子云伊尹恥其君不若堯舜一夫不獲則曰時予之辜學者當志伊尹之志竊謂學者口不可一日不誦此言心不可一日不存此念漢孔氏曰言以此道左右成湯功至于天無能及者烈祖說見伊訓陳氏曰格感通之也漢孔氏曰爾庶㡬明安我事則與伊尹同美吕氏曰明保者明白一心以保佑我也蔡氏曰傅說以成湯望髙宗故曰允協先王成徳監于先王成憲髙宗以伊尹望傅說故曰罔俾阿衡専美有商漢孔氏曰言君須賢治賢須君食朱子曰惟后非賢不乂言人君必任賢而後可以致治也惟賢非后不食言人君當任養賢之責也髙宗之本意如此按君必資賢之能治賢亦在君之能養髙宗切切於養賢以任治而非謂爵禄可徳色於賢者也朱子此說得之矣漢孔氏曰能繼汝君於先王長安民則汝亦有保衡之功蔡氏曰克者責望必能之辭漢孔氏曰對答也答受美命而稱揚之趙氏曰前言疇敢不祗若王之休命今云敢對揚天子之休命蓋方求諫之時則貴乎廣故舉衆以稱之至於阿衡之事業則傅說當躬任其責故稱已以言之尚書纂傳卷十五下
