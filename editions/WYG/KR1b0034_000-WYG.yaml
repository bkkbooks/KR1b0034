body:
  text: 尚書纂傳書類提要臣等謹案尚書纂傳四十六卷元王天與撰天與字立大梅浦人大徳二年以薦授臨江路儒學教授盖天與為贑州路先賢書院山長時憲使臧夢解以是書申臺省得聞於朝故有是命也是書雖以孔安國傳孔穎達疏居先而附以諸家之解其大㫖則以朱子為宗而以真徳秀説為羽翼蓋朱子攷論羣經以書屬蔡沈故天與以蔡氏傳為據徳秀則書説精義以外復有大學衍義一書所言與虞夏商周之大經大法多相出入故天與亦備採之其註疏或刪或存亦以二家之説為斷自序所謂期與二先生合而已不敢以私意去取盖道其實也所説於名物訓詁多有缺畧而闡發義理則特詳亦王元杰春秋讞義之流亞也乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀尚書纂傳原序梅浦王氏尚書纂傳四十六卷先引漢唐二孔氏之說次收諸家傳注而一以晦菴朱子西山真氏為歸與其鄉先生彭翼夫徃復考正十五年而後成大徳中鄞入臧夢解為憲使以其書上於朝得授臨江路儒學教授其子振板行之予所見者即至大鋟本也吉安自宋季文信公謀興復不遂被執以死其門人賔容咸以忠義自奮鄉曲之士多知自好恒絶意仕進潛心經義於易則有龍仁夫之集傳劉霖之太極圗解易本義童子説於詩則有劉瑾之通釋於禮則有彭絲之集說於春秋則有絲之辨疑李亷之㑹通書自梅浦而外則耕野王氏其撰述多有得者梅浦是書其抄撮也博其甄綜也簡其心似薄蔡氏而不攻其非間亦採摭其說擇焉可謂精矣彭翼夫者嘗仕於宋為江陵府教授即絲之父也聞若稽古說三萬言又聞書解近年至四百家使人茫然孰何不識其所謂得王君纂傳如入武庫號萬色色具如逺遊半天下首路以歸如觀樂請止不願更有雖增多伏生吃吃三五十倍然比三萬若四百者而既少矣而又無不明與不逮也是可嘉也每憶咸淳初諸老薦徐幾經筵第一義論人心道心以為人心惡幾也余歎曰有是哉以其在理慾之間也故危槩以為惡則過矣亦何所附麗以為道心哉侍御史陳千峰聞吾言是之幾以是論去又後數年過金陵入明道書院讀真西山所為記記首二語則亦幾說也蓋駭然為之愧悔自失是幾亦有所本也懼哉以此明民猶有出于金口木舌之外者故知食不厭精而膾不厭細君纂傳多西山氏已得彼復遺此耶或謂君有功於纂擇政在此横艾執徐之二月廬陵劉辰翁書梅浦王君立大書纂傳成集齋先生為之序而又俾余賛一語余於立大十年以長居相鄰世相好也猶及記其垂髫頴脫泉涌千里駒不是過既冠章甫籍籍有場屋聲一時從之遊者膏殘馥賸無不意滿而袁臂数竒竟出諸妄校尉下衆猶以器晚俟之梅浦於是息意科舉之學研精覃思博采詳說纂為此書勤亦至矣郷使業舉子時龍躍虎變摶扶摇而上者九萬里則功業逐日以新未必有暇著述由今而觀𤼵百篇之奥緼集四百氏之大成私淑諸人垂訓來世其視夫收科膴仕甘與草木俱腐者又孰為得失也近有善評紫陽謂其山林之日長學問之功深輙借斯言挂名傳末若其𫝊中大義數十㣲顯闡幽有先儒所未到覧者宜自得之故不書丙戌暮春友人劉坦謹述書繇伏𫝊孔註若疏至近代博矣唐虞三代遼哉邈乎上遡三千五百餘年而聖賢心至今猶在者書在焉故也書藴奥難見而庻幾可探討而見者諸家說在焉故也如余習讀時尤愛鞏氏抄東萊說開卷初首引伊川𤼵明欽字義以為理學精㣲當年闡自伊洛後讀書者如欲求書旨到親切的當處舍是宜何折𠂻乆之又讀紫陽西山二先生所考釋與所記衍竊知其淵源上出伊洛之正𤼵經義理惠淑後學又至矣乎惜其未成全書於百篇或開繹之而未竟微言粹旨之别見者世亦莫有能考而㑹之一梅浦王兄立大專勤力學用工於是經者有年間與余言今解者多矣眩於多而莫適為之决擇則將焉據為是竭其聞見心思之力考諸衆說畢具而余知其纂類統有宗者逺摭伏生二孔之訓詁義䟽近据紫陽西山之考釋記衍雖其說之散在文集語餘者一旦煥然靡不㑹粹於其中而諸家說有合而弗畔者一凖此類取焉然後由博歸約而一經大義至是益以彪炳盖嘗讀之嘉其編摩之力匪易足慰余夙昔之所有志而未償者遂以余初與兒曹錄前軰說附之及管見一二以備商㩁嗟乎百代而上世逺迹陳而得其說者猶因是獲窺聖賢用心之萬一可幸也已運㑹以逝思古之人巍冠講論事付之一慨抑就此書人人玩味無不切己者斯言何謂與其藏諸家塾之私孰若廣而流布與四方同志之士切磋之以無忘徃訓適有諗梅浦刻諸梓以傳者意媺益甚余復為之慫慂敘其說於帙之初友人彭應龍翼夫敬書愚少從師取友讀尚書審問明辨亦既有年追維百篇之義繇伏生傳二孔註䟽暨數百家解釋富矣晦菴先生於易於詩皆有訓傳獨於書晚年屬之蔡九峰二典禹謨親所訂定其貢舉私議則曰諸經皆以註䟽為本書則兼取劉王蘇程楊晁葉吳薛吕其與門人荅問則如林如史如曾如李如陳各取其長西山先生讀書記纂三十餘篇大學衍義講數十餘條愚嘗稽首敬嘆曰古今傳書者之是非至晦菴先生而遂定晦菴先生折𠂻傳書者之是非至西山先生而愈明學者不於二先生乎據將焉據乃本二先生遺意作尚書纂傳其條例則先二孔氏說者崇古也有未當則引諸家說評之有未備則引諸家說足之說俱通者並存之間或以臆見按之大要期與二先生合而已愚亦安敢以私意見去取哉且愚之編此特示兒振耳積日累月而編始就就矣未敢自安乙亥冬擕是編偕振求是正於集齋彭先生先生首肯增廣挍定凡若干條徃復䆒竟十四五載且慫慂流布以與四方同志共切磋之先生以是經擢巍科視富貴如浮雲不鄙末學是講是迪使帝王遺書昭如日月愚父子之幸也晦菴西山二先生所望於後來者其庻幾乎庸是俾振鋟之梓云戊子春仲吉之安成後學王天與謹識
