front:
  text: 御製書小序考謂劉歆班固誤以孔子纂書為序者出於蔡沈之集𫝊謂鄭元馬融王肅並云孔子作書序者出於孔頴達之疏頴達且謂為書作序不作詩序者此自或作或否無義例以余思之詩序既非夫子所作則書序亦定非夫子所作何言之使書序辭義精於詩序則為夫子所作或不可知今書序逺遜詩序朱子亦以為非夫子所作而馬端臨且謂詩序不可廢書序可廢是知書序乃出於漢儒所為徒以不能定其為誰且相𫝊已久未可擯棄耳蔡沈作書𫝊疏其可疑者附於卷末可稱具卓識而王天與尚書纂𫝊及監本尚書注疏仍列於前雖姑從漢孔氏之例然未免有擇焉不精之疵矣至我皇祖欽定書經𫝊説彚纂全錄蔡沈攻駁書序之語復採朱子及諸儒糾正之説抉疑示的足為千古定案故兹不復贅論書序之非而特定書序為非夫子之作書於王天與纂𫝊之卷端乾隆戊戌年季春月欽定四庫全書經部二
  hash: sha256:71a720e21f3ff97be10d586529a3a4f4ca39e9989ee57b66cd335bb98ded45f9
