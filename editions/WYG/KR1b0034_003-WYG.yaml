body:
  text: 尚書纂傳卷三上元王天與撰大禹謨第三虞書臯陶矢厥謨禹成厥功帝舜車之作大禹臯陶謨益稷漢孔氏曰矢陳也謨謀也鄭氏曰臯陶之謨禹之功各舉其著見之最盛者而言其寔互文見意觀序既謂禹成厥功而下文又緫以大禹謨言之則臯陶可知漢孔氏曰重美二子之言陳氏曰申舒也謂𤼵達之使申而不屈朱子曰此乃三篇之序臯陶矢厥謨謂臯陶謨篇禹成厥功謂大禹謨篇陳九功之事故曰成厥功帝舜申之者舜因臯陶陳謨因申命禹曰來禹汝亦昌言而禹遂陳益稷篇中之語此一句序益稷篇也唐孔氏曰史錄其辭作大禹臯陶二篇之謨又作益稷之篇凡三篇林氏曰一序分三篇者竹簡所載不能多分為三篇便簡冊而已非謂大禹謨盡在第一篇臯陶謨盡在第二篇也三篇中凡禹所言皆大禹謨凡臯陶所言皆臯陶謨又曰虞史既述二典此又述其君臣之間嘉言善政以為三篇備二典之所未備大禹謨漢孔氏曰禹稱大大其功王氏曰臯陶指其名而禹稱大禹者宅揆任大冠諸臣之上表而出之也朱子曰今文無古文有曰若稽古大禹曰文命敷于四海祗承于帝曰若稽古說見堯典林氏曰文命上曰字史官曰也漢孔氏曰言其外布文徳教命内則敬承堯舜朱子曰文命即禹貢所謂東漸西被朔南暨聲教訖于四海者是也祗敬也帝謂舜也吕氏曰祗承與重華不同重華有日月並明之意祗承不過坤承乾之象耳漢董子曰禹繼舜舜繼堯三聖相授而守一道蘇氏曰或以文命為禹名則敷于四海者為何事耶曰后克艱厥后臣克艱厥臣政乃乂黎民敏徳吕氏曰此下四章互相𤼵明克艱之義漢孔氏曰敏疾也能知為君難為臣不易則其政治而衆民皆疾敏修徳朱子曰曰以下禹言艱難也真氏曰禹言君臣之道蔽以克艱一言可謂至矣盖以為難則存敬畏之心以為易則啓驕逸之志此治亂安危所自分吕氏曰欲為君盡君道欲為臣盡臣道克艱者聖人相傳之道厥后厥臣各止其所之意君克艱君之事臣克艱臣之事思不出其位也君不盡居道而下行臣事君職必虧非艱厥后臣不盡臣道而上僭君職臣職必虧非艱厥臣也帝曰俞允若兹嘉言罔攸伏野無遺賢萬邦咸寧稽于衆舍己從人不虐無告不廢困窮惟帝時克漢孔氏曰兹此攸所也善言無所伏言必用如此則賢才在位天下安寜陳氏曰嘉言罔無伏隱也賢者才徳多於人之稱唐孔氏曰言之善者必出賢人之口但言之易行之難或有人不賢而言可用故嘉言與賢異其文唐陸氏曰寜安也漢孔氏曰帝謂堯也考衆從人矜孤憫窮凡人所輕聖人所重張子曰稽衆舍己堯虚其心以為天下也程子曰舍己從人最為難事己者我之所有雖痛舍之猶懼守己者固而從人者輕也唐孔氏曰不虐不廢皆謂矜撫愍念之互相通也吕氏曰虐廢不必横政暴刑加之一亳精神念慮之不到便是虐之廢之蘇氏曰無告天民之窮者困窮士之不遇者朱子曰舜因禹言謂此惟堯能之非常情所及盖為謙辭以對而不敢自謂其必能舜之克艱於此亦可見矣真氏曰知為君之難者易其知其艱而能盡其道者難故曰允若兹惟帝時克世之人主謂言已盡用而不必求言不知伏于下者之難達也賢已盡得而不必求賢不知遺于野者之難進也惟堯於此一以難視之故能使言不伏于下賢不遺于野而致萬邦之安雖然堯猶慮其難也方且稽衆以求事理之當舍己以從人情之公無告易虐而不虐困窮易廢而不廢皆自克艱一念為之孔子論博施濟衆修己安百姓皆曰堯舜其猶病諸可謂知堯舜之心矣益曰都帝徳廣運乃聖乃神乃武乃文皇天眷命奄有四海為天下君漢孔氏曰益因舜言又美堯也廣謂所覆者大運謂所及者逺聖無所不通神妙無方文經天地武定禍亂眷視奄同也言堯有此徳故為天所命所以勉舜也朱子曰廣者大而無外運者行之不息吕氏曰廣運者乾健不息之意惟其廣運乃能克艱真氏曰廣運則與天同徳故能受天之命益之言全在廣運二字唐孔氏曰尊而君之則稱皇天孫氏曰命畀付也奄盡也蘇氏曰至道必簡至言必近君臣相與艱畏舍己用衆禮鰥寡達窮士其為徳若卑約然此誇者之所小而世俗之所謂無所至也故舜特申之曰是徳也惟堯能之他人不能也益又從而賛之曰是徳也推而廣之乃所以為聖神武文而天之所以命堯為天子者特以是耳禹曰惠迪吉從逆凶惟影響漢孔氏曰迪道也順道吉從逆凶吉凶之報若影之随形響之應聲言不虚項氏曰吉凶者緫名廢興存亡成敗得失皆吉凶也張氏曰禹因益美堯遂言此盖亦因之以成舜吕氏曰禹克艱之言得舜之言而愈彰舜克艱之言得益之言而益大益克艱之言得禹之言而始備聖賢之言互相𤼵明以見君道之廣大而無窮君心之誠敬而無己也益曰吁戒哉儆成無虞罔失法度罔逰于逸罔􅁋于樂任賢勿貳去邪勿疑疑謀勿成百志惟熈罔違道以干百姓之譽罔咈百姓以從己之欲無怠無荒四夷來王吕氏曰益又言克艱之目漢孔氏曰先吁後成欲使聼者精其言許氏曰戒警也王氏曰自警戒無虞至四夷來王乃歴言戒哉之說漢孔氏曰虞度也無億度謂無形成於無形備慎深朱子曰儆與警同古文作敬開元改今文蘇氏曰虞憂也自其未有憂而戒之矣漢孔氏曰乗法守度言有常朱子曰失墜也陳氏曰度尋丈尺寸也以度喻法故言法度漢孔氏曰􅁋過也遊逸過樂敗徳之源富貴所忽故特以為戒陳氏曰浮水曰逰逸者放於安之謂葉氏曰􅁋如水之浸􅁋而不返漢孔氏曰一意任賢果於去邪疑則勿行道義所存于心日以廣矣朱子曰勿禁止之辭任賢以小人間之謂之貳去邪而不能果斷謂之疑謀圗為也夏氏曰疑謀如詩所謂築室于道謀是用不潰于成當自作一句不連上文蘇氏曰人之為不善雖小人不能無疑凡疑則已則天下無小人矣人之所以不能大相逺者皆好行其所疑也朱子曰百志猶所謂百慮吕氏曰志者心之所之一心既正凡有所之皆廣且明故曰云云漢孔氏曰干求也失道求名古人賤之專欲難成犯衆與禍故戒之蘇氏曰民至愚而不可欺凡其所毁譽天且以是為聦明而况於君乎違道足以致民毁而已安能求譽哉好行小惠以求譽於此固不足恤以為不足恤而縱欲以戾之亦殆矣咈戾也漢孔氏曰言天子常戒懼無怠惰荒廢則四夷歸徃之林氏曰無怠荒所謂不倦以終之四夷東夷西戎南蠻非狄朱子曰九州之外世一見曰王四夷歸徃中土可知真氏曰益枚數告戒而終之曰云云盖治亂之源在人主之心益之戒始于君心終于君心此聖賢傳授要法也晉武帝混一天下唐𤣥宗身致太平皆以逸樂召夷狄之釁流禍至數百年然後知聖賢之言萬世之蓍䇿也禹曰於帝念哉徳惟善政政在養民水火金木土榖惟修正徳利用厚生惟和九功惟敘九敘惟歌戒之用休董之用威勸之以九歌俾勿壊憂氏曰此禹又言保治之術漢孔氏曰嘆而言念重共言鄭氏曰念常思也夏氏曰禹言今日徳政已成其事誠美在帝不可不念其保之之術也漢孔氏曰為政以徳則氏懐之吕氏曰徳惟善收政木于徳也政在養氏民資于政也後世冨國彊兵非養氏之政也漢孔氏曰言養民之本在先修六府唐孔氏曰此五行與洪範之次不同洪範以生數為次此以相刻為次左傳云天生五材民並用之彼為五材此兼以榖為六府者榖之於民尤急穀是土之所生故于土下言之葛氏曰穀本在木行之數以為民食之急故別而附之夏氏曰今舜之治以之水火金木土穀之六府則既能惟修漢孔氏曰正徳以率下利用以阜財厚生以養民三者和所謂善政夏氏曰以之正徳利用厚生之三事則既能惟和漢孔氏曰言六府三事之功有次敘皆可歌樂乃徳政之致左氏郤缺曰九功之徳皆可歌也謂之九歌朱子曰想當時田野自有此歌今不得見夏氏曰别而言之謂之六府謂之三事合而言之謂之九功六府修三事和則九功可謂有敘矣有敘非謂先水火而後金木土榖先正徳而後利用厚生特謂九者之功各得其敘而不失其倫耳或問論語韶武章朱子曰據書中說徳惟善政至九敘惟歌此是韶樂九章看他意思是如何到得又曰此便是韶樂之本也按禹謨辭簡而盡該括實政之大者水火金木土穀惟修正徳利用厚生惟和二語是也以修以和要是帝王參賛經綸之寔處考之經傳可旁證者今史舉以衍前說修水之利其經制如十夫有溝百夫有洫千夫有澮萬夫有川散之為均遂為舍列而芟作流其潤聚之為原防為偃瀦而衍沃被其澤皆是也修火之利其區畫如藪有薪蒸囿有芻蕘爟烜有令灰炭有備大之以罏冶以􅓨埴足爍金而凝土小之以燒薙以行水足美疆而糞疇皆是也修金之利驗其地圗寛其巡禁因其實蔵物其丱材是已及其用之冶鑄必廣而器具備圜法必通而貲貨衍利斯溥也修木之利辨其材麓别其植物蘩其場圃滋其樹藝是已及其用之落彼材植而隂陽不拂其宜時彼斧斤而掄取不勝其用利斯􅄎也土㑹以辨地之生土化以相地之度冥修土利也而猶不止此授之田野畫之井牧執度地度地居民地邑民居必參相得尤土利之大者也三農生九穀之殊巡野辨穜稑之種修穀利也而亦不止此視年嵗之豐凶謹春秋之頒歛以之施惠則有鄉里之委積有門關之委積有都鄙道路之委積以之先備則有三年之蓄有六年之蓄有九年之蓄尤穀利之大者也蓋泛觀天地間莫非五行百穀之利者亦既因民利而利之矣富而能教大君立極于上羣黎觀感于下經正民興斯無邪慝民徳之正也通商惠工羨補不足固利用之者者而凢害至與備患生與防利之導之出入用之皆民用之利也仰事俯育飽食煖衣固厚生之著者而凢所欲與聚所惡勿施欲夀為之生而不傷欲冨為之厚而不困皆民生之厚也此皆府事修和之寔禹特以两言該括之可謂簡而盡矣又按禹自天錫龜書而後以敘九疇之範則初一五行以下六十五字挈其綱以定九州之貢則六府孔修以下三十一字立其本以陳九功之謨則此十有六字撮其要洪範其淵源處禹貢其作為處禹謨其敷陳帝前處語之詳略不同而寔一也以是輔成帝治卒使徳政洋溢恩娱澤嬉九徳之歌九㲈之舞傳至成周尚以薦之宗廟而泰和與唐虞並稱世謂唐虞世逺復古之難以此語觀之皆鑿鑿精寔讀者當深考之也漢孔氏曰休美董督也言善政之道美以成之威以督之歌以勸之使政勿壊在此三者而已蘇氏曰先事而令曰戒朱子曰威古文作畏鄭氏曰威刑勸勉壊敗也吕氏曰此叚精神全在俾字盖消息盈虚天理之常裁成輔相君人之道也天下之理盛必有哀成必有敗俾云者聖人裁成悑相以賛消息盈虚之理觀勿壊之意聖人無窮之心可見天帝曰俞地平天成六府三事允治萬世永頼時乃功夏氏曰此舜又歸功於禹漢孔氏曰水土冶曰平五行敘曰成因禹陳九功而嘆美之言是汝之功明衆臣不及王氏曰方水之未平春作秋成有弗穫者故地平然後天成朱子曰六府水火金木土穀也六者財用之所自出故曰府三事正徳利用厚生也三者人事之所當為故曰事鄭氏曰治理頼恃也夏氏曰禹功豈惟萬世曰萬世者姑取其數之多言之耳帝曰格汝禹朕宅帝位三十有三載耄期倦于勤汝惟不怠緫朕師夏氏曰此下載舜禪禹事漢孔氏曰八十九十曰耄百年曰期頤言已年老厭倦萬機汝不懈怠于位稱緫我衆欲使攝唐孔氏曰舜年六十三即政居帝位三十有三載至今九十五矣年在耄期之間故並言之張氏曰耄昬也期指是以為期也期則當頤以養之之時鄭氏曰倦懈勤勞也吕氏曰聖心純亦不已何由有倦但老將至而血氣若倦止倦於勤而已非倦于道也居天位者以勤為本舜既以倦勤自歉必求能勤者而遜位天行健天之不怠也聖道運而無積聖人之不怠也不怠二字足以當帝位帝徳廣運亦不怠之功用也聖人之道未嘗一日怠怠則間斷不可以言聖矣陳氏曰緫猶統也朱子曰堯命舜曰陟帝位舜命禹曰緫朕師盖堯欲舜真宅帝位舜譲弗嗣後惟居攝亦若是而已禹曰朕徳罔克民不依臯陶邁種徳徳乃降黎民懐之帝念哉念玆在兹釋兹在兹名言兹在玆允出玆在兹惟帝念功漢孔氏曰依倚邁行種布降下懐歸也言已無徳民所不能依臯陶布行其徳下洽于民民歸服之朱子曰邁勇徃力竹之意蘇氏曰邁逺也種徳如農夫之種殖也衆人之種其徳也近朝種而暮穫則其報亦狹矣臯陶之種其徳也逺造次顛沛未嘗不在於徳而不求報也及其充溢而不已則沛然下及於民而民懐之吕氏曰此非禹之謙辭禹盡克艱之道徳雖已克常見其罔克民雖已依常見其不依即譲徳非嗣之意聖人之心見天下之理工夫無窮而舉臯陶以自代邁種臯陶栽培其徳之豐熟也降如而露之降黎民被其潤澤罔有不懐也種徳比之罔克者如何民懐比之不依者如何此禹灼然不敢當帝位之意漢孔氏曰釋廢也朱子曰兹指臯陶也吕氏曰禹告舜以念臯陶也念之而在此釋而不念亦在此名言者指其事而言之亦在此允出者信存于心亦在此史氏曰念功念臯陶種徳之功也帝曰臯陶惟兹臣庻罔或干予正汝作士明于五刑以弼五教期于予治刑期于無刑民恊于中時乃功懋哉漢孔氏曰或有干犯也無有干我正言順命吕氏曰帝者之世風俗醇厚敢干予正者已無而或干予正者亦無陳氏曰舜為正道之宗主使臣庻有一犯正者即犯舜之正也漢孔氏曰弼輔期當也嘆其能以刑輔教當于治體雖或行刑以殺止殺終無犯者刑期于無所刑民皆合于大中之道是汝之功勉之朱子曰期者先事取必之謂陳氏曰明利明審五刑予治猶言予正也恊中則不犯正又不待論林氏曰聖人制為刑辟非期于多刑人多殺人以為威也凡以輔吾教之不逮而已出教則入刑出刑則入教使民趨於五教而刑為無用此聖人之本心也臯陶能體此意而竹之使天下知有契之教而不知有臯陶之刑蓋百官有司之職以無曠為能惟士則異此必使民不犯于有司天下無一人之獄其官若虚設者然後為能其官朱子曰懋宜作楙盛大之意此作懋者乃訓勉耳盖古字亦或通用按中正字義程子易傳曰中重于正正者容有不中中者未有不正朱子曰中是正之恰好處合當做底是正做得恰好處是中臯陶曰帝徳罔愆臨下以簡御衆以寛罰弗及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經好生之徳洽于民心兹用不犯于有司漢孔氏曰愆過也善則歸君人臣之義吕氏曰罔愆意極淵源惟寔用工之人知之夫非盛徳之至剛健純粹質諸天地而不疑開百聖而不慚歴萬世而無弊者何以至此真氏曰帝徳雖覆載無以加而臯陶但以罔愆言之蓋必如是僅可謂之無過耳漢孔氏曰御治也葉氏曰上下以勢言故曰臨衆寡以人言故曰御陳氏曰臨統御制御也御取馭馬為義羈勒以使從與寛正相反然人君能容衆而後能御衆寛容則人心固結乃所以為御世主以嚴法御下行於法之所及不行于法之所不及所御狹矣楊氏曰權不去手寛儘不妨漢孔氏曰嗣亦世俱謂子延及也父子罪不相及而及其賞道徳之政鄭氏曰罰罪之輕者賞賜也應氏曰罰弗及嗣一人之身始惡終善猶不可棄况其嗣乎賞延于世與人為善嘉勸來者然世賞而不世官也漢孔氏曰過誤所犯雖大必宥不忌故犯雖小必刑朱子曰即所謂眚災肆赦怙終賊刑者吕氏曰過慈則近於姑息反以害仁此編茍無刑故無小一言其義不備聖人見人之故為惡者不俟其惡之大罪大則足以滅身矣自其小而刑之所以戢其為惡之心漢孔氏曰刑疑附輕賞疑從重忠厚之至朱子曰罪已定矣而於法之中有疑其可重可輕者則從輕以罰之功已定矣而於法之中有疑其可輕可重者則從重以賞之吕氏曰漢宣綜核信必而舜朝賞罰多疑然宣帝之信必爝火之光也帝舜之疑天地之寛也漢孔氏曰辜罪經常司主也臯陶因帝勉已遂稱帝之徳所以明民不犯上也寜失不常之罪不枉不辜之善仁愛之道唐孔氏曰枉殺無罪妄免有罪二者俱失寜妄免大罪不枉殺無罪也陳氏曰天地之大徳曰生好生之徳聖人所以配天地而育羣生自臨下以簡而下皆是吕氏曰自簡寛而𤼵無非好生盖好多事者必不好生好苛刻者必不好生唐孔氏曰洽謂沾漬優渥陳氏曰聖徳浹洽人皆自愛不犯有司之法上好人之生則民莫不自好其生仁心之相感也秦人殺人如草芥宜若民不敢犯而姦宄愈不勝上輕人之生則民亦自輕其生戾氣之相召也朱子曰帝徳罔愆以下見聖心涵育𤼵生與天地同徳而物或自逆理以干天誅則夫輕重取舍之間亦自有決然不易之理其宥過非私恩其刑故非私怒罪疑而輕非姑息功疑而重非過予如天地四時之運寒凉肅殺常居其半而涵育𤼵生之心未嘗不流行其間此所以徳洽民心而自不犯有司非既抵冒而復縱弛之也帝曰俾予從欲以治四方風動惟乃之休漢孔氏曰使我從心所欲而政以冶民動順上命若草應風是汝能明刑之美真氏曰欲猶好也朱子曰民不犯法而上不用刑者舜所欲也汝能使我如所願欲而冶教化四達如風鼓動莫不靡然是汝之美也張氏曰鼓之舞之不見其為之之迹而民莫不披靡此之謂風動帝曰來禹降水儆予成允成功惟汝賢克勤于邦克儉于家不自滿假惟汝賢汝惟不矜天下莫與汝争能汝惟不伐天下莫與汝争功予懋乃徳嘉乃丕績天之厯數在汝躬汝終陟元后漢孔氏曰水性流下故曰下水能成聲教之信成治水之功言禹最賢重美之朱子曰降水洪水也古文作洚孟子云水逆竹謂之洚水盖山崩水渾下流淤塞故其逝者輒復反流而泛濫决溢洚洞無涯也吕氏曰舜時水已平何以謂之儆予舜雖不見洪水之害常若洪水之在目前天地之中一物不順無非儆予何暇計時之先後况舜時水猶未盡平誠不可不儆也王氏曰舉事當人信之謂之成允朱子曰成功謂水患既平而九功皆敘吕氏曰當此之時惟禹一人故曰惟汝賢漢孔氏曰滿謂盈寔假大也言禹惡衣薄食卑其宫室而盡力為民執心謙冲不自盈大史氏曰勤儉二字視之若易行之實難惟踐復純篤涵養粹深者乃能故曰克勤克儉力足以堪其任之謂也吕氏曰滿假不必矜誇功成之後自以為功即滿假也禹既成功其心寂然若無所以為不自滿假唐孔氏曰上言其功此言其徳故再言惟汝賢漢孔氏曰自賢曰矜自功曰伐言禹推善譲人而不失其能不有其勞而不失其功所以能絶衆人唐孔氏曰矜伐俱是誇義程子曰禹不矜不伐天地同量也吕氏曰天下之理必有對已立則物對有對則有争一有矜伐即有争之理盖矜伐者争之對禹不矜不伐是無我也無我則無對無對則無争矣漢孔氏曰丕大也厯數謂天道元大也大若天子舜善禹有治水之大功言天道在汝身汝終當升為天子朱子曰徳指其克勤儉不矜伐而言功指其成允功而言厯數帝王相繼之次第猶嵗時節氣之先後也吴氏曰正朔自天子出諸侯受而行之天之厯數在汝躬言當天道為天子厯象日月以出正朔而號令天下司馬遷言堯立羲和之官明時正度隂陽調風雨節年耆禪舜戒之曰云云舜亦以命禹由此觀之帝王之所重也陳氏曰躬身也朱子曰是時舜方命禹以居攝未即天位故以終陟言按厯數之説惟吳氏得之書言厯者三堯典以厯對象而言此與洪範以厯舉數而言厯即歩占之厯數即一卜百千萬之數厯所以為紀數之書數所以為起厯之元其曰天之厯數在汝躬則傳帝王之世運頒一統之正朔責任之大可知人心惟危道心惟微惟精惟一允執厥中漢孔氏曰危則難安㣲則難明故戒以精一信執其中朱子曰心之虚靈知覺一而已矣而有人心道心之異者以其或生于形氣之私或原于性命之正而所以為知覺者不同是以或危殆而不安或微妙而難見耳然人莫不有是形故雖上智不能無人心亦莫不有是性故雖下愚不能無道心二者雜于方寸之間而不知所以治之則危者愈危微者愈微而天理之公卒無以勝夫人欲之私矣精則察夫二者之間而不離也一則守其本心之正而不離也從事于斯無少間斷必使道心常為一身之主而人心每聼命焉則危者安㣲者著而動静云為自無過不及之差矣或問人心是形氣之私指口鼻耳目四肢之屬否朱子曰是又問如此則未可便謂之私曰此數件屬自家體叚上便是私有底物不比道便公共故上面便有箇私底根本危亦未便是不好只有箇不好底根本又曰陸子静云舜若以人心為全不好則須説不好使人去之今止説危危者不可據以為安耳此言是又曰道心惟微者難明有時𤼵見些子使自家見得有時又不見了又曰人只有一箇心知覺從道理上去便是道心知覺從聲色臭味上去便是人心只争些子人心人欲也此語有病危只是危險欲墮未墮之間若以道心主之則危者自安若縱其欲則墮入于惡又不止于危喜怒人心也然無故而喜無故而怒與喜至于過怒至于甚皆為人心所使也須是喜所當喜怒所當怒乃是道心又曰以佽食言之飢食渴飲人心也然必有義理存焉有可以食有不可以食如子路食于孔悝與夫嗟來之食此不可食者也又如父慈其子子孝其父常人亦能之道心之正也茍父一虐其子則子必狠然悖其父人心之所以危也惟舜不然雖其父欲殺之舜之孝未嘗替此道心也故當使人心每聽道心之區處方可然此道心却雜出于人心之間微而難見必須精之一之而後中可執又曰中庸謂擇善而固執之擇善惟精也固執惟一也博學審問慎思明辨惟精也篤行惟一也明善惟精也誠身惟一也大學格物致知非惟精不可能誠意則惟一又曰聖賢言中有二義大本云者喜怒哀樂未𤼵時之理其氣象如此也中庸云者理之在事而無過不及之謂也此曰允執厥中以其在事者言之若天下之大本則不可得而執矣真氏心經賛曰舜禹授受十有六言萬世心學此其淵源人心伊何生於形氣有好有樂有忿有懥惟欲易流是之謂危須臾或放衆慝從之道心伊何根於性命曰義曰仁曰中曰正惟理無形是之謂㣲毫芒或失其存幾希二者之間曾不容隙察之必精如辨白黒知及仁守相為始終惟精故一惟一故中聖賢迭興體姚法姒提綱挈維昭示來世戒罹慎獨閑邪存誠曰忿白慾必窒必懲上帝是臨其敢或貳屋漏雖隱寜使有愧四非當克如敬斯攻四端既𤼵皆廣而充意必之萌雲捲席撤子諒之生春嘘物茁雞犬之放欲其知求牛羊之牧濯濯是憂一指肩背孰貴孰賤簞食萬鐘辭受必辨克治存養交致其功舜何人哉期與之同惟此道心萬善之主天之與我此其大者歛之方寸大極在躬散之萬事其用弗窮若實靈龜若奉拱璧念兹在兹其可不力相古先民以敬相傳操約施博孰此為先又曰人心指聲色臭味之欲言也道心指仁義禮智之理言也以人主言之宫室之欲安膳服之欲美妃嬪侍御之奉觀逸遊田之樂皆人心之𤼵也是心為主無所裁制則物欲日滋去桀紂不逺矣知富貴之不可恃而將之以憂勤知驕侈之不可肆而節之以恭儉知旨酒厚味為迷心之鴆毒而思却之知􅁋聲美色為伐性之斧斤而思逺之此道心之𤼵也是心為主無所汨喪則義理日充去堯舜不逺矣人心之𤼵如鈷鋒如悍馬有未易制故曰危道心之𤼵如火始然如泉始達有未易充故曰㣲惟平居荘敬自持察一心之所起知其為聲色臭味而𤼵則克治之知其為仁義禮智而𤼵則持守之自然禮義常存物欲退聽以之酧酢萬事無徃非中矣蓋主于中則曰道心形於用則曰中道非二事也朱子曰允執其中堯之授舜也人心惟危道心惟㣲惟精惟一允執厥中舜之授禹也堯之一言至矣盡矣舜復加以三言者盖必如是而後堯之一言可以庻幾也巽齋歐陽氏曰予讀論語堯曰數言疑虞書所載天之厯數至天禄永終無非堯言盖孔門舉其首末則其中間可想既以天之厯數在爾躬與四海困窮天祿永終通謂之堯言矣則危㣲精一之云何以知其獨非乎無稽之言勿聽弗詢之謀勿庸可愛非君可畏非民衆非元后何戴后非衆罔與守邦欽哉慎乃有位敬修其可願四海困窮天禄永終惟口出好興戎朕言不再漢孔氏曰無考無信驗不詢專獨終必無成故戒勿聽用朱子曰無稽者不考于古弗詢者不咨于衆言謂泛言勿聽可矣謀謂討事故戒其勿用漢孔氏曰民以君為命故可愛君失道民叛之故可畏言衆戴君以自存君恃衆以守國相須而立漢孔氏曰有位天子位可願謂道徳之美困窮謂天民之無告者言為天子勤此三者則天之禄籍長終汝身吕氏曰可願猶孟子所謂可欲敬修者用工之無己也既曰欽又曰慎又曰敬舜純誠之寔積於中故純誠之言𤼵於外輔氏曰天禄謂天所與人君之富貴崇髙也真氏曰堯之告舜曰天禄永終舜亦以命禹以後世言之必謂此不祥之語而古者君臣更相告戒不諱危亡如此此其所以不危亡也漢孔氏曰好謂賞善戎謂伐惡言口榮辱之主慮而宣之成于一也朱子曰好善也戎兵也吕氏曰一言之間禍福係焉遜位之言既出不可以再此天子無戯言之意舜言此外如有敵人之窺釁内如有權臣之乗間舜時安有此盖謹言者聖人常行之理禹曰枚卜功臣惟吉之從帝曰禹官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮恊從卜不習吉禹拜稽首固辭帝曰母惟汝諧正月朔旦受命于神宗率百官若帝之初漢孔氏曰枚謂歴卜之而從其吉此禹讓之志唐孔氏曰周禮有銜枚氏所銜之物状如箸今人數物云一枚两枚則枚是籌之名也枚卜謂人人以次歴申卜之似若枚數然鄭氏曰問龜曰卜漢孔氏曰帝王立占卜之官故曰官占蔽斷昆後也官占之法先斷人志後命於元龜言志定然後卜鄭氏曰占問也陳氏曰命謂令龜也元龜龜之大而善者漢孔氏曰習因也言已謀之于心謀及卜筮四者合從卜不因吉無所枚卜張氏曰此如洪範謀及乃心謀及卿士謀及庻人謀及卜筮至於汝則從龜從筮從卿士從庻民從是之謂大同陳氏曰人謀鬼謀雖欲其合大率以人謀為先就人謀中又以己之心為主蔡氏曰龜卜筮蓍林氏曰習重也如習坎之習不習吉猶言豈有汝既吉又更有人與汝重疊而吉真氏曰六經言鬼神始此其之一言最宜深味按鬼神字義程子曰鬼神者造化之迹張子曰鬼神者二氣之良能朱子曰以二氣言則鬼者隂之靈神者陽之靈以一氣言則至而仲者為神反而歸者為鬼其寔一而已漢孔氏曰再辭曰固陳氏曰董子云聖人以天下為憂未嘗以天下為樂此禹固辭之意漢孔氏曰言母所以禁其辭禹有大功徳故能諧和元后之任漢孔氏曰受舜終事之命神宗文祖之宗廟言神尊之陳氏曰舜言受終禹言受命互文蘇氏曰祭法謂有虞氏祖顓頊而宗堯則神宗其堯乎按文祖神宗皆難指言其人或指為黄帝或指為堯皆未敢以為然漢孔氏曰順舜初攝帝位故事奉行之林氏曰總率百官如舜居攝之初所行事唐孔氏曰如舜典在璿璣以下班瑞羣后以上事其巡守非百官之事帝曰咨禹惟時有苖弗率汝徂征禹乃㑹羣后誓于師曰濟濟有衆咸聽朕命蠢兹有苖昬迷不恭侮慢自賢反道敗徳君子在野小人在位民棄不保天降之咎肆予以爾衆士奉辭罰罪爾尚一乃心力其克有勲三旬苖民逆命益賛于禹曰惟徳動天無逺弗届滿招損謙受益時乃天道帝初于歴山徃于田日號泣于是天于父母負罪引慝祗載見瞽瞍䕫䕫齋慄瞽亦允若至諴感神矧兹有苖禹拜昌言曰俞班師振旅帝乃誕敷文徳舞干羽于两階七旬有苖格唐孔氏曰此言征苖事漢孔氏曰三苖之民數于王法徂徃也不循常道言亂逆命汝討之陳氏曰有苖猶有扈有窮皆指有國之君蔡氏曰征正也正其罪也林氏曰堯老而舜攝舜老而禹攝雖代總萬幾而堯舜為天子自若故國有大事猶禀命焉禹征有苖在居攝後而禀命于舜不敢專也以此推之舜誅四凶亦必稟堯之命無疑漢孔氏曰㑹諸侯共伐有苖軍旅曰誓濟濟衆盛之貎真氏曰㑹諸侯之師而諸侯亦在蔡氏曰㑹徴㑹也誓戒也有會有誓唐虞已然禮言商作誓周作會非也漢孔氏曰蠢動昬暗也言其所以宜討之應氏曰蠢者物之但能蝡動而懵無知識之稱蔡氏曰述惑也吕氏曰苖之惡盡出于昬迷不恭不恭者萬惡之源漢孔氏曰狎侮先王輕慢典教反正道敗徳義鄭氏曰侮輕慢忽自賢自以徳賢於人也真氏曰道徳二字並言始見於此道者常行之正路背之故言反徳者固有之寔理失之故言敗漢孔氏曰廢仁賢任姦佞漢孔氏曰言氏叛天災之許氏曰災咎也漢孔氏曰肆故也辭謂不恭罪謂侮慢以下事應氏曰奉辭猶易所謂利執言也陳氏曰罰討也漢孔氏曰尚庻幾一汝心力以從我命漢孔氏曰以師臨之一月不服吕氏曰帝王之舉兵至則服而三旬逆命何也有苖障蔽之深自難感動如一氣之春草木𤼵生而隂崖寒谷甲者未拆根者未芽豈春氣之或偏歟固隂凝結壅蔽陽和姑少俟之則昔之未𤼵生者悉拆而芽矣三旬逆命寒氣凝結壅蔽時也舜之春風和氣舉世游泳則有苖雖頑有時被其澤矣漢孔氏曰賛佐届至也益以此義佐禹欲其修徳致逺林氏曰益是時亦從禹出征吕氏曰賛猶賛天地之化育禹有是心而益賛之非告以未知也夏氏曰徳上可以動天旁可以致逺漢孔氏曰自滿者人損之自謙者人益之是天之常道鄭氏曰招召謙遜也蔡氏曰滿損謙益即易所謂虧盈而益謀者吕氏曰使禹以為弗率在苖非教化未至則滿矣自反愈至而不罪苖乃謙也唐孔氏曰因言行徳之事欲禹修徳謙虚以來苖漢孔氏曰仁覆愍下謂之旻天言舜初耕于歴山之時為父母所疾日號泣于旻天及父母克己自責不責于人蔡氏曰歴山在河中府河東縣朱子曰號泣于旻天呼天而泣也于父母呼父母而泣也漢孔氏曰慝惡載事也夔夔悚懼之貌言舜負罪引惡敬以事見于父悚懼齋荘父亦信順之言能以至誠感頑父蔡氏曰自負其罪不以為父母之罪自引其惡不以為父母之惡龜山楊氏曰舜惟恐不順于父母未嘗自以為孝也自以為孝則非孝矣蔡氏曰齋荘敬也慄戰慄也朱子曰李氏云舜能使瞽瞍厎豫者盡事親之道共為子職不見父母之非而已昔羅仲素語此云只為天下無不是厎父母了翁聞而善之曰惟如此而後天下之為父子者定彼臣弑其君子弑其父者常始于見其有不是處耳廣漢張氏曰父之詔子常理也今以瞽瞍之頑舜盡子道而瞽瞍亦允若是感格之道乃在于舜所以變化瞽瞍之氣質者舜也漢孔氏曰諴和矧况也至和感神况有苖乎言易感蘇氏曰至誠感物曰諴漢孔氏曰昌當也以益言為當故拜受而然之遂還師兵入曰振旅言整衆蔡氏曰昌言盛徳之言吕氏曰拜而俞之所謂禹聞善言則拜唐孔氏曰振整也陳氏曰二千五百人為師五百人為旅泛言則兵衆也應氏曰此見其師出以律其歸以序終始以禮而不亂也見其養威歛重而士氣初不屈也下不恥其無功上不咎其方命唐孔氏曰還不請者進退由将或當時請命乃還文不具耳漢孔氏曰逺人不服大布文徳以來之吕氏曰誕大也舜之文徳素孚于天下又大敷之則和氣彌滿天地之間矣漢孔氏曰干楯羽翳也皆舞者所執修闡文教舞文舞于賔主階間抑武事唐孔氏曰明堂位云朱干玉戚以舞大武是武舞執斧執楯詩云左手執籥右手秉翟是文舞執籥執翟據器言之有武有文俱用以舞不用於敵故為文也朱子曰舞干羽于两階只是置三苖于度外吕氏曰朝廷閒暇禮文之彛非有意於示有苖也漢孔氏曰討而不服不討自來明御者之必以道吕氏曰春意浸盛寒谷𤼵生造化本無厚薄而萬物由造化以生者自有遲速知此則三旬之逆初非可怒七旬之格亦非獨遲先春後春各有其時至此不得不格也蔡氏曰舜之文徳非自禹班師而始敷苖之來格亦非以舞干羽而後至史臣以為禹班師而後弛其威武專尚徳教干羽之舞雍容不廹有苖之至適當其時故因即其實以形容有虞之徳今數千載之下猶可以是而想其一時之氣象也哀氏曰舜耕歴山時祗見厥父惟知已之有罪不見父之為頑極其精誠一念不雜所以瞽瞍厎豫及其征苖也自省未嘗有過惟見苖之作慝與祗見瞽瞍之時是心㣲有間矣所以苖民逆命及班師之後誕敷文徳無異徃時負罪引慝之心干羽之舞和氣充塞而遂格焉滿損謙益㨗于影響然則人心其可以少自滿哉尚書纂傳卷三上欽定四庫全書尚書纂傳卷三中元王天與撰臯陶謨第四虞書臯陶謨漢孔氏曰臯陶為帝舜謀林氏曰此篇雖與禹相荅問其寔陳于舜前史記云禹臯陶相與語帝前是也故揚子雲謂臯陶以知為帝謨蔡氏曰今文古文皆有曰若稽古臯陶曰若稽古說見堯典蔡氏曰典謨皆稱稽古而下文所記則異典主記事故堯舜皆載其寔謨主記言故禹臯陶則載其謨后臣克艱禹之謨也允廸厥徳謨明弼諧臯陶之謨也然禹謨之上增文命敷于四海祗承于帝者禹受舜天下非盡臯陶比例立言輕重於此可見也曰允迪厥徳謨明弼諧禹曰俞如何臯陶曰都慎厥身修思永惇敘九族庻明勵翼邇可逺在兹禹拜昌言曰俞按此禹臯問答推廣迪徳謨弼之義而䆒極於人君修齊治平處漢孔氏曰迪蹈也蔡氏曰臯陶言人君信蹈其徳則臣之所謨者無不明所弼者無不諧唐孔氏曰此曰上不言臯陶猶大禹為謀曰上不言禹按允迪厥徳從人君修徳上說謨明弼諧從人臣輔徳上說迪徳即下文慎厥身修之云謨明則開陳乎此啓心沃心之謂弼諧則恊賛乎此惟暨乃僚罔不同心之謂或以徳為臯陶之徳或以允迪為啓迪其君之徳皆未當漢孔氏曰然其言問所以行漢孔氏曰嘆美之重也慎修其身思為長乆之道蘇氏曰慎其身之所修思其久逺之所至者禮云君子過言則民作辭過動則民作則故言必慮其所終行必稽其所敝漢孔氏曰言慎修其身厚次敘九族則衆庻皆明其教而自勉勵翼戴上命近可推而逺者在此道張氏曰親親以隆其恩燕樂以合其好文足以相接恩足以相愛惇九族之道也尊尊而卑卑長長而㓜㓜親踈以别隆殺以辨敘九族之直也程子曰正倫理篤恩義家人之道真氏曰庶明謂衆賢勵勉也翼輔也真氏曰臯陶陳謨未及他事首以慎厥身修為言盖人君一身天下國家之本而慎之一言又修身之本也思永者欲其悠乆而不息也人主孰不知身之當修然此心一放則能暫而不能乆必也常思所以致其慎者夫然後謂之永後世人主有初而鮮終者由不知思永之義也慎則常敬而無忽思則常存而不放修身之道備于此矣然後以親親賢賢二者繼之九族吾之屏翰也篤敘而均被其恩衆賢吾之羽翼也勉勵而樂為吾助身為之本而二者又各盡其道則自家可推之國自國可推之天下其道在此而已中庸九經之序其亦有所祖歟按中庸九經修身為綱而待臣與民皆其中切要之事即如此篇𤼵首先言治之原在君身而後言治之要在知人安民下章龜山楊氏説綱領固當然又當考真氏説漢孔氏曰以臯陶言為當故拜受而然之三山陳氏曰禹臯同列或都或俞或吁或如何無非真情寔意之所𤼵有合于心則都之俞之不合則吁之問之善之在己猶在人也故自言而先曰都不以為矜善之在人猶在己也故聞言而拜不以為諂臯陶曰都在知人在安氏禹曰吁咸若時惟帝其難之知人則哲能官人安民則惠黎民懐之能哲而惠何憂乎驩兜何遷乎有苖何畏乎巧言令色孔壬龜山楊氏曰知人安氏臯陶謨一篇之綱領也亦行有九徳而下知人之事天敘冇典而下安民之事漢孔氏曰嘆修身親親之道在知人所信任在能安民吕氏曰两言在者辭定而理决也漢孔氏曰言帝堯亦以知人安民為難故曰吁葉氏曰帝謂舜也難者戒焉而不敢易也漢孔氏曰哲智也無所不知故能官人惠愛也愛則民歸之蔡氏曰知人智之事也安民仁之事也哲智之明也惠仁之愛也漢孔氏曰佞人亂真堯憂其敗政故流放之孔甚也巧言静言庸違令色象恭滔天禹言有苖驩兜之徒甚佞如此堯畏其亂政故遷放之蔡氏曰能哲而惠猶言能知人安民也遷竄也巧好令善孔大也好其言善其色而大包藏凶惡之人也張氏曰驩兜誣人之功罪害於知人故憂之有苖頑弗即工害於安民故遷之巧言令色孔壬無所不害故畏之畏又甚于憂也唐孔氏曰帝能哲而惠則當朝無姦佞何憂懼於驩兜之佞而流放之何須遷徙於有苖之若何所憂懼於彼巧言令色為甚佞之人三凶見惡帝方始去之是知人之難臯陶曰都亦行有九徳亦言其人有徳乃言曰載采采禹曰何臯陶曰寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而亷剛而塞彊而義彰厥有常吉哉日宣三徳夙夜浚明有家日嚴祗敬六徳亮采有邦翕受敷施九徳咸事俊乂在官百僚師師百工惟時撫于五辰庶績其凝無敎逸欲有邦兢兢業業一日二日萬幾無曠庶官天工人其代之龜山楊氏敘章旨見上文漢孔氏曰言人性行有九徳以考察真偽則可知朱子曰者可見之迹也程子曰存諸中為徳𤼵於外為行真氏曰九徳之名自臯陶始漢孔氏曰載行也稱其人有徳必言其所行某事某事以為驗蘇氏曰人之難知如此豈可畏其難而不求其說乎盍亦以九徳求之言其人則曰斯人也有某徳言其徳則曰是徳也有某事載采采者歴言其事也按諸家皆本孔氏說但書指謂九徳之行殊科故必論其人之有某徳有某徳乃可論其人之足任某事任某事亦如立政述迪知恍恂于九徳之行乃敢告以宅事牧凖三事云漢孔氏曰問九徳品例漢孔氏曰性寛𢎞而能莊栗朱子曰栗字再見虞書皆莊敬謹嚴之意葉氏曰栗猶栗冽之栗漢孔氏曰和柔而能立事蔡氏曰柔柔順立植立漢孔氏曰慤愿而恭恪唐孔氏曰愿者慤謹良善之名王氏曰愿慤或失于朴陋恭謂恭肅有禮漢孔氏曰亂治也有治而能謹敬蘇氏曰横流而濟曰亂故方過人可以濟大難曰亂亂臣十人是也吕氏曰亂者能治亂之人多恃才作為大則為鯀小則為盆成括惟加以敬則處事當按朱子曰敬者主一無適之謂又曰程子嘗以主一無適言之矣嘗以整齊嚴肅言之矣至其門人則又有所謂常惺惺法者焉有所謂其心收斂不容一物者焉又曰敬者一心之主宰萬事之本根也詳虞書敬字凡七見而此章特以敬言徳故附其字義於此漢孔氏曰擾順也致果為毅朱子曰毅彊忍也漢孔氏曰行正直而氣温和漢孔氏曰性簡大而有亷隅朱子曰簡是好資質較之煩苛瑣細者不同亷謂有分辨也范氏曰物之有稜曰亷漢孔氏曰剛斷而寔塞吕氏曰棖也慾焉得剛惟剛而能塞則如孟子至大至剛塞乎天地漢孔氏曰無所屈撓動必合義朱子曰彊者力有以勝人之名義者心之制事之宜吕氏曰勇而無義為亂惟彊而有義則如孟子過孟賁逺矣真氏曰九徳之訓諸家各有得失今取其長合為一說蓋寛洪者易失于䟽閤必以縝宻濟之栗木性之最宻者也桑順者易失于委靡必以植立濟之謹愿者未必能恭肅有能治之才者未必能敬謹馴順之人少果毅徑直之人少温和簡者多務大體未必事亷隅剛者或出血氣未必能篤寔彊者見事勇為未必能合義學以成徳則無一偏之失唐孔氏曰寛柔擾三者相類即洪範云柔克愿亂直三者相類即洪範云正直簡剛彊三者相類即洪範云剛克孫氏曰言臣徳則此柔後剛言君徳則先剛後柔教人治人以中徳為本論人則中徳在剛柔之中此舜典臯謨洪範序徳所以不同真氏曰柔而立剛而塞雖各為一徳然寛也愿也擾也簡也皆近柔故以栗以恭以毅以亷濟之皆剛之屬也亂也直也彊也皆近剛故以敬以温以義濟之皆柔之屬也朱子曰九徳分得細宻又曰臯陶九徳凡十八種皆是好底氣質每两件鬬合將來又曰舜論直温寛栗及臯陶九徳皆是反氣質之性按九徳諸解或二之為剛柔或三之為剛柔正直雖于說亦通然朱子說盖析理于錙銖之謂無垢張氏曰自寛至彊皆天資自栗至義皆學力蔡氏曰而轉語辭皆指其成徳之自然非以此濟彼之謂真氏曰張蔡二說不同然嘗思之徳不待學而成者生知安行者也自非聖人其質必有所偏學以治之然後能復其性之全故舜命夔教胄子直而温云云止此意也漢孔氏曰彰明吉善也明九徳之常以擇人而官之則政之善三山陳氏曰久而不變曰常勉彊於暫而不能安行于乆非所謂常也劉氏曰吉士常人其揆一也立政云庶常吉士漢孔氏曰三徳九徳之中有其三宣布夙早浚須也卿大夫稱家言能日日布行三徳早夜思之須明行之可以為卿大夫史氏曰宣達也日宣者明揚導逹之必勤也林氏曰古文書浚明與濬哲字通用唐孔氏曰大夫受采邑賜世族立宗廟世不絶祀故稱有家蔡氏曰使之為大夫以浚明有家之政事也漢孔氏曰有國諸侯廿日嚴敬其身敬行六徳以信治政事則可以為諸侯林氏曰嚴亦敬也既曰嚴又曰祗又曰敬謂好賢樂善之心有加無己也張氏曰為諸侯則有山川土地之廣人民之衆而豐于都邑故稱有邦蔡氏曰使之為諸侯以亮明有邦之政事也漢孔氏曰翕合也能合受三六之徳而用之以布施政教使九徳之人皆用事謂天子如此則俊徳能治之士並在官胡氏曰受容納也施用也王氏曰合九徳而受之敷九徳而施之馬氏曰才徳過千人曰俊百人曰乂應氏曰合九徳之人而咸事其事所謂徳者貫本末而一之也非塊然土木也彼分才徳而二之殆末流之論耳八元八凱皆粹徳也而謂之才子其全才備徳如此後世治天下者大槩取辦于才力非九徳俊乂之謂也蘇氏曰後之學者多說天子用九徳諸侯用六大夫用三其寔未必然也孔子曰天子有争臣七人諸侯五人大夫三人使諸侯而有争臣七人可得謂之僭天子乎故觀書者取其意而已或曰臯陶之九徳則堯舜禹知人之法矣乎曰何獨臯陶舜命夔曰直而温寛而栗剛而無虐簡而無傲箕子教武王曰正直剛克柔克沈潜剛克髙明柔克雖詳畧不同然皆以長短相補剛柔相濟其意曰以此觀人參其長短剛柔而雜用之可以無大失矣譬如藥之有方聚衆毒而治一病君臣相使畏惡相制幸則愈疾不幸亦不至殺人者漢孔氏曰僚工皆官也師師相師法百官皆是言政無非夏氏曰自联事言則曰百僚自治事言則曰百工漢孔氏曰凝成也言百官皆撫順五行之時衆功皆成蔡氏曰撫順也唐孔氏曰撫五辰者堯典敬授民時平秩東作之類葉氏曰不特授時而已大而爕理隂陽小而山澤草木無不得其所胡氏曰春盛徳在木於是布徳施惠修舉政事所以順木之辰夏盛徳在火於是繼長增髙勞民勸相所以順火之辰秋盛徳在金於是選士厲兵禁暴誅慢所以順金之辰冬盛徳在水於是謹蓋藏循積聚飭國典所以順水之辰四辰順則土在其中矣真氏曰凝者凝定堅乆之意成功非難而堅乆為難漢孔氏曰不為逸豫貪欲之教是有國者之常真氏曰有邦諸侯也人主一身天下之表倡當以勤儉率諸侯不可以逸欲教有邦所謂教者非昭然示人以意向也逸欲之念少萌于中則天下從風而靡矣漢孔氏曰兢兢戒慎業業危懼幾微也言當戒懼萬事之㣲司馬氏曰治之于微則用力寡而功多治之于盛則用力多而功寡故曰知幾其神乎周子曰幾善惡朱子曰周子說幾儘有警𤼵人處近而公私邪正逺而廢興存亡只於此看破便斡轉了吕氏曰一二日之中幾微有萬而難察自微而動之善則善之惡則惡一心之中少有不敬善惡即於此而判矣按虞書言幾者三周書戒非幾者一諸家有指事而言者有指心而言者幾無不在要湏合二義為宻伏生大傳作一日二日萬機漢孔氏曰曠空也位非其人為空官言人代天理官不可以天官私非其才吕氏曰凡在職位無非代天理物耳如天之為然後能亮天工天敘有典勑我五典五惇哉天秩有禮自我五禮有庸哉同寅恊恭和𠂻哉天命有徳五服五章哉天討有罪五刑五用哉政事懋哉懋哉天聦明自我民聰明天明畏自我民明威達于上下敬哉有土龜山楊氏敘章旨見上文漢孔氏曰天次敘人之常性各有分義當勑正我五常之敎使合于五厚厚天下唐陸氏曰有典馬本作五典蘇氏曰勑正也吕氏曰勑有整飭之意五典說見舜典陳氏曰五者之典皆厚之所謂厚人倫也漢孔氏曰庸常自用也天次秩有禮當用我公侯伯子男五等之禮以接之使有常唐陸氏曰有庸馬本作五庸蘇氏曰秩亦敘也王氏曰吉凶軍賔嘉之禮亦天所秩也天子當自其禮庸之庸者常用之謂也程子曰書言天敘天秩天有是禮聖人循而行之所謂道也張子曰生有先後所以為天敘小大髙下相並而相形焉是謂天秩天之生物也有敘物之既形也有秩知敘然後經正知秩然後禮行朱子曰這箇典禮自是天理之當然欠佗一毫不得添佗一毫不得惟是聖人之心與天合一故行出典禮無一不與天合其間曲折厚薄淺深莫不恰好這都不是聖人白撰出都是天理决定合著如此後之人未得似聖人之心只得将聖人已行底聖人所傳於後世底依這様子做做得合時便是合天理之自然漢孔氏曰衷善也朱子曰衷即是中以衷為善却未親切蔡氏曰𠂻降𠂻之𠂻即所謂典禮也君臣同其寅畏恊其恭敬誠一無間融㑹流通而後民彜物則各得其正是所謂和𠂻也漢孔氏曰五服天子諸侯卿大夫士之服也尊卑采章各異所以命有徳蔡氏曰此即周官司服公以下五等之服孔氏以天子言之非也服說詳見益稷漢孔氏曰言天以五刑討有罪用五刑宜必當五刑說見舜典程子曰天命天討只是天理自當如此人何嘗與與則便是私意有善有惡善則理當善如五服自有一箇次第以章顯之惡則理當惡彼自絶於理故用刑以懲之賞刑之用何嘗容心于喜怒哉只是一箇義義之與比漢孔氏曰言人君居天官聼政治事不可以不自勉林氏曰大曰政小曰事两言懋哉者勉勉而不自已也朱子曰要惇五典庸五禮須是同寅恊恭和𠂻要章五服用五刑須是政事懋哉懋哉漢孔氏曰言天因民而降之福民所歸者天命之天視聽人君之行用民為聰明漢孔氏曰天明可畏亦用民成其威民所叛者天討之是天明可畏之效吕氏曰自我民聰明觀斯民生知之時可見自我民明威觀斯民凛然不可犯之時可見或問天聰明云云不知明畏是两字還是一字林氏以為聦明言視聽明畏言好惡永知如何朱子曰林氏似是明畏言天之所明所畏所明如明揚側陋之明所畏如董之用威威用六極之意漢孔氏曰言天所賞罰惟善惡所在不避貴賤有土之君不可不敬懼蔡氏曰上天下民也有土有民社也天人一理通逹無間民心所存即天理所在而吾心之敬又合天民而一之也有土者可不知所以敬哉真氏曰隆古君臣講明政治無一事不本於天無一事不本於敬臯陶曰朕言惠可底行禹曰俞乃言底可績臯陶曰予未有知思曰賛賛襄哉按此又臯陶與禹更相推讓以結之漢孔氏曰其所陳九徳以下之言順于古道可致行三山陳氏曰臯陶謂我之言順于理可以致而行之史記作吾言可底行乎漢孔氏曰然其所陳從而美之曰用汝言致可以立功漢孔氏曰因禹美之承以謙辭言我未有所知蘇氏曰曰當作日陳氏曰賛如益賛禹之賛賛賛賛之不已也蔡氏曰㐮成也惟思日賛助于帝以成其治而已吕氏曰臯陶陳謨如此方慊然不自以為可行賈誼治安一䇿才略如不可勝用謂醫能治之而上不使又謂何不令臣為屬國之官其視臯陶氣象為如何尚書纂傳卷三中欽定四庫全書尚書纂傳卷三下元王天與撰益稷第五虞書益稷漢孔氏曰禹稱其人因以名篇林氏曰伏生以益稷合於臯陶謨孔氏據科斗書釐而為二觀帝曰來禹汝亦昌言寔與前篇賛賛㐮哉相接蓋古竹簡文多者一篇釐而為二既釐之必以篇名别之故簡冊當從孔氏而以文相屬讀之當以伏生為正蔡氏曰今文古文皆有帝曰來禹汝亦昌言禹拜曰都帝予何言予思日孜孜臯陶曰吁如何禹曰洪水滔天浩浩懐山襄陵下民昬墊予乗四載随山刋木暨益奏庶鮮食予决九川距四海濬畎澮距川暨稷播奏庶艱食鮮食懋遷有無化居烝民乃粒萬邦作乂臯陶曰俞師汝昌言蔡氏曰此禹因孜孜之義述其治水本末先後之詳漢孔氏曰因臯陶謨九徳故呼禹使亦陳昌言昌言說見大禹謨漢孔氏曰拜而嘆辭不言欲使帝重臯陶所陳言已思日孜孜不怠奉承臣功而已蔡氏曰孜孜勤勉不怠也蘇氏曰予何言者猶臯陶之未有知也思日孜孜者猶臯陶之思日賛賛也皆相因之辭是以知曰之當為日也伏生以益稷合于臯陶謨有以也夫漢孔氏曰問所以孜孜之事唐孔氏曰臯陶怪禹不言故曰吁又曰如何洪水滔天浩浩懐山㐮陵說見堯典漢孔氏曰言天下民昬瞀墊溺皆困水災漢孔氏曰所載者四謂水乗舟陸乗車泥乗輴山乗樏随行九州之山林刋槎其木開通道路以治水也奏謂進于民鳥獸新殺曰鮮與益槎木獲鳥獸民以進食許氏曰乗駕也唐孔氏曰史記河渠書云泥行蹈橇山行即橋徐廣謂橋一作輂直轅車也漢書溝洫志云泥行乗毳山行則梮毳形如箕擿行泥上如淳謂毳以板置泥上以通行路也應劭謂梮或作樏為人所牽引也如淳謂梮以鐡如錐頭長半寸施之履下以上山不蹉跌也韋昭謂木器如今舉􅇃人舉以行也輴與毳一樏與梮輂一古篆變形字體改易說者不同未知孰是蔡氏曰随循刋除也王氏曰随山相水所出入治之刋木以達險阻除障蔽也陳氏曰與益奏進衆鮮食於民魚鼈新殺亦曰鮮此承山下故為鳥獸下承水復故為魚鼈漢孔氏曰距至也决九州名川通之至海一􅅿之間廣尺深尺曰畎百里之間廣二尋深二仞曰澮畎澮深之至川亦入海衆難得食處則與稷教民播種之决川有魚鼈使民鮮食之陳氏曰决䟽通也憂氏曰史記以導弱水以下為九川謂弱水也黒水也河也漢也江也沇也淮也渭也洛也說者因謂距四海者弱水入流沙為西海黒水入南海為南海河北播為九河入于海為北海餘六水所入為東海不必如此之泥但謂九州之川皆决以入海因以四海言耳王氏曰决九川距四海使大水有所歸濬畎澮距川使小水有所入葉氏曰艱食言稼穡艱難唐孔氏曰於時雖漸播種得穀猶少人食不足故鮮食以肋榖陳氏曰水漸除矣與稷播種衆榖進衆鮮食于民陳氏曰益稷播奏艱鮮非人人而飲食之亦敎之有方耳葉氏曰洪水之害草木暢茂禽獸繁殖禹随山刋木除其壅蔽然後益得以烈山澤而焚之禽獸可得而食所謂暨益奏庶鮮食也决九川使至海濬畎澮使至川降丘宅土然後稷得以播五穀教稼穡兼魚鼈而食之所謂曁稷播奏庶艱食鮮食也郁氏曰禹言暨益於随山刋木之下言暨稷於濬畎澮距川之下則是以刋木之故而暨益以濬畎澮之故而暨稷夫木乃山林之産畎澮乃田間之道益為虞寔主山澤以刋木之故暨益則木之所以刋皆益寔為之稷田官常出入田聞以濬畎澮之故暨稷則畎澮之所以濬皆稷寔助之刋木以除水之蔽濬畎澮以致水之通二者治水大事也而益稷有功焉則是治水功成禹固為先益稷寔亞之矣說者不以刋木論暨益惟以奏鮮論暨益不從濬畎澮論暨稷惟以播奏艱鮮論暨稷於是禹所言者殆類自侈其功之辭今當從随山刋木暨益濬畎澮距川暨稷作句則禹所言悉是歸功於此二人也漢孔氏曰化易也居謂所宜居積者勉勸天下徙有之無魚鹽徙山林木徙川澤交易其所居積王氏曰居儲也應氏曰勤而不匱流而不滯公天地之利以養天地所生之人豈後世均輸平準區區殖利以自私哉伏生大傳作貿遷有無化居漢孔氏曰米食曰粒言天下由此為治本蔡氏曰烝衆也應氏曰艱鮮並奏食貨交貿而必揔之以乃粒則養民之政本可知六府之土榖惟修五行之土爰稼穡本末輕重之序瞭然也陳氏曰作乂興于治也漢孔氏曰言禹言甚當可師法林氏曰禹雖不以陳謨自居惟述其治水之時險阻艱難備嘗之矣予之所以思日孜孜者蓋欲君臣之間相與警戒常如洪水未平之時則國家之福保無窮矣禹曰都帝慎乃在位帝曰俞禹曰安汝止惟幾惟康其弼直惟動丕應徯志以昭受上帝天其申命用休帝曰吁臣哉鄰哉鄰哉臣哉禹曰俞林氏曰此莭舜禹推明慎位之道唐孔氏曰禹以臯陶然已因嘆而戒帝曰帝當謹汝所在位葉氏曰慎乃在位即前帝所謂慎乃有位蓋古者君臣更以其言相告戒類如此漢孔氏曰然禹言受其戒漢孔氏曰言慎在位當先安好惡所止念慮幾微以保其安其輔臣必用直人真氏曰先儒謂心者人之北辰辰惟居其所故能為衆星之綱維心惟安所止故能為萬事之樞紐蔡氏曰止者心之所止也人心之靈事事物物莫不各有至善之所而不可遷者人惟私欲之念動摇其中始有昧于理而不得所止安之云者順適乎道心之正而不䧟於人心之危動静云為各得其當無有止而不得其止者惟幾所以審其事之𤼵惟康所以省其事之安即下文庶事康哉之義也吕氏曰安汝心之所止必於動之微及静而無事之時當致省察之工又必輔弼之人直而無隠蓋治心之道毫釐眇忽宴間暇豫工夫最切而繩愆糾繆格其非心隄防最要惟幾惟康則内得其養其弼直則外得其養按幾康如吕氏說固密如蔡氏從事上說亦通且又與下文庶事康哉合今並存之漢孔氏曰徯待也帝先安所止動則天下大應之順命以待帝志憂氏曰經言惟動丕應徯志不言惟動徯志丕應此禹戒舜舉動之際當應從天下所徯之志猶所謂丕從厥志也漢孔氏曰又乃明受天之報施天又重命用美林氏曰書稱天稱帝其寔一也如既云格于皇天又云格于上帝既云帝乃震怒又云天乃錫禹旣云惟帝不畀又云惟天不畀皆史錯綜其文以成其義漢孔氏曰鄰近也言君臣道近相須而成林氏曰據下文欽四鄰指禹之僚屬而言臣哉者指禹言之言頼爾臣之助也鄰哉者女又當率其僚屬左右前後之臣以為我助也旣言臣哉鄰哉又言鄰哉臣哉反覆重複以見至誠之深陳氏曰舜既然禹慎位之言而禹又然舜臣鄰之言君臣之相然豈茍為容恱必有莫逆於心者矣帝曰臣作朕股肱耳目予欲左右有民汝翼予欲宣力四方汝為予欲觀古人之象日月星辰山龍華蟲作㑹宗彛藻火粉米黼黻絺繡以五采彰施于五色作服汝明予欲聞六律五聲八音在治忽以出納五言汝聽予違汝弼汝無面從退有後言欽四鄰王氏曰自臣作朕股肱耳目至否則威之帝責任于禹漢孔氏曰言大體若身鄭氏曰股足也肱手也唐孔氏曰帝以禹然己言又曰云云言己動作視聽皆由臣也吳氏曰左右有民為作肱而言宣力四方為作股而言觀古人之象為作目而言聞五聲八音為作耳而言推此四者則亦無所不頼之矣髙宗之命𫝊說蓋出于此漢孔氏曰左右助也助我所有之民富而敎之汝翼成我吕氏曰予欲左右扶持其民翼而左右者汝也林氏曰左右即孟子所謂勞之來之匡之直之輔之翼之使自得之又從而振徳之之意陳氏曰翼如鳥翼輔而起之之謂翼即左右之也漢孔氏曰布力立治之功汝當為之林氏曰宣力即所謂陳力蓋陳力就列臣之職也吕氏曰予欲宣康濟之力而及于四方為其事者汝也漢孔氏曰欲觀示法象之服制日月星為三辰革蟲雉也㑹五采藻水草有文者火為火字黼若斧形黻為两巳相背五色備曰繡天子服日月而下諸侯自龍衮而下至黻黻士服藻火大夫加粉米上得兼下下不得僭上以五采明施于五色作尊卑之服汝明制之唐孔氏曰左傳云三辰旂旗昭其明也三辰日月星也日月合宿之辰非有形容可畫也鄭𤣥謂宗弇宗廟之鬰鬯樽也虞夏以上蓋取虎彛蜼彛而已粉米白米也考工記云白與黒謂之黼盖半白半黒似斧刃白而身黒考工記云黒與青謂之黻刺繡為两巳字以青黒線繡也又曰鄭𤣥云㑹續為繪日月星山龍華蟲六者畫以作繪施于衣絺續為黹黹紩也宗彛藻火粉米黼黻六者紩以為繡施于裳蔡氏曰易言黄帝堯舜垂衣裳而天下治盖取諸乾坤則上衣下裳之制創自黄帝而成于堯舜日月星辰取其照臨山取其鎮龍取其變華蟲取其文宗彛取其孝藻取其潔火取其明粉米取其養黼耴其斷黻取其辨陳氏曰采華采之物也藍之采青砂之采赤五采五種之采藍砂粉墨之類彰施施其采而彰之也五色青赤白黒黄也又曰周禮司服云公自衮冕而下如王之服侯伯自鷩冕而下如公之服子男自毳冕而下如侯伯之服孤自希冕而下如子男之服卿大夫自𤣥冕而下如孤之服鄭氏註古天子冕服十二章至周以日月星辰畫於旌旗而冕服九章登龍於山登火于宗彛一龍二山三革蟲四火五宗彛皆畫以為繢六藻七粉米八黼九黻皆希以為繡則衮之衣五章裳四章凡九鷩冕以雉謂華蟲其衣三章裳四章凡七毳畫虎蜼謂宗彛其衣三章裳二章凡五希刺粉米無畫其衣一章裳二章凡三𤣥者衣無文裳刺黻而已凡冕服皆𤣥衣纁裳虞制雖未必盡同大畧當然漢孔氏曰言欲以六律和聲音在察天下治理及忽亂者又以出納仁義禮智信五徳之言施于民以成化汝當審聽之唐孔氏曰六律六吕當有十二惟言六律者鄭𤣥云舉陽隂從可知也蔡氏曰忽治之反也蘇氏曰以樂之聲音察世之治否若其音安樂和乎則皆政修理若其音怨怒乖離則時政怠惰葉氏曰五言即五聲也詩言志歌永言聲依永律和聲雖言也播于律之所和則為五聲雖聲也本于詩之所諷則為五言林氏曰出五言者為之詩歌播於聲音宣之于下若關睢葛覃之類用之鄉人用之邦國也納五言者謂下之言播于詩歌者以達於上若太師陳詩賦以觀民風也按漢志引書曰予欲聞六律五聲八音七始咏以出内五言伏生大傳亦作定以六律五聲八音七始所謂七始者或曰七音或曰七聲或曰七均盖宫商角徵羽及變宫變徵也西山蔡氏云宫與商商與角徴與羽相去皆一律角與徴羽與宫相去獨二律一律則近而和二律則逺而不相及故宫羽之間有變宫角徴之間有變徴此亦出于自然也然五聲者正聲故以起調畢曲為諸聲之綱至二變則宫不成宫徵不成徴不比于正聲但可以濟五聲之不及而已然有五聲而無二變亦不可為樂也前舜典已載五聲之位所謂變宫變徵亦以隔八相生假如子黄鍾為宫未林鍾為徴寅太蔟為商酉南吕為羽辰姑洗為角此正聲五也又加以夾位應鍾在宫羽之間為變宫午位蕤賔在角徴之間為變徴此變聲二也諸律倣此虞書雖無七始二字而參之他書固有此理杜氏通典註又謂殷以前但有五聲自周以來加文武二聲謂之七聲未詳二聲的起何代姑識其說漢志咏以出内五言尤明漢孔氏曰我違道汝當以義輔正我無得面從我違而退後有言我不可弼吕氏曰股肱耳目之外又以一身是非之責盡付于禹也古者君臣之義委任之至如此舜之為君非有所慊而畏人之後言非容受有所木盡而致人之後言虞廷之臣又非肯欺其君而為面是肯非之行者聖人敬畏無己虚懐待諫惟恐過之不聞言之不盡故其求之切也如此漢孔氏曰四近前後左右之臣勑使敬其職伏生大傳曰古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼天子有問無對責之疑可志而不志責之丞可正而不正責之輔可揚而不揚責之弼其爵視卿其祿視次國之君又曰其為人也仁好學而多闈道順天子疑而問焉則未嘗有過而疑者謂之疑疑者疑于天子者也故其位在前其為人也彊立而敢斷廣心而從欲輔善而義者謂之輔輔者輔于天子者也故其位在左其為人也亷潔而切直弼過而諫邪者謂之弼弼者弼于天子者也故其位在右其為人也多聞而齊給便利而不超善應顧問而不囬者謂之丞丞者丞于天子者也故其位在後天子中立而聽朝則四聖維之是以慮無失計舉無過事不得為非也林氏曰欽四鄰者言汝當敬汝左右前後所與比肩以事上者也庶頑讒說若不在時侯以明之撻以記之書用識哉欲並生哉工以納言時而颺之格則承之庸之否則威之漢孔氏曰衆頑愚讒說之人若所行不在于是而為非者當察之蔡氏曰讒說即舜所堲者漢孔氏曰當行射侯之禮以明善惡之教笞撻不是者使記識其過唐孔氏曰古之射侯無以言之周禮司裘云王大射則供虎侯熊侯豹侯設其鵠諸侯則供熊侯豹侯卿大夫則供麋侯皆設其鵠若天子以下之燕射鄉射記云天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕熊侯以下同五十弓即侯身髙一丈君臣共射之蔡氏曰撻扑也即扑作教刑者按此化庶頑以射侯之禮者與王制待不帥教之人元日習射上功習鄉上齒之意同盖古人鄉射其中包涵教人意思最為深逺又鄉射禮司射搢扑即撻以記之之意侯明撻記文脉相聫不可析為二句解漢孔氏曰書識其非欲使改悔與共並生蔡氏曰識誌也錄其過惡以誌於冊如周禮鄉黨之官以時書民之孝弟睦婣有學者也張氏曰人之生也直罔之生也幸而免頑讒之人有死之道其生也幸免而已謂之並生者使之為善有可生之道也漢孔氏曰工樂官掌誦詩以納諫當是正其義而颺導之唐孔氏曰工周禮大師瞽朦之類是也陳氏曰颺播揚之也使樂官以所誦納之詩歌時時諷颺而感動之使興于善蓋以樂教也漢孔氏曰天下人能至于道則承用之任以官不從教則以刑威之蘇氏曰論語云有恥且格格謂改過陳氏曰承尊顯之庸官使之否不格者蘇氏曰威如屏之僰之寄之之類林氏曰庶頑讒說雖甚可惡能化之未必不為善苟棄之則亦以不肖之心應之矣邵子云堯舜之世非無小人難乎為小人也謂待之盡道亦變為君子此所以比屋可封也又曰此龍之職其畧見於舜典其詳見于此命禹緫其事也禹曰俞哉帝光天之下至于海隅蒼生萬邦黎獻共惟帝臣惟帝時舉敷納以言明庶以功車服以庸誰敢不譲敢不敬應帝不時敷同日奏罔功王氏曰自俞哉至帝其念哉禹歸重于帝漢孔氏曰光天之下至于海隅蒼蒼然生草木言所及廣逺蘇氏曰春秋傳太子欲殺渾良夫靈公曰諾哉諾哉者口諾而心不然也俞哉者亦有味其言矣其心猶有所不可也蔡氏曰禹雖俞帝之言而有未盡然之意謂庶頑讒說加之以威不若明之以徳林氏曰海隅四海之隅也張氏曰堯典言光被四表言堯徳之光也此言光天之下言舜徳之光也逺至海隅微至蒼生無不在光輝中漢孔氏曰獻賢也萬國衆賢共為帝臣帝舉是而用之使陳布其言明之皆以功大小為差以車服旌其能用之孫氏曰黎首之民謂之黎民賢于黎民謂之黎獻唐孔氏曰舜典云敷奏以言明試以功奏試二字與此異者彼言施于諸侯其人見為國君故令奏言試功此謂方始擢用故言納庶納謂受取之庶謂在羣衆漢孔氏曰上惟賢是用則下皆敬應上命而譲善蕭氏曰賢否明則人安分而無兢心是以譲名器不瀆則人不敢慢是以敬應漢孔氏曰帝用臣不是則逺近布回而日進於無功以賢愚並位優劣共流故孫氏曰敷同猶晋同也無若丹朱傲惟慢遊是好傲虐是作罔晝夜頟頟罔水行舟朋滛于家用殄厥世予創若時娶于塗山辛壬癸甲啓􅈱􅈱而泣予弗子惟荒度土功弼成五服至于五千州十有二師外薄四海咸建五長各迪有功苖頑弗即工帝其念哉漢孔氏曰丹朱堯子舉以戒之唐孔氏曰朱處丹淵為諸侯丹國朱名也真氏曰丹朱之惡禹獨以傲斷之傲者衆慝之源也張氏曰慢不恭也遊不勤也漢孔氏曰傲戯而為虐無晝夜常雒雒肆惡無休息張氏曰傲侮人也虐害人也凶人為不善亦惟日不足罔晝夜雒雒則其不舍晝夜可知矣漢孔氏曰朋羣也丹朱習于無水陸地行舟言無度羣滛于家妻妾亂用是絶其世不得嗣蔡氏曰堯以天下與舜而不與朱故曰殄世程子曰舜之不為此雖至愚者亦知之豈禹而不知乎葢處崇髙之位儆戒之道不得不如是也漢孔氏曰創懲也塗山國名懲丹朱之惡辛日娶妻至于甲曰復徃冶水不以私害公吕氏曰創者見惡而為善之力也林氏曰丹朱之惡起於慢遊故已懲創不敢不黽勉以赴事功唐孔氏曰左傳云禹㑹諸侯於塗山杜預謂塗山在壽春縣東北塗山之國蓋近彼山漢孔氏曰啓禹子也禹治水過門不入聞啓泣聲不暇子名之以大治度水土之功故蔡氏曰􅈱􅈱泣聲也荒大也陳氏曰度相度也林氏曰自古未有沉溺乎妻子之愛而能成大功立大事者真氏曰朱惟驕怠是以逞欲禹惟敬戒是以忘私漢孔氏曰五服甸侯綏要荒服也服五百里四方相距為方五千里治洪水輔成之張氏曰當堯之時固有其制横流之後亂而難治壊而未修禹於是奠其封域為之疆理所以弼成之也唐孔氏曰鄭𤣥云九州州立十二人為諸侯師以佐牧陳氏曰州十有二師即十二州收也以其養民故言牧以其為一州之師帥故言師漢孔氏曰薄廹也言至海諸侯五國立賢者一人為方伯謂之五長以相統治以奨帝室唐孔氏曰薄者逼近之義言從京師而至于四海也王制謂五國以為屬屬有長此建五長亦如被文陳氏曰建立也咸建謂内外皆建五長特諸州之外無師耳新安王氏曰舜之五服甸侯綏在九州内要荒在九州外成周九服侯甸男衆衛要在九州内夷鎮蕃在九州外九州之内有師有長其治詳九州之外薄于四海有長無師畧之也漢孔氏曰九州五長各蹈為有功惟三苖頑凶不得就官善惡分别蔡氏曰即就也林氏曰帝當以三苖為念而憂勤于政事不可有一日之慢逰也按前章帝責治于禹者由相臣為之緫合四鄰為之助而雖庶頑讒說亦期使薫陶於政教禮樂之中此章禹論治于舜者又謂由帝徳為之倡合萬邦黎獻薄海内外為之應而雖頑如有苖亦不使自棄于事業功庸之㑹如此乃為聖治大包天下之氣象帝曰迪朕徳時乃功惟敘臯陶方祗厥敘方施象刑惟明鄭氏曰此歸美于二臣漢孔氏曰言天下蹈行我徳是汝治水之功有次序夏氏曰即所謂九功惟敘也漢孔氏曰禹五服既成故臯陶敬行其九徳考績之次序於四方又施其法刑皆明白夏氏曰禹言苖頑弗即工欲帝念之故帝言我命臯陶敬承汝功之有次序者而用刑以防之正如前九功惟敘之後董之用威俾勿壊也陳氏曰象刑即象以典刑明刑說見禹謨夔曰夏擊鳴球搏拊琴瑟以詠祖考來格虞賔在位羣后徳譲下管鼗鼓合止柷敔笙鏞以閒鳥獸蹌蹌簫韶九成鳯皇來儀夔曰於子擊石拊石百獸率舞庶尹允諧林氏曰此節夔言作樂之效漢孔氏曰戛擊柷敔所以作止樂搏拊以韋為之寔之以糠所以節樂球玉磬此舜廟堂之樂民恱其化神歆其祀禮備樂和故以祖考來至明之丹本為王者後故稱賔言與諸侯助祭班爵同推先有徳蔡氏曰戛擊考擊也陳氏曰球擊能鳴故稱鳴球新安王氏曰八音以石為君故韶以球為首林氏曰楊雄長楊賦云戛滳鳴球劉良註謂球樂器也戛滳拊擊也是鳴球可以戛擊也新安王氏曰搏猶擊也拊輕手取聲也瑟琴屬爾雅䟽曰琴長三尺六寸六分五絃後加文武二絃大瑟長八尺一寸廣一尺八寸二十七絃雅瑟長八尺一寸廣一尺八寸二十三絃常用者十九絃頌瑟長七尺二寸廣一尺八寸二十五絃盡用之林氏曰古語云拊鳴琴又云手撫五絃是琴瑟可以搏拊也蔡氏曰樂之始作升歌于堂上則堂上之樂惟取其聲之輕清者與人聲相比故曰以詠盖戛擊鳴球搏拊琴瑟以合詠歌之聲也林氏曰來格者非謂有神靈光景接于人也祭義云其入室也僾然如見乎其位周旋出户肅然如聞容聲出户而聽愾然如聞其嘆息之聲是為來格薛氏曰朝廷之官謂之后三后成功是也有邦諸侯亦謂之后羣后四朝是也唐孔氏曰王者之後尊于羣后故殊言在位羣后亦在位也後言徳譲丹朱亦以徳讓也漢孔氏曰堂下樂也鏞大鐘間迭也吹笙擊鐘鳥獸化徳相率而舞蹌蹌然爾雅䟽曰管長尺圍寸併漆之有底賈氏以為如箎六孔蔡氏曰如周禮所謂隂竹之管絲竹之管孤竹之管也唐孔氏詩䟽曰鼗小鼓持其柄揺之傍耳還自擊又曰合樂用柷止樂用敔郭璞云柷如漆桶方二尺四寸深一尺八寸中有椎柄連底撞之令左右擊敔如伏虎背上有二十七鉏鋙刻以木長一尺擽之爾雅註曰笙列管匏中施簧管端大者十九簧小者十三簧葉氏曰鐘與笙相應者曰笙鐘與歌相應者曰頌鐘大射禮樂人宿縣于阼階東笙磬西面其南笙鍾西階之西頌磬東面其南頌鐘頌鐘即鏞鐘詩云賁鼓維鏞新安王氏曰凡樂以人聲為主歌于堂上者曰登歌歌于堂下首曰問歌以詠堂上之登歌也以間堂下之間歌也林氏曰以詠以間相對而言盖與詠歌迭奏也鄉飲酒禮云歌鹿鳴笙南陜間歌魚麗笙由庚或其遺制唐陸氏曰蹌舞貎漢孔氏曰韶舜樂名言簫見細器之備雄曰鳯雌曰皇靈鳥也儀有容儀備樂九奏而致鳯皇則餘鳥獸不待九而率舞爾雅註簫大者編二十三管長尺四寸小十六管長尺二寸林氏曰古文尚書簫字作箾舞者所執之物說文于簫字註云參差管於箾字註云舜樂名箾簫音同義異季札觀樂見舞韶箾者其字作箾是知箾韶舜樂之總名也今文作簫故諸儒以為簫管此皆曲說簫韶九成論其舞也舜冶功見于九功惟敘故樂以九為節歌于堂上者九徳之歌舜于堂下者九㲈之舞亦猶武王之功成於六故樂以六為節也唐孔氏曰成謂樂曲成也鄭云成猶終也每曲一終必變更奏故言九成文中子曰夫樂象成者也象成莫大于形而流於聲故韶之成也虞氏之恩被動植矣烏鵲之巢可俯而窺也鳯皇何為而藏乎唐孔氏曰樂之作也上下迭奏間合而後曲成神物之來上下共致非堂上堂下别有所感以祖考尊神故配堂上之樂鳥獸賤物故配堂下之樂非堂上之樂獨致神來堂下之樂偏令獸舞也夔曰於予擊石拊石百獸率舞說見舜典漢孔氏曰尹正也衆正官之長信皆諧和陳氏曰石與球皆磬也蔡氏曰玉振之也者終條理之事故舉磬以終焉上言鳥獸此言百獸者考工記云天下大獸五脂者膏者臝者羽者鱗者羽鱗總可謂之獸也薛氏曰百官之長謂之尹百僚庶尹是也有邦諸侯亦謂之尹尹兹東郊是也孫氏曰上先言神人而及鳥獸以先後為序此先言百獸而及庶尹以難易為序也程子曰記云後世有作者虞帝弗可及矣如百獸舞鳯皇儀三代以降無此也張子曰觀虞書禮樂大備左氏傳吳公子札聘魯請觀周樂見舞韶箾者曰徳至矣哉大矣如天之無不燾也如地之無不載也雖甚盛徳其蔑以加于此矣朱子曰有舜與文王之徳則聲為律而身為度簫韶二南之詩不患其不作按虞書言樂至是為備然須考論韶樂根抵處朱子謂徳惟善政至九敘惟歌此韶樂九章蓋當九功告成之後徳澤滿天地和聲溢宇宙故𤼵為韶之盡善盡美如此帝庸作歌曰勑天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉臯陶拜手稽首颺言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉帝拜曰俞徃欽哉林氏曰史又載舜臯賡歌之辭漢孔氏曰作歌以成之說己見臯陶謨吕氏曰天命流行内而起居寢處外而天下萬事無非天命必有以勑之時者時時勑之幾又時之微也頃刻之際幾微之中一亳不勑則私欲間之矣大抵天命流行而不息聖心亦流行而不息此舜居太平極治之心蔡氏曰天命無常理亂安危相為倚伏今雖治定功成禮備樂和然頃刻謹畏之不存則怠荒之所自起毫髪幾徽之不察則禍患之所自生不可不成也孫氏曰此歌引也按吕氏說天命固精然書中率以難諶靡常之命為言二說當兼取漢孔氏曰元首君也股肱之臣喜樂盡忠君之治功乃起百官之業乃廣吕氏曰乃歌曰云云言勑天命者當如此陳氏曰喜喜樂也起作興也漢孔氏曰大言而疾曰颺承歌以戒帝林氏曰首至手曰拜手首至地曰稽首李氏曰念哉者常念其敬勑之意也漢孔氏曰憲法也天子率臣下為起治之事當慎汝法度敬其職蔡氏曰率總率也吕氏曰興者奮勵之謂漢孔氏曰屢數也當数顧省汝成功敬修以善無懈怠范氏曰省察也吕氏曰治雖成時時省之蓋日中則昃月盈則虧當既濟太平之時省察之功不可歇也徐氏曰臯陶特曰念哉两曰欽哉盖欲操存於念而始終乎敬也孫氏曰此歌引也漢孔氏曰賡續載成也帝歌歸美股肱義未足故續歌先君後臣衆事乃安以成其義陳氏曰明良乃君道臣道之本體良善也漢孔氏曰叢脞細碎無大畧君如此則臣懈惰萬事墮廢其功不成蔡氏曰惰懈怠墮傾圯也范氏曰君以知人為明臣以任職為良君知人則賢者得行其所學臣任職則不賢者不得茍容于朝此庶事所以康也若夫君行臣職則叢脞矣臣不任君之事則惰矣此萬事所以墮也王氏曰前言庶事後曰萬事甚言叢脞惰之廢事也按帝歌勅天時幾而臯陶颺言𤼵明其旨曰念曰欽曰慎曰省皆敬勅意喜起之歌言夫淬厲此者精神奮事業昌也明良之歌言夫審繹此者見趣融事理當也􅓜脞惰墮之歌又言夫玩忽此者精神見趣消鑠殆盡上靡弊下怠荒事亦從而墮廢也舊說全章不歸宿於勅天時幾二句又或謂帝歌主于有為賡歌主于無為若有救偏之意亦未得其旨君緫說作歌賡歌意真氏曰舜歌本為勅天而作臣唱和乃無一語及天者修人事所以勅天命也吕氏曰是歌三百篇之祖也治定作歌宜其𤼵揚蹈厲而云勅天之命至樂乃在儆成之中臯陶聞之颺言大呼亦宜鋪張治功而不出于規矩凖繩之内此所以見情性之正漢孔氏曰拜受其歌戒羣臣自今以徃敬其職事哉吕氏曰古者君臣席地而坐一言之間可為帝者師以師禮拜而俞之觀徃欽哉一語所謂堯舜雖沒千百年其心至今猶在也陳氏曰典謨之書皆以欽終之緫說虞書意陳氏曰二典載其君之始末三謨乃錄其君臣平生嘉言善政非盡出一時之詞然史所編次脉絡相貫未嘗無意袁氏曰典謨靡不畢具皆可為萬世法尚書纂傳卷三下
