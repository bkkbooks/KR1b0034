body:
  text: 尚書纂傳卷十九上元王天與撰泰誓上第一周書蔡氏曰周文王國號武王因以為有天下之號唐陸氏曰凡四十一篇九篇亡惟十有一年武王伐殷一月戊午師渡孟津作泰誓三篇漢孔氏曰周自虞芮質厥成諸侯並附以為受命之年至九年而文王卒武王三年服畢觀兵孟津以卜諸侯伐紂之心諸侯僉同乃退以示弱十三年正月二十八日更與諸侯期而共伐紂林氏曰武王名發漢律歴志曰三統伐紂之嵗嵗在鶉火張十三度文王受命九年而崩再期在大祥而伐紂故書序曰惟十有一年武王伐殷還歸二年乃遂伐殷克紂十三年也自文王受命至此十三年嵗亦在鶉火唐歴志曰國語云武王伐商嵗在鶉火月在天駟日在祈木之津辰在斗柄星在天黿舊説嵗在己卯推其朏魄乃文王崩武王成君之嵗也竹書十一年庚寅周始伐商而三統歴以己卯為克商之嵗非也歐陽子曰泰誓稱十有一年説者謂自文王受命九年及武王居喪二年併數之耳此妄説也或謂武王畢喪伐紂而泰誓曷為稱十有一年曰畢喪伐紂出于諸家之小説非泰誓正經之明文也十有一年武王即位之十有一年耳唐孔氏曰不言正月而言一月者以武成經言一月故此序同之武成所以稱一月者武王以殷之十二月發行正月四日殺紂既入商郊始改正朔以殷之正月為周之二月其初發時猶是殷之十二月未為周之正月改正在後不可追名為正月以其實是周之一月故史以一月名之顧氏謂古史質或云正月或云一月不與春秋正月同義或然也孟津説見禹貢龜山楊氏曰武王伐紂為時中唐孔氏曰史叙其事作泰誓三篇林氏曰上篇是在河南將渡孟津時作誓而後渡河也中篇是戊午日既渡而次舍於河北次訖又誓也下篇是戊午明日將趨商郊誓而後行也泰誓漢孔氏曰大會以誓衆唐孔氏曰經云大會于孟津故稱泰誓林氏曰孟子左傳國語舉此或作泰或作大以其字通用林氏曰伏生書未有泰誓至孔安國定壁中書泰誓始出然遭巫蠱事未列學官遂有張霸偽為泰誓與伏生書並傳故篇内所載觀兵孟津白魚入于王舟有火復于王屋流為烏等語太史公皆載之不疑至後漢馬融始疑之謂其文淺露吾見書傳多矣所引泰誓而不在泰誓者甚多然融雖疑之而古文泰誓猶未出至晉世古文書始出諸儒以泰誓正經比較國語左傳荀孟諸書皆合而偽泰誓始廢云蔡氏曰今文無古文有惟十有三年春大㑹于孟津漢孔氏曰此周之孟春林氏曰洪範云十有三祀王訪于箕子而史記謂武王克商二年問箕子以天道洪範既為十三年則伐商為十一年明矣葢經文一字誤作三字也唐孔氏曰序言一月則此春是周之孟春謂建子之月也蔡氏曰春者孟春建寅之月也按朱子云以伊訓元祀十有二月觀之則商人但以建丑之月為嵗首而不改月號時亦必不改也以孟子七八月十一月十二月之説考之則周人以建子之月為正月而不改時改月者後王之彌文不改時者天時不可改故祭祀田獵猶以夏時為正以書一月戊午厥四月哉生明考之則古史例不書時今詳周禮與詩其不改月時並有明証惟此所書春大㑹孟津即一月戊午師渡孟津之㑹考之漢唐志實為建子之月與夫春秋傳日南至之云豈惟改月乃併時改之然則改者意時正以是新時人之耳目而不改者乃其理之一定故朱子又謂或是當時二者並行惟人所用此説為得之唐孔氏曰三篇俱是大告諸國之君而發首異者此因大會誓衆故言大㑹于孟津中篇徇師而誓故言以師畢會下篇王更徇師故言大巡六師皆史官觀事而為作端緒耳王曰嗟我友邦冢君越我御事庶士明聽誓惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母林氏曰此武王先言天地生民立君之意王曰説見湯誓嗟説見甘誓漢孔氏曰同志為友言志同滅紂友諸侯親之稱大君尊之下及我治事衆士大小無不皆明聽誓漢孔氏曰生之謂父母靈神也天地所生惟人為貴人誠聰明則為大君而為衆民父母朱子曰天地之大無不生育固為萬物之父母矣人於其間獨得其氣之正而能保其性之全故為萬物之靈若元后則於人類之中又得其正氣之盛而能保其全性之尤者是以能極天下之聰明而出乎人類之上以覆冒而子育之所謂作民父母也然自古聖賢惟堯舜生知安行為能履此位當此責而無愧若湯武聰明之質固不如堯舜之全矣惟能學知利行是以能復其聰明之全體亦造夫堯舜之域以為億兆之父母葢其生質雖不及而反之之至則未嘗不同也吕氏曰此雖一時誓師之辭乃六經之統轄百王之標凖今商王受弗敬上天降災下民沈湎冒色敢行暴虐罪人以族官人以世惟宫室臺榭陂池侈服以殘害于爾萬姓焚炙忠良刳剔孕婦皇天震怒命我文考肅將天威大勲未集肆子小子發以爾友邦冢君觀政于商惟受罔有悛心乃夷居弗事上帝神祇遺厥先宗廟弗祀犧牲粢盛既于凶盜乃曰吾有民有命罔懲其侮林氏曰此言紂不能作民父母之事吕氏曰推原紂惡之本也紂惡本於不敬上不知有天下豈知有民故降災虐而不恤也漢孔氏曰沈湎嗜酒冒亂女色敢行酷暴虐殺無辜唐孔氏曰冒貪也吕氏曰敢者果敢之謂行之愈力無所忌憚也漢孔氏曰一人有罪刑及父母兄弟妻子言淫濫官人不以賢才而以父兄所以亂政蘇氏曰孥戮湯事也而罪人以族則為紂罪賞延于世舜德也而官人以世則為紂惡者湯之孥戮徒言之而不用舜之賞延非官人也漢孔氏曰土高曰臺有木曰榭澤障曰陂停水曰池侈謂服飾過制言匱民財力為奢麗宫室説見伊訓唐孔氏曰李巡云臺積士為之所以觀望也臺上有屋謂之榭又云無室曰榭四方而高曰臺孫炎云榭但有堂也郭璞云榭即今之堂堭也然則榭是臺上之屋歇前無室今之㕔是也蔡氏曰殘傷也漢孔氏曰忠良無罪焚炙之懐子之婦刳剔視之唐孔氏曰焚炙俱燒也刳剔割剝也殷木紀云紂時諸侯或叛妲己以為罰輕紂欲重刑乃為熨斗以火燒之然使人舉輒爛其手不能勝紂怒乃更為銅柱以膏塗之亦加於炭火之上使有罪者緣之足滑跌墜入中紂與妲己以為大樂名曰炮烙之刑是紂焚炙之事也皇甫謐曰紂剖比干妻以視其胎即引此為刳剔孕婦也漢孔氏曰言天怒紂之惡命文王敬行天罰功業未成而崩朱子曰文武無伐紂之心而天與之人歸之勢必誅紂而後已故有肅將天威大勲未集之語但紂罪未盈天命未絶故文王猶得以服事殷使文王未崩紂惡不悛天命已絶則孟津之事文王豈得辭哉以此見文王之心未嘗不同皆無私意視天與人而已漢孔氏曰功業未就之故故我與諸侯觀紂政之善惡謂十一年自孟津還時程子曰此事間不容髪一日而命未絶則是君臣當日而命絶則為獨夫豈有觀兵二年而始伐之哉朱子曰伊川謂無觀兵之事非深見文武之心不能及此非為存名教而發也武王之伐紂觀政于商亦豈有取之之心而紂罔有悛心武王灼見天命人心之歸已也不得不順而應之漢孔氏曰悛改也言紂縱惡無改心平居無故廢天地百神宗廟之祀慢之甚林氏曰夷居與原壤夷俟之夷同葢倨肆而無禮也漢孔氏曰凶人盡盜食之而紂不罪犧牲說見微子唐陸氏曰黍稷曰粢在器曰盛林氏曰如春秋所書鼷鼠食郊牛角御廩災之類所謂既于凶如公索氏將祭而亡其牲所謂既于盜漢孔氏曰紂言吾所以有兆民有天命故羣臣畏罪不争無能止其慢心陳氏曰紂方且曰吾有民有命不能懲止其悔慢然紂所謂有民徒見林林之衆耳不知民心已離所謂有命徒見身居人上耳不知天命已絶天佑下民作之君作之師惟其克相上帝寵綏四方有罪無罪予曷敢有越厥志同力度德同德度義受有臣億萬惟億萬心予有臣三千惟一心商罪貫盈天命誅之予弗順天厥罪惟鈞予小子夙夜祗懼受命文考類于上帝宜于冢土以爾有衆底天之罰天矜于民民之所欲天必從之爾尚弼予一人永清四海時哉弗可失林氏曰此皆武王自任之辭漢孔氏曰言天佑助下民為立君以政之為立師以教之當能助天寵安天下朱子曰天之生民立君師以作成之撫養教導使無一夫不遂其性故謂之克相上帝葢助上帝之不及秦漢以來世主不知明德新民之事君道間得其一二而師道絶無矣胡氏曰天生斯民立之司牧而寄以三事然自三代以下能舉此職者百無一二漢之文明唐之太宗亦云庶且富矣西京之教無聞焉明帝尊師重傅臨雍拜老宗戚子弟莫不受學唐太宗大召名儒増廣生員教亦至矣然未知所以教也漢孔氏曰越逺也言已志欲為民除惡是與否不敢逺其志張氏曰知武王者以為體天救民是武王無罪也罪武王者以為以臣伐君是武王有罪也武王志在救民不以有罪無罪二其心惟救民之志不逾也漢孔氏曰力鈞則有德者勝德鈞則秉義者彊揆度優劣勝負可見蔡氏曰度量度也二語疑古者兵志之辭吕氏曰事不過公私兩端計較利害者私也稱量徳義者公也漢孔氏曰十千為萬十萬為億人執異心不和諧三千一心言同欲漢孔氏曰紂之為惡一以貫之惡貫己滿天畢其命今不誅紂則為逆天與紂同罪蔡氏曰貫通盈滿也鄭氏曰鈞與均同平也真氏曰常固正也變而不失其正是亦常而己矣湯武所處乃君臣之變也桀紂之暴使非湯武出而征之則生民之類將靡滅而後已又豈湯武之心哉故湯曰予畏上帝不敢不正武王曰予不順天厥罪惟鈞漢孔氏曰祭社曰宜冢上社也言我畏天之威告文王廟以事類告天祭社用汝衆致天罰于紂唐孔氏曰冢土大社也王制云天子將出類于上帝冝于社造于禰此受命文考即是造于禰王制以神尊卑為次故先言帝社後言禰此以廟是己親故先言受命文考後言類于上帝類說見舜典漢孔氏曰矜憐也言天除惡樹善與民同吕氏曰此見天之與民甚親仲舒所謂天人之際也漢孔氏曰穢惡除則四海長清陳氏曰武王伐紂不崇朝而會朝清明葢汰其濁則清者自見漢孔氏曰言今我伐紂正是天人合同之時不可違失吕氏曰此正勅天之命惟時惟幾之意非後世所謂乗機會赴事功之比也禮運曰堯授舜舜授禹湯放桀武王伐紂時也尚書纂傳卷十九上欽定四庫全書尚書纂傳卷十九中元王天與撰泰誓中第二周書惟戊午王次于河朔羣后以師畢會王乃徇師而誓唐孔氏叙章指見上篇漢孔氏曰次止也戊午渡河而誓既誓而止于河之北唐孔氏曰左傳凡師一宿為舎再宿為信過信為次此次直取止舎之義非春秋三日之例也漢孔氏曰諸侯盡㑹次也鄭氏曰畢盡也漢孔氏曰徇循也曰嗚呼西土有衆咸聽朕言我聞吉人為善惟日不足凶人為不善亦惟日不足今商王受力行無度播棄犂老昵比罪人淫酗肆虐臣下化之朋家作仇脅權相滅無辜籲天穢徳彰聞張氏曰此武王先言紂之罪漢孔氏曰武王在西故稱西土葉氏曰前篇師大㑹而槩誓之此與後二篇獨言西土有衆君子者葢紂都東北民被其惡者深不待累告而知其可伐西土漸文王之徳被其毒者淺猶恐未知伐事如亳民之以湯為不卹我故申告其衆又告其君子漢孔氏曰言吉人竭日以為善凶人亦竭日以行惡吕氏曰人心本無息如天行健在人用之何如耳吉人用于為善固思日孜孜凶人賊其良心善端幾熄然猶孳孳為利葢此心本未嘗息人自錯用之耳蔡氏曰將言紂力行無度故以古人語𤼵之漢孔氏曰行無法度竭日不足故曰力行張氏曰此句總衆惡而言其下皆無度之事漢孔氏曰鮐背之耇稱犂老布棄不禮敬昵近罪人謂天下逋逃之小人蔡氏曰播放犂黧通黒而黄也張氏曰先王養老乞言國君不近刑人紂皆反此漢孔氏曰過酗縱虐以湎成惡臣下化之言罪同吕氏曰人之陷於惡茍善端猶存則惡力尚淺不至於肆至於私欲叢長若火燎原則肆而莫知所止君者民之樞紐君然則臣下化之必矣漢孔氏曰臣下朋黨自為仇怨脅上權命以相誅滅民皆呼天告寃無辜紂之穢德彰聞天地言罪惡深林氏曰權權勢也吕氏曰君子以道義相期越宇宙而同心小人徇私一為朋羣則相妬害唐李林甫楊國忠以利相朋亦以利相傾其禍卒至於社稷傾覆生靈塗炭大抵為善為惡皆有熟時為善熟時則至治馨香為惡熟時則穢徳彰聞惟天惠民惟辟奉天有夏桀弗克若天流毒下國天乃佑命成湯降黜夏命惟受罪浮于桀剥䘮元良賊虐諫輔謂已有天命謂敬不足行謂祭無益謂暴無傷厥監惟不逺在彼夏王張氏曰此再引桀以言紂之罪漢孔氏曰言君天下者當奉天以愛民吕氏曰此兩句須看惟字天所以立君之意只在民上漢孔氏曰桀不能順天流毒虐於下國萬民言凶害王氏曰弗克若天非所謂奉天流毒下國非所謂惠民漢孔氏曰言天助湯命使下退桀命唐孔氏曰桀罪已大紂又過之言紂惡之甚故下句說其浮桀之狀漢孔氏曰剥傷害也蘇氏曰剝落也䘮去也古者謂去國為喪元良微子也微子紂同母兄而謂之庶子不得立者生於帝乙即位前也以禮言之當與紂俱為嫡子而微子為長故成王命之曰殷王元子唐孔氏曰諫輔即比干也上篇言焚炙忠良與此經相類而復言此者以殺害人為惡之大故重陳之漢孔氏曰言紂所以罪過於桀張氏曰謂已有天命故曰我生不有命在天謂敬不足行故荒怠弗敬謂祭無益故弗祀上帝神祇遺厥先宗廟弗祀謂暴無傷故作威殺戮毒痡四海海孔氏曰其視紂罪與桀同辜言必誅之天其以予乂民朕夢協朕卜襲于休祥戎商必克受有億兆夷人離心離德予有亂臣十人同心同德雖有周親不如仁人天視自我民視天聽自我民聽百姓有過在予一人今朕必往我武惟揚侵于之疆取彼凶殘我伐用張于湯有光張氏曰此武王言必誅紂之意漢孔氏曰用我治民當除惡林氏曰其云者猶盤庚謂天其永我命于兹新邑蓋言之於未然之前辭當如此漢孔氏曰言我夢與卜俱合於美善以兵誅紂必克之占應氏曰夢者心之靈而通乎物卜者物之靈而通乎心皆以無心相為感應而休祥則物之先見而動之微也襲重襲也林氏曰戎商與康誥言殪戎殷同周詩亦言燮伐大商漢孔氏曰平人凡人也雖多而執心用德不同陳氏曰億兆人離心離德則紂為獨夫矣漢孔氏曰我治理之臣雖少而心徳同唐孔氏曰鄭𤣥等皆以十人為文母周公召公太公畢公榮公泰顛閎天散宜生南宫括劉氏曰子無臣母之理蓋武王之后邑姜也九人治外邑姜治内胡氏曰始言三十一心此言十人心德之同蓋賢德之士粹然出於衆人之上德其心之精微者也漢孔氏曰周至也言紂至親雖多不如周家之多仁人陳氏曰仁人即十亂張氏曰亂臣以才言之仁人以德言之漢孔氏曰言天因民以視聽民所惡者天誅之或問天視云云此若有不同如何朱子曰天豈曽有耳目以視聴只是自民之視聴便是天之視聽如帝命文王豈天諄諄然命之只是文王要恁地便是理合恁地便是帝命之也又曰若一件事民人皆以為是便是天以為是若民人皆歸往之便是天命之也又曰此處甚微故其理難看或問天便是理否曰若全做理又如何說自我民視聽這裏有些主宰底意思漢孔氏曰已能無惡于民民之有過在我教不至林氏曰湯誥亦言萬方有罪在予一人湯武蓋以身任天下之責也漢孔氏曰揚舉也言我舉武事侵入紂郊疆伐之唐孔氏曰春秋之例有鐘鼓曰伐無鐘鼓曰侵此實伐也言侵者侵是入之意非如春秋之例無鐘鼓也漢孔氏曰桀流毒天下湯黜其命紂行凶殘之徳我以兵取之伐惡之道張設比于湯又有光明蘇氏曰湯放桀而有慚徳今我亦為之湯不愧矣勖哉夫子罔或無畏寧執非敵百姓懍懍若崩厥角嗚呼乃一德一心立定厥功以克永世吕氏曰此武王激厲軍士之意漢孔氏曰勖勉也夫子謂將士無敢有無畏之心寧執非敵之志伐之則克矣東陽馬氏曰夫子如云丈夫男兒也漢孔氏曰言民懼紂之虐危懼不安若崩摧其角無所容頭唐孔氏曰懍懍怖懼之意以畜獸為喻民之怖懼似畜獸崩摧其頭角然漢孔氏曰汝同心立功則能長世以安民吕氏曰紂之亡惟離心離徳周之興惟同心同徳前既詳言此復提起以勉之尚書纂傳卷十九中欽定四庫全書尚書纂傳卷十九下元王天與撰泰誓下第三周書時厥明王乃大巡六師明誓衆士唐孔氏敘章指見上篇漢孔氏曰是其戊午明日衆士百夫長已上唐孔氏曰上篇未次而誓故略言大㑹中篇既次乃誓為文稍詳故言以師畢會此篇最在其後為文益詳故言大巡六師巡遶周徧大其事故稱大也林氏曰此言六師泛指諸侯之師非謂周於此時已備六師之制也周禮王六軍大國三軍次國二軍小國一軍武王是時尚為諸侯但有三軍之制棫樸之詩美文王之官人而曰周王于邁六師及之此亦指文王出師之時所合諸侯之師也三篇之首史官所叙不同上篇言友邦冡君御事庶士中篇言羣后此篇言衆士但史官變其文耳非謂彼但告諸侯而此但告衆士也王曰嗚呼我西土君子天有顯道厥類惟彰今商王受狎侮五常荒怠弗敬自絶于天結怨于民斮朝渉之脛剖賢人之心作威殺戮毒痡四海崇信姦回放黜師保屏棄典刑囚奴正士郊社不修宗廟不享作竒技淫巧以恱婦人上帝弗順祝降時喪爾其孜孜奉予一人恭行天罰夏氏曰此武王數紂有可誅之罪林氏曰西土君子統上下而言越王勾踐伐吳以其私卒君子六干人為中軍則士卒亦可謂之君子漢孔氏曰言天有明道其義類惟明言王所宜法則鄭氏曰類等類也林氏曰益贊禹曰滿招損謙受益時乃天道湯亦言天道福善禍淫與此言天道意同唐孔氏曰將言商王不法天道故先標二句於前其下乃述商王違天之事漢孔氏曰輕狎五常之敎侮慢不行大為怠惰不敬天地神明吕氏曰五常之理森然在天下當尊之敬之心有度事有經玩心一生則滅天理窮人欲為人所不為矣武王數紂之惡其本原只在狎侮上其下皆為惡之流派太保作旅獒亦諄諄於狎侮則狎侮乃衆惡之源也張氏曰敬者百聖之心法弗敬者萬惡之本源漢孔氏曰不敬天自絶之酷虐民結怨之周氏曰天非絶紂也而紂自絶于天民非怨紂也而紂自結怨于民林氏曰下文皆自絶結怨之實漢孔氏曰冬月見朝渉水者謂其脛耐寒斬而視之比干忠諫謂其心異於人剖而觀之酷虐之甚唐孔氏曰說文云斮斬也朱子曰脛足骨也許氏曰剖破也漢孔氏曰痡病也言害所及逺吕氏曰作者作之有力也漢孔氏曰回邪也姦邪之人反尊信之可法以安者反放退之林氏曰師保謂師保之官漢孔氏曰屏棄常法而不顧箕子正諫而以為囚奴鄭氏曰屏除也唐孔氏曰論語云箕子為之奴是紂囚之又為奴役之漢孔氏曰言紂廢至尊之敬營卑䙝惡事作過制枝巧以恣耳目之欲唐孔氏曰不修謂不掃治也不享謂不祭祀也與上篇不事上帝神祇遺厥先宗廟不祀其事一也重言之耳竒技謂竒異技能淫巧謂過度工巧二者本同但技據人身巧指器物為異耳晉語云殷辛伐有蘇氏有蘇氏以妲己女焉妲己有寵而亡殷殷本紀云紂嬖于婦人愛妲己惟妲己之言是從漢孔氏曰祝斷也天惡紂逆道斷絶其命故下是喪亡之誅漢孔氏曰孜孜勸勉不怠吕氏曰臨事之際初心易失有所畏有所利則至公之心幾於失矣孜孜者承續而不間也恭行夫罰説見甘誓古人有言曰撫我則后虐我則讎獨夫受洪惟作威乃汝世讎樹德務滋除惡務本肆予小子誕以爾衆士殄殱乃讎爾衆士其尚迪果毅以登乃辟功多有厚賞不迪有顯戮夏氏曰此武王激厲衆士之意漢孔氏曰武王述古言以明義吕氏曰天尊地卑君臣定位若撫我者即以為后虐我者即以為讎是君臣反覆手之間可變古人之言何謂也天佑下民作之君撫我者乃為君之職虐我則於君職反矣反乎君職則是讎矣此言以警君非於民之義而發也漢孔氏曰言獨夫失君道也大作威殺無辜乃是汝累世之讎明不可不誅葉氏曰孟子言殘賊之人謂之一夫意葢本此朱子曰四海歸之則為天子天下叛之則為獨夫林氏曰世讎謂與一世之人為讎湯之於葛有匹夫匹婦之讎然且復之況紂為世讎乎漢孔氏曰立德務滋長去惡務除本言紂為天下惡本蔡氏曰此兩句意亦古語漢孔氏曰言欲行除惡之義絶盡紂吕氏曰自古人有言至殄殱乃讎數語辭旨峻厲猶之天地之化隂陽之氣和則翔之以風潤之以雨霏微霡霂而萬物無不遂戾則偃之以烈風轟之以迅霆凌厲震動而萬物無不肅聖人天也漢孔氏曰迪進也殺敵為果致果為毅登成也成汝君之功漢孔氏曰賞以勸之戮以威之王氏曰不迪謂不迪果毅也蔡氏曰厚賞則非特一爵一級而己顯戮則必肆諸市朝以示衆庶張氏曰甘誓用命賞于祖弗用命戮于社與此同意嗚呼惟我文考若日月之照臨光于四方顯于西土惟我有周誕受多方予克受非予武惟朕文考無罪受克予非朕文考有罪惟予小子無良夏氏曰此稱文王盛德以結之漢孔氏曰稱父以感衆也言其明徳充塞四方明著岐周張氏曰易云垂象著明莫大乎日月又云日月相推而明生焉則明莫明於日月文王有明德故以日月之照臨喻之蔡氏曰照臨言輝光也吕氏曰光四方與堯之光宅舜之重華同但文王未嘗中天下而立西土乃文王所治處近而尤顯學者須知光華所自發處漢孔氏曰言文王德大故受衆方之國三分天下而有其二漢孔氏曰推功於父言文王無罪於天下故天佑之人盡其用蔡氏曰無罪猶言無過漢孔氏曰若紂克我非我父罪我之無善之致蔡氏曰無良猶言無善唐孔氏曰勝非我功敗非父咎崇孝罪己蘇氏曰兵凶事也以武王與紂而猶有勝負之憂為文王羞是以先王重用兵也尚書纂傳卷十九下
