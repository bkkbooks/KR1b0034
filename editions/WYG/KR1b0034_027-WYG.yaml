body:
  text: 尚書纂傳卷二十七上元王天與撰康誥第十一周書成王既伐管叔蔡叔以殷餘民封康叔作康誥酒誥梓材漢孔氏曰滅三監以三監之民國康叔為衞侯周公懲其數叛故使賢母弟主之康圻内國名叔封字陳氏曰霍叔之罪輕於管蔡故序不及吕氏曰殷之大家世族遷于洛者周公師保之不遷而在商者謂之餘民命康叔以化之左氏傳祝鮀曰昔武王克商成王定之分康叔殷民七族陶氏施氏繁氏錡氏樊氏饑氏終葵氏封畛土略命以殷誥而封於殷虚啓以商政疆以周索按合書序與春秋傳考之所謂餘民亦有大家世族在其間或遷洛或留衞非特分治教化亦以分殺其勢無使相梃意有攸在云唐孔氏曰周公以王命戒之而作康誥酒誥梓材三篇之書康誥漢孔氏曰命康叔之誥真氏曰此篇胡氏以為武王之書朱子從之而蔡氏所辨尤力今姑從先儒之説以為周公作更當博考云蔡氏曰今文古文皆有惟三月哉生魄周公初基作新大邑于東國洛四方民大和會侯甸男邦采衛百工播民和見士于周周公咸勤乃洪大誥治唐孔氏曰此史緫序言之漢孔氏曰周公攝政七年三月始生魄生魄説見武成漢孔氏曰初造基建作王城大都邑於東國洛汭居天下土中四方之民大和悦而集會吕氏曰斧斤版築之事亦甚勞矣而民大和會悉來赴役猶文王作靈臺庶民子來也漢孔氏曰此五服諸侯服五百里侯服去王城千里甸服千五百里男服去王城二千里采服二千五百里衞服三千里與禹貢異制五服之百官播率其民和悦並見即事於周唐孔氏曰男下獨有邦字以五服男居其中舉中則五服皆有邦可知吕氏曰除要荒外皆來供役蓋王室有事諸侯皆當從之周衰城成周尚有仲孫何忌會晉韓不信齊髙張宋仲幾衞世叔之徒供役况成王時乎陳氏曰見朝見之見士與事同周説見武成漢孔氏曰周公皆勞勉五服之人遂乃因大封命大誥以治道潘氏曰勤如杕杜以勤歸之勤夏氏曰先儒或以此章為洛誥脱簡蓋周公誅三監封康叔在三年而營洛邑則在七年是康叔之封在營洛前數年所以可疑也意者王者将敷大命於諸侯必於臣民所會而誥之此康叔之誥所以在營洛之時歟林氏曰康叔之封固在卜洛之前而其誥之乃在營洛之際序蓋推本言之耳使其始封之初則書當為命之體如微子之命蔡仲之命惟其誥之不在於始封之初故不謂之命而謂之誥者也王若曰孟侯朕其弟小子封惟乃丕顯考文王克明德慎罰不敢侮鰥寡庸庸祗祗威威顯民用肇造我區夏越我一二邦以修我西土惟時怙冒聞于上帝帝休天乃大命文王殪戎殷誕受厥命越厥邦厥民惟時敘乃寡兄朂肆汝小子封在兹東土蔡氏敘章指見篇末漢孔氏曰周公稱成王命命為孟侯五侯之長謂方伯使康叔為之言王使我命其弟封封康叔名稱小子明當受教訓王若曰説見盤庚蘇氏曰康叔成王叔父而周公弟謂之孟侯則可謂之小子則不可且謂武王為寡兄此豈成王之言蓋周公雖以王命命康叔而其實皆周公之言張氏曰稱孟侯者尊之也稱其弟者親之也小子封者撫而教之也漢孔氏曰惟汝大明父文王唐孔氏曰以近而可法不過子之法父故舉文王也左氏傳申公巫臣曰明德慎罰文王所以造周也明德務崇之之謂慎罰務去之之謂漢孔氏曰惠恤窮民不慢鰥夫寡婦用可用敬可敬刑可刑明此道以示民蔡氏曰鰥寡人所易忽也於人易忽者而不忽焉以見聖人無所不敬畏也即堯不虐無告之意論文王之德而首發此非聖人不能也文王敬賢討罪一聽於理而已無與焉故德著於民漢孔氏曰用此明德慎罰之道始為政於我區域諸夏故於我一二邦皆以修治漢孔氏曰我西土岐周惟是怙恃文王之道故其政教冒被四表上聞于天天美其治陳氏曰文王為西伯故言西土應氏曰文王視民如子其民怙之如父冒聞于上帝即君奭之迪見冒聞皆是德之包涵蒙覆而感格無間也漢孔氏曰天美文王乃大命之殺兵殷大受其王命謂三分天下有其二以授武王唐孔氏曰殪殺也戎商説見泰誓中漢孔氏曰於其國於其民惟是次序皆文王教漢孔氏曰汝寡有之兄武王勉行文王之道故汝小子封得在此東土為諸侯新安王氏曰寡有二義寡君寡人貶損之稱寡兄寡命言其罕有朱子曰衞在禹貢冀州在河北朝歌之東湛水之北百泉之南即今衞縣大抵今懷衞澶相滑濮等州開封大名府界皆衞境也吕氏曰一段精神盡在此兩句提起康叔不可輕易之心王曰嗚呼封汝念哉今民将在祗遹乃文考紹聞衣德言往敷求于殷先哲王用保乂民汝丕逺惟商耇成人宅心知訓別求聞由古先哲王用康保民𢎞于天若德裕乃身不廢在王命蔡氏敘章指見篇末漢孔氏曰念我所以告汝之言漢孔氏曰今治民将在敬循汝文德之父繼其所聞服行其德言以為政教唐陸氏曰遹述也陳氏曰紹謂繼之於前衣謂服之於已吕氏曰商民見文王之子來臨為侯将以祗述文王之事望之康叔聞文王之德言日夕覆在身然後足以副民望也漢孔氏曰汝往之國當布求殷先哲王之道用安治民陳氏曰敷求廣求也漢孔氏曰汝當大逺求商家耇老成人之道常以居心則知訓民蔡氏曰宅心處心也安汝止之意吕氏曰爾之所往商之故地也商民之情素安乎殷先哲王之訓故必敷而求之循而行之又於商耇成人就而詢之廣大深逺而思惟之蓋老成之言初若無味思惟至於廣大方有所得宅心知訓者人心未宅則一念潰亂雖有老成之言無由知之惟有所宅則有所知漢孔氏曰又當別求所聞父兄用古先智王之道用其安者以安民吕氏曰別求更求也又使之更求羲黄堯舜禹之法蔡氏曰近述諸家逺稽諸古不一而足以見義理之無盡陳氏曰文考事近故曰祗遹而已殷先王逺矣故當敷求古先王又逺則當別求若夫求而聞聞而由則彼此互見曰保乂曰康保亦互文也漢孔氏曰大于天為順德則不見廢常在王命蔡氏曰𢎞者廓而大之也天者理之所從出也康叔博學以聚之集義以生之真積力久衆理該通此心之天理之所從出者始恢廓而有餘用矣若是則心廣體胖動無違理斯能不廢在王之命也吕氏曰為子必須如舜與曾閔方能不廢父命為臣必須如舜與周公方能不廢君命𢎞于天德裕身可謂盛矣止能不廢王命纔可免過而已以此見人臣職分之難盡王曰嗚呼小子封恫瘝乃身敬哉天畏棐忱民情大可見小人難保往盡乃心無康好逸豫乃其乂民我聞曰怨不在大亦不在小惠不惠懋不懋已汝惟小子乃服惟𢎞王應保殷民亦惟助王宅天命作新民漢孔氏曰瘝病治民務除惡政當如痛病在汝身欲去之敬行我言吕氏曰命爾為侯非富貴爾身乃委疾痛于爾身耳可不敬哉漢孔氏曰天德可畏以其輔誠民情大可見以小人難安真氏曰萬事之得或以一事之失而召怨萬人之悦或以一夫之怨而生亂此小人所以難保漢孔氏曰往當盡汝心為政無自安好逸豫寛身其乃治民真氏曰始以天民並言而終獨歸之民者民心即天心也能保小民即能保天命矣漢孔氏曰不在大起於小不在小小至於大言怨不可為故當使不順者順不勉者勉吕氏曰如鰥寡孤獨人所易忽汝當撫摩是惠所不惠也纎㣲小事人所易怠汝必勉行是懋所不懋也真氏曰周公以此為弭怨之道後世乃欲以嚴刑峻罰止之不知適所以長怨也漢孔氏曰已乎汝惟小子陳氏曰汝所事在𢎞廣王之德意以應保殷民而已林氏曰民之有求者有以應之民之未安者有以保之晁錯謂人情莫不欲夀三王生而不傷人情莫不欲富三王厚而不困人情莫不欲安三王扶而不危此所以應保之也漢孔氏曰亦所以惟助王者居順天命為民日新之教陳氏曰宅猶定也朱子曰鼓之舞之之謂作言振起其自新之民也商之餘民染紂汙俗而失其本心故告之以此欲其有以鼓舞而作興之使之振厲踊躍以去其惡而遷於善舍其舊而進乎新也然此豈聲色號令之所及哉亦自新而已蔡氏曰作新民者明德之終也大學之言明明德亦以新民終之王曰嗚呼封敬明乃罰人有小罪非眚乃惟終自作不典式爾有厥罪小乃不可不殺乃有大罪非終乃惟眚災適爾既道極厥辜時乃不可殺蔡氏敘章指見篇末漢孔氏曰嘆而勅之凡行刑罰汝必敬明之張氏曰明德則曰敬哉慎罰則曰敬明是明德慎罰專在敬而已漢孔氏曰小罪非過失乃惟終身行之自為不常用犯汝王氏曰典式皆訓法人若有小罪而非過誤乃終如此而自作不合典法之事爾是故為也故為者雖小罪亦當殺之漢孔氏曰汝盡聽訟之理以極其罪是人所犯亦不可殺當以罰宥論之王氏曰適爾謂偶然人若有大罪非終於為之乃是過誤以為災而偶然耳過誤者雖大罪亦當赦之也林氏曰既道極厥辜者蓋既自以為有罪云耳若今之律所謂自首者原其罪也諸葛孔明治蜀服罪輸情者雖重必釋其此意歟朱子曰此宥過刑故之意蘇氏曰吾聞之知法者謂此假設法也周公設為甲乙二人皆犯死罪而議其輕重也甲之罪小小於乙之謂也非謂其罪不至死也然其罪出於故為如是者當據法殺之不可讞也乙之罪雖大然非出於故為是則真可讞也以今世法考之謀殺已傷雖未殺皆死雖未傷而置人於必死之地亦死鬭殺故殺雖已殺而情可憫者免失殺雖已殺皆贖夫以未殺未傷而比之既殺非小罪殺而大罪赦乎初非以非死罪為小罪也王曰嗚呼封有敘時乃大明服惟民其勑懋和若有疾惟民其畢棄咎若保赤子惟民其康乂非汝封刑人殺人無或刑人殺人非汝封又曰劓刵人無或劓刵人漢孔氏曰嘆政教有次敘是乃治理大明則民服民既服化乃其自勑正勉為和漢孔氏曰化惡為善如欲去疾治之以理則惟民其盡棄惡修善漢孔氏曰愛養人如安孩兒赤子不失其欲惟民其皆安治大學曰康誥云云心誠求之雖不中不逺矣程子曰赤子未能自言其意而為之母者慈愛之心出於至誠則凡所以求其意者雖或不中而不至於大相逺矣真氏曰此章言惟民其者三蓋人君用刑有敘而人服則民皆相勑相勉以和矣治民如治疾雖攻以藥石而非害之則民皆逺罪而遷於善矣保民如保赤子心誠求之則民皆安且治矣漢孔氏曰言得刑殺罪人無以得刑殺人而有妄刑殺非辜者劓截鼻刵截耳刑之輕者亦言所得行所以舉輕以戒為人輕行之唐孔氏曰此又曰者述康叔之又曰朱子曰非汝封刑人殺人則無或刑人殺人矣非汝封又曰劓刵人則無或劓刵人矣言其責之在己也不須改句只是説汝不刑人殺人則人亦無敢刑人殺人汝不劓刵人則人亦無敢劓刵人耳吕氏曰非汝封以下丁寧告戒之辭也非汝封刑人殺人刑殺豈汝封之權乎無或刑人殺人申戒之辭不可或有刑人殺人之意也又言非汝封者緫説兩句非汝之權也又曰劓刵人無或劓刵人史官記周公諄勤反覆之意言非特大罪如此劓刵㣲罪亦不可有自用之心也按非汝封與勿庸以次汝封意近刑人殺人對劓刵人與用其義刑義殺意近蓋欲任理而無或任其已私耳又曰書凡四見此又曰以為周公設康叔之言固明快以為史述周公諄複重言合下文又曰要囚例姑兼存之以備商搉云王曰外事汝陳時臬司師兹殷罰有倫又曰要囚服念五六日至于旬時丕蔽要囚漢孔氏曰言外土諸侯奉王事汝當布陳是法司牧其衆及此殷家刑罰有倫理者兼用之林氏曰以衞侯入為大司寇上所言者司寇之事内事也外事者衞之事也臬門梱也有限凖之義故以訓法夏氏曰以汝陳時臬司師為句非經意成王謂汝但當設是法官以治之而其治之之道則師兹殷先哲王罰之有倫敘者足矣永嘉陳氏曰曰師兹殷罰曰罰蔽殷彛蓋以殷民習見殷家之法雖輕重不同而不駭於耳目周公期於頑民之畏法而不期於周令之必行漢孔氏曰要囚謂察其要辭以斷獄既得其辭服膺思念五六日至於十日至於三月乃大斷之唐孔氏曰又曰者周公重言之也陳氏曰要者結罪之謂與周禮卿士言異其死刑之罪而要之之要同要囚謂結其囚之罪也蔽要囚者斷其所結定之囚猶今世引斷也林氏曰唐太宗謂死者不可復生死囚雖三覆奏而頃刻之間何暇思慮自今宜二日五覆奏正得周公之意云王曰汝陳時臬事罰蔽殷彞用其義刑義殺勿庸以次汝封乃汝盡遜曰時敘惟曰未有遜事已汝惟小子未其有若汝封之心朕心朕德惟乃知凡民自得罪冦攘姦宄殺越人于貨暋不畏死罔弗憝漢孔氏曰陳是法事其刑罰斷獄用殷家常法夏氏曰陳設是法事指上文言也漢孔氏曰義宜也用舊法典刑宜於時世者以刑殺勿用以就汝封之心所安陳氏曰罰獨言之則兼刑殺上文殷罰有倫是也與刑殺對言則罰輕刑重殺尤重也薛氏曰擇其義之至精者無適無莫義之與比而已吕氏曰次如次舍之次不可移就汝之意漢孔氏曰乃使汝所行盡順曰是有次敘惟當自謂未有順事君子将興自以為不足王氏曰遜者屈已以就義之意漢孔氏曰已乎他人未其有若汝封之心言汝心最善我心我德惟汝所知欲其明成王所以命已之款心夏氏曰成王之心在先教化後刑罰惟康叔知之漢孔氏曰凡民用得罪為冦盗攘竊姦宄殺人顛越人於是以取貨利暋彊也自彊為惡而不畏死人無不惡之者言當消絶之林氏曰自得罪猶言自作孽應氏曰暋者昬頑彊悍其在受德暋是也林氏曰憝惡也好生惡死人之常情人惟畏死而後可以死懼之既不畏死何所不至此所以天下共惡之下章将告康叔以衞之風俗自棄人倫故先設為此言以輕重相較云王曰封元惡大憝矧惟不孝不友子弗祗服厥父事大傷厥考心于父不能字厥子乃疾厥子于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟惟弔兹不于我政人得罪天惟與我民彛大泯亂曰乃其速由文王作罰刑兹無赦不率大戛矧惟外庶子訓人惟厥正人越小臣諸節乃别播敷造民大譽弗念弗庸瘝厥君時乃引惡惟朕憝已汝乃其速由兹義率殺亦惟君惟長不能厥家人越厥小臣外正惟威惟虐大放王命乃非德用乂汝亦罔不克敬典乃由裕民惟文王之敬忌乃裕民曰我惟有及則予一人以懌漢孔氏曰大惡之人猶為人所大惡况不善父母不友兄弟者乎言人之罪惡莫大於不孝不友為人子不能敬身服行父道而怠忽其業大傷其父心是不孝於為人父不能字愛其子乃疾惡其子是不慈於為人弟不念天之明道乃不能恭事其兄是不恭為人兄亦不念穉子之可哀大不篤友于弟是不友惟人至此不孝不慈不友不恭不於我執政之人得罪乎道教不至所致天與我民五常而廢棄不行是大滅亂天道言當速用文王所作違教之罰刑此亂五常者無得赦朱子曰弔只如字讀惟弔兹惟痛憫此得罪之人也不于我政人得罪痛憫之深恨不自我得罪也雖若此然不罪之則民彛冺亂矣蘇氏曰三監之世商人父子兄弟以相殘虐為俗周公之意蓋謂孝友民之天性也不孝不友必有以使之子弟固有罪矣父兄獨無過乎故父子兄弟相為逆亂治之之道不可與寇攘同法我将誨其子曰汝不服父事豈不大傷厥考心又誨其父曰此非汝子乎何疾之深也又誨其弟曰長幼天命也其可不順又誨其兄曰此汝弟也獨不念父母鞠養劬勞之哀乎人非木石禽犢假以日月須其善心油然而生未有不為君子也張氏曰昔魯有父子訟者孔子置之狴犴三月俟其悔而後出之其意正與此合蓋斷父子兄弟之訟不與凡人同當有教以感動之若遽以法斷之則用一法吏足矣不必吾儒也林氏曰寇攘姦宄孟子以為不待教而誅則不孝不慈不友不恭之人其必教之不改然後誅也舜之時寇賊姦宄則使臯陶明刑以治之至於百姓不親五品不遜乃不屬之臯陶而屬之契周公之意亦然也朱子曰此節當從孔説蘇氏等一槩以寛為説恐非聖人懲人正法之意真氏曰朱子之言當矣然蘇林等説亦不可廢漢孔氏曰戛常也凡民不循大常之教猶刑之無赦况在外掌衆子之官主訓民者而親犯乎惟其正官之人於小臣諸有符節之吏及外庶子其有不循大常者則亦在無赦之科汝今往之國當分别播布德教以立民太善之譽若不念我言不用我法者病其君道是汝長惡惟我亦惡汝汝乃其速用此典刑宜於時世者循理以刑殺吕氏曰康叔不以身率之則乂大難戛者戛戛乎其難之謂也真氏曰不率大戛一句或屬上文或屬下文吕氏合而為一似為得之又其説與下文不能厥家人罔不敬典相應蓋戛者二物相擊之謂然其義終難通曉當在缺疑之域葉氏曰禮云庶子正公族之官教之以孝弟睦友子愛明父子之義長幼之節者此云外庶子指衞言也唐孔氏曰正人若周官三百六十職正官之首小臣諸節謂正人之下非長官之身下至符吏諸有符節者若為官行文書而有符今之印者也在軍者有旌節亦得為有符節真氏曰乃別播敷造民大譽謂我所惡者不孝不友也諸臣不以此訓民乃別立教條以要譽愚俗使其不知不孝不友之為惡豈非不體上心不用上令而病其君乎引惡謂引而入於不孝不友之地此所以速由兹義以率殺也蓋導民以惡乃賊人心害風教之大者不然安得遽以刑殺加之乎蔡氏曰上言民不孝不友則速由文王作罰刑兹無赦此言外庶子云云則速由兹義率殺曰刑曰殺若用法峻急者蓋殷之臣民化紂之惡父子兄弟之無其親君臣上下之無其義非繩之以法示之以威殷人孰知不孝不義之不可干哉周禮所謂刑亂國用重典者是也然曰速由文王曰速由兹義則其刑其罰亦仁厚而已矣吕氏曰率與上率字相應由義以表率之表率不行然後不得已而殺之漢孔氏曰則亦惟君長之正道為人君長而不能治其家人之道則於其小臣外正官之吏並為威虐大放棄王命乃由非德用治之故蔡氏曰君長指康叔也林氏曰不能厥家人越小臣外正猶左傳所謂不能其大夫至于君祖母以及國人也小臣外正即上文正人小臣諸節也其曰外正亦猶外庶子也家人之􅂏云父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣此其本末先後之序當反諸身既不能齊家必不能倡率其臣屬使敷教化而其所以治民者惟有殺而已是汝肆為威虐放棄王命而以非德治民也漢孔氏曰常事人之所輕故戒以無不能敬常汝用寛民之道當惟念文王之所敬忌而法之汝行寛民之政曰我惟有及於古則我一人以此悦懌汝德林氏曰典者天敘之典即父子兄弟之常道也敬典敬敷五教是也裕民在寛是也蔡氏曰敬則有所不忽忌則有所不敢此言慎罰之終也穆王訓刑亦曰敬忌云按孔氏釋元惡至刑兹無赦順經文為正康誥語乃王法劑量之公家語事又聖化感移之妙道並行而不悖也至於全章則合分三節刑輕於殺殺重於刑惟俗之薄警以刑矣抑正民者羣臣也故懼其引民於惡則由義率殺之長羣臣者君長之康叔也故懼其不能表率羣臣則勉之以敬典裕民匪彛之威罰雖明敬典之風化甚雅化民以是擬文王而及之庶乎是責康叔尤重也夫惟康叔反躬端化既純以粹而後敬明之罰可施於弗率之頑也不然嚴刑峻罰務以求勝可謂之罰矣能如文王之慎罰乎此篇明德慎罰為綱領其望叔汝念哉至德裕乃身是始之曰徳也敬哉敏德顧德至篇終是終之曰德也中間敬明乃罰以下五節言慎罰而參錯以德之一字者凡三四見蓋德為之主則其刑其罰兹式有慎是明德固明德也慎罰亦明德也即一章刑兹無赦一語論之具警民固至嚴而至公通一篇明德慎罰論之其導民實至寛而至裕所謂並行而不悖之道也王曰封爽惟民迪吉康我時其惟殷先哲王德用康乂民作求矧今民罔迪不適不迪則罔政在厥邦蔡氏敘章指見篇末漢孔氏曰明惟治民之道而善安之夏氏曰不孝不友之人其不善之心非與生俱生也無人以迪之耳故迪之而後可至於吉康漢孔氏曰我是其惟殷先智王之德用安治民為求等吕氏曰前既責之民又責之臣又責之康叔此以下成王所以自責也張氏曰殷民安於殷乆矣故我於殷先哲王之德求之林氏曰作求謂起而求殷先哲王所以康乂民者詩云王配于京世德作求言武王所以配于京者以求之三后故也漢孔氏曰况今民無道不之言從教也不以道訓之則無善政在其國蔡氏曰迪即迪吉康之迪真氏曰此雖成王以導民之責自勉亦以訓康叔也然欲導民於吉康其何以哉惟於殷先哲王之德用於康乂民者作而求之而已蓋殷先哲王之所為無非導民吉康之道也導之以仁義而民趨於仁義導之以孝弟而民趨於孝弟即所謂吉康也政者所以正民也不能導民使知所適尚何政之有蓋古之所謂政者合教化而言後之所謂政者離教化而言王曰封予惟不可不監告汝德之説于罰之行今惟民不靜未戾厥心迪屢未同爽惟天其罰殛我我其不怨惟厥罪無在大亦無在多矧曰其尚顯聞于天漢孔氏曰我惟不可不監視古義告汝施德之説於罰之所行欲其勤德慎刑張氏曰我監觀文王明德慎罰之意而告汝上文所告皆是也漢孔氏曰假令今天下民不安未定其心於周教道屢數而未和同設事之言明惟天其以民不安罰誅我我其不怨天汝不治我罰汝汝亦不可怨我林氏曰天佑下民作之君師今民至迪屢未同是不能盡君師之責以相上帝也則罰殛之至豈敢怨哉張氏曰古之言天者皆責備於已而不求全於人故民不静不同天不罪民而罪導民者陳氏曰迪屢未從猶無辭於天罰况不迪乎漢孔氏曰民之不安雖小邑少民猶有罰誅不在多大况曰不慎罰明聞於天者乎言罪大蔡氏曰惟民之罪不在大亦不在多苟惟有罪即在朕躬吕氏曰此成王周公自反以感動康叔也王曰嗚呼封敬哉無作怨勿用非謀非彞蔽時忱丕則敏德用康乃心顧乃德逺乃猷裕乃以民寧不汝瑕殄蔡氏敘章指見篇末漢孔氏曰言當修已以敬無為可怨之事勿用非善謀非常法陳氏曰非謀敗事之謀非彛變常之事成王恐康叔惑於邪説異術謂殷民難以德化易以刑服如封倫之語唐太宗者故戒以勿用漢孔氏曰斷行是誠道大法敏德薛氏曰忱者至誠之道也敏者至健之德也惟至誠故能有守惟至健故能有為漢孔氏曰用是誠道安汝心顧省汝德無令有非逺汝謀思為長乆陳氏曰心不安則喜異而厭常德不顧則無内省之實猷不逺則貪目前之利忘他日之害此皆原於不忱不敏也漢孔氏曰行寛政乃以民安則我不汝罪過不絶亡汝真氏曰裕乃以民寧不必言行寛政但自無作怨以下數條行之優裕即所以致民之寧而民不瑕絶之也蓋為善未至於優裕皆勉彊也與若德裕乃身之裕同王曰嗚呼肆汝小子封惟命不于常汝念哉無我殄享明乃服命高乃聽用康乂民蔡氏敘章指見篇末漢孔氏曰故當念天命之不于常汝行善則得之行惡則失之漢孔氏曰無絶棄我言而不念享有國土當明汝所服行之命令使可則陳氏曰汝當念哉無使我所與汝之爵土殄絶而不能享也服命即今所受之誥命明汝所服之命不可昏而忘朱子曰殄享世享皆謂享于天子漢孔氏曰髙汝聽以安治民陳氏曰髙乃聽猶尊所聞王若曰往哉封勿替敬典聽朕告汝乃以殷民世享漢孔氏曰汝往之國勿廢所宜敬之常法真氏曰敬典即前所謂罔不克敬典篇終復申言之無垢張氏曰此篇終始戒康叔以敬典蓋商人父子兄弟各失其倫此最風俗名教之大者李氏曰康誥篇終以敬哉敬典為言於是知敬乃修身治民之本化商民之綱要莫切於此漢孔氏曰順從我所告之言即汝乃以殷民世世享國福流後世史氏曰亡秦之世惟衞享國四十世九百年則世享之言驗矣蔡氏曰世享對上文殄享而言按二章享字當從朱子蓋於無我字順而於化殷民以享上尤通自無作怨以下意專尚德蓋始條陳於明德慎罰終歸宿於德化優容而所謂德特在敬典而已成周忠厚化民如此總説一篇意蔡氏曰明德慎罰一篇之綱領不敢侮鰥寡以下文王明德慎罰也汝念哉以下欲康叔明德也敬明乃罰以下欲康叔慎罰也爽惟民以下欲其以德行罰也敬哉以下欲其不用罰而用德也終則以天命殷民結之尚書纂傳卷二十七上欽定四庫全書尚書纂傳卷二十七中元王天與撰酒誥第十二周書酒誥漢孔氏曰康叔監殷民殷民化紂嗜酒故以戒酒誥吕氏曰酒之為病在後世視之則甚輕當時視之則甚重商舉世之病在酒所以大誥之蔡氏曰今文古文皆有王若曰明大命于妹邦乃穆考文王肇國在西土厥誥毖庶邦庶士越少正御事朝夕曰祀兹酒惟天降命肇我民惟元祀天降威我民用大亂喪德亦罔非酒惟行越小大邦用喪亦罔非酒惟辜文王誥教小子有正有事無彞酒越庶國飲惟祀德将無醉惟曰我民迪小子惟土物愛厥心臧聰聽祖考之彞訓越小大德小子惟一妹土嗣爾股肱純其藝黍稷奔走事厥考厥長肇牽車牛逺服賈用孝養厥父母厥父母慶自洗腆致用酒庶士有正越庶伯君子其爾典聽朕教爾大克羞耇惟君爾乃飲食醉飽丕惟曰爾克永觀省作稽中德爾尚克羞饋祀爾乃自介用逸兹乃允惟王正事之臣兹亦惟天若元德永不忘在王家陳氏曰此章首以文王戒酒之教勉康叔漢孔氏曰周公以成王命誥康叔欲令明施大教命於妹國妹地名紂所都朝歌以北是唐孔氏曰妹與沬一也王氏曰總其君與其臣民誥之故曰邦漢孔氏曰父昭子穆文王故稱穆將言始國在西土西土岐周之政蔡氏曰穆考敬德之考詩稱穆穆文王是也上篇言文王明德則曰顯考此篇言文王誥毖則曰穆考言各有當也漢孔氏曰文王其所誥慎衆國衆士於少正官御治事吏朝夕勑之惟祭祀而用此酒不常飲鄭氏曰庶邦諸侯庶士庶邦之羣臣少小正長也小官之長如稱小伯小尹然蔡氏曰文王為西伯故得誥毖庶邦西土庶邦逺去商邑文王誥毖亦諄諄以酒為戒則商邑可知矣漢孔氏曰惟天下教命始令我民知作酒者惟為祭祀唐孔氏曰酒人自意所為今言天降命者以天非人不因人為者亦天之所使言元祀者謂酒惟用於大祭祀見戒酒之深也漢孔氏曰天下威罰使民亂德亦無非以酒為行者言酒本為祭祀亦為亂行於小大之國所用喪亡亦無不以酒為罪也唐孔氏曰民自飲酒至亂以被威罰言天降威者亦如上言天降命也為亂而罪天理當然真氏曰觀小大邦用䘮之語則當時以酒亡國者多矣廣漢張氏曰酒之為物本以奉祭祀供賔客此即天之降命也而人以酒之故至於失德喪身即天之降威也漢孔氏曰小子民之子孫也正官治事謂下羣吏教之皆無常飲酒陳氏曰前誥庶邦曰誥毖其辭嚴此誥小子曰誥教其辭寛蔡氏曰小子血氣未定尤易縱酒害德故誥教之朱子曰楊文公言童穉之學養其良知良能當以先入之言為主漢孔氏曰於所治衆國飲酒惟當行祭祀以德自将無令至醉祝氏曰周官酒正凡祭祀以法共五齊三酒酒人掌為五齊三酒亦曰祭祀則共奉之若夫共賔客享士庶子享耆老孤子則言於祭祀之後蓋酒以祀為主自祀之外皆禮之餘也然祭而飲所以受福苟不将之以德則欲以受福禍莫大焉故先王寓之法度彞皆有舟舟皆有罍以舟能載物過量則溺罍能澤物不均則害使舉是禮者必明是義又何喪德之有按正即少正也事即御事也庶國即庶邦也文王既誥毖庶邦庶士少正御事於誥教小子之際又丁寧覆説之也下庶士有正亦是覆説上文云漢孔氏曰文王化我民教道子孫惟土地所生之物皆愛惜之則其心善子孫皆聰聽父祖之常教於小大之人皆念德則子孫惟專一真氏曰於小大之德視之惟一不以謹酒為小焉謹酒非小徳則腆酒非小過明矣漢孔氏曰今往當使妹土之人繼汝股肱之教為純一之行其當勤種黍稷奔走事其父兄陳氏曰藝種也吕氏曰此皆安分之事竭力耕田共為子職而已何暇縱酒乎惟不服田畆心無所用則必向於酒矣漢孔氏曰農功既畢始牽車牛載其所有求易所無逺行賈賣用其所得珍異孝養其父母王氏曰賈人亦受田也舉農賈則工可知矣漢孔氏曰其父母善子之行子乃自潔厚致用酒養也薛氏曰或修農功或服商賈以養父母父母慶則汝可用酒也漢孔氏曰衆伯君子長官大夫統庶士有正者其汝常聽我教勿違犯林氏曰庶士有正謂庶士有正以統之也庶伯君子者伯長也君子謂伯長之賢者也陳氏曰君子為有德之稱亦以有位稱者如有官君子是也吕氏曰凡為官長皆在爾統率之下則爾當常聽我之教也按周禮宫正宫伯鄭氏註正長也伯長也俱為長然宫正上士宫伯中士據此則此正與伯雖俱為長然亦不無小辨云漢孔氏曰汝大能進老成人之道則為君矣如此爾乃飲食醉飽之道陳氏曰行養老之禮則飲食醉飽無害漢孔氏曰我大惟教汝曰汝能長觀省古道為考中正之德則君道成矣陳氏曰民因農賈而飲士大夫因養老而醉特其小者又推其大者論之故言丕惟曰真氏曰中徳即中道即身而言則曰中德即事而言則曰中道漢孔氏曰能考中德則汝庶幾能進饋祀於祖考矣能進饋祀則汝乃能自大用逸之道馬氏曰進飲食曰饋進飲食以祀其先故曰饋祀陳氏曰介因也左傳介大國皆訓因祭祀之時始可因用逸吕氏曰周公開飲酒之門有三祭祀用酒父母慶用酒養老用酒三者無非於其良心開之蘇氏曰酒人情之所不能免禁而絶之雖聖人不能故戒其沈湎之禍而開其德飲之樂聖人之禁人蓋如此漢孔氏曰此乃信任王者正事之大臣亦惟天順其大德而佑之長不見忘在王家陳氏曰正事猶上文言有正有事李氏曰元德即中德自康叔言之則曰中自天言之則曰元吕氏曰不湎于酒亦是常事周公推之直至天若元德人之進德惟於最難捨處放得下即是德進不已獲天順處王曰封我西土棐徂邦君御事小子尚克用文王教不腆于酒故我至于今克受殷之命陳氏曰此承上章以文王事結之漢孔氏曰我文王在西土輔訓往日國君及御治事者下民子孫皆庶幾能用上教不厚於酒言不常飲袁氏曰謂之棐者孟子所謂輔之翼之是也吕氏曰天下之理相為消長不厚於酒者必厚於德漢孔氏曰故我周家至于今能受殷王之命真氏曰有司之不腆酒於天命何與而以克受殷命為職此之由但觀幽厲陳隋之朝上下沈酣以至於亡則謹酒而受天命夫何疑哉王曰封我聞惟曰在昔殷先哲王迪畏天顯小民經德秉哲自成湯咸至于帝乙成王畏相惟御事厥棐有恭不敢自暇自逸矧曰其敢崇飲越在外服侯甸男衞邦伯越在内服百僚庶尹惟亞惟服宗工越百姓里居罔敢湎于酒不惟不敢亦不暇惟助成王德顯越尹人祗辟我聞亦惟曰在今後嗣王酣身厥命罔顯于民祗保越怨不易誕惟厥縱淫泆于非彞用燕喪威儀民罔不衋傷心惟荒腆于酒不惟自息乃逸厥心疾狠不克畏死辜在商邑越殷國滅無罹弗惟德馨香祀登聞于天誕惟民怨庶羣自酒腥聞在上故天降喪于殷罔愛于殷惟逸天非虐惟民自速辜吕氏曰此以商之興亡告康叔漢孔氏曰聞之於古殷先智王謂湯蹈道畏天明著小民能常德持智陳氏曰迪畏行其所畏也上畏天道之顯明下畏小民之難保畏天畏民無隱顯輕重之間德者得此理經德常其德而不失也哲者明此理秉哲持其明而不昏也經德秉哲乃畏天畏民之實漢孔氏曰從湯至帝乙中間之王猶保成其王道畏敬輔相之臣陳氏曰成湯而下豈無僻王言自成湯咸至于帝乙者亦舉其大槩耳應氏曰古之王者克自抑畏固無俟乎勉彊然必擇其道隆德盛者以為輔相而尊敬嚴憚之所以維持其敬心而不懈也漢孔氏曰惟殷御治事之臣共輔佐畏相之君有恭敬之德不敢自寛暇自逸豫崇聚也自暇自逸猶不敢况敢聚會飲酒乎新安王氏曰御事猶言治事凡經言如庶士御事尹氏御事通庶官言之也然三公謂之三事六卿謂之六事諸侯三卿亦曰御事司徒司馬司空平王言即我御事則御事兼小大之臣皆可稱林氏曰所以輔君者皆盡其恭王博士云責難於君謂之恭厥棐有恭則責難矣真氏曰崇飲謂相尚以飲漢孔氏曰於在外國侯服甸服男服衞服國伯庶侯之長唐孔氏曰舉四者以總六服邦謂國君伯言長連率卒牧皆是漢孔氏曰於在内服治事百官衆正及次大夫服事尊官陳氏曰内服畿内也禹貢畿内稱甸服惟服奔走服事之人下士府史胥徒是也宗工尊官六卿之類也漢孔氏曰於百官族姓及卿大夫致仕居田里者林氏曰禮所謂致仕而春秋傳所謂老也漢孔氏曰自外服至里居皆無敢沈湎於酒非徒不敢亦不暇飲酒所以不暇飲酒惟助其君成王道明其德於正人之道必正身敬法真氏曰是時内外小大之臣無敢湎酒者不惟禀上之教不敢違亦以職守所在不暇為不敢猶有勉彊不暇則安之矣職守謂何上以助成君德之顯明下以助大臣之祗辟也此章乃一篇之根本凡人敬則不縱欲縱欲則不敬殷之君臣既一於敬矣舉天下之欲不足動之况荒惑敗亂如酒乎蔡氏曰成王顧上文成王而言祗辟顧上文有恭而言漢孔氏曰嗣王紂也酣樂其身不憂政事漢孔氏曰言紂暴虐施其政令於民無顯明之德所敬所安皆在於怨不可變易林氏曰孟子云安其危利其菑祗保越怨之謂也漢孔氏曰紂大惟其縱淫泆于非常用燕安喪其威儀民無不衋然痛傷其心張氏曰泆失燕安也有威可畏謂之威有儀可象謂之儀用燕喪其威儀失其君人之道民無畏而象之者矣陳氏曰衋痛也吕氏曰感傷又重於怨大抵怨之極而無可奈何方到傷處漢孔氏曰言紂大厚於酒晝夜不念自息乃過差鄭氏曰不惟者不但安息逸樂而已又為酒所使如下文所云也漢孔氏曰紂疾狠其心不能畏死言無忌憚紂聚罪人在都邑而任之於殷國滅亡無憂懼蔡氏曰罹憂也其心疾狠雖殺身而不畏也辜在商邑雖滅國而不憂也真氏曰觀今小人一醉之餘忿疾彊狠水火可入兵刃可蹈則紂之情状可知漢孔氏曰紂不念發聞其德使祀見享升聞于天大行淫虐惟為民所怨咎張氏曰先王之祀以德不以物故奉牲以告奉盛以告奉酒醴以告皆以德為主有德則馨香無徳則臭穢漢孔氏曰紂衆羣臣用酒沈荒腥穢聞在上天故天下喪亡於殷無愛於殷惟以紂奢逸故真氏曰馨香者穢德之對也紂既無德馨香惟有腥穢上聞於天而已漢孔氏曰言凡為天所亡天非虐民惟民行惡自召罪馬氏曰古民人字通用王曰封予不惟若兹多誥古人有言曰人無於水監當於民監今惟殷墜厥命我其可不大監撫于時予惟曰汝劼毖殷獻臣侯甸男衞矧太史友内史友越獻臣百宗工矧惟爾事服休服采矧惟若疇圻父薄違農父若保宏父定辟矧汝剛制于酒厥或誥曰羣飲汝勿佚盡執拘以歸于周予其殺又惟殷之迪諸臣惟工乃湎于酒勿庸殺之姑惟教之有斯明享乃不用我教辭惟我一人弗恤弗蠲乃事時同于殺夏氏曰此又詳告康叔以制酒之意漢孔氏曰我不惟若此多誥汝古聖賢有言人無於水監當於民監視水見已形視民行事見吉凶漢孔氏曰今惟殷紂無道墜失天命我其可不大視此為戒撫安天下於是吕氏曰撫于時撫當時百姓也漢孔氏曰劼固也我惟告汝曰汝當固慎殷之善臣信用之王氏曰殷獻臣謂賢人嘗仕殷而今里居者漢孔氏曰侯甸男衞之國當慎接之况太史内史掌國典法所賔友乎林氏曰康叔為諸侯長故劼毖及於侯甸男衞薛氏曰周禮太史掌邦之六典法則内史掌王八枋之法二史在王朝則貳冢宰在侯國則居賔友之地漢孔氏曰於善臣百尊官不可不慎况汝身事服行美道服事治民乎陳氏曰宗工大臣也此獻臣宗工乃周臣之致仕里居者王氏曰服休者以德為事在位者也服采者以事為事在職者也林氏曰爾事言爾所共事者也漢孔氏曰圻父司馬農父司徒身事且宜敬慎况所順疇咨之司馬乎况能迫迴萬民之司徒乎宏父司空當順安之司馬司徒司空列國諸侯三卿慎擇其人而任之則君道定况汝剛制於酒乎王氏曰三卿之位為汝疇匹司馬薄伐愆違司徒若國保民司空居四民富而生之以定辟朱子曰古註從父絶句荆公從違保辟絶句敻出諸儒之表吕氏曰剛制者當時酒之為病甚深苟泛泛悠悠不用力斷然制之則安能制之故謂之剛制夏氏曰成王謂我今惟言曰汝康叔當堅固毖慎殷之賢臣及汝為孟侯所統侯甸男衞之國君皆當固慎之此正如文王毖庶邦庶士越少正御事蓋毖慎之使不縱于酒也殷賢臣及所統諸侯既固慎之矣况太史内史乃汝康叔之所親友者及其賢臣為百官尊者不可不固慎之也内史太史及賢臣百宗工既固慎之矣况與汝康叔共事之人所謂服休而在位服采而在職者其可不固慎之乎服休服采既固慎之矣况爾之疇匹而位為三卿者謂司徒司馬司空也又可以不固慎之乎自殷賢臣推而上之至於三卿皆康叔所當毖慎者汝其可不剛以制其縱酒之失乎真氏曰四矧字一節重於一節蓋所職愈重則所戒愈嚴劼毖以上所戒勑而言剛制以己所自檢而言在羣臣則當謹上之戒在康叔則當防己之欲漢孔氏曰其有告汝曰民羣聚飲酒不用上命則汝收捕之無令失也盡執拘羣飲酒者以歸於京師我其擇罪重者而殺之蘇氏曰予其殺者未必殺也猶今法曰當斬者皆具獄以待命不必死也然必立死法者欲人畏而不敢犯也羣飲蓋亦當時之法有羣聚飲酒謀為大姦者其詳不可得而聞矣如今之法有曰夜聚曉散者皆死罪蓋聚而為妖逆者也使後世不知其詳而徒聞其名凡民夜相過者輒殺之可乎舊説以為羣飲者周人則殺之殷人則勿殺也夫民同犯一罪而殺其一不殺其一周人其肯服乎羣飲則死公卿大夫羣飲可不誅乎不誅吏則無以禁民吏民皆誅則桀紂之虐不至於此矣皆事之必不然者予不可以不論漢孔氏曰又惟殷家蹈惡俗諸臣惟衆官化紂日乆乃沈湎於酒勿用法殺之以其漸染惡俗故必三申法令且惟教之則汝有此明訓以享國蘇氏曰此謂凡湎于酒而不為他大姦者也不擇殷周而周公特言殷者蓋為妹邦化紂之德諸臣百工皆沈湎而况民乎故凡湎于酒者皆可教不可殺不分殷周也漢孔氏曰汝若忽怠不用我教辭惟我一人不憂汝乃不潔汝政事是汝同於見殺之罪吕氏曰其不聽我教辭不蠲潔其事是終不能改然後殺之蓋教之不從者乃不得已而殺之也按吕説教字雖與上文聨屬終不若孔説得本旨蓋此誥乃告康叔化殷俗千百言不如責康叔一語觀矧汝剛制之言可見王曰封汝典聽朕毖勿辯乃司民湎于酒陳氏曰總結一篇之意漢孔氏曰汝當常聽念我所慎而篤行之陳氏曰此書始終告以毖慎故篇終復提其要以語之漢孔氏曰辯使也勿使汝主民之吏湎於酒言當正身以率民王氏曰汝司民有湎于酒則以正治之勿為之辯釋以為無罪蔡氏曰辯治也乃司有司也即上文諸臣百工之類康叔不治其諸臣百工之湎酒則民之湎酒者不可禁矣真氏曰勿辯以下説者不同句斷亦異孔氏説為不費辭但不知辯之訓使何所出亦不敢以為必然也姑並載之尚書纂傳卷二十七中欽定四庫全書尚書纂傳卷二十七下元王天與撰梓材第十三周書梓材漢孔氏曰告康叔以為政之道亦如梓人治材蔡氏曰篇中有梓材二字比稽田作室為雅故以為簡編之别唐孔氏曰梓材亦誥也蔡氏曰今文古文皆有王曰封以厥庶民暨厥臣達大家以厥臣達王惟邦君汝若恒越曰我有師師司徒司馬司空尹旅曰予罔厲殺人亦厥君先敬勞肆徂厥敬勞肆往姦宄殺人歴人宥肆亦見厥君事戕敗人宥王啓監厥亂為民曰無胥戕無胥虐至于敬寡至于屬婦合由以容王其效邦君越御事厥命曷以引養引恬自古王若兹監罔攸辟按此告康叔通上下之情以施寛大之澤漢孔氏曰言當用其衆人之賢者與其小臣之良者以通達卿大夫及都家之政於國汝當信用其臣以通王教於民惟乃國君之道陳氏曰大家商七族之類吕氏曰自康叔言之有民有臣有大家自王言之則率土之濵莫非王臣故於達王止言臣此首言通上下之情也應氏曰或以大家為彊家巨室考之經文初無此意古者諸侯稱邦卿大夫稱家故諸侯之重者稱大邦卿大夫之重者稱大家下文司徒司馬司空即大家也故遂分兩曰字以言之自汝若恒越曰至戕敗人宥達大家之事也自王啓監至罔攸辟達王之事也下而達大家上而達王皆明白以達其言委曲以達其意也為邦君者既能因大家之言以達其意則亦可以吾之慈祥惻怛達之於彼既能因王之言以達其意則亦可以下之疾痛困苦達之於上斯可謂四達之皇皇矣漢孔氏曰汝惟君道使順常於是曰我有典常之師可師法言國之三卿正官衆大夫皆順典常而曰我無厲虐殺人之事如此則善矣應氏曰越語助也猶越若蓋發語辭也汝若能常常曰我有師師之三卿尹旅其言每自謂不暴虐於殺人是汝知臣下之心而能稱述褒奬之也下文達王者既為王之言則此曰當為三卿尹旅之言乃相稱漢孔氏曰亦其為君之道當先敬勞民故汝往治民必敬勞來之陳氏曰康叔又當以身率先之君指康叔也蔡氏曰敬勞恭敬慰勞也漢孔氏曰以民當敬勞之故汝往之國又當詳察姦宄之人及殺人賊所過歴之人有所寛宥亦所以敬勞之應氏曰殺人者已傷人之性命也歴人者過歴人家為剽竊而未必殺人也宥者減死之意非全赦之漢孔氏曰聽訟折獄當務從寛恕故往治民亦當見其為君之事察民以過誤殘敗人者當寛有唐孔氏曰以君者立於無過之地使物不失其所故宥罪原情當見其為君之事與上厥君始終相承陳氏曰戕人者傷人支體敗人者毁人物業漢孔氏曰言王者開置監官其治為民不可不勉當教民無得相殘傷相虐殺至於敬養寡弱至於存恤妾婦和合其教用大道以容之無令見寃枉陳氏曰周禮建牧立監以維邦國監乃諸侯之長康叔為孟侯故此篇每言監應氏曰此曰者王之言云然也蔡氏曰王命監之辭蓋曰無相與戕殺其民無相與虐害其民人之寡弱者則哀敬之使不失所婦之窮獨者則聨屬之使有所歸保合其民率由是而容蓄之也陳氏曰合由以容涵之如海育之如春俾一國之中若貴若賤若上若下若衆若寡若夫若婦一切容之漢孔氏曰王者其效實國君及於御治事者知其教命所施何用不可不勤能長養民長安民用古王道如此監無所復罪當務之蔡氏曰王所以責效邦君御事者具命何以哉亦惟欲其引掖斯民於生養安恬之地耳陳氏曰引有徐徐之意治亂民猶亂繩急目前之效而欲速者皆非所以安養之也王氏曰自古王者歴世相傳皆如此監無用刑辟應氏曰兩段曰者自有次序曰予罔厲殺人者鎮撫危疑安静反側之規模解之赦過宥罪也有忍乃有濟也曰無胥戕至合由以容者海涵春育包荒不遺之氣象坤之含𢎞光大也有容德乃大也惟曰若稽田既勤敷菑惟其陳修為厥疆畎若作室家既勤垣墉惟其塗塈茨若作梓材既勤樸斲惟其塗丹雘陳氏曰下文将言繼先王用德先取物為喻漢孔氏曰惟若農夫之考田已勞力布發之惟其陳列修治為其疆畔畎壟然後功成蔡氏曰稽治也敷菑廣去草棘也漢孔氏曰如人為室家已勤立垣墻惟其當塗塈茨蓋之唐陸氏曰馬云卑曰垣髙曰墉塈説文云仰塗也蘇氏曰塗塈墐飾之也茨蓋苫也林氏曰穀梁傳云焚東門之茨范寗註茨蓋也茅茨亦謂以茅蓋屋也漢孔氏曰如梓人治材為器已勞力樸治斲削惟其當塗以漆丹以朱而後成林氏曰梓良木可以為器而木工謂之梓人樸謂器之有質而未成也唐孔氏曰塗丹皆飾物之名謂塗丹以朱雘雘是彩色之名蘇氏曰田既敷菑室既垣墉器既樸斵則當因舊守成而潤色之不當復有所建立除治也以言康叔既已平國定位不當復有所斬艾斵削也按三既勤與下文既勤用明德相應三惟其亦與下文王惟德用數語相應蓋言先王時天子諸侯用明德於先則今日上而為王下而為監亦惟明德新民之用耳又此篇言惟曰者三言監者三前後語脉皆相類此章譬喻蓋以起下文也今王惟曰先王既勤用明德懷為夾庶邦享作兄弟方來亦既用明德后式典集庶邦丕享皇天既付中國民越厥疆土于先王肆王惟德用和懌先後迷民用懌先王受命已若茲監惟曰欲至于萬年惟王子子孫孫永保民陳氏曰此章專言繼先王用德之事漢孔氏曰夾近也言文武已勤用明德懷逺為近汝治國當法之林氏曰今王惟曰周公指王而言非成王之自稱夾訓為近不若以為夾輔先王之制分建諸侯春朝以圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮時㑹以發四方之禁殷同以施天下之政皆欲其夾輔王室也然苟無以懷之則莫不解體矣漢孔氏曰衆國朝享於王又親仁善鄰為兄弟之國萬方皆來賔服亦已奉用先王之明德夏氏曰相親相比如兄弟之密方方而來漢孔氏曰君天下能用常法則和集衆國大來朝享應氏曰來享者庶邦也式行典禮而集庶邦之丕享者后也后即先王也先儒乃以庶邦享為先王時事集庶邦丕享為今王時事而式典者體其常法之謂觀下文皇天既付以下説先王之事尚未竟安得以後王事攙入之漢孔氏曰大天已付周家治中國民矣能逺拓其界壤則於先王之道遂大林氏曰皇天盡以中國民付之先王而一民莫非其臣盡以中國之疆土付之先王而尺地莫非其有漢孔氏曰今王惟用德和悦先後天下迷愚之民所以悦先王受命之義陳氏曰德用謂用明德和之使不乖懌之使不怨林氏曰迷民謂殷餘民先迷民紂之民也後迷民武庚之民也當時殷小大好草竊姦宄及武庚叛又蓄不軌之心故曰先後迷民不以刑罰治之而惟用德以和懌之是能以先王之心為心可以慰先王在天之靈矣故曰用懌先王受命漢孔氏曰為監所行已如此所陳法則我周家惟欲使至於萬年承奉王室又欲令其子孫累世長居國以安民吕氏曰已者發語辭監則呼康叔以言也成王之意豈苟且一時之安而已欲為子孫萬年之基業迷民未安康叔當協力撫摩之不能撫摩則變亂尚未可保何以為萬世計哉古之王者民衆少有不安則撫摩安慰無所不盡永保之念至於子孫則不靜之根一毫不可留也緫説大誥康誥酒誥梓材篇意蘇氏曰大誥康誥酒誥梓材其文皆奥雅非世俗之能通學者見其書紛然若有殺罰之言因為之説曰康誥所戒大抵先言殺罰蓋衞地服紂成俗小人衆多所以治之先後緩急當如此予詳考四篇之文雖古語淵慤然皆粲有條理反覆丁寧以殺為戒專以不殺為德此易所謂聦明睿智神武而不殺者故周有天下八百餘年後之王者以不殺享國以好殺殃其身及其子孫者多矣天人之際有不可盡知者至於殺不殺之報一一若符契可必也而世主不以為監小人又或附㑹六經醖釀鐫鑿以勸之殺悲夫殆哉唐末五代之亂殺人如飲食周太祖叛漢漢隠帝開封尹劉銖屠其家百口太祖既克京師夜召其故人知星者趙延義問漢祚所以短促者延義答曰漢本未亡以刑殺寃濫故不及期而滅時太祖方以兵圍銖及蘇逢吉弟旦且滅其族聞延義言矍然貸之誅止其身予讀至此未嘗不流涕太息故表其事於書傳以救世云尚書纂傳卷二十七下
