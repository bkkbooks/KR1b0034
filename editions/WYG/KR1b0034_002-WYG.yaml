body:
  text: 尚書纂傳卷二元王天與撰舜典第二虞書虞舜側微堯聞之聦明将使嗣位歴試諸難作舜典漢孔氏曰為庻人故微賤嗣繼也試以治民之難事唐孔氏曰此云側微即堯典側陋不在朝廷謂之側其人貧賤謂之微居處褊隘故言陋史記曰舜冀州人耕歴山漁雷澤陶河濵聦明説見堯典朱子曰歴試遍試也吕氏曰堯之知舜固不待試然次序自當如此蓋位非堯之位乃天位天下非堯之天下乃天下之天下以天下授人非細事詳於試舜乃堯兢兢不忘之義唐孔氏曰史述其事作舜典舜典漢孔氏曰典之義與堯同朱子曰今文古文皆有今文合於堯典而無篇首二十八字曰若稽古帝舜曰重華恊于帝濬哲文明温恭允塞𤣥徳升聞乃命以位夏氏曰此史緫敘舜之徳曰若稽古說見堯典漢孔氏曰華謂文徳言其光又重合於堯吕氏曰重華者堯舜並出盛徳輝光重光合照如日月逓明常有輝光相映與堯渾然無異如乾之二五大人交相見之時夏氏曰或以重華為舜號非也漢孔氏曰濬深哲智也舜有深智文明温恭之徳信允塞上下程子曰温粹和也塞充寔也朱子曰細分是八事緫是四事深沈而有智文理而光明和粹而恭敬信寔而充塞真氏曰唐虞之時未有誠字此云允塞即誠義也按詩既明且哲書明作哲明哲字須體認庻徴豫者哲之反豫為疑豫不斷之名則哲乃明見立决之義又經中濬哲維商文明以止温恭朝夕王猶允塞皆两字為一義而歸宿於下一字漢孔氏曰𤣥謂幽潛潛行道徳升聞天朝遂見徴用唐孔氏曰東晉初豫章内史梅頤上孔氏傳猶闕舜典自此乃命以位已上二十八字世所不傳多用王范之註補之而皆以慎徽五典已下為舜典之初至齊蕭鸞建武四年姚方興於大航頭得孔氏傳古文舜典乃表上之事未施行方興以罪致戮至隋開皇初購求遺典始得之慎徽五典五典克從納于百揆百揆時敘賔于四門四門穆穆納于大麓烈風雷雨弗迷陳氏曰此述舜登庸歴試之事漢孔氏曰慎謹徽美也五典五常之教父義母慈兄友弟恭子孝舜慎美篤行斯道舉八元使布之四方五教能從無違命程子曰五典謂父子有親君臣有義夫婦有别長幼有敘朋友有信五者人倫也孔氏所云未盡張氏曰父子至朋友其有分也故謂之五品其有彛也故謂之五典為父子者教之使有親為君臣者教之使有義至於夫婦長幼朋友亦然故謂之五教朱子曰從順也此盖使為司徒之官也漢孔氏曰揆度也度百事緫百官納舜于此官舜舉八凱使揆度百事百事時敘無廢事業新安王氏曰入處其位故曰納朱子曰百揆惟唐虞有之猶周冢宰敘序也時敘以時而序漢孔氏曰穆穆美也四門四方之門舜流四凶族四方諸侯來朝者舜賔迎之皆有美徳無凶人朱子曰古者以賔禮親邦國諸侯各以方至而使主焉故曰賔穆穆和之至也此盖又兼四岳之官也漢孔氏曰麓錄也納舜使大錄萬機之政隂陽和風雨時各以其節不有迷錯愆伏明舜之徳合于天蘇氏曰自漢以來有大錄萬機之説章帝始置太𫝊錄尚書事而晉以後彊臣将篡者為之考其文盖古文麓作㯟故誤耳太史公云堯使舜入山林川澤暴風雷雨舜行不迷此其寔也朱子曰麓山足也吕氏曰大麓之說不同惟太山之麓者頗近意堯使舜攝行祭祀于太山之麓而風雨不迷耳李氏曰以孟子考之所謂主事而事治即五典克從百揆時敘四門穆穆之類是也所謂主祭而百神享即納于大麓烈風雷雨弗迷是也帝曰格汝舜詢事考言乃言厎可績三載汝陟帝位舜讓于徳弗嗣吴氏曰自此至帝乃殂落雜載舜二十八年居稱事漢孔氏曰格來詢謀乃汝厎致陟升也堯呼舜曰來汝所謀事我考汝言汝言致可以立功三年矣三載考績故命使升帝位将禪之舜辭譲於徳不堪不能嗣承帝位吕氏曰舜非姑遜乃兢業不已之意龜山揚氏曰堯禪舜為時中朱子曰堯命舜曰汝陟帝位舜譲于徳弗嗣則是不居其位也其曰受終于文祖不居其位不稱其號只是攝行其職事後來舜遜于禹不復言位止曰緫朕師其曰汝終陟元后則今不陟也正月上日受終于文祖漢孔氏曰上日朔日也終謂堯終帝位之事文祖者堯文徳之祖廟陳氏曰正月上日與月正元日正月朔旦一也互文相備唐孔氏曰堯之文祖不知謂誰不可彊言吕氏曰言受終則舜正始可知必於祖廟見堯不敢私以天下與人為天下得人其責方塞舜在廟受堯付託祗懼之意不言可知在璿璣玉衡以齊七政漢孔氏曰璿美玉璣衡王者正天文之器可運轉者七政日月五星各異政舜察天文齊七政以審已當天心與否朱子曰未必然只是從新整理起此其最當先理㑹者唐孔氏曰玉是大名璿是玉之别稱璣衡俱以玉餙但史變其文璣為轉運衡為横簫運機使動於下以衡望之漢世以來謂之渾天儀是也蔡邕天文志云言天體者有三家一曰周髀二曰宣夜三曰渾天宣夜絶無師説周髀術數具在考驗天象多所違失故史官不用惟渾天者近得其情今史所用候臺銅儀則其法也王蕃渾天説云渾天言其形體渾渾然其術以為天半覆地上半在地下其天居地上見有一百八十二度半彊地下亦然北極出地上三十六度南極入地下亦三十六度而嵩髙正當天之中極南五十五度當嵩髙之上又其南十二度為夏至之日道又其南二十四度為春秋分之日道又其南二十四度為冬至之日道南下去地三十一度而已是夏至日北去極六十七度春秋分去極九十一度冬至去極一百一十五度此其大率也其南北極持其两端天與日月星宿斜而廻轉此必古有其法遭秦而㓕漢宣帝時耿夀昌始鑄銅為之象史官用焉宋元嘉年錢樂鑄銅作渾天儀衡長八尺孔徑一寸璣徑八尺圎周二丈五尺彊轉而望之有其法也朱子曰渾天儀歴代以來為儀三重其在外者曰六合儀平置黑單環上刻十二辰八千四隅在地之位以凖地面而定四方側立黒䨇環背刻去極度數以中分天脊直跨地平使其半出地上半入地下而結於其子午以為天經斜倚赤單環背刻赤道度數以平分天腹横繞天經亦使半出地上半入地下而結於其卯酉以為天緯三環表衷相結不動其天經之環則南北二極皆為圎軸虚中而内向以挈三辰四逰之環以其上下四方於是可考故曰六合次其内曰三辰儀側立黒䨇環亦刻去極度數外貫天經之軸内挈黄赤二道其赤道則為赤單環外依天緯亦刻宿度而結扵黒䨇環之卯酉其黄道則為黄單環亦刻宿度而又斜倚於赤道之腹以交結於卯酉而半入其内以為春分後之日軌半出其外以為秋分後之日軌又為白單環以承其交使不傾墊下設機輪以水激之使其日月随天東西運轉以象天行以其日月星辰於是可考故曰三辰其最在内者曰四逰儀亦為黒䨇環如三辰儀之制以貫天經之軸其環之内則两面當中各施直距外指両軸而當其要中之内面又為小窽以受玉衡要中之小軸使衡既得随環東西運轉又可随處南北低昂以待占侯者之仰窺焉以其東西南北無不周徧故曰四逰此其法之大畧也沈括云舊法規環一面刻周天度一面加銀丁盖以夜候天晦不可目察則以手切之也古人以璿餙璣疑亦為此今銅儀制亦以銅丁為之厯家之說又以北斗魁四星為璣杓三星為衡今詳經文簡質不應北斗二字乃用寓名恐未必然姑存其説以廣異聞焉按朱子渾儀説又有漢東俞氏震儀表法要編敘六合儀所謂平置黒單環者名地平環一名隂渾一名單横規一名全渾規一名地盤平凖一名隂緯單環上刻壬子癸丑艮寅甲卯乙辰巽巳丙午丁未坤申庚酉辛戌乾亥此地面四方之象也所謂側立黒䨇環者名天經環古名外䨇規一名陽經䨇規上刻周天度數與地平相結於子午半出其上半入其下子以上出地平三十六度為北極樞孔午以下入地平三十六度為南極樞孔此天半在地上半在地下之象也所謂斜倚赤單環者名天緯環一名天常單環一名百刻單環上下與天經相銜去南北極各九十一度少弱東西與地平相銜當卯酉之位此天腹赤道之象也三辰儀所謂側立黒䨇環者制即如天經黒䨇環在内而差小但彼不可動而此㘅附黄赤二環以轉動耳所謂赤道環者制亦如天緯赤單環在内而差小上下與三辰䨇環相㘅去南北極各九十一度少弱所謂黄道環者上下亦與三辰䨇環相㘅而南出赤道環二十四度弱北入赤道環亦二十四度弱東西與赤道環交互相㘅之處正環上所刻卯酉春秋二分之處也所謂白單環者鎖定黄赤二環或不用以水激輪可省人運亦或不用四逰儀所謂黒䨇環者制亦如三辰儀之黒䨇環在内而又小以揭直距所謂直距者銅版二縱置於四逰儀内上屬北極下屬南極中施關軸以夾望筒所謂望筒者即王衡也一名窺筒一名窺管一名横簫其筒中空兩首各為方掩方掩中各開圜孔以透窺測右渾儀三重六合天經䨇環䘖附地平天緯二單環也三辰䨇環㗸附黄赤道二單環也四逰䨇環㘅附直距與望筒也六合之規大於三辰三辰之規大於四逰六合不動以象天地四方三辰運動以象天行四逰則亦運動而窺測焉䨇環䨇鑄一様二合而為一故厚可貫管軸單環單鑄故薄其天經環南北二極之次有孔㘅軸以穿三辰四逰於内使可運轉軸如管虚中其外有臍两層以間隔三辰四逰之位次尺度則地平單環徑八尺闊五寸厚一寸半天經䨇環徑八尺闊五寸厚八分两環合一寸六分天緯單環徑七尺八寸一分闊九分厚五分三辰䨇環徑七尺四寸八分闊一寸八分厚七分两環合一寸四分黄赤二道徑七尺二寸一分闊九分厚六分四逰䨇環徑六尺二寸八分闊一寸八分厚八分半两環合一寸七分直距二長各如四逰環内徑闊一寸六分厚八分望簡長随直距方一寸六分两首方掩方一寸七分中開圜孔徑七分半平地之下擎以龍柱四各髙七尺七寸植於水槽上槽名水跌或名水平其臺舊為十字或為方井中鑿水道相通行水水平則渾儀正矣如前尺度特其大約要之廣袤長短厚薄随宜增損有不必拘但得規模分布度次均凖相㘅交結樞竅無差則窺測不患其無凖矣以上俞氏説附載於此朱子曰七者運行於天有遲有速有順有逆猶人君之有政事也曾氏曰歩七政之軌度時數以轉璣窺衡而不差焉故曰齊其不齊者乃陵歴鬬食盈縮犯守不如璣衡則為變異也肆類于上帝禋于六宗望于山川徧于羣神漢孔氏曰肆遂也唐陸氏曰上帝天也朱子曰類祭名周禮肆師類造上帝註云郊祀者祭吴天之當祭非常祀而祭告于天其禮依郊祀為之故曰類漢孔氏曰精意以享謂之禋宗尊也所尊祭者其祀有六謂四時寒暑日月星水旱祭亦以攝告唐孔氏曰祭法云埋少牢於泰昭祭時相近於坎壇祭寒暑王宫祭日夜明祭月幽宗祭星雩宗祭水旱朱子曰六宗只當用祭法或問晉初張髦三昭三穆之説如何朱子曰古者昭穆不盡稱宗惟祖有功宗有徳故云祖文王而宗武王且如漢之廟惟文帝稱太宗武帝稱世宗至唐乃盡稱宗此不足為據漢孔氏曰九州名山大川五岳四瀆之屬皆一時望祭之羣神謂丘陵墳衍古之聖賢皆祭之朱子曰望祭名張氏曰山川之逺不可徧至而祀望祀之而已矣鄭氏曰徧周羣衆也唐孔氏曰祭法云有天下者祭百仲陳氏曰祭不及祖先者意其因受終文祖見之歟輯五瑞既月乃日覲四岳羣牧班瑞于羣后漢孔氏曰輯歛覲見班還后君也舜歛公侯伯子男之瑞圭璧盡以正月中乃日日見四岳及九州牧監還五瑞於諸侯與之正始唐孔氏曰周禮典瑞云公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧盖諸侯執之以為符信故稱瑞程子曰輯瑞徴五等諸侯也此以上皆正月事盡此月則四方諸侯有至者矣逺近不同來有先後故日日見之不如他朝㑹同期於一日也朱子曰羣牧九州之牧伯毛氏曰守養六畜曰牧州牧取守養之義陳氏曰諸侯君國故得稱后嵗二月東巡守至于岱宗柴望秩于山川肆覲東后恊時月正日同律度量衡修五禮五玉三帛二生一死贄如五器卒乃復五月南巡守至于南岳如岱禮八月西巡守至于西岳如初十有一月朔巡守至于北岳如西禮歸格于藝祖用特漢孔氏曰諸侯為天子守土故稱守巡行之既班瑞之明月乃順春東巡岱宗泰山為四岳所宗燔柴祭天告至程子曰非是當年二月夏氏曰但謂巡守之嵗祭氏曰泰山在襲慶府奉符縣唐陸氏曰爾雅祭天曰燔柴馬云祭時積柴加牲其上而燔之漢孔氏曰東岳諸侯竟内名山大川如其秩次望祭之謂五岳牲禮視三公四瀆視諸侯其餘視伯子男朱子曰秩者其牲幣祝號之次第漢孔氏曰遂見東方之國君漢孔氏曰合四時之氣節月之大小日之甲乙使齊一也律法制及尺丈斛斗斤两皆均同唐陸氏曰同齊也漢律歴志曰律黄帝所作也黄帝使伶倫自大夏之西崑崙之隂取竹之解答生其竅厚均者斷两節之間而吹之以為黄鐘之宫是為律本又曰律十有二陽六為律隂六為吕律一曰黄鐘二曰太蔟三曰姑洗四曰㽔賔五曰夷則六曰亡射吕一曰林鐘二曰南吕三曰應鐘四曰大吕五曰夾鐘六曰仲吕又曰度者分寸尺丈引所以庚長短也本起黄鐘之長以子穀秬黍中者一黍之廣度之九十分黄鐘之長一為一分十分為寸十寸為尺十尺為丈十丈為引五度審矣量者龠合升斗斛所以量多少也本起黄鐘之龠以子穀秬黍中者千有二百實其龠以井水凖其槩十龠為合十合為升十升為斗十斗為斛五量嘉矣權者銖两斤鈞石所以稱物平施知輕重也本起黄鐘之重一龠容千二百黍重十二銖二十四銖為两十六两為斤三十斤為鈞四鈞為石五權謹矣權與物鈞而生衡按漢鄭氏月令註曰凡律空圍九分唐孔氏䟽曰諸律雖長短有差其圍皆以九分為限蔡邕銅龠銘曰龠黄鐘之宫長九寸空圍九分容秬黍一千二百粒稱重十二銖两之為一合西山蔡氏參釋之曰空圍九分盖空圍中九分也又曰黄鐘累九十黍以為長積千二百黍以為廣又按程子曰以律管定尺乃是以天地之氣為凖非秬黍之比也秬黍積數在先王時惟此適與度量合故可用今時則不同又蔡氏曰律吕散亡其器不可復見然古人所以制作之意則猶可考今欲求聲氣之中而莫適為凖則莫若且多截竹以擬黄鐘之管或極其短或極其長長短之内每差一分而為一管皆即其長權為九寸而度其圎徑如黄鐘之法焉如是而史迭以吹則中聲可得淺深以列則中氣可驗茍聲和氣應則黄鐘之為黄鐘者信矣黄鐘者信則十一律與度量權衡皆得矣若秬黍則嵗有豐凶地有肥瘠種有長短大小圎妥不同尤不可恃况古人謂子穀秬黍中者寔其龠則是先得黄鐘而後度之以黍不足則易之以大有餘則易之以小約九十黍之長中容千二百之實以見周徑之廣以生度量衡之數而已非律生於黍也百世之下欲求百世之前之律其求於聲氣之元母必之於秬黍則得之矣以上𤼵明又詳故附載朱子曰時月之差由積日而成其法則先粗而後精度量衡受法於律其法則先本而後末故言正日在恊時月之後同律在度量衡之先立言之敘盖如此也按厯以紀數象以觀運表以測景律以候氣皆推占造化制度虞書言厯象一言律三賔餞敬致識表景也制作非巡守時事特考厯考律使與王國合而已漢孔氏曰修吉凶賔軍嘉之禮朱子曰修品節之也唐孔氏曰周禮大宗伯以吉禮事邦國之鬼神示以凶禮哀邦國之憂以賔禮親邦國以軍禮同邦國以嘉禮親萬民之婚姻周之五禮亦當是前代之禮漢孔氏曰五等諸侯執其玉三帛諸侯世子執纁公之孤執𤣥附庸之君執黄二生卿執羔大夫執鴈一死士執雉玉帛生死所以為贄以見之應氏曰五瑞命圭也五玉五器贄玉也新安王氏云贄與瑞不同瑞者上頒而下守之以為有國之符信贄者下獻而上受之以明享上之儀物記曰凡贄諸侯圭周禮小行人六幣圭璋璧琮琥璜享后用琮餘有五玉其所贄之玉歟覲禮侯氏朝瑞玉有藻侯氏取圭斤致命王受之則所頒之瑞也享玉皆束帛加璧侯氏所致命王還玉不受以示輕財則所贄之玉也此説得之蘇氏曰執以見曰贄漢孔氏曰卒終復還也器謂圭璧如五器禮終則還之三帛生死則否唐孔氏曰如若也聘禮云以圭璋聘重禮也已聘而還圭璋此輕財重禮之義也聘義主於説聘意朝禮亦然漢孔氏曰南岳衡山自東岳南巡五月至蔡氏曰南岳在潭州衡山縣唐孔氏曰柴望以下一如岱宗之禮漢孔氏曰西岳華山初謂岱宗蔡氏曰西岳在華州華隂縣唐孔氏曰其禮如岱宗初行漢孔氏曰北岳恒山蔡氏曰北岳在定州曲陽縣唐孔氏曰亦如西岳之禮漢孔氏曰巡守四岳然後歸告至文祖之廟藝文也言祖則考著特一牛朱子曰藝祖疑即文祖或云文祖藝祖之所自出未有可考古者君將出必告于祖禰歸又至其廟而告之孝子不忍死其親出告反面之義也王制鄭注云祖下及禰皆一牛程子以為但言藝祖舉尊耳實皆告也但止就祖廟共用一牛不如時祭各設主於其廟也二説未知孰是文中子叔恬問曰舜一嵗而巡五岳國不費而民不勞何也曰兵衛少而徴求寡也吕氏曰歸格藝祖一語可見聖人之心夫舜負天地萬物之責持兢業危懼之心徧巡天下諸侯既無不順然後歸見祖廟而無愧使一民未遂一物未宜其歸格為何如舜之心慊然而有愧藝祖之靈慊然而不滿此身將若無所容想舜歸格藝祖時此心無愧肅肅在廟惟純于敬而已矣五載一巡守羣后四朝敷奏以言明試以功車服以庸漢孔氏曰各會朝于方岳之下凡四處故曰四朝将説敷奏之事故申言之許氏曰朝覲君之緫稱朱子曰五載之内天子廵守者一諸侯來朝者四盖巡守之明年則東方諸侯來朝又明年則南方諸侯來朝又明年則西方諸侯來朝又明年則北方諸侯來朝又明年則天子復巡守是則天子諸侯雖有尊卑而一徃一來禮無不答是以上下交通而逺近洽和也漢孔氏曰敷陳奏進也諸侯四朝各使陳進治理之言明試其言以要其功功成則賜車服以表顯其能用程子曰敷奏以言者使各陳其為治之説言之善者則從而明考其功有功則賜車服以旌異之其言不善則亦有以告飭之矣吕氏曰五年間如此提督警䇿過使人情制度為之一新此聖人操持大權治天下妙用處林氏曰舜巡守則有恊時月以下等事諸侯來朝則有敷奏以言以下等事肇十有二州封十有二山濬川漢孔氏曰肇始也禹治水之後舜分冀州為幽州并州分青州為營州始置十二州唐孔氏曰十二州終舜之時常然左傳云夏之方有徳貢金九牧則禹登王位還置九州按劉侍讀説書序九共共當為丘九篇篇一州也以此推之肈州建師咨牧皆攝政及即位中間事則釐下土合九州安知非其後随時闔闢再更定乎謂十二州終舜之時常然恐未必爾漢孔氏曰封大也每州之名山殊大者以為其州之鎮有流川則深之使通利蘇氏曰封殖也謂禁採伐王氏曰濬者冶而深之之謂又曰十二州之山川皆封培而濬之盖山川所以表識又天地間生民之大利於是乎出也吴氏曰此一節在禹治水後其次不當在四罪之先盖史泛記舜所行之大事初不計先後之序也象以典刑流宥五刑鞭作官刑扑作教刑金作贖刑眚災肆赦怙終賊刑欽哉欽哉惟刑之恤哉流共工于幽洲放驩兜于崇山竄三苖于三危殛鯀于羽山四罪而天下咸服漢孔氏曰象法也王氏曰象者垂以示人之謂若周官垂治象刑象之法于象魏是也朱子曰典刑常刑即五刑也漢孔氏曰宥寛也以流放之法寛五刑五刑墨劓剕宫大辟朱子曰流遣之使去如下文流放竄殛之類是也漢孔氏曰以鞭為治官事之刑朱子曰鞭者木末垂革唐孔氏曰周禮滌狼氏誓大夫曰敢不關鞕五百左傳鞭徒人費圉人犖是也若於官事不治則鞭之量状加之未必有定數漢孔氏曰朴榎楚也不勤遒業則撻之唐孔氏曰大射鄉射皆云司馬搢扑則扑亦官刑惟言作教刑者官刑鞭扑俱用教刑惟扑而已故屬扑於教漢孔氏曰金黄金誤而入刑出金以贖罪唐孔氏曰古之金銀銅鐡緫號為金此金銅也古之贖罪皆用銅漢孔氏曰眚過災害肆緩賊殺也過而有害當緩赦之怙姦自終當刑殺之朱子曰眚謂過誤災謂不幸肆縱也赦釋之也怙謂有恃終謂再犯漢孔氏曰舜陳典刑之義勑天下使敬之憂欲得中漢孔氏曰象恭滔天足以惑世故流放之幽州北裔水中可居者曰洲漢孔氏曰黨於共工罪惡同崇山南裔朱子曰放置之於此不得他適也崇山今在澧州漢孔氏曰三苖國名縉雲氏之後為諸侯號饕餮三危西裔朱子曰竄則驅逐禁錮之三危即雍之所謂三危既宅者漢孔氏曰方命圯族績用弗成殛竄放流皆誅也異其文述作之體羽山東裔在海中朱子曰殛則拘囚困苦之羽山即徐之蒙羽其藝者漢孔氏曰皆服舜用刑當其罪故作者先敘典刑而連引四罪明皆徴用所行於此緫見之程子曰舜誅四凶怒在四凶舜何與焉盖因是人有可怒之事而怒之聖人之心本無怒也聖人以天下之怒為怒故天下咸服之朱子曰象以典刑五刑之正也所以待夫元惡大憝殺人傷人穿窬滛放凡罪之不可宥者也流宥五刑所以待夫罪之稍輕雖入于五刑而情可矜法可疑與夫親貴勲勞不可加以刑者則以此寛之也鞭作官刑官府之刑也扑作教刑學校之刑也皆以待夫罪之輕者金作贖刑罪之極輕雖入于鞭扑之刑而情法猶有可議者也此五句者從重入輕各有條理法之正也眚災肆赦若人有如此而入於刑則不待流宥金贖而直赦之也怙終賊刑若人有如此而入於刑則雖當宥當贖亦不許其宥不聼其贖而必刑之也此二句者或由重而即輕或由輕而即重蓋用法之權衡所謂法外意也聖人立法制刑之本末此七言者大畧盡之矣雖其輕重取舍陽舒隂慘之不同然欽恤之意未始不行其間也盖其輕重毫釐之間各有攸當者乃天討不易之定理而欽恤之意行乎其間則可見聖人好生之本心也據此經文五刑有流宥而無金贖周禮秋官亦無其文至吕刑乃有五等之罰疑穆王始制之非法之正也蓋當刑而贖則失之輕疑赦而贖則失之重且使富者幸免貧者受刑既非所以為平而又有利之之心焉聖人之法必不然矣又曰流宥所以寛五刑贖刑所以寛鞭扑真氏曰欽恤二言百聖相傳此其心法而用刑特一事耳四凶之罪不加以五者之正刑而止從流宥既仁之至迸諸四夷不與同中國又義之盡流放竄殛舊説以為誅殺非也儻果誅之則於市於朝不於四裔矣大率曰流曰放若後之安置居住曰竄曰殛若後之羈管編隷是故後之讀書至此有曰四凶之罪止從流竄而嘆後世刑網之宻嗚呼真異世同心者歟二十有八載帝乃殂落百姓如喪考妣三載四海遏密八音漢孔氏曰殂落死也堯年十六即位七十載求禪試舜三載自正月上日至崩二十八載尭死壽一百一十七載林氏曰魂氣歸於天故曰殂體魄降於地故曰落漢孔氏曰考妣父母許氏曰喪亡也曲禮曰生曰父曰母死曰考曰妣鄭云考成也言其徳行之成妣之為言媲也媲於考也漢孔氏曰遏絶密靜也八音金石絲竹匏土革木唐陸氏曰金鐘也石磬也絲琴瑟也竹箎笛也匏笙也土塤也革鼓也木柷敔也朱子曰儀禮圻内之民為天子齊衰三月圻外之民無服今應服三月者如喪考妣應無服者遏密八音見聖徳廣大恩澤隆厚故思慕之深至於如此陳氏曰四海自絶樂非若後世禁樂邵子皇極經世紀堯甲辰年即位癸丑徴時登庸乙卯遜於位至舜二十八年乃殂逋在位一百年月正元日舜格于文祖唐孔氏曰自此以下言舜真為天子命百官受職之事漢孔氏曰月正正月元日上日也舜服堯喪三年畢将即政故復至文祖廟告唐孔氏曰前以攝政告今以即政告詢于四岳關四門明四目達四聦漢孔氏曰謀政治於四岳吕氏曰舜繼堯以通下情為出治之首務四岳者累朝之元老當代之蓍龜故首詢之漢孔氏曰開闢四方之門未開者廣致衆賢廣視聼於四方使天下無壅塞朱子曰闢開也逹通也開闢四方之門以受天下之朝貢廣四方之視聼以决天下之壅蔽唐孔氏曰告廟既訖乃謀政治於四岳之官所謀開四方之門也明四方之目也達四方之聦也咨十有二牧曰食哉惟時柔逺能邇惇徳允元而難任人蠻夷率服咨説見堯典朱子曰十二牧十二州之牧漢孔氏曰所重在於民食惟當敬授民時朱子曰王政以食為首農事以時為先漢孔氏曰柔安邇近也言當安逺乃能安近唐孔氏曰以牧在逺方故據逺言之漢孔氏曰惇厚元善之長任佞難拒也朱子曰徳有徳之人元仁厚之人任古文作壬包藏凶惡之人言當厚有徳信仁人而拒姦惡也吕氏曰難者非特去之而已常有戒懼之意少不戒懼則彼得乗間投隙雖有上數件前功俱廢矣蠻夷説見禹貢吕氏曰此數語教十二牧以為治之大綱如桑麻穀粟初無驚人可喜之論大抵於根本求之十二牧領此而歸豈有為國生事如後世求邊功者舜曰咨四岳有能奮庸熈帝之載使宅百揆亮采恵疇僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉禹拜稽首讓于稷契暨臯陶帝曰俞汝徃哉漢孔氏曰奮起庸功載事也訪羣臣有能起𤼵其功廣堯之事者言舜曰以别堯吕氏曰奮勵激昂之人興廢補弊之時用之可也舜時天下已治復奮其庸不幾于生事乎盖天下之理不進則退常存奮起之心所以為生生不窮日新之道應氏曰云熙帝載者見舜于堯兢兢然惟恐負其付託雖易世之後不敢忘漢孔氏曰亮信惠順也唐孔氏曰舜本以百揆攝位既即政故求置其官林氏曰亮有輔相之義如寅亮天地之亮疇如九疇之疇疇類也謂弼亮朝廷之事各順其類而不至于倒行逆施漢孔氏曰四岳同辭而對禹代鯀為崇伯入為天子司空冶洪水有成功言可用之朱子曰禹姒姓鯀之子漢孔氏曰然其所舉稱禹前功以命之懋勉也惟居是百揆勉行之朱子曰盖使仍作司空而兼行百揆之事錄其舊績而勉其新功也以司空兼百揆如周以六卿兼三公後世以他官平章事知政事之比漢孔氏曰居稷官者棄也契臯陶二臣名稽首首至地唐孔氏曰周禮大祝九􅉔一曰稽首稽首為敬之極是拜内之别名禹拜乃稽首故云拜稽首朱子曰稷田止官稷名棄姓姬氏封於邰契姓子氏封於商稷契皆帝嚳子唐孔氏曰臯陶即庭堅髙陽氏漢孔氏曰然其所推之賢不許其譲勑使徃宅百揆帝曰棄黎民阻飢汝后稷播時百榖漢孔氏曰阻難播布也衆人之難在于飢汝后稷播種是百穀以濟之美其前功以勉之張氏曰棄以名命稷以官稱朱子曰阻厄也后謂有邰之君如所謂三后后䕫皆有爵土之稱也穀非一種故曰百穀此亦因禹之譲而又申命之帝曰契百姓不親五品不遜汝作司徒敬敷五教在寛漢孔氏曰遜順也布五常之教務在寛所以得人心亦美其前功五品五教説見前司徒説見周官朱子曰聖賢於事無不敬此又事之大者故特以敬言之寛者寛裕以待之也盖五者之理出于人心之本然非有彊而後能者自其拘于執質之偏溺于物慾之蔽始有昧于其理而不相親受不相遜順者敬以敷教而又寛裕以待之此亦因禹之譲又申命之帝曰臯陶蠻夷猾夏宼賊姦宄汝作士五刑有服五服三就五流有宅五宅三居惟明克允漢孔氏曰猾亂也夏華夏羣行攻劫曰宼殺人曰賊在外曰姦在内曰宄曾氏曰中國文明之地故曰革夏林氏曰此非境外之蠻夷盖九州之内有蠻夷與民雜居為民害者漢孔氏曰士理官也服從也謂服罪也行刑當就三處大罪于原野大夫於朝士於市林氏曰孔說三就本國語然經言五服是五刑皆然而此止於大辟耳應氏曰刑與事稱之謂服疑可已矣而聖人未遽已也必再三審决求其至當而後已就者獄辭之成者一就之不足而至于再再就之不足而至於三謂三就也易曰革言三就豈非參錯審訂省其已成之説乎周禮有三刺三赦三宥之法王制三公以獄之成告於王王三宥然後制刑盖雖後世斷刑尚有三覆奏五覆奏者况隆古之盛乎漢孔氏曰謂不忍加刑則流放之若四凶者五刑之流各有所居五居之差有三等之居大罪四裔次九州之外次千里之外應氏曰罪不輕流而必羈糜全護随所在而有以宅之流而各奠其所宅則既得其所安矣而亦不限以一處且斟酌區處别而為三自非窮凶極惡不可移徙者未有不以斬而使之自新也如王制不帥教之人自左鄉移之右自右鄉移之左不變移之郊不變移之遂又不變屏之逺方未嘗不以其漸而行之也漢孔氏曰言臯陶能明信五刑施之逺近蠻夷猾夏使咸信服無敢犯者孫氏曰惟明則情偽畢知克允則輕重適當真氏曰是亦前章欽恤之意蓋欽恤者聖人用刑之心明允者聖人用刑之法朱子曰此亦因禹之譲而申命之孫氏曰凡問而後命譲而後受者皆新命也不問而命不譲而受者皆申命也帝曰疇若予工僉曰垂哉帝曰俞咨垂汝共工垂拜稽首讓于殳斨暨伯與帝曰俞徃哉汝諧漢孔氏曰問誰能順我百工事者朱子曰若順其理而治之也曲禮六工有土工金工石工木工獸工草工周禮有攻木之工攻金之工攻皮之工設色之工摶埴之工皆是也張氏曰守其法信其度此之謂若非作為竒技􅁋巧漢孔氏曰朝臣舉垂垂臣名朱子曰垂有巧思荘子謂攦工倕之指是也共工説見堯典林氏曰汝共工猶言汝后稷謂欲使汝為共工也漢孔氏曰殳斨伯與二臣名林氏曰殳一也斨二也伯與三也中加暨字三人無疑朱子曰殳以積竹為兵建兵車者斨方銎斧也古者多以其所能為名殳斨豈能為二器者歟漢孔氏曰汝能諧和此官朱子曰不聼其譲也吕氏曰聖人事事物物無不全備與後世技巧工匠咸精其能者事同而意異也帝曰疇若予上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞益拜稽首讓于朱虎熊羆帝曰俞徃哉汝諧漢孔氏曰上謂山下謂澤順謂施其政教取之有時用之有節應氏曰虞衡作山澤之材而舜之命略不反此惟曰若予上下草木鳥獸此聖人不急於致用而急於遂物之宜盖成天下之大順者自致天下之大利故曰若漢孔氏曰言伯益能之林氏曰伯益即伯翳其後為秦漢孔氏曰虞掌山澤之官曾氏曰益之為虞非一山一澤盖為衆虞之長漢孔氏曰朱虎熊羆二臣名林氏曰四臣名左傳有仲虎仲熊虎與熊二人則朱羆亦二人朱子曰以獸為名意亦以能服是獸得名歟史記云朱虎熊羆為益之佐前殳斨伯與當亦為垂之佐徃諧説見上章朱子曰亦不聽其譲也帝曰咨四岳有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗夙夜惟寅直哉惟清伯拜稽首讓于夔龍帝曰俞徃欽哉漢孔氏曰三禮天地人之禮朱子曰典主也林氏曰典禮之職於吉凶賔軍嘉無所不統然實以郊廟祭祀為主故但言三禮漢孔氏曰伯夷臣名姜姓漢孔氏曰秩序宗尊也主郊廟之官夏氏曰宗如宗主之宗故長子主器謂之宗子秩宗云者豈非以天秩之禮而是禮彼實主之乎故成周掌邦禮者謂之宗伯掌都家之禮者謂之都宗人家宗人漢孔氏曰夙早也言早夜敬思其職典禮施政教使正直而清明朱子曰直者心無私曲之謂人能敬以直内無少私曲則心清而無物慾之汙可交神明林氏曰寅則敬而不慢直則正而不諂清則㓗而不汙三者事郊廟交鬼神之道也漢孔氏曰夔龍二臣名漢孔氏曰然其賢不許譲真氏曰勑伯夷獨曰欽者禮之本敬而已陳氏曰禹益垂伯夷皆遜舜答之各異曰汝徃哉徃哉汝諧徃欽哉乃史互文相備盖徃者必能諧能諧斯可徃雖諧亦當敬也帝曰夔命汝典樂教胄子直而温寛而栗剛而無虐簡而無傲詩言志歌求言聲依永律和聲八音克諧無相奪倫神人以和夔曰於予擊石拊石百獸率舞漢孔氏曰胄長也謂元子以下至卿大夫子弟唐孔氏曰説文云胄𦙍也王制云樂正崇四術立四教王太子王子羣后之太子卿大夫元士之適子皆造焉鄭註云王子王之庻子也吕氏曰典樂教胄子夔之職兼二事也樂感人也深故掌樂必兼教之任周大司樂掌成均之法合國之子弟漢之太常猶領太學以此教人不在規矩誦說之間矣漢孔氏曰教之正直而温和寛𢎞而能莊栗剛失入虐簡失入傲教之以防其失朱子曰剛堅強不屈之意簡者不煩之謂虐暴虐也直温寛栗所以因其徳性之善而輔翼之也二無字與母同剛無虐簡無傲所以防其氣質之遇而矯揉之也教胄子者欲其如此而教之之具專在于樂盖所以蕩滌邪穢斟酌飽滿動盪血脉流通精神養其中和之徳而救其氣質之偏也漢孔氏曰謂詩言志以導之歌永其義以長其言鄭氏曰人聲曰歌張子曰詩者樂章也又曰永言只是轉其聲令人可聼今歌者亦以轉聲而不變字為善朱子曰心之所之謂之志心有所主必形於言故曰詩言志既形於言則必有長短之節故曰歌永言漢孔氏曰聲謂五聲宫商角徴羽律謂六律六吕十二月之音氣言當依聲律以和樂唐杜氏曰宫生徴徴生商商生羽羽生角三分宫數八十一分各二十七下生者去一去二十七餘五十四以為徴故徴數五十四三分徴數五十四分各十八上生者加一加十八於五十四得七十二以為商故商数七十二三分商数七十二分各二十四下生者去一去二十四得四十八以為羽故羽數四十八三分羽數四十八分各十六上生者益一加十六於四十八得六十四以為角故角􅁆六十四此五聲大小之次也朱子曰五聲之序宫最大而沈濁羽最細而輕清商之大次宫徴之細次羽而角居四者之中唐杜氏曰先王通于倫理以候氣之管為樂聲之均以子為黄鐘丑為大吕寅為太簇卯為夾鐘辰為姑洗已為仲吕午為蕤賔未為林鐘申為夷則酉為南吕戌為無射亥為應鐘周禮大師鄭氏註曰黄鐘初九也下生林鐘之初六林鐘又上生太簇之九二太蔟又下生南吕之六二南吕又上生姑洗之九三姑洗又下生應鐘之六三應鐘又上生蕤賔之九四蕤賔又上生大吕之六四大吕又下生夷則之九五夷則又上生夾鐘之六五夾鐘又下生無射之上九無射又上生仲吕之上六黄鐘長九寸其實一龠下生者三分去一上生者三分益一五下六上乃一終矣大吕長八寸二百四十三分寸之一百四太蔟長八寸夾鐘長七寸二千一百八十七分寸之千七十五姑洗長七寸九分寸之一仲吕長六寸萬九千六百八十三分寸之萬二千九百七十四㽔賔長六寸八十一分寸之二十六林鐘長六寸夷則長五寸七百二十九分寸之四百五十一南吕長五寸三分寸之一無射長四寸六千五百六十一分寸之六千五百二十四應鐘長四寸二十七分寸之二十四朱子曰歌既有長短則必有清濁髙下之殊歌聲長而濁者為宫以漸而清且短則為商為角為徴為羽所謂聲依永也聲既冇長短清濁則又必以十二律和之乃能成文而不亂假令黄鐘為宫則太蔟為商姑洗為角林鐘為徴南吕為羽蓋以三分損益隔八相生而得之餘律皆然即禮運所謂五聲六律十二管還相為宫所謂律和聲也按唐杜氏曰五聲六律還相為宫若黄鐘之均以黄鐘為宫林鐘為徴太蔟為商南吕為羽姑洗為角若大吕之均以大吕為宫夷則為徴夾鐘為商無射為羽仲吕為角所謂迭為宫商角徴羽也若黄鐘之律自為其宫為夾鐘之羽為仲吕之徴為夷則之角為無射之商此黄鐘之五聲大吕之律自為其宫為姑洗之羽為㽔賔之徴為南吕之角為應鐘之商此大吕之五聲所謂五聲六律十二管還相為宫者也此還宫例即朱所云又樂律殊品制器随之其還宫有宫律短而四律反長則乖而不和故有半律子聲之法詳見周禮註杜氏通典蔡氏律吕新書漢孔氏曰倫理也八音能諧理不錯奪則神人咸和命夔使勉之八音説見前朱子曰八音金石為衆音之綱絲竹匏土包括於其中而革木二音無當於五聲十二律故最居後而但為衆音之節林氏曰先王之樂本之情性稽之度數自直而温至歌永言本之情性也聲依永律和聲稽之度數也夏氏曰大司樂以樂徳教國子中和祗庸孝友以樂語教國子興道諷誦言語自直而温至簡而無傲此教之樂徳也自詩言志至律和聲此教之樂語也朱子曰聖人作樂以養情性育人才事神祗和上下其體用功效廣大深切如此漢孔氏曰石磬也磬音之清者拊亦擊也舉清者和則其餘皆從矣樂感百獸使相率而舞則神人和可知唐孔氏曰擊是大擊拊是小擊蔡氏曰有大磬有編磬有歌磬磬有大小故擊有輕重八音特言石者盖石音屬角最難諧和記云磬以立辨夫樂以和為主而磬聲獨立辨者以其難和也石聲和則無不和矣夏氏曰此亦因伯夷之譲稱其所掌而申戒之帝曰龍朕堲讒說殄行震驚朕師命汝作納言夙夜出納朕命惟允漢孔氏曰堲疾殄絶震動也言我疾讒說絶君子之行而動驚我衆欲遏絶之張氏曰燒土為堲所謂堲周是也燭燼為堲所謂折堲是也盖堲有息滅之義堲之使不生也朱子曰讒譖也殄行傷絶善人之事也驚駭也言之不正而能變亂黒白以駭衆聼也漢孔氏曰納言喉舌之官聼下言納于上受上言宣于下必以信唐孔氏曰此官主聽下言納於主故以納言為名亦主受上言宣于下故言出朕命納言不納于下朕命有出無入官名納言云出納朕命互相見也朱子曰命令政教必使審之既允而後出則讒説不得行而矯偽無所託敷奏復逆必使審之既允而後入則邪僻無自進而功緒有所稽周之内史漢之尚書魏晉以來所謂中書門下者皆此職也夏氏曰此亦因伯夷之譲稱其所掌而申戒之也帝曰咨汝二十有二人欽哉惟時亮天工漢孔氏曰禹垂益伯夷夔龍六人新命有職四岳十二牧凡二十二人特勑命之或問四岳是一人是四人朱子曰汝能庸命巽朕位不成譲與四人又如曰咨汝二十有二人乃四岳九官十二牧尤見得四岳止是一人漢孔氏曰各敬其職惟是乃能信立天下之功陳氏曰功事也典天敘禮天秩服天命刑天討無非天事吕氏曰欽哉惟時亮天功二十二人治職之統要也三載考績三考黜陟幽明庻績咸熈分北三苖唐孔氏曰此以下史述舜事非帝語也漢孔氏曰三年有成故以考功九嵗則能否幽明有别黜退其幽者升進其明者鄭氏曰黜退也漢孔氏曰考績法明衆功皆廣三苖幽暗君臣善否分北流之不令相從善惡明庻績咸熈說見堯典朱子曰此言舜命二十二人之後立此考績黜陟之法以時舉行而卒言其效如此北猶背也其善者留不善者竄徙之使分背而去也三苖見於典謨益稷禹貢吕刑詳矣盖其負固不服乍臣乍叛舜攝位而竄逐之禹治水之時三危已宅而舊都猶頑不即工及禹攝位帝命徂征而猶逆命及禹班師而後來格於是乃得考其善惡而分北之吕刑言遏絶則通本末而言不可以先後論吕氏曰分北三苖與堯典燭書共工之事同見萬國皆順執也舜生三十徴庸三十在位五十載陟方乃死朱子曰此于篇末緫序始終漢孔氏曰言其始見試用朱子曰徴召也舜生三十堯召用之漢孔氏曰歴試二年攝位二十舜年唐孔氏曰在位在臣位也漢孔氏曰方道也即位五十年升道南方巡守死於蒼梧之野而葬焉林氏曰蘇氏謂陟方猶曰升遐耳顧命曰惟新陟王是也陟方乃死與楊子曰黄帝堯舜殂落而死文勢正同皇極經世紀舜丙辰即位至禹十七年陟方乃死通為夀一百一十年帝釐下土方設居方别生分類作汨作九共九篇稾飫漢孔氏曰言舜理四方諸侯各設其官居其方生姓也别其姓族分其類使相從陳氏曰設置也别即分也互文漢孔氏曰汨治作興也言其治民之功興故為汨作之篇劉氏曰汨作言釐下土致治興功之道九共共當作丘古文丘共相近故誤耳即所謂八索九丘九丘者所謂方設居方别生分類也九篇篇一州也伏生大𫝊曰九共書曰予辨下土使民平平使民無傲漢孔氏曰稾勞也飫賜也唐孔氏曰亦不知勞賜之何所謂也漢孔氏曰凡十一篇皆亡唐孔氏曰此序也孔以書序序所以為作者之意冝相附近故引之各冠其篇首其經亡者以序附於本篇次而為之𫝊既不見其經闇射無以可中順其文為𫝊耳是非不可知也他皆傲此尚書纂傳卷二
