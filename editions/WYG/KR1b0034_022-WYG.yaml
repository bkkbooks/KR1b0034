body:
  text: 尚書纂傳卷二十二元王天與撰洪範第六周書武王勝殷殺受立武庚以箕子歸作洪範漢孔氏曰不放而殺紂自焚也武庚紂子以為王者後一名禄父張氏曰立武庚者繼絶世也漢孔氏曰歸鎬京吕氏曰以字不可不深求箕子言我罔為臣僕是無仕周之意以之歸者武王也蘇氏曰箕子之不臣周也曷為武王陳洪範也天以是畀禹而傳至於箕子不可使自我而絶也以武王而不傳則天下無復可傳者矣故為箕子之道者傳道則可仕則不可唐孔氏曰箕子叙述其事作洪範夏氏曰此篇雖箕子之言實周史所録也洪範漢孔氏曰洪大範法也言天地之大法鄭氏曰此篇訓體也蔡氏曰洪範𤼵之於禹箕子推衍増益以成篇今文古文皆有惟十有三祀王訪于箕子唐孔氏叙章指見篇末漢孔氏曰箕子稱祀不忘本夏氏曰武王以十一年伐商洪範之作正武王之十三年也史記謂武王克殷後二年問箕子吕氏曰訪者就而問之孟子所謂大有為之君必有所不召之臣欲有謀焉則就之也王乃言曰嗚呼箕子惟天隂騭下民相協厥居我不知其彞倫攸叙唐孔氏叙章指見篇末唐孔氏曰此問荅皆言乃者以天道之大沈吟乃問思慮乃荅乃緩辭也蔡氏曰箕子稱舊邑爵者未封新爵也漢孔氏曰騭定也天不言而黙定下民是助合其居使冇常生之資唐陸氏曰隂黙也蔡氏曰武王之問蓋曰天於冥冥之中黙有以安定其民輔相保合其居止吕氏曰上棟下宇夏葛冬裘渴飲饑食是孰使之然哉天也漢孔氏曰言我不知天所以定民之常道理次叙間何由真氏曰彞倫者治天下之常理先後本末各有自然之叙君師治教之責於我乎屬而我則未知常理之次叙焉此所以問箕子也吕氏曰武王豈真不知哉云不知者蓋灼見聖學之無窮也箕子乃言曰我聞在昔鯀陻洪水汨陳其五行帝乃震怒不畀洪範九疇彞倫攸斁鯀則殛死禹乃嗣興天乃錫禹洪範九疇彞倫攸叙唐孔氏叙章指見篇末吕氏曰箕子言我聞在昔葢得於遺言大訓非臆説也漢孔氏曰陻塞汨亂也治水失道亂陳其五行程子曰河北但見鯀堤無禹堤鯀陻洪水故無功禹則導之而已唐孔氏曰水是五行之一水性下流鯀反塞之失水之性水失其性則五行皆失矣是塞洪水為亂陳其五行言五行陳列皆亂也漢孔氏曰畀與斁敗也天動怒鯀不與大法九疇故常道所以敗皇天震怒説見湯誥唐孔氏曰九疇言其每事自相類者冇九九者各有一章故漢書謂之九章吕氏曰堯舜之時彞倫未嘗斁也止於鯀身言之耳漢孔氏曰放鯀至死不赦廢父興子堯舜之道程子曰殛死非戮死也猶曰死於放殛不得生還耳朱子曰鯀既被誅禹乃委質所以蓋前人之愆漢孔氏曰天與禹洛出書神龜負文而出列於背有數至於九禹遂因而第之以成九類常道所以次叙真氏曰龜所負者數耳大禹聖人心與天通見其數而知其理因次之為九疇唐孔氏曰易繋辭云河出圖洛出書聖人則之天與禹者即是洛書也禹既第之應人盡知武王獨問箕子者五行志云聖人行其道而寶其真降及於殷箕子在父師之位而典之周既克殷以箕子歸周武王親虚已而問焉言箕子典其事故武王特問之義或然也蔡氏曰闗子明云河圖之文七前六後八左九右洛書之文九前一後三左七右四前左二前右八後左六後右邵子云圓者星也歴紀之數其肈於此乎方者土也畫州并地之法其倣於此乎蓋圓者河圖之數方者洛書之文故羲文因之以造易禹箕叙之而作範也古今傳記自孔安國以來皆以為河圖授羲洛書錫禹闗子明邵康節皆以十為河圖九為洛書蓋大傳既陳天地五十有五之數洪範又明言錫禹九疇而九宫之數戴九履一左三右七二四為肩六八為足正龜背之象也朱子曰易大傳云天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也此夫子所以𤼵明河圖之數也天地之間一氣而已分而為二則為隂陽而五行造化萬物始終無不管攝於是故河圖之位一與六共宗而居乎北二與七為朋而居乎南三與八同道而居乎東四與九為友而居乎西五與十相守而居乎中蓋其所以為數者不過一隂一陽一竒一偶以兩其五行而已天者陽之輕清而位乎上者也地者隂之重濁而位乎下者也陽數竒故一三五七九皆屬乎天所謂天數五也隂數偶故二四六八十皆屬乎地所謂地數五也天數地數各以其類而相求所謂五位之相得者也天以一生水而地以六成之地以二生火而天以七成之天以三生木而地以八成之地以四生金而天以九成之天以五生土而地以十成之此所謂各有合者也此河圖之全數而諸儒之説也至洛書雖夫子所未言然其象其説已具於前有以通之則劉歆所謂經緯表裏者可見矣或曰河圖洛書之數其所以不同者何也曰河圖以五生數統五成數而同處其方蓋揭其全以示人而道其常數之體也洛書以五竒數統四偶數而各居其所蓋主於陽以統隂而肈其變數之用也曰其皆以五居中者何也曰凡數之始一隂一陽而已矣陽之象圓圓者徑一而圍三隂之象方方者徑一而圍四圍三者以一為一故參其一陽而為三圍四者以二為一故兩其一隂而為二所謂參天兩地者也三二之合則為五矣此河圖洛書之數所以皆以五為中也然河圖以生數為主故其中之所以為五者亦具五生數之象其下一點天一之象也其上一㸃地二之象也其左一㸃天三之象也其右一㸃地四之象也其中一㸃天五之象也洛書以竒數為主故其中之所以為五者亦具五竒數之象其下一㸃亦天一之象也其左一㸃亦天三之象也其中一㸃亦天五之象也其右一㸃則天七之象也其上一㸃則天九之象也其數與位皆三同而二異葢陽不可易而隂可易成數雖陽固亦生之隂也曰中央之五既為五數之象矣然則其為數也奈何曰以數言之則通乎一圖由内及外固各有積實可紀之數然河圖之一二三四各居其五象本方之外而六七八九十者又各因五而得數以附於其生數之外洛書之一三七九亦各居其五象本方之外而二四六八者又各因其類以附於竒數之側蓋中者為主而外者為客正者為君而側者為臣亦各有條而不紊也曰其多寡之不同何也曰河圖主全故極於十而竒偶之位均論其積實然後見其偶贏而竒乏也洛書主變故極於九而其位與實皆竒贏而偶乏也必皆虛其中然後隂陽之數均於二十而無偏耳曰其序之不同何也曰河圖以生出之次言之則始下次上次左次右以復於中而又始於下也以運行之次言之則始東次南次中次西次北左旋一周而又始於東也其生數之在内者則陽居下左而隂居上右也其成數之在外者則隂居下左而陽居上右也洛書之次其陽數則首北次東次中次西次南其隂數則首西南次東南次西北次東北也合而言之則首北次西南次東次東南次中次西北次西次東北而究於南也其運行則水克火火克金金克木木克土右旋一周而土復克水也是亦各有說矣曰其七八九六之數不同何也曰河圖六七八九既附於生數之外矣此隂陽老少饒乏之正也其九者生數一三五之積也故自北而東自東而西以成於四之外其六者生數二四之積也故自南而西自西而北以成於一之外七則九之自西而南者也八則六之自北而東者也此又隂陽老少互藏其宅之變也洛書之縱横十五而七八九六迭為消長虚五分十而一含九二含八三含七四含六則參伍錯綜無適而不遇其合焉此變化無窮之所以妙也曰然則聖人之則之也奈何曰則河圖者虛其中則洛書者總其實也河圖之虛五與十者太極也竒數二十偶數二十者兩儀也以一二三四為六七八九者四象也析四方之合以為乾坤離坎補四隅之空以為兊震艮巽者八卦也洛書之實其一為五行其二為五事其三為八政其四為五紀其五為皇極其六為三德其七為稽疑其八為庶徴其九為福極其位與數尤曉然矣曰洛書而虛中五則亦太極也竒偶之各居二十則亦兩儀也一二三四而含七八九六縱横十五而互為七八九六則亦四象也四方之正以為乾坤離坎四隅之偏以為兊震艮巽則亦八卦也河圖之一六為水二七為火三八為木四九為金五十為土則固洪範之五行而五十五者乂九疇之子目也是洛書固可以為易河圖亦可以為範矣是其時雖有先後數雖有多寡其為理則一而已但易乃伏羲之所先得乎圖而初無待於書範則禹之所獨得乎書而未必追考於圖耳且以河圖而虛十則洛書四十有五之數也虛五則大衍五十之數也積五與十則洛書縱横十五之數也以五乘十以十乘五則又皆大衍之數也洛書之五又自含五而得十則通為大衍之數矣積五與十則得十五而通為河圖之數矣茍明乎此則横斜曲直無所不通而河圖洛書又豈有先後彼此之間哉按劉歆云河圖洛書相為經緯八卦九章相為表裏此章止著洛書而顧命亦言河圖故並載初一曰五行次二曰敬用五事次三曰農用八政次四曰協用五紀次五曰建用皇極次六曰乂用三德次七曰明用稽疑次八曰念用庶徴次九曰嚮用五福威用六極唐孔氏叙章指見篇末陳氏曰朱子於初一之下有讀㸃曰此讀也全讀是以一二為次第不見洛書本文又不見聖人法象之義故後人至以此章總為洛書本文皆為句讀不明也下皆倣此漢孔氏曰九類類一章以五行為始真氏曰以其流行於天地之間故曰行唐孔氏曰不言用者五行萬物之本天地萬物莫不用之不嫌非用也漢孔氏曰五事在身用之必敬乃善朱子曰五氣運行人禀之以成形故有五事用者人所有事也凡用皆主人君而言蔡氏曰五事曰敬所以誠身也漢孔氏曰農厚也厚用之政乃成蔡氏曰八政曰農所以厚生也漢孔氏曰和天時使得正用五紀曽氏曰協與恊時月正日之協同陳氏曰其數錯綜而條理不亂是謂紀蔡氏曰五紀曰協所以合天也漢孔氏曰皇大極中伏生大傳作建用王極朱子曰皇極不是大中皇者王也極者如以為民極言王者之身可以為下民之標準蘇氏云至而無餘之謂極亦好唐孔氏曰皇極不言數者以總該九疇理兼萬事非局數所能盡也蔡氏曰皇極曰建所以立極也漢孔氏曰治民必用正直剛柔之三德孫氏曰條理辨治之不紊故曰人用蔡氏曰三德曰乂所以治民也漢孔氏曰明用卜筮考疑之事張氏曰稽之不可不明不明則終於疑矣此所謂明用稽疑也唐孔氏曰稽疑不言數者以卜五筮二共成為七若舉卜不得兼筮舉筮不得兼卜且疑事既衆不可以數總之也蔡氏曰稽疑曰明所以辨惑也唐孔氏曰念用天時衆氣之應驗庶徴不言數者以庶徴得為五休失為五咎若舉休不兼咎舉咎不兼休若休咎並言便為十事本是五物不可言十也蔡氏曰庶徴曰念所以省驗也漢孔氏曰言天所以嚮勸人用五福所以威沮人用六極真氏曰極窮極也與皇極之義不同朱子曰福極通天下人民而言葢人主不以一身為福極而以天下為福極民皆仁夀堯舜之福也民皆鄙夭桀紂之極也蔡氏曰五福曰嚮所以勸也六極曰威所以懲也朱子曰洪範一篇首尾都歸皇極上去葢人君以一身為至極之標準最是不易須是順五行敬五事厚八政協五紀以結裏箇皇極又須乂三德事物之接剛柔之辨須區處教合宜稽疑則考之於神庶徴則驗之於天五福六極則體之於人這下許多維持這皇極真氏曰九疇六十五字耳而天道人事無不該焉原其本皆自人君一身始漢孔氏曰此已上禹所第叙唐孔氏曰不知洛書本有㡬字五行忘云凡此六十五字皆洛書本文計天言簡要必無次第之數初一曰等二十七字必禹所加也其敬用農用等一十八字大劉及顧氏以為龜背先有總三十八字小劉以為敬用等亦禹所第叙其龜文惟有二十字並無明據未知孰是朱子曰洛書本文只有四十五㸃諸儒說皆未是恐只是以義起不是數如此一五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘唐孔氏叙章指見篇末朱子曰一五行者次第之辭與前章異後倣此漢孔氏曰皆其生數唐孔氏曰易繫辭云天一地二天三地四天五地六天七地八天九地十此即五行生成之數天一生水地二生火天三生禾地四生金天五生上此其生數也如此則陽無匹隂無偶故地六成水天七成火地八成木天九成金地十成土於是隂陽各有匹偶而物得成焉故謂之成數也人數之所起起於隂陽隂陽徃来在於日道十一月冬至日南極陽來而隂徃冬水位也以一陽生為水數五月夏至日北極隂極而陽退夏火位也當以一隂生為火數但隂不名竒數必以偶故以六月二隂生為火數是故易説乾貞於十一月子坤貞於六月未而皆左行由此也冬至以及於夏至當為陽來正月為春木位也三陽已生故三為木數夏至以及冬至當為隂進八月為秋金位也四隂已生故四為金數三月春之季四季土位也五陽生故五為土數此其生數之由也又萬物之本有生於無著生於微及其成形亦以微著為漸五行先後亦以微著為次五行之體水最微為一火漸著為二木形實為三金體固為四土質大為五亦是次之宜大劉與顧氏皆以為水火木金得土數而成故水成數六火成數七木成數八金成數九土成數十義或然也周子太極圖説曰無極而太極太極動而生陽動極而静静而生隂静極復動一動一静互為其根分隂分陽兩儀立焉陽燮隂合而生水火木金土五氣順布四時行焉五行一隂陽也隂陽一太極也太極本無極也朱子曰有太極則一動一静而兩儀分有隂陽則一變一合而五行具然五行者質具於地而氣行於天者也以質而語具生之序則曰水火木金土而水木陽也火金隂也以氣而語其行之序則曰木火土金水而木火陽也金水隂也又統而言之則氣陽而質隂也又錯而言之則動陽而静隂也蓋五行之變至於不可勝窮然無適而非隂陽之道至其所以為隂陽者則無適而非太極之本然也唐五行志曰五行見象於天為五星分位於地為五方行於四時為五德禀於人為五常用於人為五材播於音律為五聲發於文章為五色而總其精氣為五行人禀五行之秀以生故於物為最靈王氏曰五行之為物其時其位其材其氣其性其形其事其情其色其聲其臭其味皆各有偶推而散之無所不通一剛一柔一晦一明故有清有濁有正有邪有美有惡有吉有凶性命之理道德之意皆在是矣偶之中又有偶焉萬物之變遂至於無窮朱子曰潤下潤濕而下流炎上炎熱而上升曲直謂生而有曲有直從革謂可因可革無定體種曰稼斂曰穡土性發生稼穡乃所生之大者蘇氏曰曰者所以名之也土不曰曰而言爰爰於也土無成名無專器無定位言於此稼穡而非所以名之也張子曰水火氣也故炎上潤下與隂陽升降上不得而制焉木金者上之華實也其性有水火之雜故木之為物水漬則生火然而不離也葢得土之浮華於水火之變也金之為物得火之精於土之燥得水之精於土之濡故水火相得而不害爍之反流而不秏蓋得土之精實於水火之際也木曰曲直能既曲而反申也金曰從革一從革而不能自反也上者物之所以成始而成終也地之質也化之終也水火之所以升降物兼體而不遺也朱子曰張子此説一字不可増減鄭氏曰此五行即六府也蓋主生民日用之利而言之唐孔氏曰水性本甘久浸其地變而為鹵鹵味乃鹹月令冬云其味鹹是也火性炎上焚物則焦焦是苦氣月令夏云其味苦是也木生子實其味多酸五果之味雖殊其為酸一也月令春云其味酸是也金之在火别有腥氣非苦非酸其味近辛月令秋云其味辛是也穀是土之所生故甘為土之味月令中央云其味甘是也言曰者言其本性言作者從其發見指其體則稱曰致其類即言作下五事庶徴言曰作者義亦然也蘇氏曰五行之所作不可勝言所可言者聲色臭昧而已人之用是四者惟味為急故舉味以見其餘唐孔氏曰此章所演文有三重第一言其名次第二言其體性第三言具氣味二五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰睿恭作肅從作乂明作哲聰作謀睿作聖唐孔氏曰貌舉身之大名言是口之所出視是目之所見聽是耳之所聞思是心之所慮真氏曰貌言視聽思五者相須而不相離也而孔子之告顔淵乃獨弗及乎思何哉蓋視聽言貌身之用也而主之者心也心有所主然後四者之發惟吾之為聽不然耳目口體紛然用事其能合乎禮者㡬希然則勿云者正即心而言也張氏曰㳟敬之見於貌也從謂從理而不悖也聦明説見堯典曽氏曰思者所以充人之材以至於其極聖者人之極也或曰不思而得何也蓋自誠而明者不思而得堯舜性之者也自明而誠者思之弗得弗措湯武身之者也程子曰思慮久後睿自然生又曰致思如掘井初有渾水久則稍引動得清者出來人思慮始若溷濁久自明快吕氏曰曰字當與水曰潤下一般看蓋其本然如此如貌本㳟不恭則非貌餘亦然陳氏曰自恭而充之齊一清整而能肅自從而充之理當人服而能乂自明而充之洞達立決而能哲自聦而充之審善定計而能謀自睿而充之則無所不通而能聖周子曰洪範思曰睿睿作聖無思本也思通用也㡬動於彼誠動於此無思而無不通為聖人不思則不能通微不睿則不能無不通是則無不通生於通微通微生於思故思者聖功之本而吉凶之㡬也吕氏曰作字是工夫處然亦是自然唐孔氏曰此章所演亦為三重第一言其所名第二言其所用第三言其所致緫説五行五事相配唐孔氏曰五行傳曰貌屬木言屬金視屬火聽屬水思屬土五行傳伏生之書也木有華葉之容故貌屬木言之斷決若金之斷割故言屬金火外光故視屬火水内明故聽屬水土安靜而萬物生心思慮而萬事成故思屬土又易東方震為足所以動容貌也西方兊為口口出言也南方離為目目視物也北方坎為耳耳聽聲也土在内猶思在心也亦是五屬之義也五行志曰貌之不恭是謂不肅則木不曲直言之不從是謂不乂則火不炎上視之不明是謂不哲則土不稼穡聽之不聦是謂不謀則金不從革思之不睿是謂不聖則水不潤下蘇氏曰脾之發為貌而主土肺之發為言而主金肝之發為視而主木腎之發為聽而主水心之發為思而主火自黄帝以來知醫者言之詳矣諸儒之説皆失之朱子曰吳人傑云貌是水言是火視是木聽是金思是土與庶徴之序相脗合蔡氏曰貌澤水也言揚火也視散木也聴收金也思通土也按四説伏生漢志多牽彊蘇氏雖有據亦未順洪範之序惟吳蔡説五行五事庶徴皆順三八政一曰食二曰貨三曰祀四曰司空五曰司徒六曰司寇七曰賔八曰師漢孔氏曰勸農業林氏曰務農重穀之政如井田補助之類漢孔氏曰貨用物林氏曰阜通貨財之政如懋遷有無化居之類漢孔氏曰敬鬼神以成教林氏曰報本反始之政社稷宗廟山川百神以至公卿大夫士庶莫不祭其先之類漢孔氏曰主空土以居民林氏曰度地居民之政如辨方正位體國經野使士農工商各得其所之類漢孔氏曰主徒衆教以禮義林氏曰教之以政如學校選舉之類漢孔氏曰主姦盜使無縱林氏曰立法懲姦宄之政如五刑之屬三千之類漢孔氏曰禮賔客無不敬林氏曰交際酬酢之政如冠昬喪祭鄉相見之類漢孔氏曰簡師所任必良士卒必練林氏曰寓兵於農以修武備之政如鄉遂教閱之法之類唐孔氏曰食貨祀賔師指事為之名三卿舉官為名者三官所主事多若以一事為名則所掌不盡故舉官名以見義陳氏曰八政在唐虞時食貨合為一而稷掌之粒烝民而遷有無是也祀則秩宗掌之司空司徒司寇皆有之惟司寇謂之士而兼兵師之職賔雖不知其何官所謂賔於四門是也蘇氏曰周禮建六官主八政食貨則天官祀賔則春官師則夏官司空則冬官司徒則地官司冦則秋官朱子曰此八政是箇大綱舉天下之事其大者已該備於此如周禮一書只是箇八政而已四五紀一曰歳二曰月三曰日四曰星辰五曰歴數漢孔氏曰所以紀四時歳説見堯典漢孔氏曰所以紀一月唐孔氏曰從朔至晦大月三十日小月二十九日漢孔氏曰紀一日唐孔氏曰從夜半以至明日夜半周十二辰為一日星辰説見堯典歴數説見大禹謨唐孔氏曰五紀不言時者以歳月氣節正而四時亦自正時隨月變非歴所推故不言時也五紀為此次者歳統月月統日星辰見於天其曰歴數緫歴四者故歳為始歴為終也五皇極皇建其有極斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極凡厥庶民無有淫朋人無有比德惟皇作極凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之而康而色曰予攸好德汝則錫之福時人斯其惟皇之極無虐㷀獨而畏髙明人之有能有為使羞其行而邦其昌凡厥正人既富方榖汝弗能使有好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直㑹其有極歸其有極曰皇極之敷言是彞是訓于帝其訓凡厥庶民極之敷言是訓是行以近天子之光曰天子作民父母以為天下王按此章當以朱子説為主今先載訓詁語録及諸説㣲異處而後繋以皇極辯皇極説見前或問何以能斂五福朱子曰當就五行五事上推究人君修身使貌恭言從視明聽聦思睿即身自正五者得其正則五行得其序以之稽疑則龜從筮從卿士從庶民從在庶徴則有休徴無咎徴有仁壽無鄙夭便是五福反是則福轉而極又日斂者非有以取之於外亦自吾身先得其正然後率天下之民以歸於正此錫福之道也蔡氏曰人君敷錫其福以與衆民使人人觀感而化所謂敷錫也當時之人亦皆於君之極與之保守不敢失墜所謂錫保也漢孔氏曰民無淫過朋黨之惡比周之德蔡氏曰人有位之人比德私相比附也朱子曰有猷有為如可以託孤寄命有守如臨大節而不可奪若漢霍光雖有猷有為只是無所守王氏曰詩云載色載笑匪怒伊教而康而色之謂漢孔氏曰㷀單無兄弟也無子曰獨單獨者不侵虐之寵貴者不枉法畏之陳氏曰㷀獨謂孤寒寡援者髙明謂勢位尊顯者漢孔氏曰凡其正直之人既當以爵禄富之又當以善道接之漢孔氏曰偏不平陂不正應氏曰古文無皆作母唐藝文志曰開元十四年𤣥宗以無偏無頗聲不協詔改頗為陂陳氏曰遵循也千夫有道萬夫有路此言道路互辭也道路即義之可通行者也陳氏曰偏謂偏於已黨謂黨於人蔡氏曰黨不公也反倍常也側不正也漢孔氏曰蕩蕩言開闢平平言辯治蔡氏曰蕩蕩廣逺也平平平易也正者無邪直者無曲陳氏曰君能㑹其有極則民皆歸其有極吕氏曰㑹如㑹聚之㑹歸如歸宿之歸朱子曰自皇建其有極以下緫說人君立至極之標準而天下化之之義自無偏無陂以下反覆歌詠正說皇極體段自曰皇極之敷言以下推本結一章之大意馬氏曰天子作民父母武王以之首泰誓箕子以之終皇極或以為民稱頌恐失其指朱子曰洛書九數而五居中洪範九疇而皇極居五故自孔氏傳訓皇極為大中而諸儒皆祖其説余獨嘗以經之文義語脉求之而有以知其必不然也蓋皇者君之稱也極者至極之義標準之名常在物之中央而四外望之以取正焉者也故以極為在中之準的則可而便訓極為中則不可若北辰之為天極脊棟之為屋極其義皆然而禮所謂民極詩所謂四方之極者於皇極之義為尤近顧今之説者既誤於此而并失於彼是以其説展轉迷謬而終不能以自明也即如舊説姑亦無問其他但即經文而讀皇為大讀極為中則夫所謂惟大作中大則受之為何等語乎今以余説推之則人君以眇然之身履至尊之位四方輻凑面内而環觀之自東而望者不過此而西也自南而望者不過此而北也此天下之至中也既居天下之至中則必有天下之絶德而後可以立至極之標準故必順五行敬五事以修其身厚八政協五紀以齊其政然後至極之標準卓然有以立乎天下之至中使夫面内而環觀者莫不於是而取則焉語其仁則極天下之仁而天下之為仁者莫能加也語其孝則極天下之孝而天下之為孝者莫能尚也是則所謂皇極者也由是而權之以三德審之以卜筮驗其休咎於天考其禍福於人如挈裘領豈有一毛之不順哉此洛書之數所以雖始於一終於九而必以五居其中洪範之疇所以雖本於五行究於福極而必以皇極為之主也若箕子之言有曰皇建其有極云者則以言夫人君以其一身而立至極之標準於天下也其曰斂時五福用敷錫厥庶民云者則以言夫人君能建其極則為五福之所聚而乂有以使氏觀感而化焉則是又能布此福而與其民也其曰惟時厥庶民至錫汝保極云者則以言夫民視君以為至極之標準而從其化則是復以此福還錫其君而使之長為至極之標準也其曰凡厥庶民無有淫朋人無有比德惟皇作極云者則以言夫民之所以有是德者皆君之德有以為至極之標準也其曰凡厥庶民至皇則受之云者則以言夫君既立極於上而下之從化或有淺深遲速之不同其有謀者有才者有德者人君固當念之而不忘其或未能盡合而未抵乎大戾者亦當受之而不拒也其曰而康而色至時人斯其惟皇之極云者則以言夫人之有能革面從君而以好德自名則雖未必出於中心之實人君亦當因其自名而與之以善則是人者亦得以君為極而勉其實也其曰無虐㷀獨至而邦其昌云者則以言夫君之於民一視同仁凡有才能皆使進善則人材衆多而國賴以興也其曰凡厥正人至其作汝用咎云者則以言夫凡欲正人者必先有以富之然後可以納之於善若不能使之有所頼於其家則此人將必陷於不義至其無復更有好德之心而後始欲教之以修身勸之以求福則已無及於事而其起以報汝惟有惡而無善矣葢人之氣禀或清或濁或純或駁有不可以一律齊者是以聖人所以立極乎上者至嚴至密而所以接引乎下者至寛至廣雖彼之所以化於此者淺深遲速其效或有不同而吾之所以應於彼者長養涵育其心未嘗不一也其曰無偏無陂至歸其有極云者則以言夫天下之人皆不敢徇其已之私以從乎上之化而㑹歸乎至極之標準也葢偏陂好恶者己私之生於心者也偏黨反側者己私之見於事者也王之義王之道王之路上之化也所謂皇極者也遵義遵道遵路方㑹其極也蕩蕩平平正直則已歸於極矣其曰皇極之敷言至於帝其訓云者則以言夫人君以身立極而布命於下則其所以為常為教者皆天之理而不異乎上帝之降衷也其曰凡厥庶民至以近天子之光云者則以言夫天下之人於君所命皆能受其教而謹行之則是能不自絶逺而有以親被其道德之光華也其曰天子作民父母以為天下王云者則以言夫人君能立至極之標準所以能作億兆之父母而為天下之王也不然則有其位無其德不足以首出庶物統御人羣而履天下之極尊矣是書也原於天之所以錫禹雖其茫昧幽眇有不可得而知者然箕子之所以言之而告武王者則已備矣顧其詞之宏深奥雅若有未易言者然嘗試虛心平氣而再三反覆焉則亦坦然明白而無一字之可疑但先儒未嘗深求其意而不察乎人君所以修身立道之本是以誤訓皇極為大中又見其詞多為含洪寛大之言因復誤認中為含糊苟且不分善惡之意殊不知極雖居中而非有取乎中之義且中之為義又以其無過不及至精至當而無有毫釐之差亦非如其所指之云也乃以誤認之中為誤訓之極不謹乎至嚴至密之體而務為至寛至廣之量其弊將使人君不知修身以立政而墜於漢元帝之優游唐代宗之姑息卒至於是非顛倒賢否貿亂而禍敗隨之尚何斂福錫民之可望哉六三德一曰正直二曰剛克三曰柔克平康正直彊弗友剛克燮友柔克沈潛剛克髙明柔克惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僭忒正直説見上文剛柔説見臯陶謨唐陸氏曰克馬云勝也朱子曰剛克主於剛勝柔克主於柔勝吕氏曰正直言皇極本體然也剛克柔克言皇極之用然也漢孔氏曰世平安用正直治之陳氏曰如唐虞待於變之民周家待二南之俗是也漢孔氏曰友順也世彊禦不順以剛治之陳氏曰如舜待四凶周待三監是也漢孔氏曰燮和也世和順以柔治之陳氏曰如湯武漢髙光唐太宗懷撫新附之民是也張氏曰遇平康則正直為中遇彊弗友則剛克為中遇燮友則柔克為中此所謂時中也蔡氏曰沈潛者深沈潛退不及中者也髙明者髙亢明爽過乎中者也資質沈潛者當以剛治之資質髙明者當以柔治之平康正直無所事乎矯拂無為而治是也彊弗友燮友沈潛髙明蓋習俗之偏氣禀之過者也彊弗友剛克以剛克剛也燮友柔克以柔克柔也沈潛剛克以剛克柔也髙明柔克以柔克剛也正直之用一而剛柔之用四也聖人撫世酬物因時制宜三德乂用陽以舒之陰以斂之執其兩端用其中于民所以納天下民俗於皇極者蓋如此漢孔氏曰言惟君得專威福為美食華氏曰周官八柄馭羣臣爵禄予生皆作福也置奪廢誅皆作威也唐陸氏曰玉食珍食也林氏曰玉食凡服食器用乘輿服御皆在其中此人主之名器所以尊崇萬乘之勢者唐孔氏曰此經福威與食於君每事言辟於臣則并文而略之也作福作威謂秉國之權勇略震主者也人用側頗僻者謂在位小臣見彼大臣威福由已由此之故小臣皆附下罔上為此側頗僻也下民見此在位小臣秉心僻側用此之故下民皆不信恒為此僭差也言在位由大臣下民由在位故皆言用也真氏曰或謂吳楚嘗僭天子三家嘗僭諸侯不閒其害與凶何邪曰吳楚之篡奪相尋季孟之家臣繼叛非凶害而何吁洪範九疇箕子受之於禹大禹受之於天片言隻字莫非天理而可違乎以此坊民猶有竊弄威福如齊田氏選物上第盡歸私室如漢董賢者袁氏曰三德所以開乂治之福窒僭亂之原也世有盛德時乂之君必無上下僭差之患中正健順緫持制御上下辨而民志定矣七稽疑擇建立卜筮人乃命卜筮曰雨曰霽曰蒙曰驛曰克曰貞曰悔凡七卜五占用二衍忒立時人作卜筮三人占則從二人之言汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從筮從卿士從庶民從是之謂大同身其康彊子孫其逢吉汝則從龜從筮從卿士逆庶民逆吉卿士從龜從筮從汝則逆庶民逆吉庶民從龜從筮從汝則逆卿士逆吉汝則從龜從筮逆卿士逆庶民逆作内吉作外凶龜筮共違于人用静吉用作凶漢孔氏曰龜曰卜蓍曰筮考正疑事當選擇知卜筮人而建立之建立其人命以其職朱子曰龜歳久則靈蓍生百年一本百莖亦物之神靈者卜筮問鬼神以蓍龜神靈之物故假之以驗其卦兆卜法以明火爇柴灼龜為兆筮法以四十九蓍分掛揲扐凡十有八變而成卦林氏曰如周禮大卜掌三兆三龜之法卜師掌開龜之四兆龜人掌六龜之屬菙氏掌共燋契以待卜事占人掌占龜皆是漢孔氏曰龜兆形有似雨者有似雨止者蒙隂闇氣絡驛不連屬兆相交錯五者卜兆之常法唐孔氏曰今之用龜其兆横者為土立者為木斜向徑者為金背徑者為火因兆而細曲者為水不知與此同異如何此五兆不言一曰二曰者灼龜所遇無先後也蔡氏曰雨者如雨其兆為水霽者開霽其兆為火蒙者蒙昧其兆為木驛者絡驛其兆為金克者相錯有相勝之意其兆為土漢孔氏曰内卦曰貞外卦曰悔朱子曰貞悔不止一説如六十四卦則每卦内卦為貞外卦為悔如揲蓍成卦則本卦為貞之卦為悔漢孔氏曰卜筮之數唐孔氏曰卜筮兆卦其法有七事其卜兆用五雨霽蒙驛克也其筮占用二貞與悔也唐孔氏曰卜筮皆就此七者推衍其變陳氏曰卜之變如經兆之體百有二十其頌千有二百體色墨拆方功義弓之類筮之變如老陽變為少隂老隂變為少陽一卦變為六十四卦六十四卦變為四千九十六卦之類引而伸之觸類而長之其變無有終窮漢孔氏曰立是知卜筮人使為卜筮之事夏殷周卜筮各異三法並卜從二人之言善鈞從衆卜筮各三人唐孔氏曰覆述上句立卜筮人也周禮大卜掌三兆之法一曰玉兆二曰瓦兆三曰原兆掌三易之法一曰連山二曰歸藏三曰周易三法並卜法有一人故三人也葉氏曰孔氏以三人為三法所掌箕子之前安得遽有周易蔡氏曰凡卜筮必立三人以相參考謂之三人非三卜筮也漢孔氏曰將舉事而汝則有大疑先盡汝心以謀慮之次及卿士衆民然後卜筮以決之林氏曰大疑若周官所謂凡國大貞卜立君卜大封皆國之大事而未決者漢孔氏曰人心和順龜筮從之是謂大同於吉動不違衆故後世遇吉朱子曰此條無問尊卑其謀皆配於龜筮故為大同之吉髙氏曰舜之禪禹朕志先定詢謀僉同龜筮協從此大同也故歴數在躬啓能敬承成王宅洛周召營相四方和會卜惟洛食此大同也故卜年八百終過其歴身其康彊子孫逢吉可知矣唐孔氏曰此必臣民皆從乃問卜筮而進龜筮於上者尊神物故先言之不在汝則之上者卜當有主故以人為先下三事亦然改卜言龜者卜是請問之意吉凶龜占兆告於人故改言龜也筮則本是蓍名故不須改也朱子曰心者人之神明其虛靈知覺無異於鬼神雖龜筮之靈不至踰於人故自此以下必以人謀為首然鬼神無心而人有欲人之謀慮未必盡無適莫之私故自此以下皆以龜筮為主人雖不盡從不害為吉若龜筮從逆則凶咎必矣漢孔氏曰三從二逆中吉亦可舉事朱子曰此條惟君謀配於龜筮亦吉吕氏曰如盤庚遷都心已無疑卜稽如合獨臣民不肯遷何害於吉唐孔氏曰此與下二事皆是三從二逆除龜筮以外有汝與卿士庶民分三者各為一從二逆嫌其貴賤有異從逆或殊故三者各以有一從為主見其吉同也漢孔氏曰君臣不同決之卜筮亦中吉朱子曰此條惟卿士謀配於龜筮亦吉吕氏曰此如周公東征成王未知民亦蠢動獨在朝大臣與二公及卜筮知之亦終於吉唐孔氏曰此論得吉以從者為主故次言卿士從下言庶民從以從為主故退汝則於下漢孔氏曰民與上異心亦卜筮以決之朱子曰此條惟庶民謀配於龜筮亦吉漢孔氏曰二從三逆龜筮相違故可以祭祀冠婚不可以出師征伐朱子曰此條龜筮一從一違本不可舉事但筮短龜長又尊者之謀配合故内事吉外事凶蔡氏曰有龜從筮逆而無筮從龜逆者龜尤聖人所重也故禮記大事卜小事筮自夫子賛易極蓍卦之德蓍重而龜書不傳云漢孔氏曰皆逆安以守常則吉動則凶朱子曰此條龜筮皆逆於人謀縱有從者動必凶矣八庶徴曰雨曰𤾉曰燠曰寒曰風曰時五者來備各以其敘庶草蕃廡一極備凶一極無凶曰休徴曰肅時雨若曰又時暘若曰哲時燠若曰謀時寒若曰聖時風若曰咎徴曰狂恒雨若曰僭恒𤾉若曰豫恒燠若曰急恒寒若曰蒙恒風若曰王省惟歳卿士惟月師尹惟日歳月日時無易百穀用成又用明俊民用章家用平康日月歳時既易百穀用不成乂用昬不明俊民用微家用不寧庶民惟星星有好風星有好雨日月之行則有冬有夏月之從星則以風雨漢孔氏曰雨以潤物𤾉以乾物煖以長物寒以成物風以動物五者各以其時所以為衆驗唐孔氏曰不言一曰二曰者為其來無先後也五行傳言雨屬木𤾉屬金燠屬火寒屬水風屬土朱子曰舊説相配皆錯亂了惟吳斗南説雨屬水暘屬火燠屬木寒屬金風屬土其説為順漢孔氏曰言五者備至各以次叙則衆草蕃滋廡豐也唐孔氏曰下言百穀此言庶草者舉草茂盛則穀成必矣舉輕以明重也漢孔氏曰一者備極過甚則凶一者極無不至亦凶謂不時失叙王氏曰極備極無饑饉疫癘之所由作故曰凶漢孔氏曰叙美行之驗漢孔氏曰君行敬則時雨順之朱子曰肅是恭肅便自有滋潤㡳意思漢孔氏曰君行政治則時𤾉順之朱子曰又則整治便有開明底意思漢孔氏曰君能照晢則時燠順之朱子曰哲是普照便有和暖底意思漢孔氏曰君能謀則時寒順之朱子曰謀是藏密便自有寒結底意思漢孔氏曰君能通理則時風順之朱子曰聖是通明便自有爽快底意思漢孔氏曰叙惡行之驗漢孔氏曰君行狂疾則常雨順之唐孔氏曰人君行不敬則狂妄故狂對肅李氏曰狂則蕩故恒雨若漢孔氏曰君行僭差則常𤾉順之唐孔氏曰政不治則僭差故僭對乂李氏曰僭則亢故恒𤾉若漢孔氏曰君行逸豫則常燠順之唐孔氏曰明不照物則行自逸豫故豫對哲朱子曰豫猶豫明不足也李氏曰豫則解緩故恒燠若漢孔氏曰君行急則常寒順之唐孔氏曰心無謀慮則行必急躁故急對謀李氏曰急則縮栗故恒寒若漢孔氏曰君行蒙闇則常風順之唐孔氏曰性不通曉則行必蒙闇故蒙對聖李氏曰蒙則冥其心思無所不害故恒風若朱子曰庶徴若不細心體識如何㑹見得如漢儒之説有某事必有某應固難盡信但古人意精密只於五事上體察是有此理如王荆公又都不説感應只以若字作譬喻説則人君亦不必警戒矣如漢儒之説固不可如王荆公全不相闗之説尤不可漢孔氏曰王所省職兼所緫羣吏如歳兼四時卿士各有所掌如月之有别衆正官之吏分治其職如日之有歳月曽氏曰此章之所言皆念用庶徴也休咎之徴各象其事任其事者王也與王共其任者卿士師尹也則庶徴之來王與卿士師尹當省其所以致之者所謂念用庶徴也王計一歳之徴而省之卿士師尹計一月一日之徴而省之所省多者其任責重所省少者其任責輕其所處之分然也林氏曰先儒君臣取象説與休咎之徴全為隔膜惟曽氏説得之按林氏評二說如此然以下文語例之則體象之中又及占象其曰王省惟歳卿士惟月師尹惟日庶民惟星是王卿士師尹如歳月日之統會庶民如列星之衆多體象説也至其考歳月日時之不易既易與日月運行之為冬為夏月星感召之為風為雨又占象説也周官辨十二歳星辰日月訪序事傳言日官底日漢世星摇亦以為民勞之占此類甚衆夫惟體象占象無徃不足然後為能參賛範圍盡其所以省念庶徴之道云漢孔氏曰各順常歳月日時無易則百榖成君臣無易則政治明賢臣顯用國家平寧林氏曰歳月日之時各循其常度無所變易則年穀豐登紀網修明賢才彚進家國安彊休徴見於天下矣蔡氏曰休徴言歳月日者緫於大也漢孔氏曰是三者已易喻君臣易職君失其柄權臣擅命治闇賢隠國家亂林氏曰日月歳之時失其常度而至於陵歴鬬食有餘不足則水旱相仍紀綱揉亂賢才擯棄患難日臻咎徴見於天下矣蔡氏曰咎徴言日月歳時者著其小也漢孔氏曰星民象故衆民惟若星箕星好風畢星好雨亦民所好日月之行冬夏各有常度君臣政治小大各有常法月經於箕則多風離於畢則多雨政教失常以從民欲亦所以亂林氏曰漢班固天文之説為善其説以謂日有中道月有九行中道者黄道北至東井去北極近南至牽牛去北極逺東至角西至婁去極中夏至至於東井去北極近故晷短冬至至於牽牛去北極逺故晷長春秋分日至婁角去極中而晷中此日去極逺近之差晷景長短之制也日陽也陽用事則日進而北晝進而長陽勝故為温暑隂用事則日退而南晝退而短隂勝故為風寒此皆行必循軌故所以有冬夏也若日之南北失節晷進而長為常寒退而短為常燠月有九行者黒道二出黄道北赤道二出黄道南白道二出黄道西青道二出黄道東立春春分月東從青道立秋秋分西從白道立冬冬至北從黒道立夏夏至南從赤道青赤出陽道白黒出隂道若月失節度而妄行出陽道則旱風出隂道則隂雨箕星為風東北之星也月失中道移而東北出箕則多風西方為雨雨少隂之位也月失中道移而西南入畢則多雨言失中道而東西也班固此言諸儒議論所未至庶民惟星者謂王及卿士師尹皆休咎之所出故各有所省以知已之得失至於庶民則其所省者不在於歳月日時之躔度惟以月所麗之星者以星有好風星有好雨日月之行則有冬有夏月之從星則以風雨故也星有好風星有好雨者即孟堅所謂月失中道移而東北入箕則多風移而西南入畢則多雨蓋以其失中道而東西故也孟堅之意蓋以謂日月之麗於天所歴有常度所行有常道則雨𤾉寒燠風各以時至無有失節故能使萬物莫不茂遂年榖時熟如或所歴度有過有不及而為南北之贏縮則寒燠之氣必有愆所行之道或彼或此而為東西之附麗則風雨之氣必有過差矣月之遲速以晦朔決之日冬則南夏則北冬至於牽牛夏至於東井月五星皆隨之故有冬有夏併月日而言之也日亦有從星之時而不言者鄭康成云曰之從星不可見故也九五福一曰壽二曰富三曰康寧四曰攸好德五曰考終命六極一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱漢孔氏曰百二十年唐孔氏曰人之大期百年為限世有長壽云百二十者故以最長者言之未必有正文也漢孔氏曰財豐備陳氏曰言富則貴在其中五福通天下而言故不及貴漢孔氏曰無疾病孫氏曰形康而心寧安之至也漢孔氏曰所好者德福之道蘇氏曰作德心逸日休其為福大矣漢孔氏曰各成其長短之命以自終不横夭新安王氏曰盡其道而死者正命也是謂考終楚人執解揚將殺之揚曰下臣獲考死又何求蓋死生命也死而合義亦考終命而非凶上壽百歳中壽八十下壽六十年未六十死以正命雖考終不得謂之夀年過六卜而死非正命雖夀不得謂之考終故壽一福也考終命又一福也漢孔氏曰動不遇吉短未六十折未三十夏氏曰凶短折止是天枉不必分析漢孔氏曰常抱疾苦林氏曰疾者疫癘之類漢孔氏曰多所憂林氏曰憂者不得以樂其生漢孔氏曰困於財林氏曰貧者不得以資其生漢孔氏曰醜陋林氏曰惡者凶暴之謂漢孔氏曰尫劣林氏曰弱者懦弱之謂吕氏曰萬善生於剛萬惡生於弱人之不能自彊為善或牽引入於惡而不能自拔者皆懦而無立者耳故弱居六極之末張氏曰福有五極有六者其義相反不必數之相敵五福曰壽曰考終命六極曰凶短折此一極而反二福也五福曰富六極曰貧此一極而反一福也五福曰康寧六極曰疾曰憂五福曰攸好德六極曰惡曰弱此二極而反一福也張氏曰上之人使民舒泰則各全其壽樂業則各得其富知禮教所以攸好德不死於征戰不陷於刑戮所以考終命其或死於征戰陷於刑戮則凶短折隂陽不調則疾多失其所則憂賦斂繁食貨乏則貧禮教失風俗壞則惡而弱福極之柄全在君而已緫説一篇意唐孔氏曰發首二句記被問之年自王乃言至彞倫攸叙王問之辭自箕子乃言至彞倫攸叙言禹得九疇之由自初一至威用六極言禹第叙九疇之次自一五行以下箕子條説九疇之義使成典教耳武王既勝殷邦諸侯班宗彞作分器漢孔氏曰賦宗廟彛器酒罇賜諸侯宗彞説見益稷漢孔氏曰言諸侯各有分也亡唐孔氏曰昭十二年左傳楚靈王云昔我先王熊繹與吕伋王孫牟燮父禽父並事康王四國皆有分我獨無十五年傳曰諸侯之封也皆受明器於王杜預云謂明德之分器也尚書纂傳卷二十二
