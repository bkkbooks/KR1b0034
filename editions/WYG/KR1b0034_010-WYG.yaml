  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1b0034_WYG_010-1a, image: WYG0062/WYG0062-0687a.png}
body:
  text: 尚書纂傳卷十元王天與撰湯誥第三商書湯旣黜夏命復歸于亳作湯誥漢孔氏曰黜退也林氏曰黜廢夏命不使復承天統亳說見帝告序唐孔氏曰史録其事作湯誥仲虺在路作誥此至亳乃作故次仲虺之下湯誥漢孔氏曰以伐桀大義告天下蔡氏曰今文無古文有王歸自克夏至于亳誕告萬方夏氏曰此史敘湯作誥之意漢孔氏曰誕大也陳氏曰萬方猶言萬國唐孔氏曰下云凡我造邦是告諸侯王曰嗟爾萬方有衆明聽予一人誥惟皇上帝降衷于下民若有恒性克綏厥猷惟后夏王滅徳作威以敷虐于爾萬方百姓爾萬方百姓罹其凶害弗忍荼毒並告無辜于上下神祇天道福善禍淫降災于夏以彰厥罪肆台小子將天命明威不敢赦敢用𤣥牡敢昭告于上天神后請罪有夏聿求元聖與之戮力以與爾有衆請命上天孚佑下民罪人黜伏天命弗僭賁若草木兆民允殖林氏敘章指見篇末漢孔氏曰天子自爾曰予一人嗟說見甘誓吕氏曰明聽提撕振起作其更新之意漢孔氏曰上帝天也皇說見大禹謨朱子曰天下莫尊於理故以帝名之降衷降便有主宰意又曰何故不說降善却說降衷看得衷字是箇無過不及恰好㡳道理天之生物箇箇有一副常恰好㡳道理或問降衷與受中以生之中二字義同異朱子曰左傳云始衷終皆舉之又云衷甲以見看此衷字義本是衷甲以見之義爲其在衷而當中也然中字大槩因過不及而得名如六藝折衷於夫子蓋是折兩頭而取其中之義後人以衷爲善却未親切又問民受天地之中以生與程子天然自有之中還是一意否朱子曰只是一意蓋指大本之中也衷說已見臯陶謨真氏曰聖賢之言衷曰降衷命曰降命才曰降才深味降之一言真若天之與人交相付受明命赫然不離心目之間也可不敬哉漢孔氏曰順人有常之性能安立其道教則惟爲君之道朱子曰恒常也自天而言則謂之降衷自人受此衷而言則謂之性猷即道也道者性之發用處真氏曰六經言性始見於此伊尹謂兹乃不義習與性成又兼習而言與此言降衷之性亦互相發也按性字義程子曰性即理也朱子曰生之理謂性又曰性只是實理仁義禮智無一不具真氏曰成湯此言可謂知君師之職矣蓋天能與人以性而不能使之全其性使人全其性者君師之任也天之生民莫不各賦以仁義禮智之性渾然於中無所偏倚所謂衷也然天之降於人者初無智愚之間而人之所受於天者清濁純駁隨其所禀有不同焉必賴君師之作順其有常之性而開迪之舜之徽五典周之教六徳六行皆其事也性本至善因而教焉是之謂順若其本惡而彊教以善則是逆之而非順之也觀若之一字則人性之善可見矣順其性使安其道非君不能何謂安父安於慈子安於孝知其自然而不可違與其當然而不容已然後爲安成湯有天下之初即以此自任故曰可謂知君師之職也厥後秉彞受中之言相繼而發至於孔孟性善之理益明而開萬世性學之源則自湯始吕氏曰仲虺言惟天生民有欲惟天生聰明時乂與此同但仲虺從情上說乃自末以及本成湯從性上說乃自本以及末也漢孔氏曰夏桀滅道徳作威刑以布行虐政於天下言殘酷吕氏曰徳者性之本有以私欲滅之故曰滅威者性之所本無以私欲作之故曰作人君天下之源其勢甚便作威于上則其酷虐順流于下使轉其機以敷徳其勢亦然耳漢孔氏曰罹被荼毒苦也不能堪忍虐之甚唐孔氏曰荼苦也毒螫人之蟲蛇虺之類漢孔氏曰言百姓兆民並告無罪稱冤訴天地林氏曰天曰神地曰祇不堪其苦無所赴愬並告于天地神祇以冀拯己屈原云人窮則反本故勞苦倦極未嘗不呼天疾痛慘怛未嘗不呼父母也漢孔氏曰政善天福之淫過天禍之故下災異以明桀罪惡譴寤之而桀終不改或問福善禍淫如何程子曰此自然之理善則有福淫則有禍又曰天道如何曰只是理理便是天道且如說皇天震怒終不是有人在上震怒只是理如此又問今人善惡之報曰幸不幸也蔡氏曰災咎也意當時必有災咎之事如周語所謂伊洛竭而夏亡之類漢孔氏曰行天威謂誅之蔡氏曰以天子告萬方故稱予一人對上帝而言故稱台小子陳氏曰將天命之明威明威言其威之明吕氏曰不敢赦深見湯不得已之心如有所督迫而不得已者漢孔氏曰明告天問桀百姓有何罪而加虐乎唐孔氏曰檀弓云殷人尚白牲用白今云𤣥牡夏家尚黒于時未變夏禮故也夏氏曰必用牡者牲用牡不用牝吕氏曰昭告者湯無一毫私意對越天地鬼神而爲之也林氏曰上天天帝神后后土皇地祇也吳氏曰請求也請罪者請加罪有夏也漢孔氏曰聿遂也大聖陳力謂伊尹放桀除民之穢是請命吳氏曰請命請百姓之命也漢孔氏曰孚信也天信佑助下民桀知其罪退伏逺屏林氏曰湯以桀爲罪人武王以紂爲獨夫蓋其得罪於天人不復有君人之道也漢孔氏曰僭差賁飾也言福善禍淫之道不差天下惡除煥然咸飾若草木同華民信樂生李氏曰賁明也朱子曰言天命不差明白易見人得遂其生也俾予一人輯寧爾邦家兹朕未知獲戾于上下慄慄危懼若將隕于深淵凡我造邦無從匪彞無即慆淫各守爾典以承天休爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心其爾萬方有罪在予一人予一人有罪無以爾萬方嗚呼尚克時忱乃亦有終林氏敘章指見篇末漢孔氏曰言天使我輯安汝國家蔡氏曰輯和也吳氏曰言爾邦家蓋天下乃天下之天下也漢孔氏曰此伐桀未知得罪於天地蔡氏曰獲得戾罪也漢孔氏曰慄慄危心若墜深淵危懼之甚陳氏曰慄慄危懼貎隕墜也真氏曰商頌云聖敬日躋玩此則聖敬日躋之實可見矣漢孔氏曰戒諸侯與之更始彞常慆慢也無從非常無就慢過禁之蔡氏曰夏命已黜湯命維新侯邦雖舊悉與更始故曰造邦夏氏曰從如惟耽樂之從之從即如即康功田功之即蔡氏曰匪彞指法度言慆淫指逸樂言漢孔氏曰守其常法承天美道吕氏曰天休即在爾典中能守爾典則能承天休何者此心恬愉安泰其爲休美可知凡福慶之鍾祥瑞之集皆其發見者也漢孔氏曰所以不蔽善人不赦己罪以其簡在天心故也吳氏曰於人言善禮下之辭於己言罪自責之辭朱子曰蔽遮隔簡閱也善與惡天皆知之如天點檢數過相似爾之有善也在帝心我之有惡也在帝心漢孔氏曰自責化不至無用爾萬方言非所及王氏曰此非謙而過厚之辭乃誠然矣天下有罪豈非天子不能治化故然乎天子有罪萬方何與焉漢孔氏曰忱誠也庶幾能是誠道乃亦有終世之美陳氏曰曰尚曰亦皆不敢必之辭蓋兢兢不忽之意總說一篇意林氏曰此篇自惟皇上帝至兆民允殖言順天應人伐夏弔民之事自俾予一人至乃亦有終言戒謹恐懼保邦安民之意一篇所誥首尾本末與仲虺之言蓋相爲表裏咎單作明居漢孔氏曰咎單臣名主土地之官作明居民法一篇亡唐孔氏曰馬融云咎單爲湯司空尚書纂傳卷十
