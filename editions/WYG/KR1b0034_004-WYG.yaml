此蓋泉自渇馬之崖潛流地中而至此復出也其注而北則謂之濼水達於清河以入于海舟之通於濟者皆於是乎達也齊多甘衆其顯名者十數而色味皆同以余驗之蓋皆濼水之旁出者也然則水之伏流地中固多有之奚獨於滎澤疑哉呉興沈氏亦言古說濟水伏流地中今歷下凡發地皆是流水世謂濟水經過其下東阿亦濟所經取其井水煑膠謂之阿膠用攪濁水則清人服之下膈踈痰蓋其水性趨下淸而重故也濟水伏流絶河乃其物性之常事理之著者程氏非之顧弗深考耳又曰溢滿也復出河之南溢而為滎澤也滎說見豫州按孔氏截河之說程氏河溢之說皆非是惟蔡氏說當就以經證之溢與出字皆特見之例惟其自中而滿故不如菏澤被孟豬之被而有溢之名惟其由伏而見故不如他水下流之至而有出之名一也又王屋之下既見而伏濟源之西平地復見在河北既爾何獨溢出於河南而不然二也又濟河兖州至爾雅猶有濟南曰兖州之稱至吕氏春秋猶有濟河間曰兖州之稱使其下流至兖者非沇濟自來之濟則歴代相傳豈其以無源之水名兖疆域三也要之大河之逕其初與濟伏地之泉兩不相礙自濟源至温入河者固並河東下其伏地潛而復見湧溢於滎再出於菏者脉絡未嘗不與沇相通漢孔氏曰陶丘丘再成易氏曰鄭州滎澤縣東至本州五十里又東一百里至汴州又東北二百四十里至曹州曹州濟隂縣有定陶鎭後以為定陶縣屬廣濟軍本漢定陶縣之地屬濟隂郡蓋古之陶丘也一名左城唐堯所居故為陶唐漢孔氏曰菏澤之水易氏曰自定陶縣又東北九十里至於菏澤是陶丘在今廣濟軍之西菏澤在今廣濟軍之東北以上古濟所經之地自河至此凡七百餘里蔡氏曰謂之至于菏者濟隂縣自有菏派濟流特至其地耳菏說見豫州漢孔氏曰濟與汶合易氏曰濟至菏澤即東北㑹于汶在鄆州中都縣之地汶說見靑州漢孔氏曰北折而東易氏曰濟自㑹汶凡北流一百里至鄆州須昌縣鄆州須昌縣後為東平府須城縣本漢須昌縣屬東郡濟去縣西二里又北流經齊州之長淸縣本漢盧縣地又東北流經齊州之豐齊縣後省入長淸本漢荏縣地濟西去縣二十六里凡二百里至齊州之臨邑縣齊州臨邑縣本漢舊縣屬東郡濟西去縣四十里又東北流經本州之全節縣後省入歷城本漢東平陵縣屬濟南郡又東北流經本州章丘縣本漢陽丘縣地又東北流經本州臨濟縣後省入章丘本漢管縣屬濟南郡又東北流經淄州鄒平縣本漢舊縣屬濟南郡濟南去縣三十五里又東北流經淄州濟陽縣本漢鄒縣屬濟南郡凡一百九十里至淄州髙苑縣淄州髙苑縣本漢舊縣屬千乘郡濟去縣七十歩凡東流二百四十里至靑州博昌縣靑州博昌縣後為博興縣本漢博昌縣屬千乘郡濟北去縣百歩又東北流入海合沙鄭氏曰濟之源不出於塞外流不外於中國導淮自桐柏東會于泗沂東入于海桐柏說見導山唐孔氏曰水經云淮出胎簪山東北過桐柏山胎簪蓋桐柏之旁小山也陳氏曰淮自桐柏以上流小無所用導故導之自桐柏始渭洛言自亦然易氏曰漢志南陽平氏縣桐柏大復山在其南淮水所出東南至淮陸入海過郡四行三千二百四十里今考唐志唐州桐柏縣本漢平氏縣之東界屬南陽郡桐柏山一名大復山在縣南九十里淮水經此山漢孔氏曰與泗沂二水合而入海易氏曰淮自桐柏縣東流經蔡州朗山縣凡二百四十里至蔡州眞陽縣本漢愼陽縣地屬汝南郡淮經縣南八十里北至州一百里又東流至本州襃信縣又東流至本州新息縣南五里凡東流三百里至潁州潁州汝隂縣本漢舊縣屬汝南郡淮西南流入經縣南五里又東流二百二十里經本州下蔡縣周世宗以下蔡縣置夀春府凡東流五百里至宿州蘄縣宿州蘄縣本漢舊縣屬沛郡淮經縣南七十里又東流經本州虹縣又東流經淮南濠州之昭義縣後改為昭信屬泗州本漢臨淮郡淮陵縣地漢志所謂至淮陵者也又東北經泗州之徐城縣凡四百二十里至泗州泗州臨淮縣本漢徐縣地屬臨淮郡南臨淮水北枕汴河又東流經本州之宿遷縣又東北流經本州之連水縣凡二百七十里入海唐孔氏曰沂水至下邳入泗泗水至淮陵入淮乃沂先入泗泗入淮耳以去淮近故連言之沂泗說見徐州合沙鄭氏曰淮之源不出於塞外流不出於中國導渭自鳥鼠同穴東會于澧又東會于涇又東過漆沮入于河鳥鼠說見雍州漢孔氏曰鳥鼠共為雌雄同穴處此山遂名山曰鳥鼠唐孔氏曰釋文云鳥鼠同穴其鳥為鵌其鼠為鼵李巡云鵌鼵鳥鼠之名共處一穴天性然也郭璞云鼵如人家鼠而短尾鵌似鵽而小黃黒色穴入地三四尺鼠在内鳥在外易氏曰漢志隴西郡首陽縣鳥鼠同穴山渭水所出東至北船司空縣入河過郡四行千八百七十里考之唐志渭州渭源縣本漢首陽縣屬隴西郡今屬熙州有鳥鼠山在縣西七十六里禹導渭始此凡有三源又正東㣲南流至渭州襄武縣又東流五十里至本州隴西縣後於縣置鞏州又東流至秦州伏羌縣南一里凡三百里至秦州秦州上邽縣唐末廢徙成紀渭水在縣北十三里又東流凡二百二十里至隴州南由縣後省縣入呉山本漢汧縣地屬右扶風渭水在縣南四十里凡東流三百二十里至鳳翔府岐山縣鳳翔府岐山縣渭水在縣南二十里又東流經京兆府之渭南同官咸陽三縣凡東流二百七十里至京兆府京兆府萬年縣本漢觀縣屬左馮翊渭水在縣北五十里凡東流二百四十里至華州華隂縣華州華隂縣本漢舊縣屬𢎞農郡渭水在縣東北流三十五里自永豐倉入河謂之渭口即所謂渭汭也灃涇漆沮說見雍州蔡氏曰此言東會于灃又東會于涇又東過漆沮者渭水自西而東之次也雍州言涇屬渭汭漆沮既從灃水攸同者㪚言境内諸水非東西之次也合沙鄭氏曰渭水源出於塞外其行不下二千里而附於河故不得與四瀆並而禹之施功不下於四瀆故與四瀆同紀於導水也導洛自熊耳東北會于澗瀍又東會于伊又東北入于河熊耳說見導山易氏曰漢志𢎞農上洛縣洛水出冢嶺山東北至鞏入河過郡二行千七十里蓋禹導洛雖始於此而洛源實出於上流之冢嶺山考之唐志商州洛南縣本漢上洛縣地屬𢎞農郡冢嶺山在縣西七十里洛水所出又東流七十里至本縣又東北流九十里至本州之上洛縣南四十里乃在熊耳山之西浮梁之水出焉而注于洛凡四百六十里至虢州界虢州盧氏縣本漢舊縣屬𢎞農郡熊耳山在縣南五十里禹導洛始此東流經河南府福昌縣又東北流經河南府壽安縣凡四百五十里至河南府河南府河南縣本漢舊縣屬河南郡洛在縣北四里又洛陽縣本漢舊縣屬河南郡洛在縣西南三里自苑内上陽之南瀰漫東流又六十三里至本府緱氏縣又東北流七十七里至本府鞏縣會伊瀍澗之水東經洛汭北對郎渚謂之洛口亦名什谷凡東北流一百四十里而入河澗瀍伊說見豫州合沙鄭氏曰洛之水其源不逺不及渭漢其流之大不過涇沔終亦入于河其行僅千餘里而已而得與導水之列者洛居天下之中與河並為圖書之所古人見河洛而思禹功蓋亦本此緫說導水唐孔氏曰所導九水大意亦自北為始弱水最在西北水又西流故先言之黒水從雍梁西界南入南海與諸水不相參渉故次之四瀆江河為大河在北故先言河也漢入江故先漢後江其濟發源河北越河而南與淮俱為四瀆故次濟次淮其渭與洛俱入河故後言之計流水多矣此舉大者言耳夏氏曰上文導山如河濟淮渭洛江漢大略已見故此所導水皆所以結上文而足其義前有導岍及岐則此導川遂及於河濟前有西傾朱圉鳥鼠則此導川遂及於淮渭洛前有導嶓冢岷山則此導川遂及於江漢皆始終相因之辭惟弱水黒水前無所因後無所屬又皆在塞外西北禹先順而導之故以冠於衆水之上蔡氏曰經言導河積石導淮自桐柏導渭自鳥鼠同穴導洛自熊耳者源皆非出於其山特自其山以導之故先言水而後言山也河不言自者河源多伏流積石其見處故言積石而不言自也言嶓冢導漾岷山導江者漾之源出於嶓江之源出於岷故先言山而後言水也沇水不言山者沇水伏流其出不一故不志其源也弱水黒水不言山者九州之外蓋略之也曽氏曰水所經一也有言至言過言會者鄭𤣥云言過言會者皆水名言至者或山或澤是也若河之至于龍門至于華隂至于厎柱大伾漢之至于大别皆山名河至于孟津則地名河至于大陸濟至于菏皆澤名也江至于澧或以為澧州多山澤或地名因水也至于東陵陵名也以大水合小水則謂之過若河之過浲水過洛汭漢之過三澨江之過九江渭之過漆沮皆以大水合小水也二水勢均而相入則謂之會若江會于匯濟會于汶淮會于泗沂渭會于涇會于灃洛會于澗瀍會于伊皆水勢之均也天下之水莫大於河故未嘗言會濟淮洛之水為小凡川之合者勢皆可均故未嘗言過如洛於澗瀍伊皆謂之會則水之巨細可知也九州攸同四隩既宅九山刋旅九川滌源九澤既陂四海會同六府孔修庶土交正厎愼財賦咸則三壤成賦中邦唐孔氏敘章指見篇末漢孔氏曰所同事在下林氏曰周禮職方氏辨九州之國使同貫利蓋辨之則廣谷大川異制民生其間異俗五味異和器械異制車服異冝各得其所而不雜亂同之則車同軌書同文行同倫各要其所歸而不見其為異故序言別此言同也漢孔氏曰四方之宅已可居許氏曰隩水涯隈也李氏曰涯内近水為隩漢孔氏曰九州名山已槎木通道而旅祭矣上官氏曰九州之山見於禹貢者四十有五岱衡大華恒外方南荆梁蒙北荆壷口雍岐梁冀岐太岳徐蒙碣石羽傾西嶧南終岷物惇嶓冢鳥鼠蔡危三積石厎柱龍門析城崐崘王屋岍行太雷首朱圉熊耳原敷淺桐柏合黎陪尾大伾内方東陵大别陶丘漢孔氏曰九州之川已滌除泉源無壅塞矣上官氏曰九州之川見於禹貢者三十有六河水黒江漾沇渭淮洛弱水兖沮雍沮衡漳荆沱恒梁沱衞荆潛灉梁潛漯濰汶淄泗降沂三澨涇澧灃漆江九澗瀍伊桓漢孔氏曰九州之澤已陂障無決溢矣索至曰九州之澤見於禹貢者十有二大陸雲夢雷夏滎大野波彭蠡菏澤震澤孟豬豬野孔氏流沙海之内會同京師九州同風萬國共漢曰四貫唐孔氏曰禮諸侯之見天子時見曰會殷見曰同此言官之與民皆得聚會京師非據諸侯朝天子也六府修說見禹謨漢孔氏曰交俱也衆土俱得其正謂壤墳壚致所愼者財貨貢賦言取之有節不過度蔡氏曰謂之庶土則非特穀土也庶土有等皆以肥􅇤髙下名物交相正焉以任土事因庶土所出之財而致慎其財賦之入如周大司徒以土冝之法辨十有二土之名物以任土事之類也漢孔氏曰皆法壤田上中下大較三品成九州之賦蔡氏曰則品節之也九州穀土又皆品節之以三等如周大司徒辨十有二壤之名物以致稼穡之類也中邦諸夏也蓋土賦有及於四夷而田賦則止於中國耳陳氏曰禹貢書法簡嚴上經每州惟舉一隅以反至此緫結之以見九州之所同如宅土惟言於兖雍故此以四隩既宅緫之旅山惟言於梁雍故此以九山刋旅緫之上經所載川澤雖多然九州之川澤不止是也故九川九澤之滌陂緫之上經雖各載達河之道而四方之趨帝都者不止是也故以四海會同緫之六府孔修則非特水土之治也庶土交正則山林川澤丘陵墳衍原隰之土地無不辨正非特墳壤之別也財物者民命所係一或輕取則民無以生聖人所深謹也故於此又提其綱言之觸類而推禹功之全可見矣錫土姓祗台德先不距朕行唐孔氏敘章指見篇末漢孔氏曰台我也天子建德因生以賜姓謂有德之人生此地以此地名賜之姓以顯之王者常自以敬我德為先則天下無距違我行者王氏曰封建諸侯錫之土以立國錫之姓以立宗祗台德先者祗上之德先之也不距朕行從上所行行之也陳氏曰台朕皆史氏我其君上也東陽馬氏曰水土已平天子於是封建諸侯共治天下天子又祗是德以先之而天下無敢不從此皆禹功所致也五百里甸服百里賦納緫二百里納銍三百里納秸服四百里粟五百里米唐孔氏敘章指見篇末漢孔氏曰規方千里之内謂之甸服為天子服治田去王城面五百里陳氏曰禹之甸法達於天下而王畿獨以甸名蓋農事國之本也京師聲名文物之所萃四方百貨之所聚其民易以棄本逐末制名必曰甸服所以示務本之義制賦必以稼穡所以責務本之實蓋率天下以歸本也朱氏曰里者乃道途逺近之數非方井之里也畿内天子之田其民主為天子治田事故謂之甸服漢孔氏曰甸服内之百里近王城者禾藳曰緫入之供飼國馬朱氏曰百里二百里亦以四面各言之百里者言王城之一百里二百里者第二之百里三四五皆然唐孔氏曰緫者緫下銍秸禾穟與藳緫皆送之也漢孔氏曰銍刈謂禾穟唐孔氏曰說文云銍穫禾短鎌也漢孔氏曰秸藳也服藳役唐孔氏曰納粟之外斟酌納藳非是徒納藳也此言服明上下皆有所納之役省文也吕氏曰粟榖也有殻曰粟無曰米曽氏曰春秋傳云甸粟而納之王宫米而藏之御廩而九數有粟米之法為粟二十㪷為米十㪷粟米之辨也周官倉人掌粟入之藏舂人掌供米物於此可見漢孔氏曰所納精者少麤者多唐孔氏曰其於稅也皆當什一但所納有精麤逺輕而近重耳孫氏曰二百里以下不言賦粟米不言納從上文也林氏曰上文九州皆言田賦此所載但及甸服者鄭氏謂侯綏等所出賦稅各入本國此但據天子立文耳朱氏曰自緫至米皆公田之稅畿内專言田賦者畿内不封諸侯故田賦入天子然五服事各不同亦舉凡例以互相見耳五百里侯服百里采二百里男邦三百里諸侯漢孔氏曰甸服外之五百里侯候也斥候而服事王氐曰以始有諸侯故曰侯服漢孔氏曰侯服内之百里夏氏曰第一百里為采采者卿大夫食邑之地也索至曰王制云千里之外曰采王畿千里之外為侯服於此正采地也然考之周官六郷之外為六遂六遂之外有家邑稍地則大夫之采地在畿内也又有小都縣地大都畺地則公卿王子弟之采地亦在畿内也然則侯服之采其周官所謂邦國閒田乎蓋侯服百里最近王圻故不以封而為閒田天子之子弟食采在邦國之畺地世逺族蕃則其采地有及於侯服故空其地所以待之謂之百里采者如此漢孔氏曰男任也任王者事言邦者見上下皆是諸侯之國也朱氏曰第二之百里為男爵之國王氏曰男邦之建欲王畿不為大國所逼而小國易獲京師之助漢孔氏曰三百里同為王者斥候故合三為一名朱氏曰三百里謂自三至五為百里者三隨文生例不可拘也李氏曰建諸侯非特此三百里以其對男邦言之則自此以外皆諸侯也陳氏曰言男則子在其間言侯則伯在其間蘇氏曰男邦小國也諸侯大國次國也小國在内依天子而大國在外以禦侮也朱氏曰侯服惟言邑國者畿内主於封侯亦互相見也五百里綏服三百里揆文教二百里奮武衞漢孔氏曰綏安也侯服外之五百里安服王者之政教蔡氏曰謂之綏者漸逺王畿而取綏安之義也綏服内取王畿千里外取荒服千里介於内外之間唐孔氏曰周語云先王之制邦内甸服邦外侯服侯衞賔服蠻夷要服戎狄荒服彼賔服當此綏服綏者據諸侯安王為名賔者據王敬諸侯為名彼云先王之制則此服舊有二名漢孔氏曰揆度也度王者文教而行之三百里皆同陳氏曰文教以文德教化也内之三百里接於中國故以文教為準夏氏曰若揚雄所謂五政所加七賦所養揆度文教以經理之也漢孔氏曰文教外之二百里奮武衞天子所以安陳氏曰武衞以武事衞䕶也外之二百里接於夷蠻故奮勵武衞也然武以衞言保䕶邦國而已非窮兵服逺也吕氏曰夷虜無常故二百里常奮其武以衞中國以二百里之武衞而能捍數百里之蠻夷蓋因其所居使之守其郷邑墳墓則人人自盡故二百里足矣後世不明古意秦至發閭左萬里出戍離墳墓棄井邑怨望而行遇敵望風渙㪚安能為備林氏曰漢魏使夷狄内附入居中國障塞之地故至西晉有劉淵石勒之變石晉以盧東一道賂契丹故至末帝有耶律德光之變綏服二百里奮武衞以嚴夷狄之限實萬世不可易之法也陳氏曰内三百里非無武備蓋以文教為主外二百里非無文教蓋以武衞為主五百里要服三百里夷二百里蔡漢孔氏曰綏服外之五百里要束以文教王氏曰於此不可用中國之政為之要約而已陳氏曰猶近世羈縻州也緫其大要而已唐陸氏曰夷馬云易也蔡氏曰夷雜夷俗也劉氏曰夷者稍以夷禮通之若春秋祀鄫葛莒是也漢孔氏曰蔡法也法三百里而差簡林氏曰蔡先儒止作蔡字讀然左傳云殺管叔而蔡蔡叔註蔡放也陸氏音素達反此冝依左氏讀要服三百里為夷則其外二百里亦夷也而乃謂之蔡者蓋中國之人有罪先王不忍殺之則投於此地故言蔡以示放罪之意其實即夷狄也五百里荒服三百里蠻二百里流漢孔氏曰要服外之五百里言荒又簡略王氏曰荒不治也又非若要也陳氏曰荒服雖不治然亦率服來王故列於五服漢孔氏曰以文德蠻來之不制以法王氏曰蠻之為言慢則甚於夷矣劉氏曰蠻者亦言雜以蠻俗待之若春秋楚越也漢孔氏曰流移也劉氏曰流如流共工之流輕罪則蔡於要服重罪則又流於荒服所謂投之四裔屏之逺方林氏曰荒服三百里蠻則其外二百里亦蠻也而乃謂之流者以示放罪人之意其實即蠻地也緫說五服張氏曰服者服其事也内而甸侯衞外而要荒莫不各服其事於天子故皆謂之服新安王氏曰甸侯綏謂之中國要荒謂之夷蠻則中國之地方廣不過三千里聖人務廣德不務廣地春秋不治夷狄亦此意蔡氏曰先儒疑禹服之狹而周漢地廣或謂周服里數以相方言或謂古今尺有長短或謂禹以直方計後世以人迹屈曲取之皆非的論蓋禹聲教所及則地盡四海而其疆理則止以五服為制荒服之外又别為區畫如所謂咸建五長周漢則盡其地而疆理之也東漸于海西被于流沙朔南暨聲教訖于四海禹錫𤣥圭告厥成功唐孔氏敘章指見篇末漢孔氏曰漸入也此言五服之外皆與王者聲教而朝見禹功盡加於四海薛氏曰聲教風聲教化也振於此而彼聞焉謂之聲軌於上而下效焉謂之教陳氏曰訖盡也林氏曰青徐抵東海故言東漸于海雍州弱水既西而弱水入流沙故言西被流沙揚州抵南海冀州扺碣石至北海哉言朔南暨聲教而終以訖于四海蓋聲教盡加四海也朔南不言所至下文見之也漸被暨皆言聲教所加特變文耳非有淺深漢孔氏曰𤣥天色堯錫𤣥圭以彰顯之言天功成朱氏曰錫猶師錫帝曰之錫下錫上也𤣥圭其贄歟王氏曰禹納𤣥圭於舜以告成功也緫該一篇意唐孔氏曰此篇史述為文發首奠高山大川言禹治九州之水水害既除定山川次秩與諸州為引序自導岍至嶓冢條說所治之山言其首尾相及也自導弱水至導洛條說所治之水言其發源汪海也自九州攸同至成賦中邦緫言水土既平貢賦得常之事也錫土姓三句論天子於土地布行德教之事也自五百里甸服至二百里流緫言四海之内量其逺近分為五服之事也自東漸于海以下緫結禹功成之事也尚書纂傳卷四
