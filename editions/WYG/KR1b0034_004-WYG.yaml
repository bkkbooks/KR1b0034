body:
  text: 尚書纂傳卷四元王天與撰禹貢第一夏書唐陸氏曰夏禹天下號也凡九篇五篇亡禹别九州隨山濬川任土作貢漢孔氏曰分其圻界唐孔氏曰計九州之境當應舊定而云禹别者以堯遭洪水萬事改新故言禹别耳隨山説見益稷濬川説見舜典漢孔氏曰任其土地所有定其貢賦之差漢孔氏曰此堯時事而在夏書之首禹之王以是功唐孔氏曰史錄其事以為禹貢之篇諸序皆言作某篇此不言作禹貢者以發首言禹句末言貢篇名顯矣百篇之序此類有三微子作誥不言作微子仲虺作誥不言作仲虺之誥與此篇皆為理足而略之也禹貢漢孔氏曰禹制九州貢法林氏曰是篇有貢有賦而獨以貢名篇者孟子云夏后氏五十而貢則貢又夏后氏田賦之揔名又曰書有六體典謨訓誥誓命此篇典體也蔡氏曰今文古文皆有禹敷土隨山刋木奠髙山大川唐孔氏敘章指見篇末漢孔氏曰洪水泛濫禹分布治九州之土張氏曰敷分也分土即别九州之義隨山刋木説見益稷張氏曰序言隨山濬川言其終也此言隨山刋木言其始也漢孔氏曰奠定也髙山五岳大川四瀆蔡氏曰以别州境若兖之濟河青之海岱徐之海岱及淮揚之淮海荆之荆衡豫之荆河梁之華陽黒水雍之黒水西河也冀州漢孔氏曰堯所都也此州帝都不説境界以餘州所至則可知成氏曰歐陽氏輿地廣記云真定保中山莫趙雄深霸冀信安河間寜祁順安永保定懷安肅衞廣信寜相幽晉磁涿邢易洺檀絳薊慈媯隰平澤營潞大原中晉解河潦石威勝憲平定嵐汾寜化忻火山代保德嵐岢雲朔應府新安北寰鎮北儒單于毅右古蔚州冀地冀州三面距河河自積石東北流入中國折而南流雍在冀西故曰西河至華隂折而東流豫在冀南故曰南河至大伾又折而北流兖在冀東故曰東河以三州考之則冀在東河之西南河之北西河之東王制云自東河至西河千里而近自恒山至南河千里而近恒山在河北此冀東西南北之境也舜後分冀州為幽州為并州幽州幽涿易檀以下等州是并州太原晉絳以下等州是蔡氏曰即周禮職方河内曰冀州新安王氏曰九州之名其意不可詳考晉地有冀秦地有雍則是冀雍以地名州也蜀有梁山楚有荆山則梁荆以山名州也沇省文作兖則兖以水名州也其不知者當缺之既載壷口朱氏曰既者己事之辭篇内凡言既者倣此載始有事也漢孔氏曰壺口左冀州馬氏曰壷口山名唐孔氏曰漢地理志云在河東郡北屈縣東南易氏曰唐為慈州吉昌縣後為吉鄉縣本漢北屈縣地壷口山在縣西南五十里呂氏曰壷口龍門之上口也治梁及岐王氏曰備其亂謂之治漢孔氏曰梁岐在雍州晁氏曰梁山呂梁也在今石州離石縣東北爾雅云梁山晉望也則是冀州之山若以為雍之梁山則當為秦望而去冀逺矣春秋成五年梁山崩左氏榖梁皆以為晉山則亦呂梁也岐山孤岐山也在今汾州介休縣山海經云孤岐之山勝水所出流至於汾則岐山亦冀州山若以為雍之岐山則與冀相去絶逺矣朱子曰晁説為是蔡氏曰呂不韋云龍門未闢呂梁未鑿河出孟門之上酈道元謂呂梁之石崇竦河流激盪震動天地此禹既事壷口乃即治梁也酈道元又云後魏於孤岐置六壁防離石諸處因為大鎮今六壁城在勝水之側實古河逕之險阨二山河水所經治之所以開河道也吕氏曰壷口梁岐是龍門左右地禹最用工處既修太原至於岳陽王氏曰治其壊謂之修漢孔氏曰髙平曰大原今以為郡名易氏曰漢志太原郡榆次縣有太原亭唐以後屬太原府晉陽縣後省晉陽入陽曲縣漢孔氏曰岳太岳在太原西南山南曰陽易氏曰唐以後晉州岳陽縣本漢榖逺縣屬上黨郡隋改為岳陽在太岳之南朱氏曰從太原至岳陽皆修之也曽氏曰太原汾水所出岳陽汾水所經此導汾故也朱氏曰他所舉山川皆先地後績者覩成功而言也壷口梁岐太原皆先績後地者本用功之始而言也覃懐厎績至于衡漳漢孔氏曰覃懷近河地名唐孔氏曰地理志河内郡有懐縣在河之北盖覃懐二字共為一地易氏曰唐以後為懐州周蘇忿生以温為司宼其田有隤懐是也曽氏曰覃懐平地也平地致功為難故曰厎績漢孔氏曰漳水横流入河唐孔氏曰衡古横字漳在懐北五百餘里曽氏曰河自大伾折而北流漳水東流注之地形南北為從東西為横河北流而漳東流則河從而漳横矣唐孔氏曰地理志云濁漳水出上黨長子縣東至鄴縣入清漳易氏曰唐潞州長子縣本漢舊縣屬上黨郡發鳩山在西南六十五里濁漳出焉東北流至本州所理之上黨縣本漢壷關縣地濁漳在縣西南二十五里又東北流四十里至本州潞城縣本漢潞縣漳水一名潞水在縣南又東北流五十三里至本州㐮垣縣南二十一里本漢舊縣又東北流三十里至本州黎城縣西北五十六里凡東流三百五十里至相州鄴縣北五里鄴本漢舊縣即西門豹引漳水之地又東北流六十五里經磁州滏陽縣又東北流一百一十里至洺州洺水縣本漢斥漳縣地屬廣平國有衡漳故瀆俗名阿難渠在縣西二百歩至此入清漳唐孔氏曰地理志云清漳水出上黨沾縣大黽谷東北至渤海阜城縣入河過郡五行千六百八十里易氏曰唐大原府樂平縣本漢沾縣屬上黨郡少山一名河逢山在縣西南三十里山海經云少山清漳出焉東南流至儀州和順縣亦漢沾縣地後改州為遼州又東南流至潞州黎城縣東北又東北流至洺州洺水縣東北又東北與濁漳合而至貝州宗城縣本漢廣宗縣地後改州為恩州又東北流至本州漳南縣北四十六里又東北流至德州長河縣西二十五里本漢廣川縣地屬信都國即漳水之南境其北境即瀛州平舒縣本漢東平舒縣屬渤海郡自此二縣東北流而入河蔡氏曰桑欽云二漳異源而下流相合同歸于海唐人亦言漳水能獨達于海請以為瀆而不云入河者盖禹導河自洚水大陸至碣石入海本隨西山下東北去周定王五年河徙砱礫則漸遷而東漢初漳猶入河其後河徙日東而漳水日逺至欽時河自大伾而下已非故道而漳自入海矣漢孔氏曰從覃懐致功至衡漳厥土惟白壤漢孔氏曰無塊曰壤水去土復其性色白而壤王氏曰冀土非盡白壤其大致然也餘州倣此厥賦惟上上錯厥田惟中中漢孔氏曰賦謂土地所生以供天子上上第一錯雜雜出第二之賦蘇氏曰賦田所出粟米兵車之類劉氏曰此聖人良法預為推移通變之權而通行於萬世於是舉其輕重之尤者四州而為錯法焉曰厥賦上上錯厥賦錯上中者皆其重之尤也重之尤而不為錯出之法則其乆也或有所不堪非可通行於萬世也曰厥賦下上上錯厥賦下中三錯皆其輕之尤也輕之尤而不為錯出之法則其乆也或有所僥倖亦非通行於萬世也漢孔氏曰田之髙下肥􅇤九州之中為第五劉氏曰九州田賦多不等者禹之定田賦揔其田為九等又揔其賦為九等九州之境有大小之不齊其定田也以田之美惡為等州雖小而田美則居上州雖大而田惡則居下不復問其大小也其定賦也以賦之多寡為差州大者其賦多州小者其賦少不盡繫其田之美惡也漢孔氏曰此州先賦後田殊於餘州林氏曰他州先田後賦盖賦出於田而已冀先賦後田者王畿之地併與廛里場圃關市之類征之如周官載師所載非盡出田賦也漢孔氏曰不言貢筐亦差於餘州馬氏曰貢者侯國獻其土物於天子冀州天子自治故不言貢孔氏曰畿内材木蒲葦則林衡澤虞掌之金錫禽魚則牧人罟人掌之皆其自有何待於貢恒衞既從漢孔氏曰二水已治從其故道唐孔氏曰地理志云恒水出常山上曲陽縣東入滱水易氏曰漢常山郡上曲陽縣唐為定州恒陽縣後升州為中山府縣為上曲陽本漢舊縣有恒山在縣北四十里恒水所出漢避文帝諱改為常山蔡氏曰晁氏云今恒水西南流至真定府行唐縣東流入滋水又南流入衡水非古逕矣唐孔氏曰地理志云衞水出常山靈壽縣東北入滹沱易氏曰唐之靈壽縣屬恒州後改為真定府大陸既作漢孔氏曰大陸之地已可耕作唐孔氏曰地理志云大陸在鉅鹿縣北釋地十藪云晉有大陸孫炎謂今鉅鹿縣廣阿澤春秋魏獻子畋于大陸焚焉還卒于寗杜氏以為汲郡修武縣吴澤寗即修武也然此二澤相去甚逺以爾雅廣平曰陸但廣而平者則名大陸故異所而同名易氏曰鉅鹿郡鉅鹿縣唐以後屬邢州平郷縣汲郡修武縣唐以後屬懐州修武縣此二説皆未當邢州在磁相以北非河水所經修武又在澶衞以西尤非其地今考唐志邢州鉅鹿縣本漢舊縣大陸澤在縣西北五里自邢州東北至趙州百九十里趙州昭慶縣有廣阿澤一名大陸在縣東二十五里自趙州東北至深州二百里深州鹿城縣大陸澤在縣南五里盖河自澶衞以北皆行西山之麓班馬王璜所謂載之髙地是古河之在貝冀以南者穿西山踵趾及其過貝冀以北則地漸夷曠今此三州相去四五百里地皆夷曠又皆有大陸澤然則不可泥一所以當其名朱氏曰他州田賦之下不敘山川此復敘者以此水平在田賦既定之後也島夷皮服漢孔氏曰海曲謂之島林氏曰冀揚之島夷青之萊夷徐之淮夷梁之和夷雍之崑崙析支渠搜皆九州近要荒之服洪水既平效誠於上輸其所有如蠙蛛織皮之類島夷皮服貢其皮服也陳氏曰此夷狄獻方物以自效與冀州不言貢不相妨礙孫氏曰見禹之功及夷狄也他州倣此夾右碣石入于河漢孔氏曰碣石海畔山唐孔氏曰地理志碣石山在北平驪城縣西南易氏曰唐載碣石山在平州盧龍縣南盧龍本漢肥如縣屬遼西郡今平州石城縣本漢驪城縣屬右北平有禹貢碣石山秦皇登之以望巨海蔡氏曰酈道元言今驪城枕海有石如甬道数十里當山頂有大石如柱形韋昭以為碣石其山昔在河口海濵歴世既乆為水所漸淪入于海已去岸五百餘里矣程氏曰冀為帝都東西南三面距河他州貢賦皆以達河為至故此三方不必書而其北境則漢遼東西右北平漁陽上谷之地其水如遼濡滹易皆中髙不與河通故必自北㳂海附挾河口碣石以為之右然後能逹河新安王氏曰此言夾右碣石入于河此禹河之舊也周定王五年河徙己非禹之故道漢時河徙東郡更注渤海繼決于瓠子又決于魏之舘陶遂分為屯氏河大河在西屯氏河在東二河相並而行後又決于清河靈鳴犢口則河水分流入博州屯氏河始絶後又決于平原則東入齊入青以達海而下流與漯為一王莽時河遂行漯川失河不行於大伾之北而道於相魏之南則山澤在河之濵者支川與河相貫者悉皆易位而與禹貢不合故欲辨冀州山川當先講求河之故道也濟河惟兖州漢孔氏曰東南據濟西北距河唐孔氏曰兖州之境跨濟而過東南越濟水西北至東河也濟河說並見導水鄭氏曰禹貢言濟河惟兖州而爾雅及吕氏春秋皆言濟河間曰兖州盖言間者特起東西之間耳成氏曰輿地記云濟滑濮大名博恩德開德濵鄆棣自濟滄北皆清州境永静後右古兖州地自河以東以兖也然世大河所經歴之境與古不同考求古河所經之界則兖州之境見矣九河既道漢孔氏曰河水分為九道在此州界平原以北是唐陸氏曰爾雅九河徒駭一太史二馬頰三覆鬴四胡蘇五簡六潔七鈎盤八鬲津九唐孔氏曰漢成帝時許商上書云古記九河有徒駭胡蘇鬲津見在成平東光鬲縣界中自鬲津以北至徒駭其間相去二百餘里是知九河所在徒駭最北鬲津最南許商上言三河下言三縣則徒駭在成平胡蘇在東光鬲津在鬲縣其餘不復知也徒駭河許商説外地理志曰渤海郡成平縣滹沱河民曰徒駭河寰宇記曰在滄州清池縣南太史河闕馬頰河寰宇記曰在薊州蓨縣又曰在棣州滳河縣北又曰在滄州樂陵縣東南即篤馬河也覆鬴河通典曰在德州安德縣胡蘇河許商説外寡宇記曰在滄州饒安無棣臨津三縣簡河闕潔河輿地記曰在滄州南皮縣鈎盤河寰宇記曰從德州平昌縣來自滄州樂陵縣東南入海鬲津河許商説外寰宇記曰在滄州樂陵縣西東北流饒安縣南入海蔡氏曰自漢至唐講求九河甚悉漢世近古止得三𣲖唐人集累世積傳遂得其六與地記又得其一夫近古而采獲者少逺古而采獲者多已不可信至其顯然譌誤者班固以滹沱為徒駭而不知滹沱不與古河相渉樂史説馬頰乃以篤馬河當之而不知漢志篤馬不與古河相合強取他名以應九目而謂隨𣲖自入于海或一名而更兩出或新河而載舊名重複異同謬誤自見今考唐滄州即漢渤海郡地北境與平州接相去五百餘里方河未沒海之時從今海岸東北有五百里平地河播為九當在此地又上文言夾右碣石則九河入海之處有碣石在其西北岸大河水道變遷難於推考而碣石趾頂皆石不應仆沒後世濵海之地既無此山而平州正南有山而名碣石者尚在海中去岸五百餘里卓立可見則是古河自今已為海處向北斜行始分為九其河道已入于海明矣漢王璜言昔天連雨東北風海水溢西南出浸數百里九河之地已為海水所漸酈道元亦謂九河碣石包淪於海後世知求九河於平地而不求碣石有無以為證故非九河之地而強鑿求之冝其支離不能的也朱子曰既道者水行得其道也後言道者倣此雷夏既澤灉沮㑹同漢孔氏曰雷夏澤名唐孔氏曰地理志云雷夏在濟隂城陽縣西北易氏曰唐以後濮州雷澤縣本漢城陽縣有雷夏澤蔡氏曰山海經云澤中有雷神龍身而人頰鼓其腹則雷然則夲夏澤因其神名之曰雷夏也澤水之鍾也洪水横流而入于澤澤不能受則亦泛濫奔潰故水治而後雷夏為澤夏氏曰其陂東西二十里南北十五里即舜所漁之澤吕氏曰凡瀦澤之類皆禹不與水争地也治水不出兩端川流畎澮皆達于海所以使之有所歸也或逺而不達則捐數百里地以為澤所以使之有所容也漢孔氏曰灉沮二水名蔡氏曰灉水曽氏云爾雅謂水自河出為灉許慎謂河灉水在宋又謂汳水受陳留浚儀隂溝至蒙為灉水東入于泗水經謂汳水出隂溝東至蒙為狙獾則灉水即汳水也灉之下流入于睢水沮水地理志云睢水出沛郡芒縣睢水其沮水歟晁氏云爾雅謂自河出為灉濟出為濋求之於韻沮有楚音二水河濟之别也二説未詳孰是易氏曰灉沮漢志不著本末唐以後濮州雷澤縣灉沮二源俱出縣西北平地去縣十四里王氏曰兩相合謂之㑹合為一謂之同周氏曰㑹同朝宗諸侯見天子之禮故以為喻桑土既蠶蔡氏曰桑土冝桑之土既蠶者可蠶桑也蠶性惡濕故水退而後可蠶然九州皆賴其利獨於兖州言之者兖地冝桑後世之濮上桑間猶可驗也是降丘宅土漢孔氏曰地髙曰丘大水去民下丘居平土唐孔氏曰下丘居土諸處皆然獨於此州言之者鄭𤣥云此州寡於山而夾於兩大流之間遭洪水之民尤困以其免於厄尤喜故記之也厥土黒墳漢孔氏曰色黒而墳起漢馬氏曰墳有膏肥也林氏曰土脉墳起如左傳謂祭之地地墳是也厥草惟繇厥木惟條漢孔氏曰繇茂條長也唐孔氏曰九州惟此州與徐揚二州言草木者三州偏冝之也冝草木則地美矣而田非上者為其下濕也陳氏曰此見禹之功及草木也他州倣此厥田惟中下厥賦貞作十有三載乃同漢孔氏曰田第六貞正也州第九賦正與九相當漢孔氏曰治水十三年乃有賦法與他州同唐孔氏曰作者役功作務謂治水也曽氏曰鯀九載禹終事十三載髙堂隆言堯洪水二十二載是也厥貢漆絲厥篚織文漢孔氏曰地冝漆林又冝桑蠶唐孔氏曰諸州貢物多種其次第皆以當州貴者為先漢孔氏曰織文錦綺之屬盛之筐篚而貢焉蔡氏曰篚竹噐筐屬也織文織而有文古者幣帛之屬則盛之以筐篚所謂篚厥𤣥黄也唐孔氏曰鄭𤣥云貢者百功之府受而藏之其實於篚者入於女功故以貢篚别之歴檢篚之所盛皆供衣服之用入於女功如鄭言矣朱氏曰貢者諸侯貢天子故畿外八州皆有貢張氏曰史以貢名書與其載貢篚之意盖洪水平定民得安居自然懐報上之心以其土地所有獻於上若人子具甘㫖之奉於慈親焉此其貢篚皆其樂輸初非強為之科率馬氏曰周禮九貢一曰祀貢菁茅是也二曰嬪貢絲枲是也三曰噐貢浮磬是也四曰幣貢瑶琨皮革是也五曰材貢杶榦栝柏是也六曰貨貢金珠是也七曰服貢絺紵是也八曰斿貢羽毛是也九曰物貢魚鹽橘柚是也林氏曰八州之貢兖雍至寡荆揚至多各因其地之所冝雖有多寡而無輕重浮于濟漯達于河漢孔氏曰順流曰浮濟漯二水名濟説見導水唐孔氏曰地理志云漯水出東郡東武陽縣至樂安千乘縣入海過郡三行千二十里易氏曰班氏於東武陽言治漯水於此而不言所出釋者於平原郡髙唐縣引桑欽説以為漯水所出又應劭於平原郡漯隂縣釋二漯水出東武陽二説未知孰是今考平原髙唐縣即唐博州之縣西南至州百一十里則在禹河之東若東郡東武陽縣即唐魏州莘縣後升魏州為北京大名府北京雖在河北然禹河故瀆在州東三里而莘縣西去州百里則亦在禹河之東要之魏州東武陽在西乃其上流然後流至博州髙唐以至千乘而入海千乘即唐靑州千乘縣是漯水在禹河東南者如此自大河東徙魏博等諸州諸縣乃在河北蔡氏曰漯者河之支流也未詳其地漢孔氏曰因水入水曰達唐孔氏曰自漯入濟自濟入河林氏曰經不見濟漯相通之道要之二水皆可以入河蔡氏曰帝都冀州三面距河達河即達帝都海岱惟靑州漢孔氏曰東北據海西南距岱唐孔氏曰靑州境非至海畔而已漢末公孫度竊據遼東號靑州刺史越海收東萊諸郡堯時靑州當越海而有遼東也舜分靑州為營州即遼東也岱説見舜典易氏曰漢志泰山郡博縣泰山在西北武帝封禪分其地立奉髙縣後魏改博縣為博平隋改為博成唐改為乾封屬兖州後升州為襲慶府改縣為奉符泰山在縣西北三十里成氏曰輿地記云靑齊濰登州惟萊最濵宻地有淄鹽之安東儒右古靑州地九靑海魚利先皆以靑徐為河下流不知河下流惟兖當之靑徐已隔濟漢以來河流遷徙始歴靑徐之境夏氏曰爾雅不言靑州商制也商無靑州并靑於徐也周有靑無徐并徐於靑也嵎夷既略朱氏曰嵎夷即堯典嵎夷薛氏曰今登州地吕氏曰略經略為之封畛也濰淄其道漢孔氏曰濰淄二水復其故道唐孔氏曰地理志云濰水出琅邪箕屋山北至都昌縣入海過郡三行五百二十里易氏曰唐密州莒縣本漢舊縣屬城陽國濰山在縣東北八十三里濰水所出與漢志差異要之山因水得名必所出之源漢志於箕縣不言所出或者濰水所經之地今濰水出莒縣之濰山又東北流一百五十三里至本州諸城縣界諸城本漢東武縣屬琅邪郡又東北流七十四里至本州髙密縣髙密本漢舊縣屬膠西國又東北流至靑州北海縣本漢平壽縣屬北海郡後分屬濰州濰水南去縣五十里後又析北海縣地本漢都昌縣地置昌邑縣即濰水至都昌入海之地唐孔氏曰地理志云淄水出泰山萊蕪縣原山東北至千乘博昌縣入泲易氏曰唐淄州淄川縣本漢般陽縣地屬濟南郡淄水出縣東南原山去縣六十里俗傳禹治水功畢土石皆墨故謂之淄是淄水出原山雖同而漢唐郡縣差異考今地理兖州萊蕪縣地實有原山而萊蕪故城則在今淄州淄川縣東六十里淄水本出萊蕪原山東北過臨淄縣又東北過利縣東北入海此言入海而漢志言入泲盖入泲乃禹川之舊自大河東徙濟之上流既絶故入于海博昌即今靑州壽光縣乃淄水入泲之地林氏曰河濟下流兖受之淮下流徐受之江漢下流揚受之青雖近海然不當衆流之衝但濰淄二水順其故道其功畢矣比之他州用工最省厥土白墳海濵廣斥林氏曰此州平地之土則色白性墳海濵之土則彌望皆斥鹵漢孔氏曰濵涯也言復其斥鹵唐孔氏曰鄭云斥謂地鹹鹵也説文云東方謂之斥西方謂之鹵海畔逈闊地皆斥鹵故云廣斥厥田惟上下厥賦中上漢孔氏曰田第三賦第四厥貢鹽絺海物惟錯岱畎絲枲鉛松怪石蔡氏曰鹽斥地所生漢孔氏曰絺細葛林氏曰海物水族蠯蜃蠃蚔之類漢孔氏曰錯雜非一種林氏曰鹽絺海物惟錯與揚州齒革羽毛惟木文勢同木既别是一物則錯亦應別是一物如所謂錫貢磬錯漢孔氏曰畎谷也怪異好石似玉者岱山之谷出此五物皆貢之唐孔氏曰枲麻也王氏曰黒錫曰鉛唐陸氏曰怪石碔砆之屬林氏曰怪石意其資為器用之飾有不可缺非以充玩好又曰凡貢不言所出之地者一州所出皆可貢也言所出之地者以此地所産為良也按洪水初平九州有貢譬之食芹美曝懐不忘君下之人輸誠貢之而不容己上之人寛大受之而無所拒如此則怪石之類不勞解釋其意自明萊夷作牧厥篚檿絲易氏曰萊夷古萊子國齊滅之夾谷之㑹齊萊人以兵劫魯侯孔子以為裔夷之俘漢志東萊郡有萊君祠唐以後為萊州漢孔氏曰可以放牧漢孔氏曰檿桑蠶絲中琴瑟絃唐孔氏曰釋木云檿桑山桑郭璞云柘屬也蘇氏曰惟東萊出此絲以之為繒堅韌異常萊人謂之山蠒孫氏曰檿絲出於萊夷𤣥纎縞出於淮夷織貝出於島夷故靑徐揚序厥篚於三夷之下浮于汶達于濟唐孔氏曰地理志云汶水出泰山萊蕪縣原山西南入濟易氏曰唐兖州乾封縣本漢泰山郡博縣後改為襲慶府奉符縣汶水出縣東北原山盖博與萊蕪皆在兖州之西南故汶水所出之原山介兩邑間又有北汶嬴汶柴汶牟汶述征記云泰山郡水皆名汶今縣界有五汶皆源别而流同其原山之汶水西南經乾封縣治南去縣三里又西南流九十里入鄆州中都縣孔子為中都宰之地本漢東平陸縣屬東平國汶水北去縣二十四里已上為汶水入古濟瀆之地自濟之上流既絶故汶水入大野陂而不入濟濟説見導水朱氏曰不言達河者因於兖也揚州倣此海岱及淮惟徐州漢孔氏曰東至海北至岱南及淮岱説見靑州淮説見導水林氏曰北接靑州則至岱南接揚州則及淮一州之境必有四至七州止言二至盖以鄰州互見此獨載三面者止言海岱則嫌於靑止言淮海則嫌於揚故必言海岱及淮而後徐州之疆境始别莆陽鄭氏曰吕氏春秋云泗上曰徐州者泗之源委皆在徐州也成氏曰輿地記云淮陽徐右古宿州地兖海沂泗徐此州受淮泗下流地亦卑下然不若兖揚之甚春秋為鄒魯之國秦末為楚漢戰争之地項羽都彭城即今徐州夏氏曰爾雅泲東曰徐州者商無靑州靑兼於徐故徐言泲也淮沂其乂漢孔氏曰二水已治淮説見導水唐孔氏曰淮出桐柏山發源逺矣於此州言之者淮水至此而大為害尤甚故於此記之唐孔氏曰地理志云沂水出泰山盖縣臨樂子山南至下邳入泗過郡五行六百里易氏曰蓋縣在唐兖州之境下邳唐屬泗州後以下邳縣置淮陽軍沂水經下邳縣分為二一於城北西南入泗一經城東屈曲從縣南亦注泗謂之小沂水上有橋張良遇黄石公之處曽氏曰酈道元謂沂水出尼丘山西北經魯之雩門曽點浴沂即此又武水出泰山武陽之冠石山世謂之小沂水又一水出黄孤山世亦謂之小沂水許慎亦云沂水出東海費縣東則徐州之水以沂名者非一蔡氏曰徐之水有泗有汶有汴有漷而獨以淮沂言者周職方氏靑州其川淮泗其浸沂沭周無徐州兼之於青周之靑即禹之徐徐之川莫大於淮淮乂則泗以下凡為川者可知徐之浸莫大於沂沂乂則沭以下凡為浸者可知蒙羽其藝漢孔氏曰二山已可種藝唐孔氏曰地理志云蒙山在泰山蒙隂縣西南易氏曰唐沂州費縣本漢舊縣屬東海郡蒙山在縣西北八十里與漢志差異蓋蒙山跨兩邑之間費在其山之東南蒙隂在其山之東北可以互見顓㬰國在費縣西北為東蒙主即此唐孔氏曰地理志云羽山在東海祝其縣南易氏曰唐沂州臨沂縣羽山在縣東南百一十里與海州胊山縣分界羽山亦在其縣之西北百里蓋羽山介乎二邑祝其在其山之北臨沂在其山之西北朐山在其山之東南大野既豬漢孔氏曰大野澤名水所停曰豬唐孔氏曰地理志云大野澤在山陽鉅野縣北鉅即大也易氏曰唐鄆州鉅野縣本漢舊縣鉅野澤在縣東五里即魯西狩獲麟處後以鉅野縣屬濟州蔡氏曰何承天云鉅野廣大南通洙泗北連淸濟徐之有濟於是乎見夏氏曰職方氏兖州澤藪曰大野今徐州有大野者大野在徐之西兖之東周無徐州故以屬兖東原厎平漢孔氏曰東原致功而平言可耕唐孔氏曰東原即東平郡蔡氏曰即鄆州晁氏謂東平自古多水患數徙其城後又徙城於東南則其下濕可知厎平者水患去而厎於平也後人以其地之平故曰東平又曰東原在徐西北而謂之東者以在濟東故也東平國在景帝亦名濟東國云曽氏曰原曰既平山阜可知蔡氏曰大野東原所以志濟厥土赤埴墳夏氏曰土色赤質黏而膏脉墳起漢孔氏曰土黏曰埴蔡氏曰埴腻也黏泥如脂之腻墳説見兖州草木漸包漢孔氏曰漸進長包叢生蔡氏曰漸如易所謂木漸言其日進於茂而不已包如詩所謂如竹包矣言其叢生而積厥田惟上中厥賦中中漢孔氏曰田第二賦第五厥貢惟土五色羽畎夏翟嶧陽孤桐泗濵浮磬淮夷蠙珠暨魚厥篚𤣥纎縞漢孔氏曰王者封五色土為社建諸侯則各割其方之色土與之使之立社燾以黄土苴以白茅茅取其潔黄取王者覆四方鄭氏曰土五色謂靑赤黄白黒五種之土徐州之土雖赤而五色之土亦間有之故制以為貢漢孔氏曰夏翟翟雉名羽中旌旄羽山之谷有之林氏曰周禮染人秋染夏鄭註云染夏者染五色是知夏翟雉之具五色者古者車服器用以雉為飾多矣不但旌旄漢孔氏曰孤特也嶧山之陽特生桐中琴瑟唐孔氏曰地理志云東海下邳縣西有葛嶧山易氏曰下邳縣唐屬泗州後屬淮陽軍嶧山在縣西六里林氏曰詩云梧桐生矣于彼朝陽蓋桐之生以向日者為貴必曰孤桐者猶言孤竹之管漢孔氏曰泗水涯水中見石可以為磬蔡氏曰泗水旁近石浮生土中不根著者也今下邳有石磬山或以為古取磬之地唐孔氏曰貢石而言磬者此石冝為磬猶如砥礪然漢孔氏曰蠙珠珠名唐孔氏曰蠙蚌之别名此蠙出珠遂名蠙珠馬氏曰淮有美魚謂之淮白魚林氏曰淮夷獻此二物蔡氏曰夏翟孤桐浮磬珠魚各有所産之地非他處所有故詳其地漢孔氏曰𤣥黒繒縞白繒纎細也纎左中明二物皆當細曽氏曰𤣥者赤而有黒色以之為衮所以祭也以之為端所以齋也以之為冠所以為首服也記云期而大祥素縞麻衣中月而禫禫而纎註謂黒經白緯為纎則纎縞皆去凶即吉之服又云有虞氏縞衣而養老則縞又為燕服𤣥也纎也縞也凡三物浮于淮泗達于河淮説見導水唐孔氏曰地理志云泗水出濟隂乘氏縣東南至臨淮睢陵縣入淮過郡六行千一百一十里易氏曰漢濟隂郡唐為曹州後升為興仁府乘氏縣屬焉睢陵縣即今泗州昭信縣之北境漢志所載有兩泗水其一即所謂自乘氏至睢陵入淮者也又一水魯國卞縣泗水西南至方與入沛過郡三行五百里唐志卞及方與皆在兖州兖州泗水縣東有陪尾山泗水出焉其源有四四水俱導因以為名西南流四十五里經本州曲阜縣縣本漢舊分為二流南為泗北為洙二水間即夫子設教之所又西南流三十五里至本州瑕丘縣縣本漢舊屬山陽郡即兖州所治泗水東去縣二十五里洙復與泗合又南流百九十里至本州魚臺縣界本漢方與地屬山陽郡即所謂自方與入沛者也又東南流經徐州沛縣本漢舊縣屬山陽郡即所謂自沛入淮者也自兖州凡五百九十三里至徐州徐州鼓城縣本漢舊縣屬沛郡泗水在縣東十歩又東南至泗州下邳縣本漢舊縣屬東海郡又東南流與濟隂乘氏之泗水合凡五百九十里至泗州入淮今盱眙軍相對即泗口蘇氏曰自淮泗入河必道于汴世謂隋煬始通汴入泗禹時無此水道此考之不詳也漢書項羽與漢約中分天下割鴻溝以西為漢東為楚文頴註云於滎陽下引河東南為鴻溝以通宋鄭陳蔡曹衞與濟汝淮泗㑹于楚即今官渡水也魏武與袁紹相持於官渡乃楚漢分裂之地自秦漢有之安知非禹迹耶王濬伐呉杜預與之書云足下既摧其西藩當徑取秣陵自江入淮踰于泗汴泝河而上振旅還都亦曠世一事也王濬舟師之事古今絶倫而自汴遡河可以班師則汴水之大小當不減於今又足以見秦漢魏晉皆有此水道非煬帝創開也禹貢九州之末皆記入河水道而淮泗獨不能入河理不應爾意其必開此道其後或為鴻溝或為官渡或為汴上下百餘里間不可必知然皆引河而注之淮泗也淮海惟揚州漢孔氏曰北據淮南距海成氏曰輿地記云和揚髙郵楚通泰滁眞無為壽平江盧杭蘄越舒潤濠湖光婺睦常秀明江寜温宣台歙處池衢饒筠信臨太平撫廣德吉南康袁江江虔洪南安劔建昌武福興化建潮南邵漳右古泉州地汀止揚孔據南北二方而言然以地域考之經蓋舉三方揚州東南二境皆距海而江漢入海處皆東海也疆域之廣通於閩越及於兖靑徐而不下於冀梁經於徐豫止言三方於荆止言二方蓋以鄰州互見此州止言淮海三方而不言西境得非以荆州互見耶曽氏曰禹別其域故曰淮海惟揚州周辨其方故曰東南曰揚州一也爾雅江南曰揚州則揚之境北不至淮與禹貢異殆商因於夏而所損益如此歟彭蠡既豬陽鳥攸居漢孔氏曰彭蠡澤名隨陽之鳥鴻鴈之屬冬月所居於此澤蔡氏曰地志在豫章郡彭澤縣東合江西江東諸水跨豫章饒州南康軍三州之地所謂鄱陽湖也唐孔氏曰彭蠡是江漢合處下云導漾水南入于江東匯于彭蠡是也易氏曰唐江州都昌縣本漢彭澤縣地後都昌屬南康軍彭蠡湖在縣西六十里即江漢所匯之澤既豬説見徐州唐孔氏曰日之行也夏至漸南冬至漸北鴻鴈九月而南正月而北日陽也此鳥南北與日進退故稱陽鳥蔡氏曰今彭蠡洲渚之間千百為羣記陽鳥攸居猶夏小正記鴈北鄉也唐氏曰見禹之功及飛鳥也三江既入震澤厎定漢孔氏曰震澤呉南大湖名言三江已入致定為震澤又導江下注曰自彭蠡江分為三入震澤遂為北江而入海又曰有北有中南可知唐孔氏曰地理志云會稽呉縣故周泰伯所封國也具區在西古文以為震澤三江既入入海耳不入震澤也周禮職方揚州藪曰具區浸曰五湖五湖即震澤若如志云具區即震澤則浸藪為一餘州浸藪皆異而揚州同者蓋揚州浸藪同處論其水謂之浸指其澤謂之藪曽氏曰震如山川震之震若今之湖翻具區水多震而難定故曰震澤厎定者底於定而不震蕩易氏曰三江自入于海不通震澤而經何以言震澤厎定蓋江湖在今日雖無相通之勢而當時洪水實有横流之理想洪水横流之際震澤與江水莽為一壑自大禹䟽導而三江入海震澤自厎于定自然之勢也按三江不勝異説班氏云南江從㑹稽呉縣入海中江從丹陽蕪湖東至㑹稽陽羡入海北江從㑹稽毗陵縣入海韋氏云松江浙江浦陽江郭氏云岷江浙江松江唐氏呉都注云松江下七十里分流東北入海者為婁江東南流者為東江併松江為三江其地今亦名三江口呉越春秋所謂范蠡乘舟出三江之口者是也蘇氏云豫章江入彭蠡而東至海為南江岷江江之經流㑹彭蠡以入海為中江漢自北入江匯為彭蠡為北江此三江自彭蠡而下則三江為一過秣陵京口以入于海不復三矣曽氏云考於地志豫章之川如彭水鄱水塗水之類凡九水合於湖漢東至彭蠡入江此九氷蓋南江也南江江之故迹非禹所導其後禹導漢水入焉與舊江合流而水之派分為南北故漢為北江又其後導岷山之江入焉其流介乎三江之中故為中江北江中江皆禹所導南江乃其故道耳故經不之志前三説已經諸儒辨駁唐氏之説蔡氏取之蘇曽之説則朱子於九江彭蠡辨嘗謂此説極巧而新然自湖口而下江本無二安得有三且於下文之震澤又懸隔遼夐而不相屬也又安能曲説而彊附之問諸呉人則曰震澤下流實有三江以入于海彼既以目驗之恐其説之必可信今吾邑耕齋劉氏嘗見喻云頃年之官呉門郡遣舟來迓一夕問所冝宿舟子曰晚宿震澤洎至其所屋室綿亘里門扁以震澤二字且有厎定橋登岸問塗之人曰此去大湖近耶曰近矣又問三江何在曰此去不逺有三江口又問三江何謂曰浙江呉江松江也耕齋所言與朱子所問呉人合敬附其説於此以備參考云篠簜既敷厥草惟夭厥木惟喬漢孔氏曰篠竹箭簜大竹水去已布生漢孔氏曰少長曰夭喬髙也新安王氏曰兖州言草木於厥土之下其土髙下燥濕性同兼山林言之揚之塗泥惟言其沮洳之多山林不與故言草木於厥土之上厥土惟塗泥漢孔氏曰地泉濕王氏曰地之下濕東南為甚天傾西北地缺東南故揚與荆皆曰塗泥厥田惟下下厥賦下上上錯漢孔氏曰田第九賦第七雜出第六厥貢惟金三品瑶琨篠簜齒革羽毛惟木島夷卉服厥篚織貝厥包橘柚錫貢漢孔氏曰金銀銅漢孔氏曰瑶琨皆美玉唐孔氏曰王肅云瑶琨美石次玉者篠簜説見上文蔡氏曰瑶琨可以為禮器篠之材中矢之笴簜之材中樂之管簜亦可為符節周官掌節有英簜漢孔氏曰齒象牙革犀皮羽鳥羽毛旄牛尾木楩楠豫章蔡氏曰齒革可以成車甲羽毛可以成旌旄木可以備棟宇器械之用漢孔氏曰南海島夷蔡氏曰卉草也木綿之屬唐孔氏曰鄭𤣥云貝錦名詩云成是貝錦凡為錦者先染其絲乃織之則文成蔡氏曰今南夷木綿精好者亦名吉貝海島之夷既貢卉服而織貝之精者則入篚焉漢孔氏曰小曰橘大曰柚其所包褁而致者錫命乃貢言不常蘇氏曰橘柚常貢則勞民害物如漢永平唐天寳荔枝之害矣故錫命乃貢之沿于江海達于淮泗漢孔氏曰順流而下曰沿沿江入海自海入淮自淮入泗林氏曰禹時江淮未通故揚州入貢必由江以入海然後達于淮泗至呉夫差掘溝通水與晉㑹黄池然後江淮始通孟子謂禹排淮泗而注之江蓋誤指呉王所通之水以為禹迹夏氏曰孟子必不至誤意者禹時淮當入江後來堙塞呉復通之此言沿于江海達于淮泗非謂江不入淮當是揚州疆界闊逺貢道不一或由江入淮泗或由海入淮泗耳蔡氏曰不言達河者因於徐也荆及衡陽惟荆州漢孔氏曰北據荆山南及衡山之陽唐孔氏曰地理志云南條荆山在南郡臨沮縣北易氏曰南郡臨沮縣即今荆門軍當陽縣地林氏曰此州與豫州以荆山為界荆山之南則荆州荆山之北則豫州荆州安得跨而據之當言北距荆山可也衡説見導山唐孔氏曰此州之境南過衡山以衡是大山其南無復有名山大川可以為記故言衡陽見其南至山南也成氏曰輿地記云江陵郢荆門漢陽鄂信陽國歸岳興峽鼎安澧復辰黄沅靖桂陽潭全衡武岡永錦道奬郴溪邵施以南黔荆州右古荆州地衡山以東則為揚州衡山則之境猶未盡如二廣之地恐亦在其間曰莆陽鄭氏曰職方氏正南曰荆州吕氏春秋南方荆州爾雅漢南曰荆州爾雅商制荆州之域又跨荆山之北而至于漢水也江漢朝宗于海漢孔氏曰二水經此州而入海有似於朝百川以海為宗江説見導水易氏曰江出梁州岷山東流至南郡秭歸縣即今歸州秭歸縣始入荆州界又東流至長沙下雋縣即今岳州岳陽縣又東北流至江夏郡沙羡縣即今鄂州江夏縣皆荆州境也漢説見導水易氏曰漢出梁州嶓冢東流至南陽郡武當縣即今均州武當縣始入荆州界又東流至江夏郡安陸縣以入江即今漢陽軍漢陽縣皆荆州境也唐孔氏曰周禮春朝夏宗朝宗是人事之名水無性識非有此義以海水大而江漢小以小就大似諸侯歸天子假人事以言之九江孔殷漢孔氏曰江於此州界分為九道唐孔氏曰地理志云九江在廬江郡尋陽縣南曽氏曰九江洞庭也考之前志沅水漸水潕水辰水敘水酉水澧水湘水資水皆合洞庭中江則過之而已九江豈非洞庭乎下文云過九江至于東陵東迤北㑹于匯東陵即巴陵江水過洞庭至巴陵而後東北邪行合於彭蠡則九江不在潯陽易氏曰漢志沅水出牂柯郡至武陵郡臨沅縣入江漸水至武陵郡索縣入沅潕水至武陵郡舞陽縣入沅辰水出武陵郡辰陽縣三山谷南入沅敘水出武陵郡義陵縣鄜梁山入沅酉水出武陵郡充縣酉原山又南至沅陵縣入沅澧水出武陵郡充縣歴山又東至長沙國下雋縣入沅資水出零陵郡都梁縣路山東北至長沙國益陽縣入沅湘水出零陵郡始安縣海陽山北至長沙國酃縣入江此九江漢志皆在荆州之境㑹於洞庭以入江沱濳既道漢孔氏曰沱江别名濳水名皆復其故道唐孔氏曰釋水云水自江出為沱自漢出為濳林氏曰江漢二水發源於梁州入於荆州出於荆者荆之沱潛出於梁者梁之沱濳易氏曰今江漢之間支川分流者不一或有出於江漢而他流者又有出於江漢而其流復入者此荆梁二州各有沱潛也程氏曰沱潛從江漢下流得名此喜江漢之得平故曰沱潛既道若曰不獨其上流治其支流亦治耳雲土夢作乂漢孔氏曰雲夢之澤在江南其中有平土丘水去可為耕作畎􅅿之治沈氏曰舊尚書曰雲夢土作乂太宗時得古本尚書乃雲土夢作乂詔改從古本唐孔氏曰地理志云南郡華容縣南有雲夢澤杜預云南郡枝江縣西有雲夢城江夏安陸縣亦有雲夢雲夢一澤而每處有名者司馬相如子虚賦云雲夢方八九百里則此澤跨江南北每處名存焉易氏曰左傳楚子渉睢濟江入于雲中則在江北者為雲建子田江南之夢則在江南者為夢江之南皆山也水源易涸江之北則江漢交流之㑹水潦常積雲之在北方者方見土夢之在南方者已作乂亦其勢耳鄭氏曰雲在江北今玉沙監利景陵等縣夢在江南今公安石首建寜等縣厥土惟塗泥塗泥説見揚州厥田惟下中厥賦上下漢孔氏曰田第八賦第三林氏曰土雖與揚州同而地勢稍髙故田加於揚州一等厥貢羽毛齒革惟金三品杶榦栝柏礪砥砮丹惟箘簵楛三邦厎貢厥名包匭菁茅厥篚𤣥纁璣組九江納錫大龜漢孔氏曰土所出與揚州同林氏曰職方揚州其利金錫荆州其利銀丹齒革則荆揚所産可見左傳重耳對楚子曰羽毛齒革君地生焉又聲子曰如杞梓皮革自楚往也又鄭伯朝楚楚子賜之金既而悔之曰無以鑄兵故以鑄三鍾則羽毛齒革金木貢於荆冝矣蔡氏曰杶木似樗漢孔氏曰幹柘也柏葉松身曰栝唐孔氏曰考工記弓人取榦之道以柘為上杶栝柏皆木名也以其所施多矣柘木惟用為弓榦故舉其用曽氏曰揚州貢木不言名者不可勝名也此言杶榦栝柏者所貢止此耳漢孔氏曰砥細於礪皆磨石也砮石中矢鏃丹朱類唐孔氏曰砥以細宻為名礪以粗厲為稱魯語云肅慎氏貢楛矢石砮賈逵謂砮矢鏃之石也丹者丹砂王肅云可以為采漢孔氏曰箘簵美竹楛中矢榦三物皆出雲夢之澤近澤三國常致貢之其名天下稱善唐陸氏曰楛馬云木名毛詩草木䟽云葉如荆而赤莖似蓍林氏曰箘簵楛三者皆可為矢智伯伐趙趙襄子入晉陽問張孟談曰無矢奈何孟談曰臣聞董安于之治晉陽也公宫之垣皆以荻蒿苫楚廧之其髙丈餘襄子發而試之其堅則箘簵之勁不能過也是則箘簵竹之堅勁者其材中矣之笴楛矢肅慎氏嘗貢焉則楛之材亦中矢之笴三邦之地經無明文考工記云材之美者有妢胡之笴鄭註謂胡子之國在楚傍意者三邦故地歟漢孔氏曰匭匣也林氏曰菁茅有刺而三脊所以供祭祀縮酒之用既包而又匣之示敬也左傳齊桓公責楚云爾貢包茅不入又管子云江淮之間一茅而三脊名曰菁茅今辰州麻陽縣苞茅山出苞茅有刺而三脊漢孔氏曰此州染𤣥纁色善故貢之璣珠類生於水組綬類唐孔氏曰釋器云三染謂之纁李巡謂三染其色已成為絳纁綘一也考工記云三入為纁五入為緅七入為緇鄭云纁者三入而成又再染以黒則為緅又再染以黒則為緇𤣥在緅緇之間其六入者説文云璣珠不圓者馬氏曰組織成綬帶之類夏氏曰此皆充冕服之用故入篚而貢漢孔氏曰尺二寸曰大龜出於九江水中陳氏曰錫貢命之使貢如敷錫庶民之類上錫下之辭納錫納而錫之如師錫帝曰之類下錫上之辭林氏曰大龜不可常得故不可為常貢惟九江之地偶得之則納錫於上與禹錫𤣥圭同意浮于江沱濳漢逾于洛至于南河江沱潛漢説見上文程氏曰不徑浮江漢兼用沱潛者隨貢物所出之便或由經流或循支派期便事而已漢孔氏曰逾越也河在冀州南東流故越洛而至南河洛説見導水蔡氏曰四水不與洛通故舎舟而陸以達于洛自洛而至于南河陳氏曰河在冀之西者曰西河在冀之南者曰南河在冀之東者曰東河其實一河也荆河惟豫州漢孔氏曰西南至荆山北距河水荆説見荆州河説見導水林氏曰荆即南條之荆其隂為豫州其陽為荆州此州在荆之東北冀之南故以荆山河水為界成氏曰輿地記云蔡潁潁昌應天亳孟陳陜開封虢興仁汝廣濟鄭河南唐單鄧州地隨九州襄中四光化湊均地地拱平曠右古豫居之方輻之勢惟有伊洛瀍澗四水而伊瀍澗又㑹洛而入河惟洛水稍大其他皆非巨流禹治此州視他州稍易曽氏曰周官爾雅皆云河南曰豫州吕氏春秋云河漢間曰豫州則豫之東南至漢東而不及荆山蓋三代地大同小異有因有革也伊洛瀍澗既入于河唐孔氏曰地理志云伊水出𢎞農盧氏縣東熊耳山東北入洛易氏曰𢎞農盧氏縣今虢州盧氏縣伊水所出過郡二行四百五十里至河南府鞏縣入洛唐孔氏曰地理志云洛水出𢎞農上洛縣冢嶺山東北至鞏縣入河洛又説見導水唐孔氏曰地理志云瀍水出河南穀城縣潛亭北東南入洛蔡氏曰今河南府河南縣西北有古穀城縣其北山瀍水所出至本府偃師縣入洛唐孔氏曰地理志云澗水出𢎞農新安縣東南入洛蔡氏曰新安在今河南府新安澠池之間今澠池縣東二十三里新安城是也城東北有白石山即澗水所出酈道元云世謂之廣陽山漢孔氏曰四水合流而入河易氏曰考之地理瀍澗近出河南府而伊逺出虢州洛又逺出商州東流至河南三川皆入洛而同流入河曽氏曰伊瀍澗入洛洛入河今乃若四水各入河者以四水大小相敵也滎波既豬漢孔氏曰滎澤波水已成遏豬林氏曰周禮職方云其川滎洛其浸波溠滎波當為二水唐孔氏曰沇水入河而溢為滎鄭云今塞為平地滎陽民猶謂其地為滎澤在其縣東易氏曰漢志河南郡滎陽縣乃古滎澤之地即今鄭州滎澤縣曽氏曰職方云其川滎雒者禹時為澤至周為川穆天子傳浮于滎水乃奏廣樂則滎澤至周為川易氏曰爾雅云水自洛出為波波以出洛得名則當在𢎞農盧氏與河南鞏縣之境乃今河南府商虢等州導菏澤被孟豬漢孔氏曰菏澤在胡陵唐孔氏曰地理志云菏澤在濟隂定陶縣東易氏曰唐曹州濟隂縣本漢定陶縣地菏澤在縣東北九十里後以濟隂縣之定陶鎮置定陶縣仍置廣濟軍漢孔氏曰孟豬澤名在菏東北水溢覆被之唐孔氏曰地理志云孟豬左梁國睢陽縣東北易氏曰唐宋州虞城縣本漢虞縣屬梁國孟豬澤在縣西北十里周回五十里蓋此澤介二邑之問睢陽在其西南虞城在其東南宋州後改名應天府林氏曰孟豬周禮作望諸左傳爾雅作孟諸漢志作明諸史記作明都一也周禮靑州澤藪曰望諸此乃屬豫州者周無徐州徐并於靑靑在豫東故得兼有孟諸夏氏曰菏澤水盛餘波被于孟豬如導弱水餘波入流沙也不言入而言被者水盛乃被之不常入也厥土惟壤下土墳壚漢孔氏曰髙者壤下者壚唐陸氏曰説文壚黒剛得土也唐孔氏曰不言色者州内之土不純一色故不言色厥田惟中上厥賦錯上中漢孔氏曰田第四賦第二又雜出第一厥貢漆枲絺紵厥篚纎纊錫貢磬錯林氏曰周官載師漆林有征蓋豫在周為畿内故征之禹時豫在畿外故為貢枲絺説見靑州林氏曰顧師古云織紵以為布及練然經但言貢紵成布未成布未可詳漢孔氏曰纎纊細綿纎説又見徐州漢孔氏曰治玉石曰錯治磬錯林氏曰揚州橘柚言包則與厥篚之文無嫌故言錫貢在後此磬錯則與厥篚之文相屬故言錫貢在先浮于洛達于河蔡氏曰豫去帝都最近其東境徑自入河其西境則浮洛而後至河華陽黒水惟梁州漢孔氏曰東據華山之南西距黒水華説見導山黒水説見導水唐孔氏曰周禮豫州山鎮曰華山在豫州界内此梁州之境東據華山之南不得其山故言陽也林氏曰梁雍西境皆至黒水梁之東北雍之東南以華為界成氏曰輿地記云利洋閬劒巴興元文興果蓬資龍普三泉昌梓敘遂瀘合順富榮都成渠眉懐安彭廣安蜀長寕綿漢簡卭威嘉祺雅亨黎井僊茂康永松翼當眞悉乾靜姚恭嶲柘夔達平南忠寜太萬階開成涪鳯梁山扶疊州境宕雖廣商險且金重山房嶺四右古梁州地此域而逺複塞險固與中州不相接武王伐殷庸蜀羌髳微盧彭濮人皆從而誓師之言曰逖矣西土之人則梁雍皆逺而梁尤逺也禹時劒門金牛之道未鑿梁州之通于中州者梯縁蜀道之險而北行逺至漢上而浮潛逾沔然後能入渭亂河以達帝都則其險逺可知岷嶓既藝漢孔氏曰岷嶓皆山名既藝説見徐州唐孔氏曰地理志云蜀郡湔氐道岷山在西徼外江水所出易氏曰唐茂州汶山縣本漢舊縣屬蜀郡汶山即岷山在縣西北南去青城石山百里俗謂之鐵豹嶺晁氏曰蜀以山近江源者通為岷山連峰接岫重疊險阻不詳逺近靑城天彭諸山之所環繞皆古岷山唐孔氏曰地理志云隴西郡西縣冢山西漢水所出易氏曰西縣即今秦州上邽縣其地大逺今考唐志興元府金牛縣本漢葭萌縣地屬廣漢郡後省為鎮𨽻三泉縣嶓冢山在縣東二十里漾水所出其山中髙而東西下沱潛既道荆梁二州沱潛説見荆州唐孔氏曰地理志在今蜀郡郫縣江沱及漢中安陽皆有沱水潛水其尾入江漢耳首不於此出蜀郡江源有􅗪江首出江南至犍為武陽又入江豈沱之類歟潛蓋西漢出嶓冢東南至巴郡江州入江行二千七百六十里此解梁州之沱潛也郭璞爾雅音義云沱水出蜀郡都水縣揃山與江别而更流璞又云有水從漢中沔陽縣南流至梓潼漢壽入大穴中通峒山下西南潛出一名沔水舊俗云即禹貢潛也郭璞此言亦解梁州沱潛蔡氏曰沱水地志云蜀郡汶江縣江沱在西南東入江汶江縣今永康軍導江縣也濳水地志巴郡宕渠縣濳水西南入江宕渠今渠州流江縣也酈道元謂宕渠縣有大穴潛水入焉通罡山下西南潛出南漢入于江又地志漢中郡安陽縣灊谷水出西南入灊音潛安陽縣即今洋州真符縣也按梁州沱潛諸說並存易氏謂江漢支川分流不一不可泥一所以當其名下文浮于潛亦然志緫說岷嶓沱潛蔡氏曰梁州乃江漢之源此不者岷之藝導江也嶓之藝導漾也道沱則江悉矣道潛則漢悉矣上志岷嶓下志沱濳江漢源流於是而見蔡蒙旅平漢孔氏曰蔡蒙二山名祭山曰族平言治功畢唐孔氏曰蔡山不知所在易氏曰漢唐地理不載惟與地記云雅州嚴道縣有蔡山今曰周公山唐孔氏曰地理志云蒙山在蜀郡靑衣縣易氏曰唐雅州嚴道縣本漢舊縣蒙山在縣南十里今雅州名山縣本漢靑衣縣地有蒙山此與漢郡縣同而唐志乃在嚴道即此山介二縣之間也蔡氏曰酈道元謂山上合下開沫水逕其間溷崖水脉漂疾歴代為患蜀郡太守李冰發卒鑿平溷崖則此山在禹為用功多也陳氏曰旅祭獨於梁雍言之蓋九州終於梁雍以見前此諸州名山皆有祭也又獨於蔡蒙荆岐言之蓋紀梁之山終於蔡蒙紀雍之山始於荆岐以見州内諸山皆有祭也故下文復以九山刋旅緫之旅山則川可知祭山川則大於山川者可知和夷厎績蘇氏曰和夷西南夷名曽氏曰自嚴道以西地名和川夷人唐之為羈縻郡三十有七林氏曰今雅州有和川鎭即和夷故地厎績説見冀州厥土靑黎漢孔氏曰色靑黒而沃壤張氏曰餘州皆言土之色與性此不言性者其性不一也厥田惟下上厥賦下中三錯漢孔氏曰田第七賦第八雜出第七第九三等厥貢璆鐵銀鏤砮磬熊羆狐貍織皮西傾因桓是來漢孔氏曰璆玉名曽氏曰蜀郡卓氏程氏皆以鐵治富擬封君則梁州之利尤在於鐵夏氏曰銀白金也漢孔氏曰鏤剛鐵唐孔氏曰鏤者可以刻鏤砮說見荆州林氏曰徐貢浮磬此貢石磬豫又貢磬錯則知當時樂器磬最為重漢孔氏曰貢四獸之皮織金罽新安王氏曰熊似豕羆似熊而黄狐類犬而長尾貍則狐之小者蘇氏曰以罽者曰織以裘者曰皮漢孔氏曰西傾山名桓水自西傾山南行唐孔氏曰西傾雍州山地理志云西傾在隴西臨洮縣西南桓水出蜀郡蜀山西南行羌中入南海易氏曰唐洮州臨潭縣地本漢臨洮縣屬隴西郡崧臺山即西傾山後名西彊山李氏曰熊羆狐貍織皮非中國所有之物也自西傾來因桓水而至耳舊說謂桓水由西傾而至于潛非也織皮之物出於羌戎自西傾山因桓水而入蜀耳張氏曰西傾夷之地因桓水而來以通中國獻方物也浮于潛逾于沔入于渭亂于河潛說見上文程氏曰凡漢水下流分支可以容舟處皆是浮濳也易氏曰不言浮漢而言浮潛者隨其支流徑便可浮則浮不必盡至漢乃浮也漢孔氏曰漢上曰沔易氏曰沔即漾漢之異名程氏曰桑欽敘漢截自西樂城以上為沔度水口以下為漢大率漢之支流皆名潛漢之上流皆名沔此由潛以達漢也漢孔氏曰越沔而北入渭唐孔氏曰計沔在渭南五百餘里故越沔陸行而北入渭蘇氏曰沔在梁州山南而渭在雍州山北沔無入渭之道然前漢書武帝時人有上書言通襃斜道及漕事下張湯湯問之云襃水通沔斜水通渭皆可以漕曹從南陽上沔入襃襃絶水至斜間百餘里以車轉從斜下渭如此漢中穀可致此則自沔入渭之道也然襃斜之間絶水百餘里故曰逾于沔蓋禹時通謂襃為沔也漢孔氏曰正絶流曰亂夏氏曰冀在河東梁在河西自渭至河必絶流横渡乃達帝都程氏曰梁之貢道於浮江便而浮潛逾沔則若甚迂而偏此知山川孔道者所疑而其實不然也此梁貢其實江潛皆浮然其書潛遺江者荆之貢道在前可因而見荆之言曰浮于江沱潛漢逾于洛至于南河夫江沱之可以浮漢逾洛之可以達河荆之所有梁之所共也梁賦之近北而不可浮江者既載之州末所謂潛沔渭河是已其南道之可以浮江者荆既先之則梁次乎荆不待申言黒水西河惟雍州漢孔氏曰西距黒水東據河龍門之河在冀州西黒水說見導水唐孔氏曰雍州之境被荒服之外東不越河而西踰黒水王肅云西據黒水東距西河所言得其實孔本誤也成氏曰輿地記云京兆鄜延安環同慶華寧邠坊耀丹銀涇綏德熈保安隴麟岷鳯翔渭秦原河湟蘭廓鞏洮㑹戎鎮西安德順西寧懷德積石勝靈甘夏涼宥𤓰鹽肅豐沙西函右伊蜀阻安西河北庭戎右古雍州地此州左崤隴山帶控扼夏沃野千里古人所謂百二之勢金城天府之國大河自此東注地勢極髙視山東諸州若臨千仭之上而觀其下田肯所謂猶居髙屋之上而建領者此也曽氏曰職方氏正西曰雍州爾雅河西曰雍州吕氏春秋西方曰雍州一也周都豐鎬故雍為正西商都河西則雍為西迤北不得為正西秦都咸陽亦周故畿故吕覽以西方為雍皆因其都之所在也弱水既西弱水說見導水唐孔氏曰諸水言既道此言既西由地勢不同導之使西流也涇屬渭汭漢孔氏曰屬逮也唐孔氏曰地理志云涇水出安定涇陽縣西岍頭山東南至馮翊陽陵縣入渭行千六百里易氏曰唐原州髙平縣本漢髙平縣屬安定本郡岍頭山一名崆峒山在縣西一里又本州百泉縣漢朝􅄼縣地涇水源出西南二縣雖皆安定郡之地而實非涇陽之舊漢涇陽縣即唐原州之平涼縣今縣西四十里涇州故城是也蓋其山連亘於此三縣涇水出於此東南流至涇州臨涇縣本漢舊縣屬安定郡又東南流至本州保定縣東一里本漢安定縣屬安定郡又東南流至邠州宜禄縣本漢淺水縣地屬上郡又東南流至本州新平縣本漢漆縣屬漢右扶風又東南流至本州永壽縣本新平縣地又東北流至京兆府醴泉縣本漢谷口縣地屬左馮翊在九堫山東仲山西當涇水出山之處故謂之谷口溝洫志白渠溉田四千五百餘頃即此地又自池陽東流至本府涇陽縣本漢舊縣屬安定郡涇水在縣南七里左傳襄十四年諸侯伐秦濟涇而次即此地又東南流入本府髙陵縣界本漢舊縣屬左馮翊又東北流至本府雲陽縣本漢舊縣屬左馮翊涇水在縣西二十五里即鄭國分涇水置鄭渠之地又東流而入渭今以原之平涼屬渭州京兆之雲陽屬耀州渭說見導水易氏曰渭水至陽陵而涇水自西北來入之與渭相屬故曰渭汭或謂周職方氏其川涇汭則汭亦水名其說未當考之漢志右扶風汧縣芮水出西北東入于涇今汭既入涇而涇又入渭方謂之渭汭則其地理不相干渉下文又有㑹于渭汭則渭水不應再舉於龍門西河之下嘗考經㫖洛入河處謂之洛汭則渭入河處謂之渭汭而上言涇者蓋涇水至京兆府雲陽縣入渭在府之東北一百一十里又一百七十里至華州華隂縣之永豐倉而入河指此二百八十里間渭與涇相聨故曰涇屬渭汭漆沮既從漢孔氏曰漆沮之水已從入渭蔡氏曰漆水寰宇記自耀州同官縣東北界來經華源縣合沮水沮水地志出北地郡直路縣東今坊州冝君縣西北境也寰宇記沮水自坊州昇平縣北子午嶺出俗號子午水下合榆谷慈馬等川遂為沮水至耀州華原縣合漆水至同州朝邑縣東南入渭二水相敵故並言之地理志云漆水出扶風漆縣晁氏云此豳之漆也水經漆水出扶風杜陽縣程氏云杜陽今岐山普潤縣之地亦漢漆縣之境其水入渭在灃水之上與經序渭水節次不合非禹貢漆水灃水攸同漢孔氏曰灃水所同同之於渭唐孔氏曰地理志云澧水出扶風鄠縣東南北過上林苑入渭易氏曰唐京兆府鄠縣本漢舊縣屬右扶風灃水出縣東終南山自發源經縣東二十八里入渭蔡氏曰屬從同主渭而言荆岐既旅漢孔氏曰此荆在岐東非荆州之荆唐孔氏曰地理志云北條荆山在馮翊懐德縣南易氏曰唐京兆府富平縣本漢舊縣屬北郡荆山在縣南二十五里唐孔氏曰地理志云岐山在右扶風美陽縣西北易氏曰唐以後鳯翔府岐山縣有岐山亦名天柱山在縣東北十里太王所邑陳氏曰梁言旅平此言既旅互相備說又見梁州終南惇物至于鳥鼠漢孔氏曰三山名言相望唐孔氏曰地理志云扶風武功縣有太一山古文以為終南又有垂山古文以為惇物皆在縣東唐陸氏曰三秦記云終南又名地肺唐孔氏曰地理志云鳥鼠同穴山在隴西首陽縣西南易氏曰唐以後渭州渭縣縣本漢首陽縣鳥鼠山一名靑雀山在縣西七十六里唐孔氏曰三山空舉山名不言治意蒙上既旅之文原隰厎績至于豬野原說見冀州漢孔氏曰下濕曰隰豬地名言皆致功唐孔氏曰詩云度其隰原即此原隰豳地蔡氏曰今邠州也唐孔氏曰地理志云武威郡武威縣東北有休屠澤古文以為豬野澤易氏曰輿地記涼州姑臧縣本漢武威縣地有豬野澤古休屠城蔡氏曰治水成功自髙而下故先言山次原隰次陂澤三危既宅三苗丕敘漢孔氏曰西裔之山皆已可居三苗之族大有次序美禹之功唐孔氏曰地理志杜林以為燉煌郡即古𤓰州左傳云先王居擣杌于西裔故允姓之姦居于𤓰州杜預謂允姓之祖與三苗俱放于三危𤓰州今燉煌也鄭𤣥引地記書云三危山在鳥鼠之西南當岷山則在積石之西南地記乃妄書其言未必可信要知三危之山必在河之南也易氏曰唐沙州燉煌縣本漢舊縣屬燉煌郡三危山在縣南三十里有三峰故曰三危此即頴達所引者然非也其引鄭氏謂三危在河之南其說誠然唐松州禹貢梁州之境古西羌地羌夲出自三苗蓋允姓之別其國近南岳及舜流四凶徙之三危濵於賜支至於河首綿亘千里賜支者禹貢所謂析支也唐屬劔南西道豈非在積石大河之南而為雍梁西境乎三危說又見導水吕氏曰三苗既竄自後世觀之聼其生死在所不恤聖人則不然方其有罪至于竄棄刑行之後施仁發政自當及之故禹治水至三苗亦為之畫其居宅大得其敘後世以為投之四裔若棄之者非知聖人之心也厥土惟黃壤蔡氏曰黃者土之正色林氏曰物得其常性者最貴雍州之土黃壤故其田非他州所及厥田惟上上厥賦中下漢孔氏曰田第一賦第六厥貢惟球琳琅玕漢孔氏曰球琳皆美玉琅玕石而似珠唐孔氏曰釋地云西北之美者有崐崘之球琳琅玕焉蔡氏曰今南陽有靑琅玕珊瑚屬也浮于積石至于龍門西河會于渭汭積石龍門說見導河西河渭汭說見上文林氏曰雍之貢道有二其北道自積石入河其南道自渭入河北道來自龍門者與南道會故曰會于渭汭言渭汭不言河者蒙梁之文也蔡氏曰他州入貢亦必不止一道發此例以互見耳織皮崐崘析支渠搜西戎即敘漢孔氏曰織皮毛布有此四國在荒服之外流沙之内羌髳之屬皆就次敘美禹之功及戎狄也唐孔氏曰四國崐崘也析支也渠也搜也四國皆衣皮毛故以織皮冠之皆是戎狄故以西戎揔之蘇氏曰靑徐揚三州皆載夷篚此三國亦篚織皮但古語有顛倒詳略耳唐孔氏曰崐崘在臨羌西析支在河關西易氏曰臨羌西即今蘭州之地河關西即今積石軍之地皆屬漢金城郡渠搜漢志朔方郡有渠搜縣水經云河自朔方東流經渠搜故城禮三朝記云北發渠搜南撫交趾則渠搜一國西戎又在三國之外如漢之西域亦揔三十六國後為五十餘國云蔡氏曰雍州水土既平而餘功及於西戎故附於末緫說九州唐孔氏曰九州之次以治為先後水性下流當從下泄故治水皆從下為始冀州帝都於九州近北故首從冀起而東南次兖而東南次靑而南次徐而南次揚從揚而西次荆從荆而北次豫從豫而西次梁從梁而北次雍雍地最髙故在後林氏曰禹治水先後之序具載九州之後導山導水是也此但記九州疆界與其田賦貢篚之詳耳新安王氏曰辨其州之封域序所謂禹别九州也次言山川治水之迹所謂隨山濬川也次言土田貢賦所謂任土作貢也而以入帝都之道終焉導岍及岐至于荆山逾于河壷口雷首至于太岳厎柱析城至于王屋太行恒山至于碣石入于海唐孔氏敘章指見篇末王氏曰導山者導山谷之水而納之川唐孔氏曰地理志云呉岳在扶風汧縣西古文以為岍山易氏曰唐隴州汧縣本漢汧縣地在汧水之北岍山在縣西六十里北與隴山接此正禹貢岍山非所謂呉岳呉岳雖同在隴州別自有呉山縣在龍州西北一百二十里呉山又在縣西南五十里岐荆山說見雍州漢孔氏曰此謂梁山龍門西河程氏曰此逾于河者禹自西絶河而東也壷口說見冀州唐孔氏曰地理志云雷首在河東蒲坂縣南易氏曰唐河中府河東縣本漢蒲坂縣雷首山一名中條山在縣南十五里後以蒲坂縣屬永興軍唐孔氏曰地理志云河東彘縣東有霍大山周禮職方氏冀州山鎮曰霍山即此易氏曰唐以後晉州霍邑縣本漢彘縣霍山一名太岳在縣東三十里漢孔氏曰厎柱山名河水分流包山而過山見水中若厎柱然在西虢之界易氏曰唐陜州陜石縣有厎柱山俗名三門山在縣東北五十里唐太宗勒銘於此蓋禹治水山陵當水者破之以通河三穿既決河出其間有似於門故亦謂之三門山唐孔氏曰地理志云析城在河東濩澤縣西易氏曰唐河南府王屋縣本漢垣縣濩澤地屬河東郡後以王屋縣屬孟州析城山在縣西北七十里山峰四面其形如城有南門焉故曰析城唐孔氏曰地理志云王屋在河東垣縣東北易氏曰唐河南府王屋縣本漢垣縣濩澤地屬河東郡後以垣縣屬孟州王屋山在縣北十五里周囬一百三十里髙三十里晁氏曰山狀如屋唐孔氏曰地理志云太行山在河内山陽縣西北易氏曰漢志河内郡埜王縣太行山在西北又在山陽縣唐及今太行山連亘於河北諸州如澤州之靑城陵川懷州之河内武德修武以至於河北北境皆太行所經之地故太行在河北為天下之􅆃唐孔氏曰地理志云恒山在常山上曲陽縣西北易氏曰唐定州恒陽縣本漢上曲陽縣屬常山郡恒山在縣北四十里後改恒陽為上曲屬中山府有北岳恒山在西碣石說見冀州唐孔氏曰入于海言山傍之水皆入海蔡氏曰此北條大河北境之山也西傾朱圉鳥鼠至于太華態耳外方桐柏至于陪尾西傾說見梁州曽氏曰岍與西傾皆雍州山故西傾不言導其文蒙於導岍唐孔氏曰地理志云朱圉在天水郡冀縣南易氏曰唐秦州伏羌縣朱圉山在縣西南六十里後廢伏羌為寨入淸水縣而成紀縣有朱圉山鳥鼠說見雍州唐孔氏曰地理志云太華在京兆華隂縣南易氏曰唐華州華隂縣本漢舊縣太華山在縣南八里唐孔氏曰地理志云熊耳山在𢎞農盧氏縣東易氏曰唐虢州盧氏縣本漢舊縣熊耳山在縣南五十里唐孔氏曰地理志云嵩髙山在潁川崈髙縣古文以為外方山易氏曰漢志崈髙縣武帝置以奉太室山是為中岳唐河南府告成縣嵩髙山在縣西北二十三里後以縣為登封唐孔氏曰地理志云桐柏山在南陽平氏縣東南易氏曰唐及今唐州桐柏縣本漢平氏縣之東境桐柏山在縣西南九十里唐孔氏曰地理志云横尾山在江夏安陸縣東北古文以為陪尾山易氏曰唐安州安陸縣本漢舊縣陪尾山在縣北六十里後以安州為德慶府蔡氏曰此北條大河南境之山也導嶓冢至于荆山内方至于大别嶓說見梁州蔡氏曰山形如冢故謂之嶓冢林氏曰漢中記云嶓冢以東水皆東流嶓冢以西水皆西流故俗以為分水嶺荆山說見荆州唐孔氏曰地理志云章山在江夏竟陵縣東北古文以為内方山易氏曰竟陵後為景陵屬復州漢孔氏曰大別山名唐孔氏曰左傳云呉既與楚夾漢然後楚乃濟漢而陳自小别至于大別然則二别近漢之名易氏曰唐沔州汊川縣本漢安陸縣地屬江夏郡有魯山一名大别山在縣東一百歩小別山在縣東南五十歩蔡氏曰此南條江漢北境之山也岷山之陽至于衡山過九江至于敷淺原岷山說見梁州曽氏曰岷嶓皆梁州山故岷山不言導其文蒙於嶓冢唐孔氏曰地理志云衡山在長沙湘南縣易氏曰唐衡州衡陽縣本漢酃縣地岣嶁山即衡山在縣北七十里衡山之南岣嶁特一峰而已自酃縣西北以至湘南縣東南皆衡山也九江說見荆州朱子曰過九江者言導岷陽之山而導山之人至於衡山之麓遂越洞庭之尾東取山路以至於敷淺原是導岍岐荆山逾于河以盡恒碣之例也唐孔氏曰地理志云豫章歴陵縣南有𫝊陽山古文以為敷淺原易氏曰江州德安縣本漢歴陵縣有敷淺原蔡氏曰此南條江漢南境之山也緫說導山唐孔氏曰從上而下條說所治之山因冀州在北故自北而始蔡氏曰山水皆原於西北故禹敘山水皆自西北而東南導山則先岍岐導水則先於弱水林氏曰禹本導川歸海今乃先導山蓋洪水懷襄故川浸沒雖欲施功無所措手故先以髙下巨鎭為表識自西決之使東以殺其勢水既順下漸入于海川流故迹稍稍可求於是始施濬川之功先隨山後濬川其序不得不然又曰導岍岐至碣石然後導河濟之功可施導西傾至陪尾然後導淮渭洛之功可施導嶓冢至大別然後導漾之功可施導岷山至敷淺原然後導江之功可施又曰岍岐所導之水乃合河濟之流最為奔悍當其隨山之初自西決之東自東達之東北則已達于海矣故言入于海西傾嶓岷所導之水則未能達海且注于下流之地及導川之功既施乃得入海故下文所載方是衆水入海之道此則止言至于陪尾大别敷淺原而止而下流之山皆所不及也導弱水至于合黎餘波入于流沙唐孔氏敘章指見篇末唐柳氏曰西海之山有水焉㪚渙無力不能負芥投之則委靡墊没及底而後止故名曰弱漢孔氏曰合黎在流沙東弱水餘波西溢入流沙唐孔氏曰地理志云張掖郡刪丹縣桑欽以為導弱水始此易氏曰唐甘州刪丹縣本漢舊縣屬張掖郡弱水在縣南山下唐甘州張掖縣本漢觻得縣屬張掖郡合黎山俗名要塗山在縣西北二百里又有居延澤在縣東北百六十里古文以為流沙者風吹沙行故曰流沙弱水合黎流沙同在唐之甘州即漢之張掖郡程氏曰當弱水壅溢禹導之至合黎其逺而無所事治者固不極之於西海近而無能為害者亦任其波委之於流沙所謂行所無事也故書於雍止曰既西而於導水不曰入于西海者皆紀實也導黒水至于三危入于南海唐柳氏曰雍州之山有水焉幽險若漆不知其所出故曰黒水漢孔氏曰黒水自北而南經三危唐孔氏曰水經黒水出張掖雞山南至燉煌過三危山南流入于南海蔡氏曰地志出犍為郡南廣縣汾關山易氏曰樊綽蠻書載蠻水之入南海者有四西弭河與蘭倉江合一也麗水與彌諾江合二也新豐川合勃弄諸水三也唐蒙所見盤江四也其所謂麗水者綽正指為黒水此黒水一名禄禆江而羅些城北有山即三危山其水從羅些城三危山西南行上流出乎西羌吐蕃下流南至蒼望城又南至雙王道勿川有彌諾江西南來㑹之南經驃國之東而入海羅些乃南詔吐蕃南北相距之地其西接吐蕃其東接劒南東川之西境正與鄭氏所引地記謂三危在鳥鼠之西而南當岷山者合又與唐志松州賜支河首之説相近則樊綽羅些城麗水之說信而有證也導河積石至于龍門南至于華隂東至于厎柱又東至于孟津東過洛汭至于大伾北過降水至于大陸又北播為九河同為逆河入于海唐孔氏曰釋水云河出崐崘虚李巡云崐崘山名虚山下地郭璞云發源髙處激湊故水色白潛流地中受渠衆多渾濁故水色黃漢書西域傳張騫所窮河源云河有兩源一出葱嶺一出于闐于闐在南山下其河北流與葱嶺河合東注蒲昌海蒲昌海一名鹽澤去玉門陽關三百餘里其水潛行地下南出積石為中國河蔡氏曰唐長慶中薛元鼎使吐蕃自隴西成紀縣西南出塞二千餘里得河源於莫賀延磧尾曰悶摩黎山其山中髙四下所謂崐崘也東北流與積石河相連吐蕃亦自言崐崘在其國西南漢孔氏曰施功發于積石至于龍門或鑿山或穿地以通流易氏曰漢志金城郡河關縣積石山在西羌中河水行塞外東北入塞内至章武入海過郡十六行九千四百里今以唐以後郡縣證之廓州積石軍在州西南西臨大澗北枕黄河河自此東北流一百五十里至本州所理化成縣南八十歩又東流一百四十里至鄯州龍支縣界鄯州龍支縣本漢允吾縣屬金城郡河在縣西南六十里積石山在縣西九十八里河又東流三百九十里至河州抱罕縣界河州抱罕縣本漢舊縣屬金城郡積石山一名唐述山在縣西北七十里今人目龍支縣山為大積石山此名小積石山河在縣南五十里又東流三百里至蘭州五泉縣蘭州五泉縣本漢金城縣屬金城郡河經縣北二十里又東北流三百八十里至㑹州所理㑹寧縣會州會寧縣本漢鶉隂縣地屬安定郡河在縣西北有黃河堰又東北流五百三十里至靈州所理迴樂縣靈州迴樂縣本漢富平縣地屬北地郡縣枕黄河即後魏刁雍開富平艾山舊渠通河溉田之地又東北流經本州靈武縣凡一千餘里至西受䧏城西受降城本漢臨河縣地屬朔方郡在黄河外八十里又東流一百八十里至天德軍天德軍本安北都護又東流二百里至中受降城中受降城本秦九原郡地漢更名五原又東流三百里至東受降城東受降城在朔州北三百五十里本漢定襄郡之盛樂縣三城皆景龍中張仁愿所築並在河岸以遏突厥河水又轉而南流凡三百五十里至朔州所理鄯陽縣鄯陽縣本漢馬邑縣屬鴈門郡河在縣西三十里又南流凡三百七十四里至嵐州合河縣嵐州合河縣本漢汾陽縣地屬太原郡河在縣西二里又南流七十里至石州臨泉縣石州臨泉縣本漢離石縣地屬西河郡河在縣北二十里又南經本州定胡縣西二百歩亦漢離石縣地孟門關在縣西一百歩又南經本州平夷縣西四十五里亦漢離石縣地河南流凡四百二十里至隰州永和縣隰州永和縣本漢狐讘縣地屬河東郡河東去縣六十里又南經本州大寧縣凡南流二百里至慈州所理吉昌縣慈州吉昌縣本漢北屈縣地屬河東郡河北去縣六十里又南經本州文城縣亦北屈縣地孟門山俗名石槽在縣西南三十六里水經註云孟門與龍門相對即龍門之上口實為河之巨阨今河中有山如槽水流懸注七十餘尺又南流一百八十里至綘州龍門縣綘州龍門縣今屬河中府本漢皮氏縣屬河東郡河北去縣二十五里乃龍門口經所謂至于龍門者也河口廣八十歩三秦記云河津一名龍門水陸不通江海大魚集其下數千不得上上則為龍故曰曝腮龍門唐孔氏曰地理志云龍門山在馮翊夏陽縣北林氏曰禹鑿龍門於狹處鑿大使廣袤足容此水而已非謂山横於前創鑿之也西漢賈讓謂鑿龍門墮斷天地之性過論也漢孔氏曰河自龍門南流至華山北而東行易氏曰河至龍門縣又南流二百里至陜州陜州之西北對河為華州華隂縣本漢舊縣屬京兆尹太華山在縣南八里河經太華之北故曰華隂地接潼關故桃林塞河在關内衝激關山故名潼關華說又見導山易氏曰河至華隂至此方東流經陜州芮城縣本漢河北縣屬河東郡又東流經陜州所理陜縣本漢舊縣屬𢎞農郡又自州東流五十里至陜石縣亦漢陜縣地後省入陜縣有厎柱山在黃河中厎柱說見導山漢孔氏曰孟津地名易氏曰河至陜石縣又東流二百五十里至河南府王屋縣河南府王屋縣本漢垣縣地屬河東郡河在縣南五十里又東流至本府河陽縣本漢舊縣屬河内郡後為孟州南城四面臨河世謂之富平津古謂之孟津武王誓師之地林氏曰河流湍悍至此稍緩可以横舟而渡漢孔氏曰洛汭洛入河處易氏曰河至河陽縣又東流經河南府鞏縣本漢舊縣河於此有五社渡又有五社津洛水東經洛汭北對郎渚入河謂之洛口亦名什谷張儀所謂下兵三川塞什谷之口者也夏氏曰河大洛小故言過下文倣此洛說見導洛唐孔氏曰釋山云一成伾李巡云山一重曰伾易氏曰河至鞏縣又東流經河南府汜水縣本漢成臯縣一名虎牢凡東流三百九十里至衞州汲縣衞州汲縣本漢舊縣河經縣南五里謂之棘津亦謂之石濟津又東北流至本州黎陽縣界本漢舊縣屬魏郡大伾山南去縣七里俗號為黎