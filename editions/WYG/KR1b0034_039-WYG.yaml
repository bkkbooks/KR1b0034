body:
  text: 尚書纂傳卷三十九元王天與撰康王之誥第二十五周書康王旣尸天子遂誥諸侯作康王之誥尸說見五子之歌漢孔氏曰旣受顧命羣臣進戒遂報誥之因事曰遂唐孔氏曰史敘其事作康王之誥康王之誥唐孔氏曰伏生以此篇合于顧命共爲一篇蔡氏曰今文古文皆有王出在應門之内太保率西方諸侯入應門左畢公率東方諸侯入應門右皆布乗黃朱賔稱奉圭兼幣曰一二臣衞敢執壤奠皆再拜稽首王義嗣德答拜唐孔氏曰此敘諸侯見新王之事漢孔氏曰出畢門立應門内之中庭南面唐孔氏曰天子五門臯庫雉應路也畢門即路寢之門出畢門始至應門之内夏氏曰成王殯宫在畢門内以殯在焉故曰廟門諸侯出以俟朝故康王出在應門之内應門之内即畢門之外周禮内朝也王有三朝外朝在雉門之内朝士所掌内朝在應門之内司士所掌燕朝在路寢太僕所掌時殯在路寢故王以内朝見諸侯漢孔氏曰二公爲二伯各率其所掌諸侯隨其方爲位皆北面唐孔氏曰太保召公爲西伯率西方諸侯入應門左立於門内之西廂也太師畢公爲東伯率東方諸侯立應門右立于門内之東廂也北面以東爲右以西為左王肅云畢公代周公為東伯然則畢公是太師也太師在太保之上此先言太保者於時太保領冢宰相王室任重故先言西方若使東方任重亦當先言東方漢孔氏曰諸侯皆陳四黄馬朱鬛以爲庭實唐孔氏曰四馬曰乗言乗黄是馬色黄矣黄下言朱朱非馬色左傳云宋公子地有白馬四公嬖向魋魋欲之公取而朱其尾鬛以與之是古人貴朱鬛也於時諸侯其數必衆衆國皆陳四馬則非王庭所容諸侯各有所獻必當少陳之也周禮小行人云合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此六物者以和諸侯之好鄭𤣥云六幣所以享也五等諸侯享天子用璧享后用琮用圭璋者二王之後也如鄭彼言則諸侯之享天子惟二王之後用馬此云皆陳馬者下云奉圭兼幣幣即馬是也圭即文馬之物鄭云此幣圭以馬蓋舉王者之後以言耳諸侯當璧以帛亦有庭實然則此陳馬者是二王之後享王物也獨取此物以緫表諸侯之意故云諸侯皆陳馬也圭亦享王之物下言奉圭此不陳圭者圭奉以文命不陳之也覲禮諸侯享天子馬卓上九馬隨之此用乘黄者因喪禮而行朝故略之漢孔氏曰賔諸侯也舉奉圭兼幣之辭言一二見非一也爲蕃衞故曰臣衞來朝而遇國喪遂因見新王敢執壤地所出而奠贄也夏氏曰諸侯朝王皆有幣如以馬為幣則以圭兼之皮為幣則以璋兼之周禮謂之合幣書謂之兼幣上文旣言布乘黄朱是以馬為幣也故賔奉圭以兼之唐孔氏曰諸侯享天子其物甚衆非徒圭馬而已皆是土地所有故曰敢執壤奠吕氏曰壤奠猶言川奠壤物之奠謂土産也陳氏曰奠薦也陳也漢孔氏曰諸侯拜送幣而首至地盡禮也康王以義繼先人明德荅其拜受其幣唐孔氏曰義嗣德三字史言王荅拜之意也康王先是太子以義繼先人明德今為天子無所嫌故荅拜受幣自許與諸侯為王也吳氏曰穆公使人弔公子重耳重耳稽顙而不拜穆公曰仁夫公子稽顙而不拜則未為後也葢為後者拜不拜故未為後也弔者含者禭者升堂致命主孤拜稽顙成為後者也康王之見諸侯若以為不當拜而不拜則疑未為後也且純乎吉也答拜既正其為後且知其以喪見也太保曁芮伯咸進相揖皆再拜稽首曰敢敬告天子皇天改大邦殷之命惟周文武誕受羑若克恤西土惟新陟王畢恊賞罰戡定厥功用敷遺後人休今王敬之哉張皇六師無壞我髙祖寡命夏氏曰此敘諸侯百官進戒之辭漢孔氏曰冢宰與司徒皆共羣臣諸侯並進陳戒不言諸侯以内見外林氏曰前者率諸侯朝王而召畢為二伯故召畢率之以入此率羣臣戒王而冢宰司徒最尊故太保與芮伯咸進唐孔氏曰相揖者揖之使俱進也夏氏曰臣無交揖之禮當為擯相之相篇末言相揖趨出則旣進之後相者揖之乃拜旣聽命之後相者揖之乃出漢孔氏曰大天致大國殷之王命謂誅紂也蔡氏曰言敢敬告天子示不敢輕告先尊稱之以重其聽也漢孔氏曰言文武大受天道而順之能憂我西土之民本其所起吕氏曰羑里之囚厄莫甚焉于此能順則天下之理無乎不順文王得于憂患武王又得于文王故謂之誕受羑若按羑若吕說得之明夷謂文王柔順以䝉大難韓昌黎琴操云臣罪當誅兮天王聖明程子以為最得文王心事此句若從羑里而以逆境順受為言亦似惬當曰文武者大槩縂言之漢孔氏曰惟周家新升王位當盡和天下賞罸能定其功用布遺後人之美言施及子孫無窮王氏曰古以升遐為陟時成王未謚故稱新陟王蔡氏曰好惡在理不在我故能盡合其賞之所當賞罸之所當罸而能定其功也漢孔氏曰敬天道務崇先人之業陳氏曰今王指康王敬者德之大本召公昔屢以敬德告成王今復首以告康王可謂要言矣漢孔氏曰言當張大六師之衆無壞我髙德之祖寡有之命吕氏曰守成之主常溺于宴安而無立志故告以奮振自强大戒戎備無弛惰而墮壞我髙德之祖宗艱難寡得之基命不知畏天不知憂民不習世故不自振起乃繼世者所同病故召公必精言之王若曰庶邦侯甸男衞惟予一人釗報誥昔君文武丕平富不務咎厎至齊信用昭明于天下則亦有熊羆之士不二心之臣保乂王家用端命于上帝皇天用訓厥道付畀四方乃命建侯樹屏在我後之人今予一二伯父尚胥曁顧綏爾先公之臣服于先王雖爾身在外乃心㒺不在王室用奉恤厥若無遺鞠子羞夏氏曰此敘王報誥之辭漢孔氏曰不言羣臣以外見内唐孔氏曰周制六服此惟四服不言采要者略舉其事猶武成云侯甸衞亦略舉之漢孔氏曰報其戒唐孔氏曰禮天子自稱予一人不言各此王自稱名者新即王位謙也蔡氏曰康王在喪故稱名春秋嗣王在喪亦書名漢孔氏曰言先君文武道大政化平美不務咎惡陳氏曰丕則大而無外平則均而無偏富者惠養之謂咎刑罰也吕氏曰康王論文武非深達君德者不足以與此丕平富者覆載溥博均平富養至仁無外之體也不務咎若不待言而必言之者形容文武發生之心粹然專以愛育長養為事猶孟子不嗜殺人之論也漢孔氏曰致行至中信之道用顯明于天下蔡氏曰底至者推行而厎其至齊信者兼盡而極其誠文武務德不務罸之心内外充實故光輝發越用昭明于天下蓋誠之至者不可掩也陳氏曰羣臣以賞罰六師告康王明君道之大用也康王以文武至仁誥諸侯明君道之大本也互相發明漢孔氏曰言文武旣聖則亦有勇猛如熊羆之士忠一不二心之臣共安治王家漢孔氏曰君聖臣良用受端直之命于上天大天用順其道付與四方之國王天下鄭氏曰端正也吕氏曰莫非命也順受其正則謂之端命文武君臣盡正理而受正命于上帝端直相當無少囘曲也漢孔氏曰言文武乃施政令立諸侯樹以為藩屏傳王業在我後之人謂子孫蔡氏曰言文武命建侯邦植立蕃屏者意在我後之人也漢孔氏曰天子稱同姓諸侯曰伯父言今我一二伯父庶幾相與顧念文武之道安汝先公之臣服于先王而法循之唐孔氏曰覲禮言天子呼諸侯同姓大國曰伯父異姓曰伯舅同姓小邦曰叔父異姓曰叔舅此時諸侯多矣獨云伯父舉同姓大國言之也蔡氏曰尚胥曁顧庶幾相及顧視我也林氏曰先公諸侯之祖父也諸侯祖父故嘗臣服于先王今汝諸侯盡忠王室則爾先公在天之靈可安矣漢孔氏曰言雖汝身在外土為諸侯汝心常當忠篤無不在王室熊羆之士勵朝臣此督諸侯吕氏曰此君臣相飭之至意初非欲其向已以自利然蕃屏擁衞之心亦在其中特不可以私視之耳漢孔氏曰當各用心奉憂其所行順道無自荒怠遺我稚子之羞辱稚子康王自謂也按此王報誥荅誕受羑若克恤西土之辭也用奉恤即奉文武克恤西土之恤用奉厥若即奉文武誕受羑若之若羣公旣皆聽命相揖趨出夏氏曰以下史辭漢孔氏曰已聽誥命趨出罷退諸侯歸國朝臣就次唐孔氏曰羣公縂謂朝臣與諸侯鄭𤣥云羣公主爲諸侯與王之三公諸臣亦在焉夏氏曰旣進則必待揖而後拜將退則必待揖而後出見人臣之進退惟君命是聽王釋冕反喪服漢孔氏曰脫去黼冕反服喪服居倚廬唐孔氏曰王釋冕反喪服朝臣諸侯亦反喪服禮喪服篇臣為君諸侯為天子皆斬衰蘇氏曰成王崩未葬君臣皆冕服禮歟曰非禮也謂之變禮可乎曰不可禮變于不得已三年之喪旣成服釋之而即吉無時而可者曰成王顧命不可以不傳旣傳不可以喪服受也曰何為其不可孔子有言將冠子未及期日而有齊衰大功之喪則因喪服而冠冠吉禮也猶可以喪服行之受顧命見諸侯獨不可以喪服乎太保使太史奉册授王于次諸侯入哭于路寢而見王于次王喪服受敎戒哭踊荅拜聖人復起不易吾言矣春秋傳云鄭子皮如晉葬晉平公將以幣行子産曰喪安用幣子皮固請以行旣葬諸侯之大夫欲因見新君叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則喪服未畢其以喪服見是重受弔也大夫將若之何皆無辭以退今康王旣以嘉服見諸侯而又受乗黄玉帛之幣使周公在必不為此然則孔子何取于此書也曰至矣其父子君臣之間敎戒深切著明者猶足為後世法孔子何為不取哉然其失禮則不可不辨或問蘇氏以此為失禮不知當此際合如何區處朱子曰天子諸侯之禮與士庶人不同故孟子有吾未之學之語謂此類也如伊訓惟元祀十二月朔亦是新喪伊尹奉嗣王祗見厥祖固不可用凶服矣漢唐新主即位皆行册禮君臣亦皆吉服追述先帝之命以告嗣君韓文外集順宗實録此事可考蓋易世傳授國之大事當嚴其禮而王侯以國為家雖先君之喪猶以為己私服也五代以來此禮不講則始終之際殊草草矣尚書纂傳卷三十九
