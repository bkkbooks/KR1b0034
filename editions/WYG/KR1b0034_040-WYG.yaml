body:
  text: 尚書纂傳卷四十元王天與撰畢命第二十六周書康王命作冊畢分居里成周郊作畢命唐孔氏曰周禮内史云凡命諸侯及孤卿大夫皆䇿命之此云命作冊者命内史為冊書孫氏曰凡命羣臣皆有冊獨言於此詳略異也漢孔氏曰分别民之居里異其善惡林氏曰分民之居里於成周之東郊吕氏曰周公始遷啇民善惡並育所以安反側也至君陳則商民寖服周化故簡修進良始表其善者出之使惡者知愧而自勸猶未大區别也至康王世變風移為善者衆其不善者亦不能無怙惡之失苟兼蓄之則餘孽不除將復為良民之害故命畢公分别其居里不惟惡不能染善而惡者無以自容勢不能不入於善矣唐孔氏曰史敘其事作畢命畢命漢孔氏曰言畢公見命之書蔡氏曰今文無古文有惟十有二年六月庚午朏越三日壬申王朝歩自宗周至于豐以成周之衆命畢公保釐東郊張氏曰此史敘命畢公之端漢孔氏曰康王即位十二年六月三日庚午朏說見召誥唐孔氏曰此日未有事而記之者為下言壬申張本猶記朔望與生魄死魄然也漢孔氏曰於朏三日壬申王朝行自宗周至于豐豐說見武成陳氏曰古者封諸侯命德賞功必於祖廟示不敢專重其事也漢孔氏曰用成周之民衆命畢公陳氏曰保釐保護而分理之也吕氏曰保釐所謂旌别淑慝之類蓋有恩意行其間非斬然割裂無復潤澤也觀此二字一篇之治體可見東郊說見君陳王若曰嗚呼父師惟文王武王敷大德于天下用克受殷命惟周公左右先王綏定厥家毖殷頑民遷于洛邑密邇王室式化厥訓旣歴三紀世變風移四方無虞予一人以寧道有升降政由俗革不臧厥臧民㒺攸勸惟公懋德克勤小物弼亮四世正色率下㒺不祗師言嘉績多于先王予小子垂拱仰成陳氏曰此章歴敘文武周公而歸重畢公功德漢陳孔氏曰嘆告畢公代周公為太師為東伯命之代君王若曰說見盤庚王氏曰畢公同姓故稱父為太師故稱師稱父師而不名尊之也漢孔氏曰言文武布大德于天下故天佑之用能受殷之王命漢孔氏曰言周公助先王安定其家張氏曰先王謂文武成王漢孔氏曰愼殷頑民恐其叛亂故徙於洛邑密近王室用化其敎毖殷說見洛誥漢孔氏曰言殷民遷周已經三紀世代民易頑者漸化四方無可度之事我天子用安矣十二年曰紀父子曰世張氏曰旣歴三紀難化者或老或死易化者方少方生頑民父子亦已一變父子相代善惡不同其風亦移殷民變則四方安四方安則人主安矣吕氏曰文武敷大德而受命言得之難周公輔相而綏定言安之難殷頑民尤難安周公尤謹之遷其洛邑用使化其敎訓旣歴三紀世已變而風始移言敎化浹洽之難漢孔氏曰天道有上下交接之義政敎有用俗改更之理民之俗善以善養之俗有不善以法御之若乃不善其善則民無所勸慕陳氏曰道無乎而不在世治則為道之升世亂則為道之降猶易言道長道消禮記言道隆道汚王氏曰道有升降故俗有厚薄俗有厚薄故政隋而革今商俗已異於前不善其善者則民無所勸而為善漢孔氏曰言公勉行德能勤小物輔佐文武成康四世為公卿正色率下下人無不敬仰師法唐孔氏曰小物猶小事勤小事則大者可知晉語說文王事云詢于八虞訪于辛尹重之以周召畢榮則畢公在文王時已為大臣是輔佐文武成康四世也張氏曰帝王世紀云商容見畢公至曰視其為人儼乎將有急色故君子臨事而懼是畢公為人必端重嚴肅其正色率下可知漢孔氏曰公之善功多大先人之美我小子為王垂拱仰公成理吕氏曰畢公天下大老康王不稱其成德而稱其懋德不稱其縂大體而稱其勤小物蓋以成德自居則止矣於小物而忽焉則非所謂造次顛沛于是者也惟勉于德者貫穉耄而不息故勤于物者一小大而無間畢公風采凝峻表儀朝著若小若大㒺不祗服父師之訓德容之重衆望之孚養之非一日之積嘉績在先王之世多矣今予惟仰其成歸重畢公將付以保釐之寄也王曰嗚呼父師今予祗命公以周公之事往哉旌别淑慝表厥宅里彰善癉惡樹之風聲弗率訓典殊厥井疆俾克畏慕申畫郊圻愼固封守以康四海政貴有恒辭尚體要不惟好異商俗靡靡利口惟賢餘風未殄公其念哉我聞曰世禄之家鮮克由禮以蕩陵德實悖天道敝化奢麗萬世同流兹殷庶士席寵惟舊怙侈滅義服美于人驕淫矜侉將由惡終雖收放心閑之惟艱資富能訓惟以永年惟德惟義時乃大訓不由古訓于何其訓張氏曰此章方告以保釐東郊之事漢孔氏曰今我敬命公以周公所為之事往為之哉言非周公所爲不敢枉公往治漢孔氏曰言當識别頑民之善惡表異其居里明其爲善病其爲惡立其善風揚其善聲徐氏曰昭而揭之曰旌標而植之曰表唐孔氏曰表其居里若今孝子順孫義夫節婦表其門閭也陳氏曰宅者所居之家里者所宅之里二十五家為以里王氏曰癉病也先王之政不獨慶賞刑威而已所沮勸之術尤在于榮辱彰善癉惡使民知是非榮辱之所在也吕氏曰榮辱不止于一時而流芳遺臭將百年而未冺所謂樹之風聲也人存則政舉人亡則政息惟風聲所傳雖事往迹陳而興起如新此先王所以維持後世也漢孔氏曰其不循敎道之常則殊其井居田界使能畏為惡之禍慕為善之福所以沮勸張氏曰禮記云不變移之郊不變移之遂此殊厥井疆也漢孔氏曰郊圻雖舊所規晝當重分明之又當謹慎堅固封疆之守備以安四海京畿安則四海安矣鄭氏曰畫分圻界也應氏曰古者每郊有門而郊闗之限啓閉尤謹夏氏曰此恐有不令如淮夷徐奄者濳相交通誘民以亂故使之申畫愼固則姦民無自而入而商民可永為良民商民不擾則四海永安矣漢孔氏曰政以仁義為常辭以理實為要故貴尚之若異于先王君子所不好蔡氏曰對暫之謂恒對常之謂異趣完具而已之謂體衆理所㑹之謂要漢孔氏曰紂以靡靡利口為賢覆亡國家今殷民利口餘風未絶公其念絶之唐孔氏曰韓宣子稱紂使師延作靡靡之樂靡靡相隨順之意蘇氏曰予以書考之知商俗如秦俗蓋二世似紂也張釋之諫漢文帝秦以任刀筆之吏爭以亟疾苛察相髙其弊徒文具無惻隠之實以故不聞其過陵夷至于二世天下土崩今以嗇夫口辯而超遷之臣恐天下隨風靡爭口辯無其實凡釋之所論則康王以告畢公者也漢孔氏曰特言我聞自古有之世有禄位而無禮敎少不以放蕩陵邈有德者如此實亂天道陳氏曰德雖性之固有然敬則存肆則泯以放蕩而陵蔑其德蓋人欲勝則天理消也鄭氏曰悖反也漢孔氏曰言敝俗相化車服奢麗雖相去萬世若同一流陳氏曰敝壞麗華也吕氏曰興門之俗儉衰門之俗侈古人論世族之病必歸之驕侈此乃商民受病之源漢孔氏曰此殷衆士居寵日久怗恃奢侈以滅德義服餙過制美于其人言僭上陳氏曰席藉也席寵惟舊蓋世禄之家也吕氏曰私欲公義相為消長故怙侈則㓕義義㓕則無復羞惡之端徒以服飾美於人而身之不美則莫之恥也漢孔氏曰言殷衆士驕恣過制矜其所能以自侉大如此不變將用惡自終雖今順從周制心未厭服以禮閑禦其心惟艱鄭氏曰侉侉大閑防閑也眞氏曰放心二字始見於此按程子曰聖賢千言萬語只是欲人將已放之心約之使反復入身來朱子曰放心謂心本善而流於不善是放也故附其說于此漢孔氏曰以富資而能順義則惟可以長年命矣惟有德義是乃大順若不用古訓典籍於何其能順乎蔡氏曰資資財訓敎訓也陳氏曰資富而能敎則不至於奢靡淫佚可以持身保家可以長守禄位可以養全壽命然所謂訓者豈外人心而他求哉德則内之所得深而不移於物義則外之裁制明而不役於利德義乃訓之大也苟不由古人德義之訓何以為訓乎古訓即德義也三山陳氏曰君陳之書猶有辟以止辟三細不宥之說此篇雖歴數商民之惡惟務區别以生其愧敎訓以導其善而無一言及于刑足見世變風移刑措不用也王曰嗚呼父師邦之安危惟兹殷士不剛不柔厥德允修惟周公克愼厥始惟君陳克和厥中惟公克成厥終三后恊心同厎于道道洽政治澤潤生民四夷左衽罔不咸賴予小子永膺多福公其惟時成周建無窮之基亦有無窮之聞子孫訓其成式惟乂嗚呼㒺曰弗克惟旣厥心罔曰民寡惟愼厥事欽若先王成烈以休于前政張氏曰此申結一篇之意漢孔氏曰言邦國所以安危惟在和此殷士而已治之不剛不柔寛猛相濟則其德政信修立吕氏曰當時四方無虞矣猶曰邦之安危惟兹殷士此保治兢業之心也漢孔氏曰周公遷殷頑民以消亂階能愼其始君陳𢎞周公之訓能和其中畢公闡二公之烈能成其終蔡氏曰言成者豫期之也漢孔氏曰三君合心為一終始相成同致于道道至普洽政化治理其德澤惠施乃浸潤生民呉氏曰道者致治之道也始之中之終之雖時有先後皆能即其行事觀其用心而有以濟之若出於一時成於一人謂之恊心如此鄭氏曰潤如水之浸潤漢孔氏曰言被髪左衽之人無不皆恃賴三君之德我小子亦長受其多福朱子曰衽衣衿也左衽夷狄之俗蘇氏曰康王以邦之安危在殷多士又以保釐之任為足以澤生民而服四夷其言若過然殷民至此亦不能睥睨周室如三監時矣然猶重其事如此賈誼言秦俗婦乳其兒與翁並倨毋取箕箒立而誶語以此痛哭流涕太息以為漢之所憂無大於此者正此意也古之知治體者其論安危蓋如此漢孔氏曰公其惟以是成周之治為周家立無窮之基業於公亦有無窮之名聞於後世吕氏曰此畢公元老豈有意於立後世名而勲德之隆亦豈少康王所以望之者蓋相期以無窮之事業孰敢以名譽誘公哉漢孔氏曰言後世子孫順公之成法惟以治漢孔氏曰人之為政無曰不能惟在盡其心而已無曰人少不足治也惟在愼其政事無敢輕之蘇氏曰曰弗克者畏其難而不敢為者也曰民寡者易其事以為不足為者也漢孔氏曰敬順文武成業以美於前人之政所以勉畢公先王說見上文蘇氏曰前政周公君陳也吕氏曰畢命前頌而後規蓋三代君臣相與警戒無時不存末嘗以盛德廢也尚書纂傳卷四十
