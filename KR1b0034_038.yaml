body:
  text: 尚書纂傳卷三十八元王天與撰顧命第二十四周書成王將崩命召公畢公率諸侯相康王作顧命漢孔氏曰二公為二伯中分天下而治之吕氏曰天子天下之共主也成王力疾臨廣朝而命之二公受遺率諸侯而輔之所以公天位而嚴大寶也世稱漢武拔霍光於宿衛託以幼孤為知人抑不知大臣者非可以寄安危而屬存亡不在此位召畢內總衆職外統諸侯君存則輔政君沒則託孤所稱受遺蓋一職也武帝垂沒始拔一人而用之平時大臣果安用乎其亡具甚矣唐孔氏曰史敘其事作顧命顧命漢孔氏曰臨終之命曰顧命唐孔氏曰鄭元云回首曰顧臨死回顧而發命也吕氏日堯舜禹湯文武無顧命成王獨有之始終授受固有常典成王之初三監幾搖王室故正其終始特詳焉顧命成王所以正其終康王之誥康王所以正其始蔡氏曰今文古文皆有惟四月哉生魄王不懌甲子王乃洮頮水相被冕服憑玉兒乃同召太保奭芮伯彤伯畢公衛侯毛公師氏虎臣百尹御事唐孔氏敘章指見篇末漢孔氏曰成王崩年之四月始生魄月十六日王有疾故不恱懌唐孔氏曰於哉生魄下始言王不懌者甲子是發命之日為洮頮張本耳林氏曰天子之疾曰不懌曰不豫崩曰陟遐曰晏駕皆臣子不忍斥言之也漢孔氏曰王發大命臨羣臣必齊戒沭浴今疾病故但洮盥頮面扶相者被以冠冕加朝服憑玉几以出命唐孔氏曰洮為盥手頮是洗面言水謂洮盥俱用水周禮司几筵云凡大朝覲王位設黼扆扆前南面設左右玉几王見羣臣當憑玉几以出命唐陸氏曰憑說文作憑倚依也鄭氏曰几案屬吕氏曰成王去崩才一日猶盥洗以致其潔冠服以致其嚴顧託之言淵奧精明蓋臨衆之敬不以困憊廢而素定之理雖垂沒猶炯然也惟善治氣者歷疾病而不惰惟善養心者臨死生而不昏此豈一朝一夕之積哉陳氏曰此天子疾時見羣臣也君問之東首加朝服拖紳此人臣疾時見人君也莫困於疾而法禮之嚴不以疾廢故不可以冕服而猶被之冕服不可以朝紳而猶加之以朝紳也古之人勉強於禮蓋如此耳漢孔氏曰周召六卿下至御治事太保畢毛稱公則三公矣此先後六卿次第冢宰第一召公領之司徒第二芮伯為之宗伯第三彤伯為之司馬第四畢公領之司寇第五衛侯為之司空第六毛公領之召芮彤畢衛毛皆國名入為天子公卿師氏大夫官虎臣虎賁氏百尹百官之長及諸御治事者唐孔氏曰王肅云彤姒姓之國其餘五國姬姓畢毛文王庶子衛侯康叔林氏曰周家命官之意見於此者有四以六卿兼三公之事諸侯入為公卿公卿多同姓之邦三公六卿各以職任為尊卑不以爵秩為髙下陳氏曰序止言命召公畢公蓋序舉其要經備其詳也王曰嗚呼疾大漸惟幾病日臻既彌留恐不獲誓言嗣兹豫審訓命汝昔君文王武王宣重光奠麗陳教則肄肄不違用克達殷集大命在後之侗敬迓天威嗣守文武大訓無敢昏逾今天降疾殆弗興弗悟爾尚明時朕言用敬保元子釗𢎞濟于艱難柔逺能邇安勸小大庶邦思夫人自亂于威儀爾無以釗冒貢于非幾唐孔氏敘章指見篇末漢孔氏曰自嘆其疾大進篤惟危殆吕氏曰統言曰疾甚言曰病蘇氏曰漸進也幾危也漢孔氏曰病日至言困甚已久留言無瘳恐不得結信出言嗣續我志以此故我詳審教命汝鄭氏曰臻至彌甚留久也林氏曰恐不得誓言繼嗣之事吕氏曰誓言則發之力審訓命則思之熟不易其言欲羣臣不苟於聽也漢孔氏曰言昔先君文武布其重光纍聖之德定天命施陳教則勤勞文武定命陳教雖勞而不違道故能通殷為周成其大命吕氏曰堯舜君臣而並故謂之重華文武父子而處故謂之重光自古聖聖相繼惟此兩時為然奠麗者定民之所附麗如居之麗於棟字食之麗於畎畝之類蓋言養之也陳教則教之也肄者教養之事必先肄習肄習之久事理貫徹舉無所違然後能推而達之代殷而集大命也真氏曰奠麗與多方開于民之麗必同一意但此無民字陳氏曰肄習也漢孔氏曰在文武後之侗稚成王自斥敬迎天之威命繼守文武大教無敢昏亂逾越吕氏曰此成王自叙平日用力之實也敬迓者凛然如在其上敬以承之而非心之有所將迎也天威者理也文武大訓述此理者也嗣守言操存之功也敬則不昏昏則不逾矣少昏即逾君子所以每用敬也漢孔氏曰今天下疾我身甚危殆不起不悟汝當庶幾明是我言勿忽略鄭氏曰殆危悟覺也吕氏曰弗興弗悟血氣之病耳若志氣則無敢昏逾者初未嘗病也漢孔氏曰用奉我言敬安太子釗釗康王名大度於艱難蔡氏曰曰元子者正其統也漢孔氏曰言當和逺又能和近安小大衆國吕氏曰合逺邇小大而言之者周偏不遺乃所謂君道也漢孔氏曰羣臣皆宜思夫人自治正於威儀汝無以釗冒進于非危之事吕氏曰斯言蓋成王平日至親至切之學至死始發其祕周公精微之傳成王得之將終方以示羣臣孔子精微之傳曽子得之將終方以示孟敬子皆近在威儀容貌辭氣之際人受天地之中以生是以有動作威儀之則蓋莫非天命也躁輕縱緩或踰其則特人自亂之耳其天秩本何亂哉威儀失則豈特形于事然後當戒一俯一仰毫釐有間已冒進于非之幾矣誥戒之嚴密見其觀之逺而察之精也用力于聖學者可不事斯語乎蔡氏曰冒妄貢進也幾者動之微而善惡之所由分也非幾則發於不善而陷於惡矣孔子所謂知幾子思所謂謹獨周子所謂幾善惡者皆致意於是也吕氏曰正死生之變而審安危之幾於此章見之兹既受命還出綴衣于庭唐孔氏敘章指見篇末漢孔氏曰此羣臣已受顧命各還本位漢孔氏曰綴衣幄帳羣臣既退徹出幄帳於庭王寢于北牖下東首反初生唐孔氏曰綴衣者連綴衣物出之於庭則是從內而出下文狄設黼扆綴衣則綴衣是黼扆之類黼扆是王坐立之處綴衣是施張于王坐之上幄帳也周禮幕人掌帷幕幄帟綬之事鄭元云在旁曰帷在上曰幕帷幕皆以布為之四合象宫室曰幄王所居之帳也帟王在幕居幄中坐上承塵也幄帟皆以繒為之幄帳是黼扆之上所張之物此言出綴衣于庭則亦併出黼扆王發顧命在此黼扆幄帳之坐命訖乃復反於寢處以王病重不復能臨此坐故徹出於庭欲為死備也喪大記云疾病君大夫徹懸士去琴瑟東首於北牖下廢牀林氏曰庭路寢之庭吕氏曰所謂疾病內外皆掃蓋靜以俟終順之至也越翼日乙丑王崩太保命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆子釗于南門之外延入翼室恤宅宗漢孔氏曰於其明日王崩邵子皇極經世紀成王丙戌即位至三十七年壬戌崩漢孔氏曰冢宰攝政故命二臣桓毛名臣子皆侍左右將正太子之尊故出於路寢門外使桓毛二臣各執干戈於齊侯吕伋索虎賁百人更新逆門外所以殊之伋為天子虎賁氏唐孔氏曰桓毛二人必是武臣宿衛唐陸氏曰伋齊侯名太公子林氏曰召公即以王崩之日命二臣于吕伋之處取二干戈持之統率虎賁百人陳氏曰干戈之器虎賁之士皆掌于齊侯有事則于之而取薛氏曰節服氏郊祀二人執戈逆尸禮君行則二執戈者在前漢孔氏曰明室路寢延之使居憂為天下宗主蘇氏曰翼室路寢旁左右翼室也成王喪在路寢故子釗廬於翼室唐趙氏曰公薨必于正寢以就公卿也大位姦之窺也危病邪之伺也若蔽于隱是使小人女子得行其志也故宗嗣素定之兵權散主之閨門嚴飭之小人女子不尸重任賢臣受託鼎足交輔則篡弒之禍曷由而至哉吕氏曰成王軍政統六師者則畢公典宿衛者則太公之子兵柄所屬亦不輕矣國冇大喪呼吸安危徵宿衛以逆嗣君事莫重焉發命者冢宰傳命者兩朝臣承命者勳戚顯諸侯體統尊嚴樞機周密折衝消萌之意深矣桓毛非不可獨任也將立君之命並遣而往所以為萬世慮也入自端門萬姓咸覩與天下共之延入翼室為居憂之宗示天下不可無統也唐穆敬以降閹寺易主於宫掖而外庭猶不聞然後知周家之制曲盡豫備也丁卯命作冊度漢孔氏曰三日命史為冊書法度傳顧命於康王王氏曰喪禮厥明而小斂又厥明而大斂尊卑皆同丁卯大斂後也林氏曰此亦太保之命唐孔氏曰將崩雖口有遺命未作冊書故以此日作之既作冊書因作受冊法度下云皇后憑玉几宣成王言是冊書也將受命時升階即位及傳命以後康王答命受同祭享皆是法度也越七日癸酉伯相命士須材漢孔氏曰邦伯為相則召公於丁卯七日癸酉召公命士致材木須待以供喪用唐孔氏曰於丁卯七日癸酉則王乙丑崩於今已九日矣鄭元云癸酉蓋大殯之明日也大夫以上殯斂皆以死之來日數天子七日而殯於死為八日故癸酉為殯之明日陳氏曰以其為三公故稱太保以其為西伯故稱伯以其為冢宰故稱相吕氏曰自成王既崩之後訖康王受冊之前命皆出于召公所以一號令而無二門也薛氏曰士山虞匠人之屬須取也唐孔氏曰材謂椁與明器應氏曰材者五材之用皆所以備喪紀之須不專於木狄設黼扆綴衣漢孔氏曰狄下士扆屏風畫為斧文置戶牖間復設幄帳象平生所為唐孔氏曰禮記祭統云狄者樂吏之賤者也喪大記復魄之禮云狄人設階是喪事使狄狄設亦是伯相命狄使設之不言命者上云命士此䝉命文設四坐及陳寶玉兵器與輅車各有所司皆是相命不言所命之人從上省文也釋宫云牖户之間謂之扆李巡云牖之東户之西為扆郭璞云窗東户西也禮云斧扆者以其所在處名之郭璞又云禮有斧扆形如屏風畫為斧文置于扆地因名為扆考工記云畫繢之事白與黑謂之黼是用白黑畫屏風置之于扆地故名此物為黼扆也經于四坐之上言設黼扆綴衣則四坐皆設之綴衣說見上文牖間南嚮敷重蔑席黼純華玉仍几漢孔氏曰篾桃枝竹白黑雜繒緣之華彩色華玉以飾憑几仍因也因生時几不改作此見羣臣覲諸侯之坐唐孔氏曰牖謂窗也間者窗東戶西户牖之間也周禮司几筵云凡大朝覲大享射凡封國命諸侯王位設黼扆扆前南嚮設管筵紛純加繅席畫純加次席黼純左右玉几即此坐也彼言扆此言牖間即一坐也彼言次席黼純此言篾席黼純亦一物也周禮天子之席三重則此四坐所言敷重席者其席皆敷三重舉其上席而言重知其下更有席也此牖間之坐即周禮扆前之坐篾席之下二重其次是繅席畫純其下是管筵紛純也此一坐有周禮可據知其下二席必然下文三坐禮無其事以扆前一坐敷三重之席知下三坐必非一重之席敷三坐但不知其下二重是何席耳此篾席與周禮次席一也鄭注彼云次席桃枝席有次列成文注此則云篾析竹之次青者王肅云篾席纎蒻革席並不知其所據也釋器云緣謂之純黼純蓋以白繒黑繒錯雜彩以緣之鄭注周禮云斧謂之黼其繡白黑彩也以絳帛為質其意以白黑之線縫刺為黼文以緣席其事或當然也華是彩之别名鄭元云華玉五色玉也周禮云凡吉事變几凶事仍几禮之於几有變有仍特言仍几以見因生時几也西序東嚮敷重底席綴純文貝仍几漢孔氏曰東西廂謂之序底蒻蘋綴雜彩有文之貝飾几此旦夕聽事之坐唐孔氏曰孫炎云堂東西牆所以别序內外也朝士職掌治朝之位王南面此西序東嚮者以此諸坐並陳避牖間南嚮覲諸侯之坐故也禮注謂蒲席為蒻蘋史游急就篇云蒲蒻藺席蒲蒻謂此也王肅云底席青蒲席也鄭𤣥云篾纎致席也謂此底席亦竹席也凡此重席非有明文可據各自以意說耳綴者連綴諸色席必以彩為緣貝者水蟲取其甲以飾器物釋魚於貝之下云餘蚳黃白文餘泉白黃文李巡謂貝甲以黃為質白為文采名餘蚳貝甲以白為質黃為文采名餘泉文貝飾几謂用此餘蚳餘泉之貝飾几也東序西嚮敷重豐席畫純雕玉仍几漢孔氏曰豐莞彩色為畫雕刻鏤此養國老享羣臣之坐唐孔氏曰釋草云莞苻蘺郭璞謂今西方人呼蒲為莞用之為席又云􅤴鼠莞樊光謂詩云下管上簟郭璞謂似莞而纎細今蜀所出莞席是也王肅亦云豐席莞鄭𤣥云豐席刮凍竹席考工記云畫繢之事雜五色蓋以五彩色畫帛以為緣鄭𤣥云似雲氣畫之為緣唐孔氏曰燕禮云坐於阼階上西嚮則養國老及享與燕禮同也西夾南嚮敷重筍席𤣥紛純漆仍几漢孔氏曰西廂夾室之前筍蒻竹𤣥紛黑綬此親屬私宴之坐故席几質飾唐孔氏曰天子之室有左右房房即室也以其夾中央大室故謂之夾室此坐在西廂夾室前故係夾室言之釋草云筍竹萌孫炎云竹初萌生謂之笱是取筍竹之皮以為席也紛則組之小别鄭𤣥周禮注云紛如綬有文而狹者也於此注云以𤣥組為之緣周禮太宗伯云以飲食之禮親宗族兄弟文王世子云族食世降一等天子與親屬私宴骨肉情親不事華麗也總說以上四坐意吕氏曰四坐者平居隨事蘇而設至傳顧命則並陳之遍象其平生之居處也氏曰將傳先王之顧命知神之在此乎在彼乎故並設平生之坐越玉五重陳寶漢孔氏曰於東西序坐北列玉五重又陳先王所寶之器物唐孔氏曰此經為下總目下復别言之赤刀大訓𢎞璧琬琰在西序漢孔氏曰寶刀赤刀削大訓虞書典謨大璧琬琰之圭為二重唐孔氏曰鄭云赤刀武王誅紂時刀赤為飾不知其言何所出陳氏曰孔叢子言昆吳之劍鍊鋼赤刃豈寶刀固赤歟孔氏書序伏羲神農黃帝之書謂之三墳少吳顓頊髙辛唐虞之書謂之五典至于夏商周之書歷代寶之以為大訓大訓蓋歷代帝王之書唐孔氏曰大璧琬琰為二重則琬琰共為一重周禮典瑞云琬圭以治德琰圭以易行則琬琰别玉而共為重者蓋以形質同故不别為重也西序說見上文大玉夷玉天球河圖在東序漢孔氏曰三玉為三重夷常也球雍州所貢河圖八之卦伏羲氏王天下龍馬出河遂則其文以畫八卦謂河圖及典謨皆歷代傳寶之唐孔氏曰王肅云夷玉東夷之美玉天球玉磬也鄭𤣥云大玉華山之球也夷玉東方之珣玗琪也天球雍州所貢之王色如天者皆璞未見琢治故不以禮器名之未知然否三玉為三重與上共為五重也河圖說見洪範東序說見上文吕氏曰西序所陳不惟赤刀𢎞璧琬琰而大訓參之東序所陳不惟大玉夷玉天球而河圖參之則所寶者斷可識矣四海之巨麗千載之典刑皆聚見於此𦙍之舞衣大貝鼖鼓在西房漢孔氏曰𦙍國所為舞者之衣皆中法大貝如車渠鼖鼓長八尺商周傳寶之西房西夾坐東唐孔氏曰𦙍是前代之國舞衣至今猶在故寶之不知舞者之衣是何衣也大貝必大於餘貝伏生書傳云散冝生之江淮取大貝如大車之渠釋樂云大鼓謂之鼖此鼓必有所異西序即是西夾西夾之前已有南嚮坐矣西序所陳之寶近在此坐之西此在西房者在西夾坐東也兊之戈和之弓垂之竹矢在東房漢孔氏曰兊和古之巧人垂舜共工所為皆中法故亦傳寶之東房東廂夾室唐孔氏曰垂之竹矢舜時之物兊和之作則不知寶來何時也東夾室無坐故直陳于夾室之前大輅在賔階面綴輅在阼階面漢孔氏曰大輅玉綴輅金面前皆南嚮唐孔氏曰大輅輅之最大玉輅也綴輅係綴于下是玉輅之次金輅也吕氏曰西階曰賔階東階曰阼階唐孔氏曰據人在堂上面向南方面謂轅向南也地道尊右故玉輅在西金輅在東先輅在左孰之前次輅在右孰之前漢孔氏曰先輅象次輅木金玉象皆以飾車木則無飾皆在路寢門內左右孰前北面唐孔氏曰此經四輅兩兩相配上言大輅綴輅此言先輅次輅二者各自以前文為文五輅金即次象先輅象也木輅在象輅之下次輅木也釋宫云門側之堂謂之孰孫炎云夾門堂也孰前陳車必以轅向堂皆北面也左孰謂門內之西右孰謂門內之東顧氏云先輅在左孰之前在寢門內之西北面對玉輅次輅在右孰之前在寢門內之東對金輅總說以上四輅意唐孔氏曰周禮巾車掌王之之五輅玉輅金輅象幣革輅木輅此四輅必是周禮五輅之四禮五輅而此四輅于五之內必將少一蓋以革輅是兵戎之用于此不必陳之馬融王肅皆云不陳戎輅者兵事非常故不陳之鄭元以綴次是從後之言二者皆為副二之車大輅是玉輅先輅是金輅也綴輅是玉輅之二次輅是金輅之二不陳象輅革輅木輅者主于朝祀而已未知孔鄭誰得經㫖周禮典路云若大祭祀則出路大喪大賓客亦如之是大喪出輅常禮也總說狄設黼扆至此漢孔氏曰凡所陳列皆象成王生時華國之事所以重顧命蔡氏曰寶玉器物之陳非徒為觀美意者成王平日之所觀閲手澤在焉陳之以象其生存也楊氏中庸傳云宗器于祭陳之示能守也于顧命陳之示能傳也吕氏曰此非獨盛彌文而章備物天位峻極幄坐靚深寶鎮輝華車輅峙列入其庭皆肅然起敬懼不克承委重投艱之意不言而已傳矣二人雀辨執惠立于畢門之內漢孔氏曰士衛殯與在廟同故雀韋辨惠三隅矛路寢門一名畢門唐孔氏曰鄭𤣥云赤黑曰雀言如雀頭色也雀辨同如冕黑色但無藻耳阮諶三禮圖云雀辨以三十升布為之周禮司服云凡兵事韋辨服此人執兵宜以韋為之異於祭服鄭𤣥云惠狀蓋斜刃冝芟刈在門者兩守門兩廂各一人故二人四人綦辨執戈上刃夾兩階戺漢孔氏曰綦文鹿子皮辨亦士堂亷曰戺士所立處唐孔氏曰鄭𤣥云青黑曰綦王肅云綦赤黑色各以意言無正文也在階者兩廂各二人故四人禮記明堂位三公在中階之前考工記夏后氏宮室九階鄭𤣥云南面三三面各二鄭𤣥又云宗廟及路寢制如明堂與路寢南面亦當有三階矣此惟四人夾兩階不守中階路寢制如明堂惟鄭元說耳路寢三階否書亦未有明文縱有中階中階無人升降不須以兵衛之一人冕執劉立于東堂一人冕執鉞立于西堂漢孔氏曰冕皆大夫也劉鉞屬立于東西廂之前堂唐孔氏曰鄭𤣥云劉蓋今鑱斧鉞大斧鄭𤣥又云序內半以前曰堂謂序內簷下自室壁至于堂亷中半以前總名為堂此立于東堂西堂者當在東西廂近階而立以備升階之人也一人冕執戣立于東垂一人冕執瞿立于西垂漢孔氏曰戣翟皆㦸屬立于東西下之階上唐孔氏曰鄭𤣥云戣瞿蓋今三鋒矛釋詀云疆界邊衛圉垂也則垂是逺外之名堂上而言東垂西垂蓋在堂上之逺地序外東廂西廂必有階上堂此立于東西堂之階上也一人冕執鋭立于側階漢孔氏曰鋭矛屬也側階北下立階上陳氏曰玉篇云鋭戈稅切銛也徙㑹切矛也說文云鋭庾準切侍臣所執周書云一人冕執鋭如此則鋭當作鋭唐孔氏曰鄭王皆以側階為東下階也然立于東垂者已在東下階上何由此人復共並立此惟堂北一階而已耳側猶侍也總說以上七節意唐孔氏曰禮大夫服冕士服辨立堂下服雀辨綦辨者皆士也以其去殯逺故使士為之在堂上服冕者皆大夫也以其去殯近皆使大夫為之先門次階次堂從外向內而敘之也次東西垂次側階又從近嚮逺而敘之也又曰此經所陳七種之兵惟戈經傳多言之考工記有其形制其餘皆無文古今兵器名異體殊此等形制皆不可得知王肅惟云皆兵器之名也吕氏曰古者執干戈以衛王宫皆士大夫之職無事而奉燕私則從容養德有膏澤之潤有事而司禦侮則堅明守義無腹心之虞下及秦漢陛楯執㦸尚餘一二此制既廢人主接士大夫者僅有視朝數刻而周廬陛枑或環以樵埋嚚悍之徒有志復古者當深繹也總說狄設黼扆至此唐孔氏曰所陳坐位及器物皆以西為上由王殯在西序故也其執兵宿衛之人則先東而後西者以王在東宿衛敬新王故也陳氏曰自設黼扆至此典章文物之備一以敬前王平生所坐所寶所乘所衛以起嗣王之追慕而盡誠紹述也一以昭前王付託之重使嗣王肅敬以祗承也一以起羣臣諸侯之尊敬想慕前王而繫心于嗣王也一以表人主之崇髙富貴尊無二上傳受之正如此以絶天下覬望之萌也王麻冕黼裳由賔階隮唐孔氏敘章指見篇末漢孔氏曰王及羣臣皆吉服用西階升不敢當主吕氏曰自此始稱王蓋將受冊命而踐位也唐孔氏曰凡諸行禮皆賤者先至此必卿士邦君即位既定然後王始升階但以君臣之序先言王服因服之下即云升階從省文也禮績麻三十升以為冕故稱麻冕王麻冕蓋衮冕也周禮司服享先王則衮冕鄭𤣥周禮注云衮之衣五章裳四章則衮衣之裳非獨有黼言黼裳者以裳之章色黼黻有文故特取為文詩采菽言王賜諸侯𤣥衮及黼以黼有文故特言之張氏曰鄭云升八十縷麻冕三十升則其經二千四百縷極細之布也吕氏曰由賔階升猶以子道自居而不敢自為王也夏氏曰論語云麻冕禮也今也純儉吾從衆古者冕皆麻孔子時始易而用絲鄭氏曰隮升也卿士邦君麻冕蟻裳入即位漢孔氏曰公卿大夫及諸侯皆同服亦廟中之禮蟻裳名色𤣥唐孔氏曰卿士王臣故先於邦君禮無蟻裳今云蟻裳蟻者蚍蜉蟲也色黑蟻裳色𤣥如蟻故以蟻名之禮祭服皆𤣥衣纁裳此獨𤣥裳者卿士邦君於此無事不可全與祭同卿士邦君無所執事故直言即位鄭𤣥云卿西面諸侯北面鄭惟據經卿士邦君言之其公亦北面孤東面也太保太史太宗皆麻冕彤裳太保承介圭上宗奉同瑁由阼階隮太史秉書由賔階隮御王册命漢孔氏曰執事各異裳彤纁也太宗上宗即宗伯也唐孔氏曰太保太史太宗皆執事之人太史乃太宗之屬而先於太宗者太史之職掌冊書此禮主為册命太史所掌事重故先言之彤赤也禮祭服纁裳纁是赤色之淺者漢孔氏曰大圭尺二寸天子守之故奉以奠康王所位同爵名瑁所以冒諸侯圭以齊瑞信方四寸邪刻之用阼階升由便不嫌唐孔氏曰大考工記玉人云鎮圭尺有二寸天子守之鎮圭圭之者禮於奠爵無名同者但下文祭酢皆用同奉酒同酒爵之名也玉人云天子執瑁四寸以朝諸侯鄭𤣥注云名玉曰瑁者言德能覆蓋天下也四寸者方以尊接卑以小為貴禮天子所以執瑁者諸侯即位天子賜之以命圭圭頭邪鋭其瑁當下邪刻之其刻闊狹長短如圭頭諸侯來朝執圭以授天子天子以瑁之刻處冒彼圭頭若大小相當則是本所賜若或不同則圭是僞作知諸侯信與不信故天子執瑁所以冒諸侯之圭以齊瑞信猶今之合符禮凶事設洗于西階西南吉事設洗于東階東南此太保上宗皆行吉事盥洗在東故用阼階升漢孔氏曰太史持册書顧命進康王故同階唐孔氏曰訓御為進鄭𤣥云御猶嚮也王于此時立賔階上少東太史東面於殯西南而讀册書以命王嗣位之事也曰皇后憑玉几道揚末命命汝嗣訓臨君周邦率循大卞燮和天下用答揚文武之光訓漢孔氏曰册命之辭大君成王言憑玉几所道稱揚終命所以感動康王命汝繼嗣其道言任重因以託戒蔡氏曰言汝者父前子名之義陳氏曰顧命中成王自言嗣守文武大訓故此言命汝嗣訓吕氏曰不曰嗣位而曰嗣訓訓所以守位循其本也漢孔氏曰用是道臨君周國率循大法陳氏曰臨之君之猶君臨也鄭氏曰率循行也漢孔氏曰言用和道和天下用對揚聖祖文武之大教叙成王意陳氏曰燮亦和也燮和天下和之至也以此對答發文武光明之訓所謂嗣訓也蘇氏曰成王顧命之言書之册矣此太史口陳者王再拜興答曰眇眇豫末小子其能而亂四方以敬忌天威漢孔氏曰言微微我淺末小子其能如父祖治四方以敬忌天威德乎謙辭託不能陳氏曰太史讀册畢王再拜受册起而答也眇眇小貌末卑下也其能猶未必能也恐不能下治四方以上承天威此非姑為謙辭謹之至也蔡氏曰顧命有迓天威嗣守大訓之語故太史所告康王所答皆於是致意焉乃受同瑁王三宿三祭三咤上宗曰饗漢孔氏曰王受瑁為主受同以祭陳氏曰已受冊則為王矣于是受同瑁于太宗同以奉祭承大統瑁以臨朝握大權言受同瑁而不言受介圭豈互見歟抑居喪未欲全受傳器而少示其變與當俟知者漢孔氏曰禮成于三故酌者實三爵於王王三進爵三祭酒三奠爵吉巴受羣臣所傳顧命唐孔氏曰釋詁云肅進也宿即肅也三宿謂三進爵從立處三進至神所也三祭酒三酹酒于神坐也每一酹酒則一奠爵三奠爵于地也經典無咤字咤為奠爵傳記無聞王肅亦以咤為奠爵鄭𤣥云徐行前為肅却行為咤王徐行前三祭又三却復本位與孔異蘇氏曰至齒而不飲曰咤曰嚌示飲而實不飲也葉氏曰禮有祭酒啐酒咤宜若啐酒然漢孔氏曰祭必受福讃王曰饗福酒林氏曰豫福曰嘏特牲少牢之禮尸嘏主人此則上宗嘏主也吕氏曰上宗曰饗者傳神命而以饗告之按咤字或謂奠爵或謂嚌啐饗字或謂神饗或謂饗福詳咤字從口疑當從嚌啐饗福之義然吕氏不取又合正理其說具見下文太保受同降盥以異同秉璋以酢授宗人同拜王答拜太保受同祭嚌宅授宗人同拜王答拜漢孔氏曰受王所饗同下堂反於篚漢孔氏曰太保以盥手洗異同實酒秉璋以酢祭半圭曰璋臣所奉王已祭太保又祭報祭曰酢唐孔氏曰祭禮以變為敬不可即用王同故太保盥手更洗異同實酒於同中乃秉璋以酢祭周禮典瑞云四圭有邸以祀天兩圭有邸以祀地圭璧以祀日月璋邸射以祀山川從上而下遞減其半祭統云君執圭瓉太宗執璋瓉謂亞獻用璋瓉此非正祭亦亞獻之類故亦執璋漢孔氏曰宗人小宗伯佐太宗者太宗供王宗人供太保拜曰已傳顧命故授宗人同拜王答拜尊所受命唐孔氏曰王既祭則奠同于地太保不敢奠于地故以同授宗人蔡氏曰以同授宗人而拜尸王答拜者代尸拜也唐孔氏曰太保既酢祭而拜則王之奠爵每奠必拜于王祭不言拜者祭酒必拜乃是常禮於王不言拜於太保言拜者足以見王拜也漢孔氏曰太保既拜而祭既祭受福嚌至齒則王亦至齒王言饗太保言嚌互相備應氏曰王之祭初獻也太保之盥亞獻也又受同終獻也唐孔氏曰太保于宗人受前所授之同而進以祭神既祭遂受福酒嚌以至齒禮之通例啐入口是嚌至于齒示飲而實不飲也吕氏曰嚌者至齒方在喪疚故歆神之惠而不甘其味也王為喪主則非徒不甘味雖飲福亦廢也漢孔氏曰太保居其所授宗人同拜白成王以事畢王答拜敬所白唐孔氏曰太保居其所於受福酒之處足不移為將拜故授宗人同也太保降收漢孔氏曰太保下堂則王亦可知有司于此盡收撤張氏曰有司收撤同爵器用也若乃綴衣及陳寶末葬以前不敢收也諸侯出廟門俟漢孔氏曰言諸侯則卿士以下亦可知殯之所處故曰廟皆待王後命唐孔氏曰廟門謂路寢門出門待王後命即作後篇後篇云三公率諸侯入應門則諸侯出應門之外非出廟門而已以其在廟行事事畢出于廟門不言出廟門即止也吕氏曰俟者俟見康新王於門外也蓋入廟門則子道也出廟門則君道也天子之尊屈于門內而伸于門外也父子君臣之義著矣總說一篇意唐孔氏曰發首至百尹御事敘王以病召臣為發言之端自王曰至非幾是顧命之辭兹既受命至立于側階言命後王崩欲宣王命布陳儀衛之事自王麻冕以下敘康王受命之事真氏曰此篇見周公養成君德之效又見召公當危疑之際區處周密皆可以為來世法也尚書纂傳卷三十八
