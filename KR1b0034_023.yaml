body:
  text: 尚書纂傳卷二十三元王天與撰旅獒第七周書西旅獻獒太保作旅獒漢孔氏曰西戎逺國貢大犬犬高四尺曰獒漢孔氏曰太保三公官名召公也林氏曰不言召公作旅獒而言太保者言保傅之職也唐孔氏曰史敘其事作旅獒旅獒唐孔氏曰旅獒亦訓也蔡氏曰今文無古文有惟克商遂通道于九夷八蠻西旅砥貢厥獒太保乃作旅獒用訓于王蔡氏曰此旅獒之本序漢孔氏曰四夷慕化貢其方賄九八言非一皆通道路無逺不服林氏曰蠻夷來王其道自通非若秦漢之開四夷以斥境土也漢孔氏曰西旅之長致貢其獒真氏曰獒方獻而言已至此召公之所以為能格君心者朱子曰是時武王已八十餘歲太保此書諄諄告之如教小兒自後世言之則為非所宜言不尊君矣曰嗚呼明王慎德四夷咸賔無有逺邇畢獻方物惟服食器用王乃昭德之致于異姓之邦無替厥服分寶玉于伯叔之國時庸展親人不易物惟德其物陳氏曰此專論貢獻之義漢孔氏曰言明王慎德以懷逺故四夷皆賔服吕氏曰慎德一篇之綱領真氏曰明王敬謹其德豈欲四夷之我賔哉而賔貢乃有不期而自至者漢孔氏曰天下萬國無有逺近盡貢其方土所生之物惟可以供服食器用者言不為耳目華侈唐孔氏曰玄纁絺紵供服也橘柚菁茅供食也羽毛齒革瑶琨篠簜供器用也漢孔氏曰德之所致謂逺夷之貢以分賜異姓諸侯使無廢其職蔡氏曰昭示也吕氏曰如以肅慎楛矢分陳之類真氏曰昭德之致謂王者得逺方之貢則分賜諸侯使知謹德則能致逺人之服不德則反是欲其惕然自省無替厥服此即慎德之謂也德以身言服以事言能謹德則能謹事能謹事則為能謹其德古人論德不在事外也漢孔氏曰以寶玉分同姓之國是用誠信其親親之道蘇氏曰展布也漢孔氏曰言物貴由人所貴在於德或問人不易物之易合如字合作去聲朱子曰看上文意則當作如字讀又曰易改易也言人不足以易物惟德足以易物德重而人輕也人猶言位也謂居其位者如寶玉雖貴若有君人之德則所錫賚之物斯足貴若無其德雖有至寶以錫諸侯亦不足貴也德盛不狎侮狎侮君子罔以盡人心狎侮小人罔以盡其力不役耳目百度惟貞玩人喪德玩物喪志志以道寧言以道接不作無益害有益功乃成不貴異物賤用物民乃足犬馬非其土性不畜珍禽竒獸不育于國不寶逺物則逺人格所寶惟賢則邇人安陳氏曰此皆反覆言獒不可受之意漢孔氏曰盛德必自敬何狎易侮慢之有真氏曰召公既言慎德又以狎侮為戒蓋不敬乃敗德之源唐孔氏曰君子謂臣小人謂民吕氏曰狎侮之病必盛德之至動容周旋中禮之人則無之下是或未必免狎侮君子豈能為用色斯舉矣髙蹈逺引望望然而去安能盡其心狎侮小人小人微賤固不得不從然心不服豈能盡其力漢孔氏曰言不以聲色自役則百度正真氏曰物之誘人因視聽而入目悅色耳悅聲苟非心有所主未有不反為耳目所役杜氏曰百度百事之節也漢孔氏曰以人為戲弄則喪其德以器物為戲弄則喪其志在心為志發氣為言皆以道為本蔡氏曰玩人即上文狎侮之事玩物即上文役耳目之事真氏曰玩有戲狎意有耽著意玩人則以人為戲輕薄慢易未有不喪其德者玩物則以物為戲荒縱淫泆未有不喪其志者何以寧其志曰道而已道者人心之正理以道養心則物欲不作而恬愈安平是之謂寧衆多之言交至吾前何以應之曰道為權是非當否折之以道雖詖淫邪遁其能遷乎此內外交養之方也漢孔氏曰遊觀為無益竒巧為異物唐孔氏曰諸所妄作皆為無益諸所希有皆為異物真氏曰為無益則心志分而功不成貴異物則征求多而民不足惟知本務實者不然工商之巧不如農桑之朴錦繡之奢不如布帛之溫推類而言莫不然也漢孔氏曰非此土所生不畜以不習其用皆非所用有損害故夏氏曰犬能守禦馬能致逺皆可用之物非其土性尚不畜養况珍異之禽竒怪之獸無用之物可畜之乎漢孔氏曰不侵奪其利則來服矣蘇氏曰夷狄性貪故喜廉而畏貪古之循吏能以廉服夷狄者多矣而貪吏亦足以致冦况王者乎漢孔氏曰寶賢任能則近人安近人安則逺人安矣真氏曰小駟乘而晉師以敗非土性也白狼入而荒服不至好珍竒也千里馬之却漢文所以有道鬭鴨之求魏氏所以不長齊不寶徑寸之珠而寶檀子敵以畏楚不寶白珩而寶觀射父國以強此皆後世事而召公之言無一不驗所以為聖賢歟嗚呼夙夜罔或不勤不矜細行終纍大德為山九仞功虧一簣允迪兹生民保厥居惟乃世王陳氏曰此又嘆息以申前意漢孔氏曰言當早起夜寐常勤於德吕氏曰此句與明王慎德相為表裏勤即慎德工夫所謂自強不息源泉混混不舍晝夜耳目玩好何隙可入漢孔氏曰輕忽小物積害毁大故君子慎其微朱子曰矜是矜惜持守之意吕氏曰當於一嚬一笑一動一作時仔細體察蓋小處易得放過真氏曰行者德之積微者巨之積一行不謹全德之纍微者少忽巨者不成漢孔氏曰八尺曰仞喻向成也未成一簣猶不為山故曰功虧一簣鄭氏曰簣盛土器也吕氏曰功虧一簣非謂止用一簣便做足了聖人雖作之不已常若欠一簣聖人之心無窮真氏曰武王大聖人也西旅獻獒初未之受召公恐其恃大德而忽細行以獻獒之受為無損故豫戒之如此蓋積行而成德猶纍土而成山一行失則全體皆失亦猶一簣虧而全功俱虧也以聖人猶若是今人未有寸善曰吾知顧其大不恤其細可乎哉漢孔氏曰言其能信蹈行此誡則生人安其居天子乃世世王天下巢伯來朝芮伯作旅巢命漢孔氏曰殷之諸侯伯爵也南方逺國武王克商慕義來朝漢孔氏曰芮伯周同姓圻內之國為卿大夫陳威德以命巢亡唐孔氏曰杜預云芮馮翊臨晉縣芮鄉是也旅陳也上旅是國名此旅訓為陳尚書纂傳卷二十三
