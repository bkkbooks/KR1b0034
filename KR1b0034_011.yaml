body:
  text: 尚書纂傳卷十一元王天與撰伊訓第四商書成湯旣没太甲元年伊尹作伊訓肆命徂后漢孔氏曰太甲太丁子湯孫也太丁未立而卒及湯没而太甲立稱元年邵子皇極經世紀成湯乙未伐夏即位至十三年丁未崩唐孔氏曰殷本紀云湯崩太子太丁未立而卒於是乃立太丁之弟外丙二年崩别立外丙之弟仲壬四年崩伊尹乃立太丁之子太甲與經不同彼必妄也程子曰古人謂歲爲年湯崩時外丙方二歳仲壬方四歳惟太甲差長故立之也史記以孟子二年四年之言遂言湯崩六年後太甲方立不知年只是歳也胡氏曰五帝官天下定於與賢三王家天下定於立嫡立嫡者敬宗也敬宗者尊祖也尊祖者所以親親也兄死弟立不敬宗尊祖本支亂而爭奪起矣成湯伊尹以元聖之徳創王業豈乃舍嫡孫而立諸子亂倫壞制大開後世爭奪之端乎故公儀仲子舍孫而立子言偃問曰禮歟孔子曰否立孫孔子魯人宜知先王之故而不以立弟爲是邵子經世書亦無外丙仲壬此又可證按公羊傳一生一及何休註父死子繼曰生兄死弟繼曰及周制傳子啇制則未盡然亦多有傳及長弟者考之世系可見湯崩而立太甲必外丙仲壬俱幼而太甲嫡孫年長宜立故程子考究情理定知史記誤云唐孔氏曰史敘其事作伊訓肆命徂后三篇漢孔氏曰其二亡伊訓漢孔氏曰作訓以教導太甲林氏曰訓書之一體有諄諄警戒之意蔡氏曰今文無古文有惟元祀十有二月乙丑伊尹祠于先王奉嗣王祗見厥祖侯甸羣后咸在百官總已以聽冢宰伊尹乃明言烈祖之成徳以訓于王夏氏曰此史敘伊尹作書之意漢孔氏曰此湯崩踰月太甲即位奠殯而告唐陸氏曰祀年也爾雅曰夏曰歳商曰祀周曰年唐虞曰載註云載取物終更始歳取歳星行一次祀取祭四時一終年取穀一熟蘇氏曰元祀十有二月者太甲立之明年正月也正月而謂之十二月何也殷之正月則夏之十二月也殷雖以建丑爲正猶以夏正數月亦猶周公作豳詩於成王之世而云七月流火九月授衣皆夏正也崩年改元亂世之事不容伊尹在而有之不可以不辨朱子曰商人但以十二月爲歳首而不改月號時亦必不改也蔡氏曰乙丑日也不繫以朔者非朔日也唐陸氏曰祠祭也唐孔氏曰伊尹祠于先王謂祭湯也漢孔氏曰居位主喪鄭氏曰下朝上曰見蔡氏曰對伊尹言故稱先王對嗣王言故稱祖唐孔氏曰奉嗣王祗見厥祖謂見湯也或問是時湯方在殯宫太甲於朝夕奠常在如何伊尹因祠而見之朱子曰此與顧命康王之誥所載冕服事同意者古人自有一件人君居喪之禮但今不存無以考據蓋天子諸侯旣有天下國家事體恐難與常人一般行喪禮漢孔氏曰在位次陳氏曰敘侯甸於羣后之首者二服在五服之先也意者四方諸侯猶未盡集特侯甸近服之始至者歟漢孔氏曰伊尹制百官以三公攝冢宰朱子曰冢宰太宰也蔡氏曰冢長也禮有冢子冢婦之名周人亦謂之冢宰漢孔氏曰湯有功烈之祖故稱焉吕氏曰明言有著力之意陳氏曰大猛爲烈喻功徳之顯著也成徳成全無虧也以久逺之事告人人未必信聽以祖宗艱難起家之事告子孫則莫不深信固守故五子述禹之戒伊尹言湯之徳周召陳文武之業堯舜雖大聖未暇及也吕氏曰太甲方在喪而作訓乗其心之虚也曰嗚呼古有夏先后方懋厥徳罔有天災山川鬼神亦莫不寧曁鳥獸魚鼈咸若于其子孫弗率皇天降災假手于我有命造攻自鳴條朕哉自亳惟我商王布昭聖武代虐以寛兆民允懷今王嗣厥徳罔不在初立愛惟親立敬惟長始于家邦終于四海夏氏曰此首言夏商興亡以戒太甲漢孔氏曰先后謂禹以下少康以上賢王言能以徳禳災吕氏曰方者常常如初久而無一毫倚滯之意日新之謂也徳者天地萬物實然之理聖人與天地萬物共由之也此徳旣懋則天地萬物自然各得其理矣漢孔氏曰莫無也言皆安之唐孔氏曰山川鬼神謂山川之鬼神也漢孔氏曰雖㣲物皆順之明其餘無不順唐孔氏曰鳥獸在陸魚鼈在水林氏曰徳合於天故無天災山川鬼神皆安其居而不爲妖不爲厲鳥獸魚鼈各順其情而不爲怪不爲孽此所謂無有天災也漢孔氏曰言桀不循其祖道故天下禍災借手於我有命商王誅討之蔡氏曰假借也有命有天命者謂湯也吕氏曰假手深言伐桀非湯純是天意吕氏曰夏之先后懋徳如此宜可憑藉扶持固億萬年之基本子孫纔爾不率天遂降之以災天理感應之速反覆手間耳感應之理存於懋徳之中災咎之理存於弗率之中後世人君所以敢於爲惡皆恃天下爲己有伊尹之言所以奪太甲之所恃漢孔氏曰造哉皆始也始攻桀伐無道由我始修徳于亳蔡氏曰明條夏所宅亳湯所宅言造可攻之釁者由桀積惡於鳴條而湯徳之修則始於亳都也漢孔氏曰言湯布明武徳以寛政代桀虐政兆民以此皆信懷我商王之徳蔡氏曰布昭敷著也聖武即易所謂神武而不殺者吕氏曰虐與寛對湯之伐桀無他不過取其相對者代之如易東爲西而已漢孔氏曰欲其慎始吕氏曰太甲雖累於欲縱而即位之初必且改志易慮亟告之以嗣徳在初乗其天理之正發而開導之也漢孔氏曰言立愛敬之道始於親長則家國並化終洽四海蔡氏曰孝悌者人心之所同非必人人教詔之立植也立愛敬於此而形愛敬於彼親吾親以及人之親長吾長以及人之長始于家達于國終而措之天下矣孔子云立愛自親始教民睦也立敬自長始教民順也真氏曰此即齊家治國平天下之序也嗚呼先王肇修人紀從諌弗咈先民時若居上克明爲下克忠與人不求備檢身若不及以至于有萬邦兹惟艱哉敷求哲人俾輔于爾後嗣制官刑儆于有位曰敢有恒舞于宫酣歌于室時謂巫風敢有殉于貨色恒于遊畋時謂淫風敢有侮聖言逆忠直逺耆徳比頑童時謂亂風惟兹三風十愆卿士有一于身家必喪邦君有一于身國必亡臣下不匡其刑墨具訓于蒙士陳氏曰此又言成湯之治己治人者以戒太甲漢孔氏曰言湯始修爲人綱紀有過則改從諫如流必先民之言是順張氏曰父子君臣夫婦長幼朋友有禮義以相維謂之人紀傳云禮義以爲紀又云紀散而衆亂吕氏曰舜嗣位而慎五典禹受命而敘彞倫湯歸亳而肇人紀之修武王勝殷而汲汲攸敘之訪爲君爲師第一事也唐孔氏曰先民古賢人也克明說見堯典漢孔氏曰事上竭誠吕氏曰克忠最難看湯放桀以臣易君豈可言忠不知湯之心最忠天命未去人心未離事桀之心何嘗須臾替真氏曰爲下之爲去聲爲民則能盡其心也左氏傳季梁曰上思利民忠也按忠字義真氏曰忠之爲義先儒以中心釋之又以盡己言之蓋本諸心而無僞者忠也發乎已而必盡者亦忠也其實一而已聖賢言忠不専於事君也爲人必忠謀也於朋友必忠告也事親必忠養也至於以善教人以利散民無適而非忠也此章爲下克忠二說姑兩存之漢孔氏曰使人必器之常如不及恐有過鄭氏曰備全檢律也朱子曰是湯急己緩人之意漢孔氏曰言湯操心常危懼動而無過以至爲天子此自立之難袁氏曰以至猶云舜自耕稼陶漁以至爲帝無非取諸人以爲善者也漢孔氏曰布求賢智使師輔於爾嗣王言仁及後世孫氏曰敷求者求之非一方孟子云湯立賢無方漢孔氏曰言湯制治官刑法以儆戒百官蔡氏曰制作官刑官府之刑也王氏曰湯豈真以刑加之哉儆戒之而已漢孔氏曰常舞則荒淫樂酒曰酣酣歌則廢徳事鬼神曰巫言無政吕氏曰觀湯之時以恒舞酣歌爲戒則知靡靡之樂非作於商紂之時鄭衛之音非起於衰周之際陳氏曰宫室皆屋宇别言之則宫者總其全室則房室也于宫于室互文唐孔氏曰巫以歌舞事神故歌舞爲巫覡之風俗也陳氏曰風者風俗之風謂足以使人動而化也漢孔氏曰殉求也敢求財貨美色常逰戲田獵是淫過之風俗遊畋說見五子之歌真氏曰殉猶殉葬之殉以身䧟其中而不顧者也漢孔氏曰狎侮聖人之言而不行拒逆忠直之規而不納耆年有徳踈逺之童穉頑嚚親比之是荒亂之風俗鄭氏曰逺棄者老比暱也蔡氏曰倒置悖理曰亂好人之所惡惡人之所好也漢孔氏曰有一過則徳義廢失位亡家之道諸侯犯此國亡之道唐孔氏曰三風十愆巫風二淫風四亂風四也吕氏曰有一云者非謂止有其一也有其一則九者從而有如一好恒舞則酣歌貨色之類駸駸爲矣有一云者箴其病於未萌也陳氏曰吕氏云云蓋謂有其一未至於喪亡耳夫九者之病固有相因者然若耽於一喪亡必至親見士大夫子弟以詩酒器玩之類亡家者蓋心溺於此則餘事皆廢此數者皆世雅好猶足以亡家況此十者何必備而後至喪亡哉鄭氏曰喪亦亡也漢孔氏曰邦君卿士則以諍臣自匡正臣不正君服墨刑鑿其額涅以墨䝉士例謂下士士以諍友僕𨽻自匡正唐孔氏曰墨刑司刑所謂墨罪五百是也劉氏曰左傳叔向云貪以敗官爲墨真氏曰臣不正君而加以貪墨之刑者蓋人臣所以不諌以貪官固位故也故不諌之罪與貪墨同使人知不獨貪賄之有罪而貪官者亦有刑垂戒之意逺矣朱子曰臣下不匡之刑蓋施於邦君大夫之喪國亡家者君臣一體不得不然如漢廢昌邑王則誅其羣臣而昔下嶺南亦誅其亂臣龔澄樞李託之類是也又曰湯制此刑正是奉行天討毫髪不差處蔡氏曰具詳悉也唐孔氏曰蒙謂蒙穉卑小之稱顧氏以爲蒙闇之士薛氏曰官刑所以戒諸侯卿士而伊尹舉以訓太甲以爲諸侯卿士犯此已足喪國亡家況天子乎伊尹之訓可謂㣲而婉矣嗚呼嗣王祗厥身念哉聖謨洋洋嘉言孔彰惟上帝不常作善降之百祥作不善降之百殃爾惟徳罔小萬邦惟慶爾惟不徳罔大墜厥宗蔡氏曰此總結上文而以天命人事禍福申戒之漢孔氏曰言當敬身念祖徳真氏曰欲太甲敬身而念念不忘也敬之一辭乃治三風砭十愆之藥石漢孔氏曰洋洋美善言甚明可法陳氏曰聖謨嘉言即上所述謨即言也洋洋即孔彰也自其謀之於心則洋洋廣大見其憂深思逺也自其發之於言則甚彰明見其善惡有證也漢孔氏曰祥善也天之禍福惟善惡所在三山陳氏曰不常者去就無定也陳氏曰祥休祥殃咎殃百言多也朱子曰觀此則人之禍福皆其自取未有不爲善而以諂禱得福者也未有不爲惡而以守正得禍者也漢孔氏曰修徳無小則天下賚慶茍爲不徳無大言惡有類以類相致必墜失宗廟此伊尹至忠之訓朱子曰慶福也又大學或問曰善必積而後成惡雖小而可懼書所謂云云亦是意耳林氏曰如湯之肇修人紀至檢身若不及然後可以爲徳之大至於三風十愆有一而亡是不徳不在大也昔李常寧云天下之大社稷之重百年成之而不足一日毁之而有餘予嘗三復斯言以爲得伊尹訓太甲之意大禹肇造有夏而太康以十旬遊畋而亂之周之王業自后稷開基凡十餘世而文武始受命幽王以褒姒之一笑而壞之豈不信哉肆命漢孔氏曰陳天命以戒太甲亡徂后漢孔氏曰陳往古明君以戒亡尚書纂傳卷十一
