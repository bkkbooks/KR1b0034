body:
  text: 尚書纂傳卷四十五元王天與撰費誓第三十一周書魯侯伯禽宅曲阜徐夷並興東郊不開作費誓漢孔氏曰始封之國居曲阜唐孔氏曰伯禽魯侯名朱子曰魯地在禹貢徐州䝉羽之野今襲慶東平府沂密海等州是其地漢孔氏曰徐戎淮夷並起為宼於魯故東郊不開唐孔氏曰經稱淮夷徐戎序言徐夷略之也此戎夷在魯之東諸侯之制於郊有門恐其侵逼魯境故東郊之門不開陳氏曰夷戎並興于東邊故東郊警備其門不開非謂已至東郊也郊在十里外若已至東郊則造城下矣唐孔氏曰史錄其誓辭作費誓蔡氏曰費誓在周公東征時眞氏曰據史記魯世家則蔡氏說當說見洛誥禮記曽子問篇子夏問曰三年之喪卒哭金革之事無避也者禮與孔子曰吾聞諸老聃曰昔者魯公伯禽有為為之也鄭氏註徐戍作難喪卒哭而征之急王事也征之作費誓按眞氏取蔡氏說以魯世家為據若禮記云金革之事而鄭氏以費誓實之恐未當費誓漢孔氏曰費魯東郊之地名魯侯征之於費地而誓衆也吕氏曰啓初嗣位驟當有扈之變伯禽初就封驟當徐夷之變一旦誓師若老于行陣者蓋禹周公之家學本末具舉也蔡氏曰今文古文皆有公曰嗟人無譁聽命徂兹淮夷徐戎並興漢孔氏曰伯禽為方伯監七百里内之諸侯帥之以征嘆而勑之使無諠譁欲其靜聽誓命唐孔氏曰鄭云人謂軍之士衆及費地之民蘇氏曰譁讙也漢孔氏曰今往征此淮浦之夷徐州之戎並起為宼此戎夷帝王所羈縻統緒故錯居九州之内秦始皇逐出之陳氏曰徂兹句絶徂兹往此而征也林氏曰淮夷徐戎壤地相望服則俱服叛則俱叛考閟宫常武之詩可見善敹乃甲胄敿乃干無敢不弔備乃弓矢鍜乃戈矛礪乃鋒刃無敢不善吕氏曰此治戎備之事漢孔氏曰言當善簡汝甲鎧胄兜鍪施汝楯紛無敢不令至攻堅使可用唐孔氏曰甲胄有善有惡故令敹簡取其善者鄭云敹謂穿徹之謂甲繩有斷絶當使敹理穿治之鄭云敿猶繋也王肅云敿楯當有紛繋持之蔡氏曰弔精至也漢孔氏曰備汝弓矢弓調矢利鍜鍊戈矛磨礪鋒刄使皆無敢不功善唐孔氏曰備具也每弓百矢弓十矢千使其數備足凡金為兵器皆須鍜礪有刃之兵非獨戈矛而已云鍜戈矛礪鋒刃文互相通蔡氏曰鍜淬礪磨也夏氏曰言弔言善互文也今惟淫舎牿牛馬杜乃擭敜乃穽無敢傷牿牿之傷汝則有常刑吕氏曰此除道路之事漢孔氏曰今軍人惟大放舎牿牢之牛馬言軍所在必放牧也唐孔氏曰牿閑牢之謂大舎牿牛馬則是出之牢閑牧于野澤令其逐草而牧之漢孔氏曰擭捕獸機檻當杜塞之穽穿地陷獸當以土窒敜之無敢令傷所放牿牢之牛馬牛馬之傷汝則有殘人畜之常刑唐孔氏曰周禮冥氏掌為穽擭以攻猛獸穽擭皆是捕獸之器擭以捕虎豹穿地為深坑又設機於上防其躍而出也穽以捕小獸穿地為深坑入必不能出其上不設機也杜敜皆閉塞之義吕氏曰舉此一條以例之則凡川梁藪澤險阻屏翳有害於師屯者除治之功無所不施矣馬牛其風臣妾逋逃無敢越逐柢復之我商賚汝乃越逐不復汝則有常刑無敢宼攘踰垣牆竊馬牛誘臣妾汝則有常刑吕氏曰此嚴部伍之事漢孔氏曰馬牛其有風佚臣妾逋亡勿敢棄越壘伍而求逐之役人賤者男曰臣女曰妾唐孔氏曰左傳云惟是風馬牛不相及也賈逵云風放也新安王氏曰師行無婦人國君自將卿大夫為偏禆或有宦女從行漢孔氏曰衆人其有得佚馬牛逃臣妾皆敬還復之我則商度汝功賜與汝漢孔氏曰越逐為失伍不還為攘盜汝則有此常刑吕氏曰師行奔逸惟宜鎭之以靜故戒本部按堵不動無敢越逐逐則奔者未反逐者先亂惟使之各守部伍則潰亂者徐將自止此出師鎭定變亂之法也又戒他部敬而復之人誘于祗復之賞憚于不復之刑則流放者不召自集此出師招集散亡之法也本部不敢離局他部不敢匿姦何潰亂之憂哉漢孔氏曰軍人無敢暴刼人踰越人垣牆物有自來者無敢取之軍人盜竊馬牛誘偷奴婢汝則有犯軍令之常刑吕氏曰此不惟欲田野不擾自古喪師毎因剽掠失部伍為敵所乘故不得不戒也甲戌我惟征徐戎峙乃糗糧無敢不逮汝則有大刑魯人三郊三遂峙乃楨榦甲戌我惟築無敢不供汝則有無餘刑非殺魯人三郊三遂峙乃芻茭無敢不多汝則有大刑吕氏曰此立期㑹之事漢孔氏曰誓後甲戌之日我惟征之皆當儲峙汝糗糒之糧使足食無敢不相逮及汝則有乏軍興之死刑夏氏曰不言征淮夷前已言之省文唐孔氏曰峙具也鄭衆云糗熬大豆及米也說文云糗熬米麥也鄭𤣥云糗擣熬穀也謂熬米麥使熟又擣之以為粉也陳氏曰糗糧乾糧也漢孔氏曰總諸國之兵而但稱魯人峙具楨榦道近也題曰楨旁曰榦言三郊三遂明東郊距守不峙甲戌日當築攻敵壘距堙之屬峙具楨榦無敢不供不供汝則有無餘之刑刑者非一也然亦非殺汝唐孔氏曰三郊三遂謂魯人三軍周禮司徒萬二千五百家為鄉司馬法萬二千五百人為軍小司徒云凡起徒役無過家一人是家出一人一郷為一軍天子六軍出自六郷則諸侯大國三軍亦當出自三郷也周禮又云萬二千五百家為遂遂人職云以歲時稽其人民簡其兵器以起征役則六遂亦當出六軍郷為正遂為副耳鄭衆云六遂之地在王國百里之外然則王國百里為郊鄉在郊内遂在郊外百里之國去國十里為郊則諸侯之制亦當鄉在郊内遂在郊外此言三郊三遂者三郊謂三鄉也蓋使三鄉之民分在四郊之内三遂之民分在四郊之外鄉近於郊故以郊言之鄉遂之民分在國之四面當有四郊四遂惟言三郊三遂者東郊留守不峙楨榦也楨謂當牆兩端者榦謂在牆兩邊者也上言甲戌我惟征徐戎此云甲戌我惟築期以至日即築兵法攻城築土為山以窺望城内謂之距堙左傳云晏弱城東牆而遂圍萊甲寅堙之杜預云堙土山也公羊傳楚子圍宋使司馬子反乗堙而窺宋城宋華元亦乗堙而出見之何休云堙距堙上城具也是攻敵城壘必有距堙築者築距堙之屬也無餘之刑言合家盡刑之不供楨榦雖是大罪未應縁坐盡及家人蓋亦權以脅之使勿犯耳漢孔氏曰郊遂多積茭芻供軍牛馬不多汝則亦有乏軍興之大刑陳氏曰說文云芻刈草也茭乾芻也唐孔氏曰上云無敢不逮無敢不供此云無敢不多文異者糗糧難備不得偏少故云無敢不逮楨榦易得惟恐缺事故云無敢不供芻茭賤物惟多為善故云無敢不多量事為文也林氏曰刑非聖賢所忍言至于用兵則不厭于三令五申所以重戎事全民命也尚書纂傳卷四十五
