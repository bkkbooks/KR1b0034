body:
  text: 尚書纂傳卷四十六元王天與撰秦誓第三十二周書秦穆公伐鄭晉襄公帥師敗諸崤還歸作秦誓漢孔氏曰遣三帥帥師往伐之蘇氏曰秦穆公名任好唐孔氏曰左傳僖三十年晉文公與秦穆公圍鄭鄭使燭之武說秦伯秦伯竊與鄭人盟使杞子逢孫楊孫戍之乃還三十二年把子自鄭使告于秦曰鄭人使我掌其北門之管若潜師以來國可得也穆公訪諸蹇叔蹇叔曰不可公辭焉召孟明西乞白乙使出師伐鄭漢孔氏曰崤晉要塞也以其不假道伐而敗之囚其三帥蘇氏曰晉襄公名驩文公子唐孔氏曰杜預云崤在𢎞農澠池縣西從秦向鄭路經晉之南境於南河之河崤闗而東適鄭左傳僖三十二年晉文公卒三十三年秦師及滑鄭商人弦髙將市備于周遇之矯鄭伯之命以牛十二犒師孟明曰鄭有矣不可冀也攻之不克圍之不繼吾其還也滅滑而還晉先軫請伐秦師襄公在喪墨衰絰夏四月敗秦師于崤獲百里孟明視西乞術白乙丙以歸漢孔氏曰晉舎三帥還歸秦穆公悔過作誓唐孔氏曰左傳又稱晉文公之夫人文嬴秦女也請三帥曰彼實構吾二君寡君若得而食之不厭君何辱討焉使歸就戮于秦以逞寡君之志若何公許之秦伯素服郊次向師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也公羊傳說此事云匹馬隻輪無反者左傳稱秦伯向師而哭則師亦少有還者唐孔氏曰史錄其辭作秦誓秦誓漢孔氏曰貪鄭取敗悔而自誓蔡氏曰今文古文皆有公曰嗟我士聽無譁予誓告汝羣言之首古人有言曰民訖自若是多盤責人斯無難惟受責俾如流是惟艱哉陳氏曰此首舉古人之言以為誓漢孔氏曰誓其羣臣通稱士也譁説見費誓漢孔氏曰衆言之本要漢孔氏曰言民之行已盡用順道是多樂應氏曰民猶言天下之人也凡人之情孰不知善之可為過之當改然悠悠度日多汨没於盤遊安樂之中歲月侵尋忽不知其已老矣盤之為樂以他篇觀之皆未有以為善者若曰盤遊無度不敢盤于遊田若是猶如此也人終自如此多為盤樂也漢孔氏曰人之有非以義責之此無難也若已有非惟受人責即改之如水流下是惟艱哉陳氏曰此數語皆古人之言我心之憂日月逾邁若弗云來惟古之謀人則曰未就予忌惟今之謀人姑將以爲親雖則云然尚猷詢兹黃髪則罔所愆畨畨良士旅力旣愆我尚有之仡仡勇夫射御不違我尚不欲惟截截善諞言俾君子易辭我皇多有之陳氏曰此述前日好惡之非而欲從今日好惡之是漢孔氏曰言我心之憂欲改過自新如日月並行過如不復云來雖欲改悔恐死及之無所益漢孔氏曰惟為我執古義之謀人謂忠賢蹇叔等也則曰未成我所欲反忌之耳蔡氏曰忌疾也漢孔氏曰惟指今事為我所謀之人我且將以為親而用之悔前違古從今以取破敗唐孔氏曰今之謀人蓋謂杞子之屬漢孔氏曰言前雖則有云然之過今我庶幾以道謀此黃髪賢老則行事無所過矣唐孔氏曰老人髪白而復黄漢孔氏曰勇武畨畨之良士雖衆力已過老我今庶幾欲有此人而用之蔡氏曰畨畨老貎良士謂蹇叔陳氏曰旅膂通用漢孔氏曰仡仡勇壯之夫雖射御不違我庶幾不欲用自悔之至蔡氏曰仡仡勇貎勇夫謂三帥漢孔氏曰惟察察便巧善為辯佞之言使君子囘心易辭我前多有之蔡氏曰截截辯給貎諞巧也諞言謂杞子吕氏曰穆公旣悔洞悟前非旅力旣愆之良士前日所詆墓木旣拱者也今乃以庶幾有之自多射御不違之勇夫前日所誇過門超乗者也今乃以庶幾不欲自喜截截諞言亦前日求之惟恐其少者也今乃厭惡其多方寸旣改羣動皆新舉秦之朝自此可以無事乎曰尊老貴德之心欲保養之而不復替也喜功生事之習欲防閑之而不復萌也憸邪讒佞之徒欲絶其本根而不復植也所當從事者方自此始昧昧我思之如有一介臣斷斷猗無他技其心休休焉其如有容人之有技若已有之人之彦聖其心好之不啻如自其口出是能容之以保我子孫黎民亦職有利哉人之有技冒疾以惡之人之彦聖而違之俾不達是不能容以不能保我子孫黎民亦曰殆哉邦之杌陧曰由一人邦之榮懷亦尚一人之慶陳氏曰此章申言用人得失之效漢孔氏曰以我揚昧昧思之不明也吕氏曰昧昧之思深潛篤至非浮輕略游意於膚革者也按此句孔說屬上文吕說屬下文要之承上起下黙然沉思如前我心之憂三句云漢孔氏曰如有束脩一介臣斷斷猗然專一之臣雖無他技藝其心休休焉樂善其如是則能有所容言將任之蔡氏曰介獨也大學作个斷斷誠一之貎云唐孔氏曰猗者足句之辭大學作兮猗是兮之類詩河水清且漣漪是也蔡氏曰技才也休休易直好善之意張氏曰樂正子為政孟子喜而不寐夫樂正子無彊力智慮多聞識所謂無他技也然其為人也好善優於天下是亦穆公之意也漢孔氏曰人之有技若已有之樂善之至也人之美聖其心好之不啻如自其口出心好之至也是人必能容之用此好技聖之人安我子孫衆人亦主有利哉言能興國蔡氏曰不啻如自其口出心之所好甚於口之所言也陳氏曰是大學作寔謂眞實能容非勉强也蔡氏曰職主也漢孔氏曰見人之有技藝蔽冒疾害以惡之人之美聖而違背壅塞之使不得上通冐疾之人是不能容人用之不能安我子孫衆人亦曰危殆哉蔡氏曰冒大學作媢忌也吕氏曰小人之於君子不惟疾之惡之違之而已必左右沮遏千慮百圖非使君子不能自達其心不厭蔡氏曰殆危也蘇氏曰至哉穆公之論前一人似房𤣥齡後一人似李林甫或問大學引秦誓何也朱子曰好善之利及其子孫不好善之禍流于後世亦由絜矩與否之異也漢孔氏曰杌陧不安言危也一人所任用國之傾危曰由所任不用賢張氏曰杌如木之動摇陧如阜之圮壞漢孔氏曰國之光榮為民所歸亦庶幾其所任用賢之善也穆公陳戒背賢則危用賢則榮自誓改前過之意陳氏曰榮如木之茂盛夏氏曰邦之不安由用一人如後所稱者邦之安榮亦賴一人之慶如前所稱者總說一篇意邵子曰穆公悔過之辭非止覇者之事幾於王道聖人所以録于書末薛氏曰詩美衞文而春秋正滅邢之罪書序秦穆而春秋貶秦晉之師觀于詩春秋可知矣按穆公敗崤之後文二年有彭衙之師三年有濟河之師七年有令狐之師十年有北徵之師十二年有河曲之師胡文定斷以為貪為忿是也而夫子取其書者蓋紀辭與紀事不同謂公能悔過實未必爾而其言有足為世明訓觀大學可見亦如平王忘親之讎穆王車轍馬跡皆未得為令王而其格言不可磨滅夫子定書取之以此或謂文侯之命夫子止存以寓貶而與秦穆又許與太深不無過論也總說費誓秦誓意漢孔氏曰諸侯之事而連帝王孔子序書以魯有治戎征討之備秦有悔過自誓之戒足為世法故録以備王事猶詩錄啇魯之頌尚書纂傳卷四十六
