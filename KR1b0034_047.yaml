body:
  text: 六經惟書最難讀去古既逺世人無唐虞三代聖賢心胸往往以其褊且薄者揣臆其寬大忠厚故非惟文義少通句讀亦未易曉自韓昌黎已目盤誥以聱牙近代大儒朱晦菴白首明經獨不為是完書意者返之於心而亦慨悼於世代人物之不可强合也惟場屋之士決得失於一夫承訛習舛而無所忌然亦時有見者舜禹授受十六字得徐景說演明之立政任準牧三事因陳行之而正釋者之誤特如此自不數數爾余猶及記長上言渡江建太學百年間陳徐二上舍始認得化商骨髓足以發先儒之不及它如皇極二字先儒固已盡發其祕由今逆數不作大中訓詁才三四十年爾士無真見實學詭隨苟且言之悶悶顧此時居官者恥貪墨用世者致雍熙後來諸儒出新意於箋解之外析精理于毫釐之間使人神馳意飽束閣古傳而貪吏滿天下華夏因以不競豈堯舜禹湯文武之精神不欲發抉之殆盡而言語文字之工固天地鬼神所共厭也科舉廢亦久矣士無繫纍蕩然失其所挾向時號為舉子進士今試使口誦本經不能以句此宜駸駸返乎醇朴惟吾友梅浦王君搜逺尋墜辛苦纂書傳晚又得鄉先生彭集齊往復考訂無復遺憾首尾十餘年而後就嗟乎君持此安求豈亦天實誘之與是書盛行為君必執典禮命討為臣必辨貨寶鞠謀在朝廷必眀目達聰在四方必棐彝率乂共鯀必流必殛馬牛必放必歸三風十愆必具訓六卿九牧必阜成其於世道銷方來而救已往淵哉百世之澤也嗟乎君將不自知其何心余自幼與君同研席世方重絢麗浮靡君為場屋文字徑赴直致宛然家人婦子語不事緣飾橫堅經意如月倒河雖繇此不偶于時然且連科洴澼盛譽流播光景更須臾君詎少一舉第哉夫昔之絢麗浮靡既竊取富貴去且為臭為腐矣徒使君有世道之責惓惓於此書故曰難平者事也余平生不泥傳注隨所藴輒言竭所言輒止講貫該洽以是愧君因君書傳成而俯仰悲欣於得喪之表竊獨以是冝家藏而人誦之也為述其梗槩置之卷末戊子長至日友人崔君舉謹書
