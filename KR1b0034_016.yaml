body:
  text: 尚書纂傳卷十六元王天與撰髙宗肜日第十五商書髙宗祭成湯有飛雉升鼎耳而雊祖己訓諸王作髙宗肜日髙宗之訓漢孔氏曰耳不聰之異雊鳴唐孔氏曰經言肜日有雊雉不知祭何廟鳴何處故序言祭成湯升鼎耳以足之陳氏曰雉野雞雄者有冠長尾身有文采善鬭鼎三足兩耳和五味之寶器吕氏曰災異有二等無道之君與天地隔絶不通至過惡彰著始出災異以警懼之其災異之應常遲賢君至誠與天地萬物為一體或有少過雖情性之差亦有災異其災異之應常速髙宗憲天工夫幾與天通故微有過失而飛雉之變隨見漢孔氏曰賢臣也以訓導諫王唐孔氏曰史敘其事作髙宗肜日髙宗之訓髙宗肜日唐孔氏曰此篇亦是訓也蔡氏曰今文古文皆有髙宗肜日越有雊雉祖已曰惟先格王正厥事唐孔氏曰史録其事以為訓王之端漢孔氏曰祭之明日又祭殷曰肜周曰繹於肜日有雉異孫氏曰肜有相尋不絶之意繹則取其尋繹而復祭也漢孔氏曰言至道之王遭變異正其事而異自消唐孔氏曰此經直云祖已曰不知與誰語鄭云謂其黨王肅云言于王下句始言乃訓于王此句未是告王之辭私言告人鄭説是也蔡氏曰格猶格其非心之格祖己言當先格王心之非然後正其所失之事惟天監民以下格王之言王司敬民以下正事之言乃訓于王曰惟天監下民典厥義降年有永有不永非天天民民中絶命民有不若德不聽罪天既孚命正厥德乃曰其如台蔡氏敘章指見上文漢孔氏曰祖己既言遂以道訓諫王言天視下民以義為常林氏曰天監視下民其禍福無常惟常主於義耳漢孔氏曰言天之下年與民有義者長無義者不長非天欲夭民民自不修義以致絶命鄭氏曰短折曰夭林氏曰髙宗之祀意者有祈年請命之意如漢武之於五畤八神歟故祖己先論壽天之理以義為主眉壽不可以禱祠而得夭折不可以禳禬而延惟能常厥義雖不祈年之永而自永矣蔡氏曰言民而不言君者不敢斥言也漢孔氏曰不順德言無義不服罪不改修天已信命正其德謂有永有不永蔡氏曰孚命者以妖孽為符信而譴告之欲其恐懼修省以正德也祖己意謂數祭豐昵徼福於神不若德也黷于祭祀傅説嘗以進戒意或吝改不聽罪也雉雊之異是天既孚命正厥德矣髙宗當因雊雉以自省不可謂適然而自恕也漢孔氏曰祖己恐王未受其言故乃復曰天道其如我所言新安王氏曰承上文言天既孚命以正其德矣民乃曰欲如我之願是猶僥幸於獲福避禍也亦愚矣按其如台三字商書凡四見孔氏之説頗合但乃曰非祖己之言合依王氏説嗚呼王司敬民罔非天胤典祀無豐于昵蔡氏敘章指見上文漢孔氏曰昵近也嘆以感王入其言王者主民當敬民事民事無非天所嗣祭祀有常不當特豐於近廟欲王因異服罪改修之林氏曰王之所職在於敬民民父天母地以生無非天之胤嗣故當敬之也應氏曰或謂髙宗昵於近親薄於祖廟故有鼎雉之異夫髙宗仁賢之君厚父薄祖豈為之乎祖己之意特謂王能敬民即所以敬天而佑助之理在其中不必區區厚於祖考之親以徼意外之福也吕氏曰傅説戒髙宗黷祭髙宗既領其言曰旨哉又許以克邁乃訓其後乃復有此病蓋人之氣質偏厚處最難變化方知行之果艱也總説一篇意蘇氏曰髙宗肜日之祭野雉鳴於鼎耳此為神告以宗廟祭祀之失審矣故祖己謂先格王心之非蓋武丁不専修人事數祭以媚神此失之大者故祖己先格而正之或者謂天災不可以象類求夫書曰越有雊雉足矣而又記其鳴於耳非以耳為祥乎人君於天下無所畏惟天可以警之今曰天災不可以象類求我自視無過則已矣為國之害莫大於此真氏曰蘇氏所謂以象類求者謂洪範五行之説也鳴不於他而於鼎耳蓋鼎者祭祀之器耳主聽聽不聰則災孽生焉漢儒之論災異大抵如此成帝時博士行大射禮有飛雉集于庭登臺而雊又集太常宗正丞相府御史車騎府又集未央宫承明殿御史大夫王音進言天地之氣以類相應譴告人主甚微而著雉者聽察先聞雷聲故經載髙宗雊雉之異以明轉禍為福之驗今以博士行禮之日大衆聚會飛集于庭歷階登堂歷三公之府典宗廟骨肉之官然後入宫其宿留告曉人具備雖人道相戒何以過是後帝使詔問音曰聞捕得雉毛羽頗類拘執者得無人為之音對曰安得此亡國之語不知誰主為此佞諂之計誣亂聖德如此漢去三代未逺一雉之異君臣相警如此故附著焉説髙宗之訓漢孔氏曰所以訓也亡林氏曰逸書與見存之書同序者若肆命徂后與伊訓同序髙宗之訓與此篇同序伊訓篇末加肆命徂后四字以見篇次當在是而遭秦大之逸也若以此為例則此篇之末當更有髙宗之訓四字蓋世久而失之尚書纂傳卷十六
