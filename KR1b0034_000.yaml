body:
  text: 御製書小序考謂劉歆班固誤以孔子纂書為序者出於蔡沈之集傳謂鄭元馬融王肅並云孔子作書序者出於孔頴達之疏頴達且謂為書作序不作詩序者此自或作或否無義例以余思之詩序既非夫子所作則書序亦定非夫子所作何言之使書序辭義精於詩序則為夫子所作或不可知今書序逺遜詩序朱子亦以為非夫子所作而馬端臨且謂詩序不可廢書序可廢是知書序乃出於漢儒所為徒以不能定其為誰且相傳已久未可擯棄耳蔡沈作書傳疏其可疑者附於卷末可稱具卓識而王天與尚書纂傳及監本尚書注疏仍列於前雖姑從漢孔氏之例然未免有擇焉不精之疵矣至我皇祖欽定書經傳説彚纂全録蔡沈攻駁書序之語復採朱子及諸儒糾正之説抉疑示的足為千古定案故兹不復贅論書序之非而特定書序為非夫子之作書於王天與纂傳之卷端乾隆戊戌年季春月欽定四庫全書經部二尚書纂傳書類提要臣等謹案尚書纂傳四十六卷元王天與撰天與字立大梅浦人大德二年以薦授臨江路儒學教授蓋天與為贑州路先賢書院山長時憲使臧夢解以是書申臺省得聞於朝故有是命也是書雖以孔安國傳孔穎達疏居先而附以諸家之解其大旨則以朱子為宗而以真德秀説為羽翼蓋朱子考論羣經以書屬蔡沈故天與以蔡氏傳為據德秀則書説精義以外復有大學衍義一書所言與虞夏商周之大經大法多相出入故天與亦備採之其注疏或刪或存亦以二家之説為斷自序所謂期與二先生合而已不敢以私意去取蓋道其實也所説於名物訓詁多有缺略而闡發義理則特詳亦王元杰春秋讞義之流亞也乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀尚書纂傳原序梅浦王氏尚書纂傳四十六卷先引漢唐二孔氏之説次收諸家傳注而一以晦菴朱子西山真氏為歸與其鄉先生彭翼夫往復考正十五年而後成大德中鄞入臧夢解為憲使以其書上於朝得授臨江路儒學教授其子振板行之豫所見者即至大鋟本也吉安自宋季文信公謀興復不遂被執以死其門人賔容咸以忠義自奮鄉曲之士多知自好恆絶意仕進潛心經義於易則有龍仁夫之集傳劉霖之太極圗解易本義童子説於詩則有劉瑾之通釋於禮則有彭絲之集説於春秋則有絲之辨疑李亷之會通書自梅浦而外則耕野王氏其撰述多有得者梅浦是書其抄撮也博其甄綜也簡其心似薄蔡氏而不攻其非間亦採托其説擇焉可謂精矣彭翼夫者嘗仕於宋為江陵府教授即絲之父也聞若稽古説三萬言又聞書解近年至四百家使人茫然孰何不識其所謂得王君纂傳如入武庫號萬色色具如逺遊半天下首路以歸如觀樂請止不願更有雖增多伏生吃吃三五十倍然比三萬若四百者而既少矣而又無不明與不逮也是可嘉也每憶咸淳初諸老薦徐幾經筵第一義論人心道心以為人心惡幾也余歎曰有是哉以其在理欲之間也故危槩以為惡則過矣亦何所附麗以為道心哉侍御史陳千峰聞吾言是之幾以是論去又後數年過金陵入明道書院讀真西山所為記記首二語則亦幾説也蓋駭然為之愧悔自失是幾亦有所本也懼哉以此明民猶有出于金口木舌之外者故知食不厭精而膾不厭細君纂傳多西山氏已得彼復遺此耶或謂君有功於纂擇政在此橫艾執徐之二月廬陵劉辰翁書梅浦王君立大書纂傳成集齋先生為之序而又俾余贊一語余於立大十年以長居相鄰世相好也猶及記其垂髫頴脫泉涌千里駒不是過既冠章甫籍籍有場屋聲一時從之遊者膏殘馥賸無不意滿而袁臂數竒竟出諸妄校尉下衆猶以器晚俟之梅浦於是息意科舉之學研精覃思博采詳説纂為此書勤亦至矣鄉使業舉子時龍躍虎變摶扶搖而上者九萬里則功業逐日以新未必有暇著述由今而觀發百篇之奧緼集四百氏之大成私淑諸人垂訓來世其視夫收科膴仕甘與草木俱腐者又孰為得失也近有善評紫陽謂其山林之日長學問之功深輒借斯言挂名傳末若其傳中大義數十微顯闡幽有先儒所未到覽者宜自得之故不書丙戌暮春友人劉坦謹述書繇伏傳孔注若疏至近代博矣唐虞三代遼哉邈乎上遡三千五百餘年而聖賢心至今猶在者書在焉故也書藴奧難見而庶幾可探討而見者諸家説在焉故也如余習讀時尤愛鞏氏抄東萊説開卷初首引伊川發明欽字義以為理學精微當年闡自伊洛後讀書者如欲求書旨到親切的當處舍是宜何折𠂻久之又讀紫陽西山二先生所考釋與所記衍竊知其淵源上出伊洛之正發經義理惠淑後學又至矣乎惜其未成全書於百篇或開繹之而未竟微言粹旨之别見者世亦莫有能考而會之一梅浦王兄立大專勤力學用工於是經者有年間與余言今解者多矣眩於多而莫適為之決擇則將焉據為是竭其聞見心思之力考諸衆説畢具而余知其纂類統有宗者逺托伏生二孔之訓詁義疏近據紫陽西山之考釋記衍雖其説之散在文集語餘者一旦煥然靡不會粹於其中而諸家説有合而弗畔者一凖此類取焉然後由博歸約而一經大義至是益以彪炳蓋嘗讀之嘉其編摩之力匪易足慰余夙昔之所有志而未償者遂以余初與兒曹録前輩説附之及管見一二以備商榷嗟乎百代而上世逺迹陳而得其説者猶因是獲窺聖賢用心之萬一可幸也已運會以逝思古之人巍冠講論事付之一慨抑就此書人人玩味無不切己者斯言何謂與其藏諸家孰之私孰若廣而流布與四方同志之士切磋之以無忘往訓適有諗梅浦刻諸梓以傳者意媺益甚余復為之慫慂敘其説於帙之初友人彭應龍翼夫敬書愚少從師取友讀尚書審問明辨亦既有年追維百篇之義繇伏生傳二孔注疏暨數百家解釋富矣晦菴先生於易於詩皆有訓傳獨於書晚年屬之蔡九峰二典禹謨親所訂定其貢舉私議則曰諸經皆以注疏為本書則兼取劉王蘇程楊朝葉吳薛吕其與門人答問則如林如史如曾如李如陳各取其長西山先生讀書記纂三十餘篇大學衍義講數十餘條愚嘗稽首敬嘆曰古今傳書者之是非至晦菴先生而遂定晦菴先生折𠂻傳書者之是非至西山先生而愈明學者不於二先生乎據將焉據乃本二先生遺意作尚書纂傳其條例則先二孔氏説者崇古也有未當則引諸家説評之有未備則引諸家説足之説俱通者並存之間或以臆見按之大要期與二先生合而已愚亦安敢以私意見去取哉且愚之編此特示兒振耳積日纍月而編始就就矣未敢自安乙亥冬擕是編偕振求是正於集齋彭先生先生首肯增廣挍定凡若干條往復究竟十四五載且慫慂流布以與四方同志共切磋之先生以是經擢巍科視富貴如浮雲不鄙末學是講是迪使帝王遺書昭如日月愚父子之幸也晦菴西山二先生所望於後來者其庶幾乎庸是俾振鋟之梓云戊子春仲吉之安成後學王天與謹識
