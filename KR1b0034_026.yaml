body:
  text: 尚書纂傳卷二十六元王天與撰微子之命第十周書成王既黜殷命殺武庚命微子啓代殷後作微子之命吕氏曰黜殷命殺武庚皆周公東征時事序言成王者發周公尊王之意見禮樂征伐自天子出漢孔氏曰命為宋公為湯後吳氏曰微子之封宋蓋在武王時此書乃爵為上公申命之書史記世家言周公既承成王命誅武庚乃命微子啓代殷後奉其先祀作微子之命以申之其説為是唐孔氏曰史敘其事作微子之命微子之命漢孔氏曰封命之書稱其本爵以名篇林氏曰微子殷之爵今既封宋當曰宋公之命而曰微子之命蓋微子未嘗有臣周之意成王亦未有臣之之心亦猶箕子雖封於朝鮮而猶稱箕子也蔡氏曰今文無古文有王若曰猷殷王元子惟稽古崇德象賢統承先王修其禮物作賔于王家與國咸休永世無窮陳氏曰此首言命微子為殷後之意漢孔氏曰微子帝乙元子王若曰説見盤庚猷説見大誥吕氏曰言元子明其當立也漢孔氏曰惟考古典有尊德象賢之義言今法之吕氏曰崇德如封夏之後所以崇禹之德封商之後所以崇湯之德象賢謂擇其後嗣象其先王之賢者封之漢孔氏曰言二王之後各修其典禮正朔服色與時王並通三統唐孔氏曰郊特牲云天子存二代之後猶尊賢也尊賢不過二代禮運云杞之郊也禹也宋之郊也契也是二王後皆郊天以其祖配之鄭云所存二王後者命使郊天以天子禮祭其始祖受命之王自行其正朔服色新安王氏曰除正朔之外不用時王之制度而用其舊法漢孔氏曰為時王賔客與時偕美長世無竟陳氏曰作賔謂先代之後有不純臣之義如為賔客然書言虞賔詩言有客是也左氏傳皇武子曰宋先代之後也於周為客天子有事燔焉有喪拜焉吕氏曰後世滅人之國惟恐苗裔之存為子孫害今乃欲其與國齊休永世無窮見用心之廣大忠厚也嗚呼乃祖成湯克齊聖廣淵皇天眷佑誕受厥命撫民以寬除其邪虐功加于時德垂後裔陳氏曰此述湯之德應上文崇德之意漢孔氏曰言汝祖成湯能齊德聖達廣大深逺澤流後世蔡氏曰齊肅也齊則無不敬聖則無不通廣言其大淵言其深漢孔氏曰大天眷顧湯佑助之大受其命謂天命漢孔氏曰撫民以寬政放桀邪淫蕩之德吕氏曰傳記多論湯尚嚴商先罰皆不知治體者仲虺稱湯曰克寬克仁則湯開創六百年之業正在於寬所謂尚嚴先罰其亦不考於經歟又曰撫民以寬乃湯有天下規模寬之一字百世不可易漢孔氏曰言湯立功加於當時德澤垂及後世裔末也朱子曰裔衣裾之末衣之餘也故以為子孫之稱爾惟踐修厥猷舊有令聞恪慎克孝肅恭神人豫嘉乃德曰篤不忘上帝時歆下民祗協庸建爾于上公尹兹東夏陳氏曰此述微子之賢應上文象賢之意漢孔氏曰汝微子能踐湯德久有善譽昭聞逺近蔡氏曰踐履修舉猷道也陳氏曰舊猶素也聞聲譽聞於人也令聞善譽也吕氏曰令聞非自外來反求於身踐履所至充實輝光自然彰著其來舊矣漢孔氏曰言微子敬慎能孝嚴恭神人故我善汝德謂厚不可忘張氏曰恪慎在心肅恭在貌克孝內也故言恪慎神人外也故言肅恭漢孔氏曰孝恭之人祭祀則神歆享施令則人敬和用是封立汝於上公之位正此東方華夏之國宋在京師東真氏曰恪慎克孝是事親以敬肅恭神人是事神治人皆以敬敬以事神故上帝時歆敬以治人故下民祗協古者聖賢惟於敬用功而已馬氏曰公有二有三公之公在內而相王者也有公侯伯子男之公封建而分治者也封建者惟二王後乃稱公魯衛齊晉止侯爵朱子曰宋地在禹貢徐州泗濵西及豫州孟諸之野商都亳宋都商丘皆在應天府亳州界欽哉往敷乃訓慎乃服命率由典常以蕃王室𢎞乃烈祖律乃有民永綏厥位毗豫一人世世享德萬邦作式俾我有周無斁嗚呼往哉惟休無替朕命陳氏曰此皆戒勉之辭應上文統承先王至永世無窮之意漢孔氏曰敬哉敬其為君之德往臨人布汝教訓慎汝祖服命數循用舊典無失其常以蕃屏周室戒之真氏曰微子既篤於敬矣猶以欽哉勉之欲其敬而又敬也往敷乃訓欲其以修於己者布其教於國人也陳氏曰服猶被服之服命即所告之命謹汝所被之命也與享明乃服命之意同循行典常之道以蕃衛王室蕃與藩同屏也諸侯之衛王國猶藩屏然漢孔氏曰大汝烈祖成湯之道以法度齊汝所有之人則長安其位以輔我一人言上下同榮慶李氏曰律謂整齊之也毗輔也漢孔氏曰微子纍世享德不忝厥祖雖同公侯而特為萬國法式汝世世享德則使我周好汝無厭蔡氏曰即詩言在此無斁之意漢孔氏曰嘆其德遣往之國言當惟為美政無廢我命陳氏曰嘆而申戒之休即上文咸休之休上文皆朕命也蘇氏曰方武庚叛後而封微子微子蓋處可疑之地而命之曰上帝時歆曰𢎞乃烈祖曰萬邦作式此三代之事後世所不及也吕氏曰武庚之變成功甚難今略無一言及此怡然氣象和平蓋殺武庚自是武庚事封微子自是微子事天命天討各無容心又曰大誥之書皆義氣微子之命皆和氣新安王氏曰泰誓牧誓言紂之失至于再三與周之友邦征士言也酒誥言紂之失詳周君臣相與言也多士多方言紂之失略與殷之遺民言也微子之命並不及紂之事止言湯之聖微子之賢其言有體也哉唐叔得禾異畝同穎獻諸天子王命唐叔歸周公于東作歸禾漢孔氏曰唐叔成王母弟食邑內得異禾也穎穗也禾各生一壟而合為一穗拔而貢之陳氏曰唐叔名虞漢孔氏曰異畝同穎天下和同之象周公之德所致周公東征未還故命唐叔以禾歸周公唐叔後封晉亡周公既得命禾旅天子之命作嘉禾漢孔氏曰已得唐叔之禾遂陳成王歸木之命而推美成王天下和同政之善者故周公作書以嘉禾名篇告天下亡三山陳氏曰此天地之和氣所以彰成王周公君臣之際始疑終信之意也二書雖亡觀其序宛然有唐虞賡歌之意當成王之疑也而禾為之偃及其啓金縢之書也而禾為之起及其君臣之心既已相得也禾為之合穗一禾而三致意焉周公之忠誠蓋與天通有以見天人之果無二理也尚書纂傳卷二十六
