body:
  text: 尚書纂傳卷四十一元王天與撰君牙第二十七周書穆王命君牙爲周大司徒作君牙漢孔氏曰穆王康王孫昭王子君牙臣名唐陸氏曰穆王名滿君牙或作君雅唐孔氏曰命君牙為大司徒之卿吕氏曰舜命契纔一語而君牙命書至一篇世降文勝也然周家典刑文獻多在焉唐孔氏曰史錄其冊書作君牙篇君牙唐孔氏曰君牙亦命也蘇氏曰今文無古文有王若曰嗚呼君牙惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常惟予小子嗣守文武成康遺緒亦惟先王之臣克左右亂四方心之憂危若蹈虎尾渉于春氷今命爾予翼作股肱心膂纉乃舊服無忝祖考𢎞敷五典式和民則爾身克正㒺敢弗正民心㒺中惟爾之中夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨厥惟艱哉思其艱以圖其易民乃寧陳氏曰此首以祖父之勞告君牙而勉以盡職漢孔氏曰稱其名而命之漢孔氏曰言汝父祖世厚忠貞服事勤勞王家其有成功見紀録書於王之太常以表顯之王之旌旂畫日月曰太常鄭氏曰紀載也吕氏曰世臣與國升降者也重光奕休之世必有世篤忠貞之族同休共戚功名隱然為社稷之鎮其後嗣王亦再三嘆頌之而不忘是非隆門閥進膏粱也念舊紀功忠厚之澤所以長苟喜新厭故則典刑墜地而國從之此欒郤胥原降為皂𨽻叔向所以憂晉之將亡也觀穆王惓惓君牙之祖父周厯其未艾乎漢孔氏曰惟我小子繼守先王遺業亦惟父祖之臣能佐助我治四方言已無所能張氏曰嗣之欲其不絶守之欲其不失漢孔氏曰言祖業之大已才之弱故心懷危懼虎尾畏噬春氷畏䧟危懼之甚陳氏曰蹈履也漢孔氏曰今命汝為我輔翼股肱心體之臣言委任陳氏曰膂脊骨也張氏曰作股肱膂者欲外竭其力作心者欲内竭其謀漢孔氏曰繼汝先祖故所服忠勤無辱累祖考之道蔡氏曰舊服忠貞服勞之事也林氏曰君牙祖考其累世為司徒若鄭武公父子歟吕氏曰穆王守文武成康之緒君牙亦守祖父之緒者也穆王方自懼不克承故亦勉君牙無忝祖考各欲保其世業君臣蓋一體也漢孔氏曰大布五常之敎用和民令有法則蔡氏曰𢎞敷者大而布之也式和者敬而和之也則有物有則之則君臣之義父子之仁夫婦之别長幼之序朋友之信是也典以設敎言故曰𢎞敷則以民彝言故曰式和此司徒之敎漢孔氏曰言汝身能正則下無敢不正民心無中從汝取中必當正身示民以中正蔡氏曰正也中也民則之體而人之所同然也正以身言欲其所處無邪行也中以心言欲其所存無邪思也孔子曰子帥以正孰敢不正周公曰率自中此告君牙以司徒之職也陳氏曰於身先言爾於心先言民互文也按中正字義已見大禹謨詳此處意謂端化率民者固在其身踐履之正又須即心體認就正而求其中自危㣲精一十六字傳心之後有德無常師一十六字又有此十六字說身心中正至為端的然帝舜已以罔干于正民協于中對言其淵源粹矣漢孔氏曰夏月暑雨天之常道小民惟曰怨嘆咨嗟及冬大寒亦天之常道民猶怨咨天不可怨民猶怨嗟治民其惟艱哉當思慮其難以圖其易民乃寧蔡氏曰祁大也蘇氏曰方周之盛越裳氏來朝曰久矣天之無疾風暴雨也中國其有聖人乎方是時四夷之民莫不戴王雖風雨天事非人力者亦歸德於王及其衰也一寒一暑亦惟王之怨故聖人以民心為存亡一失其心無動而非怨者吕氏曰此穆王深知民之艱難也時方暑雨小民之沾體塗足者殆其怨咨乎不以處廣厦而忘之也時方祁寒小民之裂面墮指者殆其怨咨乎不以處温室而忘之也穆王一遇寒暑深軫民瘼如此司徒兼敎養之職故又以養民之難告之按司徒掌五典亦大綱耳以周禮考之如以鄉三物敎民頒職事十有二登萬民本俗六安萬民之類不一則豈惟敎五典其敎以安養之事亦多有節目知此則思艱圖易亦是敎中道理嗚呼丕顯哉文王謨丕承哉武王烈啓佑我後人咸以正罔缺爾惟敬明乃訓用奉若于先王對揚文武之光命追配于前人陳氏曰此繼以文武之訓告君牙而勉以明其敎漢孔氏曰嘆文王所謀大顯明武王業美大可承奉文武之謀業大明可承奉開助我後嗣皆以正道無邪缺夏氏曰文王之謨非以隂謀取天下如後世謀人國家者乃顯然著見但知積行累功而天下自歸之故曰丕顯武王之功乃承文王之意亦惟積行累功而天命人心自有不可却者初非計其功之至此故曰丕承由其謨非隂謀而出於丕顯烈非邀功而出於丕承是以其道粹然一出於正若一有隂謀邀功之私介其間則必有不正者矣安得而無缺漢孔氏曰汝惟當敬明汝五敎用奉順於先王之道當荅揚文武先明之命君臣各追配於前令名之人吕氏曰敬明云者以君牙生長典刑之内懼其或玩故欲其提起而發揮之張氏曰先王指成康而言文武光命卽謨烈也前人指君牙父祖也陳氏曰追者繼於後而及之也王若曰君牙乃惟由先正舊典時式民之治亂在兹率乃祖考之攸行昭乃辟之有乂夏氏曰申結一篇之意漢孔氏曰汝惟當奉用先正之臣所行故事舊典文籍是法民之治亂在此而已用之則民治廢之則民亂漢孔氏曰言當循汝父祖之所行明汝君之有治功吕氏曰穆王諄諄告君牙家法夫豈狹以專門之學乎蓋名臣之後要必先識其祖考之規模風烈近而祖考之法猶不之省於逺者何有蔡氏曰此篇專以君牙祖父為言曰纉舊服曰由舊典曰無忝曰追配曰由先正舊典曰率祖考攸行然則君牙之祖父嘗任司徒之職而其賢可知矣惜載籍之無傳也陳氏云康王時芮伯為司徒君牙豈其後乎尚書纂傳卷四十一
