body:
  text: 尚書纂傳卷二十四元王天與撰金縢第八周書武王有疾周公作金縢唐孔氏曰武王有疾周公作䇿書告神請代武王死事畢納書於金縢之匱及為流言所謗成王悟而開之史敘其事乃作此篇非周公作也陳氏曰武王兄周公弟也周公名旦食采於周地在岐邦之内公爵也後封於魯諡文公金縢漢孔氏曰遂以所藏為篇名唐孔氏曰金縢自為一體祝亦誥辭也朱子曰金縢之作在周公東征而歸之後以其記武王時事且備東征本末故敘於此蔡氏曰今文古文皆有既克商二年王有疾弗豫二公曰我其為王穆卜周公曰未可以戚我先王公乃自以為功為三壇同墠為壇於南方北面周公立焉植璧秉珪乃告大王王季文王唐孔氏敘章指見篇末漢孔氏曰伐紂明年武王有疾不悦豫漢孔氏曰穆敬戚近也召公太公言王疾當敬卜吉凶周公言未可以死近我先王蔡氏曰古國有大事卜則公卿大夫百執事皆在誠一而和同以聽卜筮故曰穆卜林氏曰戚憂也潘博士云父母唯其疾之憂宜存亡之所同也故為王穆卜則戚我先王矣是也漢孔氏曰周公乃自以請命為己事因大王王季文王請命于天故為三壇壇築土墠除地大除地於中為三壇吳氏曰壇髙而墠卑髙者設神明之位於其上卑者以供奔走之役於其下壇同一墠廣其地以容之耳漢孔氏曰立壇上對三王唐孔氏曰周公北面則三壇南面可知禮授坐不立授立不坐欲其髙下均也神位在壇故周公立壇上對三王也鄭云時為壇墠於豐壇墠之處猶存焉漢孔氏曰璧以禮神植置也置於三王之坐周公秉桓圭以為贄告謂祝辭蔡氏曰二公不過卜武王之安否耳而周公愛兄之切危國之至忠誠懇懇於祖父之前如下文所云者有不得盡焉此其所以自以為功也又二公穆卜則必用朝廷卜筮之禮如此則上下喧騰人心摇動故周公不於宗廟而特為壇墠以自禱也史乃册祝曰惟爾元孫某遘厲虐疾若爾三王是有丕子之責于天以旦代某之身予仁若考能多材多藝能事鬼神乃元孫不若旦多材多藝不能事鬼神乃命于帝庭敷佑四方用能定爾子孫于下地四方之民罔不祗畏嗚呼無墜天之降寶命我先王亦永有依歸今我即命于元龜爾之許我我其以璧與珪歸俟爾命爾不許我我乃屏璧與珪唐孔氏敘章指見篇末漢孔氏曰史為册書祝辭元孫武王某名臣諱君故曰某厲危虐暴也唐孔氏曰某即發也泰誓牧誓不諱發而此獨諱之鄭𤣥云諱之者由成王讀之也意成王開匱得書至此字改為某故史官録為此篇因遂承王所讀而諱之唐陸氏曰遘遇也吕氏曰常人疾皆自致惟聖人道德充足血氣和平節宣衛養皆適其宜偶與天地之戾氣相遇而得虐害之疾耳漢孔氏曰大子之責謂疾不可救於天則當以旦代之蘇氏曰死生有可相代之理而世多疑之予觀近世匹夫匹婦為其父母發一至孝之心足以動天地感鬼神多矣况周公乎且周公之禱非徒弟為兄臣為君也乃為天下為先王禱也世之所以疑者以己之多偽而疑聖人之不情耳漢孔氏曰我周公仁能順父又多材多藝能事鬼神言可以代武王之意薛氏曰若如也與不若旦之若同義漢孔氏曰汝元孫受命于天庭為天子布其德教以佑助四方言不可以死鄭氏曰武王所不能者林藝也所能者敷佑四方也材藝但指服事役使而言漢孔氏曰言武王用受命帝庭之故能定先人子孫於天下四方之民無不敬畏張氏曰下地對上天而言四方之民以武王在上皆有祗畏之心天下方定民心易摇武王於是而死事未可知蓋大位姦之窺也危病邪之伺也其敢保四方之祗畏乎異時三監之叛周公之先見微矣朱子曰周公金縢中乃立壇墠一節分明是對鬼若爾三王有丕子之責于天以旦代某之身此一段只有晁以道説得好他解丕子之責如史傳中責其侍子之責蓋云上帝責三王之侍子侍子指武王也上帝責其來服事左右故周公乞代其死云以旦代某之身予仁若考至罔不祗畏言三王若有侍子之責于天則不如以我代之我多材多藝能事上帝武王不若我多材藝不能事鬼神不如且留他在世上定你之子孫與四方之民文意如此伊川却疑周公不應自說多材多藝不是如此他止是要代武王之死爾漢孔氏曰嘆息武王言不救則墜失天之寶命救之則先王長有依歸蔡氏曰寶命即帝庭之命謂之寶者重其事也漢孔氏曰就受三王之命於大龜卜知吉凶漢孔氏曰許謂疾瘳待命當以事神不許謂不愈也屏藏也言不得事神薛氏曰許我謂許我代王之請也吕氏曰此非與三王為要約也周公誠意之至自及於此蔡氏曰所欲以身代其死者在我者也在我者可必而在天者不可必故曰爾其許我不許我其稱爾稱我無異人子之在膝下以語其親者此亦不死其親之意也乃卜三龜一習吉啓籥見書乃并是吉公曰體王其罔害予小子新命于三王惟永終是圖兹攸俟能念予一人公歸乃納册于金縢之匱中玉翼日乃瘳唐孔氏敘章指見篇末漢孔氏曰以三王之龜卜一相因而吉吕氏曰三王之前各有一龜習吉説見大禹謨漢孔氏曰三兆既同吉開籥見占兆書乃亦并是吉唐孔氏曰鄭元云籥開藏之管也漢孔氏曰公視兆曰如此兆體王其無害言必愈唐孔氏曰周禮卜筮君占體鄭云體兆象也尊者視兆象而已張氏曰周公為王占體非僭也蓋王方在病中上相代王如此漢孔氏曰周公言我小子新受三王之命武王惟長終是謀周之道言武王愈此所以待能念我天子事成周道蘇氏曰此所俟者三王能念我一人武王言俟其疾愈也即上文所謂歸俟爾命也漢孔氏曰從壇歸瘳差也唐孔氏曰金縢之匱則金縢是匱之名也縢是束縛之義藏之於匱緘之以金若今釘鐷之不欲使人開也王氏曰古者卜筮畢而不敢䙝必藏其册書異時有大卜則復啓焉乃國家故事非特為此匱藏其册以為後世自解之計也武王既喪管叔及其羣弟乃流言於國曰公将不利於孺子周公乃告二公曰我之弗辟我無以告我先王周公居東二年則罪人斯得于後公乃為詩以貽王名之曰鴟鴞王亦未敢誚公秋大熟未穫天大雷電以風禾盡偃大木斯抜邦人大恐王與大夫盡弁以啟金縢之書乃得周公所自以為功代武王之説二公及王乃問諸史與百執事對曰信噫公命我勿敢言王執書以泣曰其勿穆卜昔公勤勞王家惟予沖人弗及知今天動威以彰周公之德惟朕小子其新逆我國家禮亦宜之王出郊天乃雨反風禾則盡起二公命邦人凡大木所偃盡起而築之歲則大熟唐孔氏敘章指見篇末漢孔氏曰武王死周公攝政其弟管叔及蔡叔霍叔乃放言於國以誣周公以惑成王孺稚也稚子成王邵子皇極經世書紀武王己卯伐商踐天子位至七年乙酉崩家語曰武王崩時成王十二嵗史記曰武王兄弟十人長伯邑考次武王次管叔鮮周公旦蔡叔度霍叔處曹叔振鐸成叔武其康叔封聃季載皆少未封武王克殷立紂子武庚禄父於故都以為殷後大建親賢以藩屏王室周公以聖德留輔相朝廷分商畿内地封管叔蔡叔霍叔監武庚治殷民號三監武王崩成王幼沖周公位冢宰正百工管叔及蔡叔霍叔乃流言於國曰周公將為成王之不利奪其位而有之馬氏曰流言謂以無根之言流布於國中朱子曰此即大誥所謂三監及淮夷叛也意其稱兵舉事必以誅周公為辭若王敦之於刁協劉隗耳漢孔氏曰辟法也告召公太公言我不以法法三叔則我無以成周道告我先王唐陸氏曰辟馬鄭音避謂避居東都或問周公之誅管蔡與伊尹之放太甲皆聖人之變惟其至誠無愧正大明白故行之不疑未可以淺俗之心窺之也此辟字與蔡仲之命所謂致辟之辟同安得以為避且使周公委政而去不幸成王終不悟小人得以乘間而入則周家之禍可勝言哉周公是時不知何以告先王也觀公告二公之言正大明白至誠惻怛則區區嫌疑不敢避矣惟此心無愧而後先王可告也自潔其身而為匹夫之諒周公豈為之哉朱子荅曰辟字當從古註龜山楊氏曰周公誅管蔡為時中漢孔氏曰周公既告二公遂東征之二年之中罪人此得陳氏曰周公為東伯東諸侯之不軌其職自得專征朱子曰周公東征不必言用權王室至親與諸侯連衡背叛當國大臣豈有坐視不救之理帥師征之乃是正義不待可與權者而後能也唐孔氏曰詩東山之篇歌此事也云自我不見于今三年又云三年而歸此言二年者詩言初去及來凡經三年此直數居東之年除其去年故二年也惟言居東不知居在何處王肅云東洛邑也管蔡與商奄共叛故東征鎮撫之案驗其事二年之間罪人皆得漢孔氏曰成王信流言而疑周公故周公既誅三監而作詩解所以宜誅之意以遺王王猶未悟故欲讓公而未敢朱子曰鴟鴞之詩大意告王以王業艱難不可毁壞之意鄭氏曰誚責讓也漢孔氏曰二年秋也蒙恒風若雷以威之故有風雷之異風災所及邦人皆大恐鄭氏曰偃仆也漢孔氏曰皮弁質服以應天所藏請命册書本史百執事皆從周公請命唐孔氏曰皮弁是視朝服每日常服白布衣素績裳王見此變與大夫盡弁以開金縢之書省案故事求變異所由林氏曰啓緘之際猶未卜而得往者周公之説於匱中蓋因卜而偶得之蔡氏曰周公卜武王之疾二公未必不知之周公册祝之文二公蓋不知也諸史百執事蓋卜筮執事之人成王使卜天變者即前日周公使卜疾之人也漢孔氏曰史百執事言信有此事周公使我勿道今言之則負周公噫恨辭唐孔氏曰周公忠心欲代武王死非是規求名譽故不用使人知之漢孔氏曰本欲敬卜吉凶今天意可知故止之穆卜説見上文林氏曰觀其得書而止卜乃知其為卜而啓縢非為周公而啓也漢孔氏曰言已童幼不及知周公昔日忠勤林氏曰周公尚欲以身代而父之死其肯不利於嗣子乎漢孔氏曰發風雷之威以明周公之聖德漢孔氏曰周公以成王未悟故留東未還改過自新遣使者迎之亦國家禮有德之宜唐陸氏曰新逆馬本作親迎蔡氏曰親誤作新正猶大學新誤作親也親迎公以歸於國家之禮亦宜也漢孔氏曰郊以玉幣謝天天即反風起木明郊之是漢孔氏曰木有偃拔起而立之築有其根禾木無虧百穀豐熟周公之德張氏曰成王疑則為雷為電為風為偃禾拔木成王悔則為雨為反風為起木為大熟人之處心可少差乎此君子所以慎其獨也總説一篇意唐孔氏曰發首至王季文王史敘将告神之事也史乃册祝至屏璧與珪告神之辭也自乃卜至乃瘳言卜吉告王差之事也自武王既喪以下敘周公被流言東征還反之事也尚書纂傳卷二十四
