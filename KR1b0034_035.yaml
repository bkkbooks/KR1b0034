body:
  text: 尚書纂傳卷三十五元王天與撰立政第二十一周書周公作立政漢孔氏曰周公既致政成王故以立政為戒吕氏曰無逸立政二篇相為經緯以無逸之心明立政之體君道備矣唐孔氏云云説見咸有一德序立政陳氏曰取篇内立政二字為名孫氏曰立政在于任賢故皆以任官得人為言葛氏曰此誥體也蔡氏曰今文古文皆有周公若曰拜手稽首告嗣天子王矣用咸戒于王曰王左右常伯常任準人綴衣虎賁周公曰嗚呼休兹知恤鮮哉張氏曰此章首言小大近臣所闗甚重漢孔氏曰盡禮致敬告成王言嗣天子今已為王矣唐孔氏曰周公既拜手稽首而後發言還自言拜手稽首示已重其事欲令受其言召誥云拜手稽首旅王若公亦是召公自言已拜手稽首與此同也王肅以為于時周公㑹羣臣共戒成王其言曰拜手稽首者是周公賛羣臣之辭林氏曰嗣天子嗣世為天子也繼天作子謂之天子君臨天下謂之王漢孔氏曰周公用王所立政之事皆戒于王曰常所長事常所委任謂三公六卿準人平法謂士官綴衣掌衣服虎賁以武力事王皆左右近臣冝得其人蘇氏曰王左右有牧民之長曰常伯有任事之公卿曰常任有守法之有司曰準人此三事之外則有掌服器者曰綴衣執射御者曰虎賁此䙝御也非獨三事當擇人此䙝御者亦當擇人吕氏曰常伯常任準人即下文所謂三宅三事也以文意考之固知其任大體重然他書無所見意者公卿輔相之别名歟綴衣虎賁于侍御僕從中錯舉二者以見其餘耳要之常伯常任準人議政而在左右者也綴衣虎賁共役而在左右者也尊卑雖有閒然職重者有安危之倚職親者有染習之移其係天下之本一也漢孔氏曰嘆此五者立政之本知憂得其人者少吕氏曰常伯常任準人之官豈徒髙位重禄而已彌綸康濟其職葢甚休也綴衣虎賁之官豈直頥指氣使而已薰陶移養其職葢甚休也其職之休如此其可恬不加恤使非其人處之乎古之人迪惟有夏乃有室大競籲俊尊上帝迪知忱恂于九德之行乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃準兹惟后矣謀面用丕訓德則乃宅人兹乃三宅無義民桀德惟乃弗作往任是惟暴德罔後吕氏曰周公既嘆知恤者鮮復歴舉知恤者以告首論夏之興亡漢孔氏曰古之人道惟有夏之時唐孔氏曰室猶家也吕氏曰求賢任官世主曷嘗不誦此語然名為之非實蹈之也古之人允蹈乎此者惟有夏也蘇氏曰競彊也夏后之世王室所以大彊者以求賢為事天之實也葉氏曰夏商周或言尊上帝或言丕釐上帝之耿命或言敬事上帝一也漢孔氏曰九德臯陶所謀陳氏曰恂信也吕氏曰迪知者蹈知而非苟知忱恂者誠信而非輕信知之深則信之篤也自臯陶以九德授禹夏之先后世守之以為知人之法漢孔氏曰乃敢告教其君以立政君矣亦猶王矣皆得其人則此惟君矣吕氏曰夏臣見其君如此乃敢告教以圖任之要始焉拜手稽首而曰后矣者敬告以為君之難也終焉歴叙事牧準而曰兹惟后矣者申告以為君之實也事牧準即常伯常任準人為治之體統係焉宅是三者人君之事畢矣周公之戒成王自綴衣虎賁之外其禮其辭與夏略同然則以圖任三宅為人君之職者三代告君之常法也表親近之職使人君不敢輕者周公養源之精意也漢孔氏曰謀所面見之事無疑則能用大順德乃能居賢人于衆官陳氏曰訓順也宅人之要必謀以詢于人面以審于己用其大順于德者乃可宅人吴氏曰彼夏之三宅皆用有德此乃三宅曽無義民謂皆不義之人指桀言也漢孔氏曰桀之為德惟乃不為其先王之法往所委任是惟暴德之人故絶世無後吕氏曰桀之惡德弗作往日任用往惟俊德是任故有室大競桀惟暴德是任故絶世無後亦越成湯陟丕釐上帝之耿命乃用三有宅克即宅曰三有俊克即俊嚴惟丕式克用三宅三俊其在商邑用協于厥邑其在四方用丕式見德嗚呼其在受德暋惟羞刑暴德之人同于厥邦乃惟庶習逸德之人同于厥政帝欽罰之乃伻我有夏式商受命奄甸萬姓吕氏曰又言商之興亡亦本于用人漢孔氏曰亦于成湯之道得升大賜上天之光命王天下陳氏曰于夏言迪惟故于湯言亦越謂與夏同也耿光明也吕氏曰凡典禮命討昭著于天下者皆上帝之光命也成湯升陟王位而大治之使章條炳蔚所謂丕釐也王氏曰三宅居常伯常任準人之位者三俊有常伯常任準人之才者吕氏曰湯所以大治之者豈一手足之力哉亦曰圖任三宅三俊而已所用之三宅實能就其位而不曠其職所稱之三俊實能就是德而不浮其名三俊他日次補三宅者宅以位言俊以德言意者儲養待用或如説者所云也髙帝儲參陵平勃于身後迄能定再世之亂諸葛亮儲琬禕允維于身後亦能持循十數年況三代所以為社稷長慮者股肱腹心之任固宜豫求其繼也吕氏曰嚴敬賢者一話言一舉措惟大法式之故能用三宅三俊而俾之自竭所謂學伊尹而後臣之亦其一事也漢孔氏曰湯在商邑用三宅三俊之道和其邑其在四方用是大法見其聖德吕氏曰近者察之詳其情未易濟畿甸之協則純之至也逺者及之難其德未易徧觀法之同則大之至也曰邑曰四方者各極其逺近而言耳漢孔氏曰受德紂字帝乙愛焉為作善字而反大惡自强惟進用刑與暴德之人同于其國並為威虐乃惟衆習為過德之人同于其政言不任賢王氏曰桀紂所用非人皆本于躬有邪德故周公言桀紂必曰桀德受德吕氏曰羞刑者進任刑戮者也庶習者備諳衆醜者也唐孔氏曰暴德以暴虐為德逸德以過惡為德與暴德同國與惡德同政其事一也異其文耳漢孔氏曰天以紂惡故敬罰之乃使我周家王有華夏得用商所受天命同治萬姓吕氏曰欽者天之理紂之于罰背此理者也周之有夏順此理者也非有罰之者而罰至于亡國非有使之者而使其有夏是所謂天理也亦越文王武王克知三有宅心灼見三有俊心以敬事上帝立民長伯立政任人準夫牧作三事虎賁綴衣趣馬小尹左右攜僕百司庶府大都小伯藝人表臣百司太史尹伯庶常吉士司徒司馬司空亞旅夷微盧烝三亳阪尹文王惟克厥宅心乃克立兹常事司牧人以克俊有德文王罔攸兼于庶言庶獄庶慎惟有司之牧夫是訓用違庶獄庶慎文王罔敢知于兹亦越武王率惟敉功不敢替厥義德率惟謀從容德以並受此丕丕基吕氏曰又言文武所以得人漢孔氏曰亦于文武之道大行陳氏曰亦越言文武亦如湯也克知實能知之非疑似之知灼見灼然見之非髣髴之見克知灼見互文也吕氏曰文武之知三宅三俊皆曰心者葢君臣之相與萬化之原也苟貌親口恵相期于肝膈之外則既無其本矣漢孔氏曰言文武知三宅三俊故能以敬事上天立民正長謂郊祀天建諸侯吕氏曰夏曰尊上帝商曰丕釐上帝周曰敬事上帝事天以人三代所共也唐孔氏曰下句立政以下歴言朝廷之臣與蠻夷衆君此立民長伯主為諸侯文王未得封建其建諸侯謂武王時耳孫氏曰王制云五國以為屬屬有長二百一十國以為州州有伯漢孔氏曰文武亦法禹湯以立政常任準人及牧治為天地人之三事張氏曰所謂立政豈無紀綱賞罰豈無典章文物周公乃無一言及之獨曰任人準夫牧作三事而已蘇氏曰任人常任也準夫準人也牧常伯也此三事皆大臣也漢孔氏曰趣馬掌馬之官言此三者雖小官長必慎擇其人虎賁綴衣説見上文唐孔氏曰周禮趣馬為校人屬官馬一十二疋立趣馬一人掌賛正良馬而齊其飲食漢孔氏曰雖左右攜持器物之僕及百官有司主劵契藏吏亦皆擇人蔡氏曰攜僕謂寺人内小臣等也新安王氏曰凡治事曰百司凡掌財曰庶府王氏曰百司若司裘司服之類庶府若泉府玉府之類漢孔氏曰小臣猶皆慎擇其人況大都邑之小長以道藝為表幹之臣及百官有司之職可以非其任乎唐孔氏曰大都邑之小長謂公卿都邑之内大夫士及邑宰之屬都邑之屬官謂之小長周官大宰云乃施則于都鄙而建其長立其兩設其伍陳其殷長謂公卿兩謂兩卿伍謂大夫殷謂衆士是也陳氏曰周禮以小都之田任縣地以大都之田任疆地註小都卿之采邑大都公之采邑王子弟之食邑今止言大都舉其重也蘇氏曰藝人執伎以事上者表外也有兩百司此其外者吕氏曰表對裏之辭上文百司内百司若内司服之屬所謂裏臣也此百司外百司若外司服之屬所謂表臣也漢孔氏曰太史下大夫掌邦六典之貳唐孔氏曰太宰掌其正太史掌其貳所掌事重故特言之漢孔氏曰尹伯長官大夫唐孔氏曰周禮每官各有長若太史為史官之長大司樂為樂官之長皆是吕氏曰三宅立政之本也凡官吏皆在内外百司之中至于特見其名者則有意焉虎賁綴衣趣馬小尹左右攜僕以扈從親近而見庶府以冗賤人所易忽而見藝人以其或興淫巧機祥蕩上心而見太史以奉諱惡公天下後世之是非而見尹伯以大小相維體統所係而見若大都小伯則分治郊圻不與百司之數者也蔡氏曰既歴序數職而緫之曰庶常吉士言在文武之庭無非常人吉士也吕氏曰長短雖不齊要皆良善之人不容一慘刻傾險者投其間此文武所以立周家忠厚之治體也漢孔氏曰此有三卿及次卿衆大夫則是文武未伐紂時舉文武之初以為法則司徒司馬司空亞旅説見牧誓漢孔氏曰蠻夷微盧之衆師及亳人之歸文王者三所為之立監及阪地之尹長皆用賢唐孔氏曰牧誓有微盧此言夷微盧以見彭濮之等諸夷也烝訓衆也三亳鄭云東成臯南轘轅西降谷皇甫謐云三處之地皆名為亳蒙為北亳穀熟為南亳偃師為西亳未知誰是此經阪下言尹則夷微以下一尹緫之林氏曰尹言夷微盧之衆及三亳之地與夫阪險之地為之尹長者吕氏曰司徒以下惟列官名而無他語葢承上庶常吉士之文以内見外也漢孔氏曰文王惟其能居心乃能立此常事司牧人用能俊有德者真氏曰文王之宅厥心即禹所謂安汝止不言克宅厥心而言克厥宅心者猶臯陶不曰慎修厥身而曰慎厥身修也蔡氏曰文王惟能其三宅之心能者能之也知之至信之篤之謂故能立此常任常伯皆能俊有德也不言準人因上文言文王用人而申克知三有宅心之説故略之也漢孔氏曰文王無所兼知于毁譽衆言及衆刑獄衆當所慎之事亦惟慎擇有司牧夫而已勞于求才逸于任賢是萬民順法用違法衆獄衆慎之事文王一無敢自知于此委任賢能而已吕氏曰凡奏請詞訟所謂庶言凡刑辟訊鞫所謂庶獄凡事皆當謹戒所謂庶慎蔡氏曰有司有職主者牧夫牧人也文王不敢下侵庶職惟訓勑其用命及違命者而已吕氏曰庶獄庶慎文王罔敢知于兹者申言之也不曰罔知于兹而曰罔敢知于兹者徒言罔知是老莊之無為也惟能罔敢知然後見文王之敬畏思不出其位之意漢孔氏曰亦于武王循惟文王撫安天下之功不敢廢其義德奉遵父道循惟謀從文王寛容之德故君臣以並受此大大之基業𫝊之子孫蔡氏曰義德義德之人容德容德之人葢義德有撥亂反正之才容德有休休樂善之量皆成德之人也周公言武王率循文王之功而不敢替其所用義德之人率循文王之謀而不敢違其容德之士吕氏曰文武如此冝並受丕丕之甚建八百年盛大之業也按蔡氏以宅心為三宅則一篇之中宅字始恊常事司牧人一句蔡説為當常事即宅事司牧人即宅牧不言準人以下文見也庶言庶獄庶慎意皆從準人刑獄上説庶言吕氏以為奏請詞訟近之庶獄要囚訊鞫時庶慎如下文兹式有慎列用中罰葢罪定用法時尤須慎之也此言罔兼庶言庶獄庶慎已而去其一言罔敢知庶獄庶慎及告成王勿誤庶獄庶慎已而又去其一獨言勿誤于庶獄葢庶言庶獄庶慎皆是説刑獄或去其一或去其二省文也有司牧夫蔡氏指為牧人尤當此數語説準説牧而不及事亦省文也大槩立政以用人為重用人以三宅為重此章先言事牧而不及準繼言準牧而不及事雖參差不齊而三宅粲然其間矣至于義德容德則蔡氏之説尤當嗚呼孺子王矣繼自今我其立政立事準人牧夫我其克灼知厥若丕乃俾亂相我受民和我庶獄庶慎時則勿有閒之自一話一言我則未惟成德之彦以乂我受民陳氏曰此下三節三以孺子王矣發之所以戒成王漢孔氏四嘆稚子今已為王矣唐孔氏曰自此以下言繼自今者凡四凡人靡不有初鮮克有終戒成王使繼續從今已往常用賢也張氏曰繼自今立政惟曰立事準人牧夫我其克灼知厥若而已知三宅之心見三俊之心即是立政吕氏曰物莫不有所順水順乎下火順乎上葢有湮之而不下鬱之而不上者矣然終非其所順也人之于善豈無飾其外而勉為者苟明知其所順則君子小人不得而遁矣漢孔氏曰則乃大使治之能治我所受天民和平我衆獄衆慎之事如是則勿有以代之言不可復變陳氏曰使之治事使之相民使之和庶獄庶慎而又勿以小人閒之此任人之要也王氏曰受民者王者之得民上受之于天下受之于先王鄭氏曰閒貳也漢孔氏曰言政當用一善善在一言而已欲其口無擇言如此我則終惟有成德之美以治我所受之民王氏曰話即言也謂一話一言無不在賢者也張氏曰言夏曰尊上帝言商曰丕釐上帝言文武曰敬事上帝至于誨成王止言乂我受民能治民即能事天也陳氏曰相民謂佑助之乂民謂理治之互相備也嗚呼予旦已受人之徽言咸告孺子王矣繼自今文子文孫其勿誤于庶獄庶慎惟正是乂之自古商人亦越我周文王立政立事牧夫準人則克宅之克由繹之兹乃俾乂國則罔有立政用憸人不訓于德是罔顯在厥世繼自今立政其勿以憸人其惟吉士用勱相我國家漢孔氏曰嘆所受賢聖説禹湯之美言皆以告稚子王矣蔡氏曰前所言禹湯文武任人之事無非至美之言我聞之于人者漢孔氏曰文子文孫文王之子孫從今以往惟以正是之道治衆獄衆慎其勿誤蔡氏曰成王之時法度彰禮樂著守成尚文故曰文誤失也吕氏曰簡畀正人付之獄慎使之以正法斷刑所謂正是乂之也勿誤者言其敬之之心正者言其治之之體漢孔氏曰言用古商湯亦于我周文王蔡氏曰又言自古及商人及我周文王所以立政用三宅之道繹如繹絲謂窮其端緒也吕氏曰克宅之則人與位俱稱克繹之則表與裏相符繹者由其言而繹其心也由其才而繹其德也由其發舒于當時而繹其持久于歲晏者果何如也審如是然後俾之為治既俾之為治則一聽其所為矣漢孔氏曰國則罔有立政用憸利之人憸人不順于德是使其君無顯明在其世吕氏曰君子陽類用則升其國于明昌小人隂類用則降其國于晻昧隂陽升降亦各從其類也漢孔氏曰惟以吉士用勉治我國家蘇氏曰勱勉也吕氏曰文武百官既庶常吉士周公復言其惟吉士同時召公進戒歌吉士者亦至再焉穆王之世周道衰矣其命伯冏吉士猶在口也是則周家父祖所傳師保所訓子孫所守惟在于吉士一代之治體葢可識矣小人而謂之憸人者形容其沾沾便㨗之情状斯葢吉士之反國家之所嚴惡者也今文子文孫孺子王矣其勿誤于庶獄惟有司之牧夫其克詰爾戎兵以陟禹之迹方行天下至于海表罔有不服以覲文王之耿光以揚武王之大烈嗚呼繼自今後王立政其惟克用常人漢孔氏曰獨言衆獄有司欲其重刑慎官人吕氏曰復呼成王而告以獄之重也獄何為而重也民命所係亦國命所係也導迎善氣祈天永命者獄也並告無辜無世在下者亦獄也冝周公獨言而獨戒之有司牧夫説見上文漢孔氏曰其當能治汝戎服兵器威懐並設以升禹治水之舊迹陳氏曰詰治也如數軍實練材勇講武習戰之類漢孔氏曰海表蠻夷戎狄無有不服化者所以見祖之光明揚父之大業吕氏曰兵者刑之大也既言庶獄而遂繼以治兵之戒焉繼世之君多耽于逸樂弛備忘戰而堕祖宗之業故戒其必能詰治戎兵徧登大禹九州之舊迹有截其所嚴正方整行于天下以震耀文武之光烈是役也葢奮張其氣而不使之堕偷操握其衆而不使之扞格摧遏其姦而不使之覬覦誠保位之良圖也或謂此言得無起人主喜兵之患乎曰周公詰戎兵之訓繼勿誤庶獄之後也庶獄尚恐其誤況戎兵乎推勿誤庶獄之心舉詰爾戎兵之制必非得已不已而輕用民命者也漢孔氏曰其惟能用賢才為常人不可以天官有所私吕氏曰常人有德之人與吉士異名同實者也其于國也若食之穀粟衣之桑麻得之則生不得則死者也然毎多重遲木訥例不能與小慧新進者爭長于頰舌之間故世主惑于取舍而治亂分焉此周公慨嘆而致意于卒章也歟周公若曰太史司冦蘇公式敬爾由獄以長我王國兹式有慎以列用中罰蔡氏曰此周公因言慎罰而以蘇公敬獄之事告之漢孔氏曰併告太史漢孔氏曰忿生為武王司宼封蘇國能用法敬汝所用之獄以長施行于我王國言主獄當求蘇公之比真氏曰式敬由獄蘇公所以永王國虐用五刑苗民所以絶厥世漢孔氏曰此法有所慎行必以其列用中罰不輕不重蘇氏曰列者前後相比猶今之言例也以舊事為比而用其輕重之中也呼太史而告之者欲書之于史以為後世法者也尚書纂傳卷三十五
